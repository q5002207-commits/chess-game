<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام أحمد المحترف - المطور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .menu-btn { display: block; width: 100%; max-width: 350px; padding: 20px; margin: 10px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.2em; cursor: pointer; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 10px; border-radius: 10px; text-align: center; color: white; margin-bottom: 10px; }
        
        /* الشطرنج - تحديد المربعات المتاحة */
        #board { width: 380px !important; max-width: 95vw !important; border: 3px solid #333; }
        .highlight-possible { position: relative; }
        .highlight-possible::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 15px; height: 15px; background: rgba(0, 255, 0, 0.4); border-radius: 50%; pointer-events: none; }
        .highlight-selected { background: rgba(255, 255, 0, 0.3) !important; }

        /* المافيا */
        .mafia-card { background: #1a1a1a; padding: 20px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; text-align: center; cursor: pointer; }
        .role-display { display: none; font-size: 1.3em; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
        .locked { opacity: 0.1; pointer-events: none; }
        .fade-out { opacity: 0; transition: 0.5s; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #000; color: #0f0; border: 1px solid #da291c; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="color:#da291c; text-align:center;">AHMED PRO</h1>
        <button class="menu-btn" onclick="showGame('chess')">♟️ شطرنج (مع دليل حركات)</button>
        <button class="menu-btn" onclick="showGame('mafia')">🕵️ موزع مافيا (نظام 10+)</button>
    </div>

    <div id="chess-section" class="hidden">
        <button onclick="location.reload()" style="color:white; background:#333; border:none; padding:5px 15px; margin-bottom:10px; cursor:pointer;">🏠 عودة</button>
        <div class="header">ID الخاص بك: <span id="my-id">...</span></div>
        <div id="board"></div>
        <div style="width:100%; max-width:400px; margin-top:10px;">
            <input type="text" id="friendId" placeholder="ID الخصم">
            <button onclick="connectToFriend()" style="width:100%; padding:10px; background:#da291c; color:white; border:none; border-radius:5px;">تحدي الآن</button>
        </div>
    </div>

    <div id="mafia-section" class="hidden">
        <button onclick="location.reload()" style="color:white; background:#333; border:none; padding:5px 15px; margin-bottom:10px; cursor:pointer;">🏠 عودة</button>
        <div class="header">نظام المافيا المطور</div>
        <div id="mafia-setup" style="width:350px;">
            <input type="text" id="playerName" placeholder="اسم اللاعب">
            <button onclick="addPlayer()" style="width:100%; padding:10px; background:#0055ff; color:white; border:none;">إضافة +</button>
            <div id="player-list" style="margin:10px 0; font-size:0.8em;"></div>
            <button onclick="distributeRoles()" style="width:100%; padding:15px; background:green; color:white; border:none; font-weight:bold;">توزيع الأدوار</button>
        </div>
        <div id="mafia-display" class="hidden" style="width:350px;">
            <div id="narrator-box" style="background:#da291c; color:white; padding:10px; border-radius:5px; text-align:center; margin-bottom:10px;"></div>
            <div id="cards-container"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        // --- إدارة الأقسام ---
        function showGame(g) {
            $('#main-menu').addClass('hidden');
            if(g === 'chess') { $('#chess-section').removeClass('hidden'); initChess(); }
            else { $('#mafia-section').removeClass('hidden'); }
        }

        // --- الشطرنج (دليل الحركات) ---
        var board = null, game = new Chess(), peer = null, conn = null;
        var myColor = 'w', selectedSq = null;

        function initChess() {
            let id = "Ahmed_" + Math.floor(1000 + Math.random()*9000);
            peer = new Peer(id);
            peer.on('open', i => $('#my-id').text(i));
            peer.on('connection', c => { conn = c; myColor = 'w'; setupConn(); });
            
            board = Chessboard('board', {
                draggable: false, position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $(document).on('click', '.square-55d63', function() {
                let sq = $(this).data('square');
                onSquareClick(sq);
            });
        }

        function onSquareClick(sq) {
            // مسح العلامات السابقة
            $('.square-55d63').removeClass('highlight-possible highlight-selected');

            let move = game.move({ from: selectedSq, to: sq, promotion: 'q' });

            if (move) {
                board.position(game.fen());
                if(conn) conn.send(move);
                selectedSq = null;
            } else {
                let piece = game.get(sq);
                if (piece && piece.color === game.turn() && piece.color === myColor) {
                    selectedSq = sq;
                    $('.square-' + sq).addClass('highlight-selected');
                    // إظهار المربعات المتاحة
                    let moves = game.moves({ square: sq, verbose: true });
                    moves.forEach(m => $('.square-' + m.to).addClass('highlight-possible'));
                } else {
                    selectedSq = null;
                }
            }
        }

        function connectToFriend() {
            let fId = $('#friendId').val();
            if(fId) { conn = peer.connect(fId); myColor = 'b'; board.orientation('black'); setupConn(); }
        }

        function setupConn() {
            conn.on('data', m => { game.move(m); board.position(game.fen()); });
        }

        // --- المافيا (قوانين 10+) ---
        let players = [];
        function addPlayer() {
            let p = $('#playerName').val();
            if(p) { players.push(p); $('#player-list').append(p + " | "); $('#playerName').val(""); }
        }

        function distributeRoles() {
            if(players.length < 4) return alert("لازم 4 على الأقل!");
            let rIdx = Math.floor(Math.random() * players.length);
            let narrator = players[rIdx];
            let actives = players.filter((_, i) => i !== rIdx);
            
            let roles = [];
            // تطبيق القوانين تبعتك يا أحمد
            if (actives.length >= 10) {
                roles.push("مافيا القتل 🔪", "مافيا التسكيت 🤫", "دكتور 💉");
            } else {
                roles.push("مافيا 💀", "دكتور 💉");
            }

            while(roles.length < actives.length) roles.push("مواطن 👨‍🌾");
            roles.sort(() => Math.random() - 0.5);

            $('#mafia-setup').hide();
            $('#mafia-display').removeClass('hidden');
            $('#narrator-box').text("🎤 الراوي: " + narrator);

            actives.forEach((p, i) => {
                let card = $(`<div class="mafia-card"><strong>${p}</strong><div class="role-display">${roles[i]}</div></div>`);
                card.click(function() {
                    if($(this).hasClass('locked')) return;
                    $(this).find('strong').hide();
                    $(this).find('.role-display').show();
                    $('.mafia-card').addClass('locked');
                    setTimeout(() => { 
                        $(this).addClass('fade-out'); 
                        setTimeout(() => { $(this).css('visibility', 'hidden'); $('.mafia-card').removeClass('locked'); }, 500);
                    }, 2500);
                });
                $('#cards-container').append(card);
            });
        }
    </script>
</body>
</html>
