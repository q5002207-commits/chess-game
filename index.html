<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مافيا أونلاين - نظام أحمد المحترف</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #0f0; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 2px solid #da291c; padding: 20px; border-radius: 15px; background: #111; }
        h1 { color: #da291c; text-shadow: 0 0 10px #da291c; }
        input { width: 80%; padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #da291c; background: #000; color: #0f0; }
        button { padding: 10px 20px; background: #da291c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .player-list { margin: 20px 0; padding: 10px; border: 1px dashed #555; }
        .role-box { font-size: 1.8em; margin-top: 20px; color: #fff; padding: 20px; border: 2px solid #0f0; display: none; border-radius: 10px; background: #002200; }
        .status { color: #888; font-size: 0.9em; margin-top: 10px; }
        #board { width: 350px; margin: 20px auto; }
        
        /* شاشة الدخول */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h1 style="font-size: 2.5em;">AHMED PRO SYSTEM</h1>
    <p>جاري التحميل...</p>
</div>

<div class="container">
    <h1>🕵️ مافيا أونلاين</h1>
    
    <div id="setup-section">
        <p>معرفك الخاص (ID): <strong id="my-id" style="color: #fff;">جاري التحميل...</strong></p>
        <div id="host-controls">
            <p style="color: #da291c;">أنت رئيس الغرفة (الراوي)</p>
            <div class="player-list" id="connected-players">اللاعبين المتصلين: (0)</div>
            <button onclick="distributeRoles()">توزيع الأدوار على الجميع 🃏</button>
        </div>
        <div id="join-controls" style="margin-top: 20px;">
            <input type="text" id="host-id-input" placeholder="أدخل ID رئيس الغرفة">
            <button onclick="joinRoom()">انضمام للغرفة 🔗</button>
        </div>
    </div>

    <div id="chess-section" style="margin-top: 30px; border-top: 1px solid #444; padding-top: 20px;">
        <h3>♟️ ساحة الشطرنج</h3>
        <div id="board"></div>
        <input type="text" id="chess-opponent-id" placeholder="ID الخصم للشطرنج">
        <button onclick="connectChess()">تحدي شطرنج ⚔️</button>
    </div>

    <div id="role-display" class="role-box"></div>
    <div id="game-status" class="status"></div>
</div>

<script>
    // إخفاء شاشة الدخول فوراً عند التحميل
    window.onload = function() {
        $('#welcome-screen').fadeOut(500);
    };

    let peer = null;
    let connections = [];
    let isHost = true;
    let myId = "Ahmed_" + Math.floor(1000 + Math.random() * 8999);

    peer = new Peer(myId);

    peer.on('open', (id) => {
        $('#my-id').text(id);
        // تشغيل الشطرنج مع رابط الصور الصحيح
        initChess();
    });

    // --- نظام المافيا (كودك الأصلي) ---
    peer.on('connection', (conn) => {
        if(conn.metadata && conn.metadata.type === 'chess') return; // تجاهل اتصالات الشطرنج هنا
        isHost = true;
        $('#join-controls').hide();
        connections.push(conn);
        updatePlayerList();
        conn.on('data', (data) => {
            if (data.type === 'role') showRole(data.role);
        });
    });

    function updatePlayerList() {
        $('#connected-players').text(`اللاعبين المتصلين: (${connections.length})`);
    }

    function joinRoom() {
        let hostId = $('#host-id-input').val();
        if (!hostId) return alert("أدخل الـ ID أولاً");
        isHost = false;
        let conn = peer.connect(hostId);
        conn.on('open', () => {
            $('#setup-section').hide();
            $('#game-status').text("متصل.. بانتظار توزيع الأدوار.");
        });
        conn.on('data', (data) => {
            if (data.type === 'role') showRole(data.role);
        });
    }

    function distributeRoles() {
        if (connections.length < 1) return alert("لا يوجد لاعبين متصلين!");
        let roles = ["مافيا 🔪", "دكتور 💉", "شريف 👮", "مواطن 👨‍🌾", "مواطن 👨‍🌾", "جاسوس 🕵️"];
        let shuffledRoles = roles.sort(() => Math.random() - 0.5);
        connections.forEach((conn, index) => {
            let roleToSend = shuffledRoles[index % shuffledRoles.length];
            conn.send({ type: 'role', role: roleToSend });
        });
        $('#game-status').text("تم إرسال الأدوار!");
    }

    function showRole(role) {
        $('#role-display').text(role).fadeIn();
    }

    // --- نظام الشطرنج (مع الصور الشغالة) ---
    var board = null, game = new Chess(), chessConn = null;
    function initChess() {
        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            // هذا الرابط المضمون لصور القطع
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop
        });
    }

    function onDrop(source, target) {
        var move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        if(chessConn) chessConn.send({ type: 'chess-move', move: move });
    }

    function connectChess() {
        let oppId = $('#chess-opponent-id').val();
        chessConn = peer.connect(oppId, { metadata: { type: 'chess' } });
        chessConn.on('data', (data) => {
            if(data.type === 'chess-move') {
                game.move(data.move);
                board.position(game.fen());
            }
        });
    }
</script>

</body>
</html>
