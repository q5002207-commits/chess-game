<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بوابة أحمد المحترف - النسخة الكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            user-select: none;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(218, 41, 28, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(218, 41, 28, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .glow-particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .login-card {
            background: linear-gradient(145deg, #0f121f, #03060c);
            width: 90%;
            max-width: 480px;
            border-radius: 48px;
            padding: 40px 28px 50px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(218, 41, 28, 0.2), 0 0 0 5px rgba(0,0,0,0.3);
            border: 1px solid rgba(218, 41, 28, 0.5);
            transition: transform 0.3s ease;
            animation: floatGlow 3s infinite alternate;
        }

        @keyframes floatGlow {
            0% { box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(218, 41, 28, 0.2); transform: translateY(0px);}
            100% { box-shadow: 0 40px 60px rgba(218, 41, 28, 0.3), 0 0 0 3px rgba(218, 41, 28, 0.6); transform: translateY(-6px);}
        }

        .login-icon {
            font-size: 80px;
            color: #da291c;
            text-shadow: 0 0 15px #da291c, 0 0 30px rgba(218,41,28,0.5);
            margin-bottom: 15px;
        }

        .login-card h1 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #da291c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .login-sub {
            color: #b0b7d0;
            font-weight: 400;
            border-bottom: 1px dashed #da291c;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .input-group {
            position: relative;
            margin: 25px 0;
        }

        .input-group i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #da291c;
            font-size: 1.4rem;
            transition: 0.3s;
        }

        .login-card input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(10, 15, 30, 0.8);
            border: 1.5px solid #2a2f45;
            border-radius: 60px;
            font-size: 1.1rem;
            color: #fff;
            font-family: 'Cairo', monospace;
            transition: all 0.3s;
            text-align: right;
            backdrop-filter: blur(4px);
        }

        .login-card input:focus {
            outline: none;
            border-color: #da291c;
            box-shadow: 0 0 18px rgba(218, 41, 28, 0.5);
            background: #080c18;
        }

        .login-card button {
            background: linear-gradient(95deg, #da291c, #b71c0e);
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            color: white;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 20px rgba(218, 41, 28, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .login-card button:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #f32c1c, #da291c);
            box-shadow: 0 12px 28px rgba(218, 41, 28, 0.6);
        }

        .guest-hint {
            color: #da291c;
            margin-top: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 20px;
        }

        .hidden {
            display: none;
        }

        .menu-btn, .back-home, button {
            font-family: 'Cairo', sans-serif;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 25px;
            margin: 15px 0;
            background: linear-gradient(145deg, #11161f, #05080f);
            border: 2px solid #da291c;
            color: white;
            border-radius: 15px;
            font-size: 1.4em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-btn:hover {
            background: #da291c;
            box-shadow: 0 0 20px #da291c;
        }

        .back-home {
            background: #333;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            border: none;
            font-size: 0.8em;
        }

        .header {
            width: 100%;
            max-width: 400px;
            background: #da291c;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            color: white;
            margin-bottom: 10px;
        }

        #board {
            width: 380px !important;
            max-width: 95vw !important;
            border: 4px solid #222;
            border-radius: 8px;
        }

        .mafia-card, .spy-card {
            background: #1a1a1a;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #444;
            cursor: pointer;
            text-align: center;
        }

        .narrator-box {
            background: #0055ff;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            border: 2px solid white;
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        .locked {
            pointer-events: none;
            opacity: 0.4;
        }

        .vote-btn {
            background: #222;
            color: yellow;
            border: 1px solid yellow;
            margin: 5px;
            width: auto;
            display: inline-block;
            padding: 10px;
            border-radius: 8px;
        }

        #app-main {
            width: 100%;
            max-width: 500px;
            margin: auto;
        }
    </style>
</head>
<body>

<div id="glowCanvas" class="glow-particles"></div>

<!-- واجهة الدخول الفخمة -->
<div id="luxury-login" class="login-overlay">
    <div class="login-card">
        <div class="login-icon">
            <i class="fas fa-crown"></i>
        </div>
        <h1>AHMED PRO</h1>
        <div class="login-sub">البوابة الذهبية</div>
        <div class="input-group">
            <i class="fas fa-user-astronaut"></i>
            <input type="text" id="royalUsername" placeholder="اسم القائد" autocomplete="off">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="royalPass" placeholder="كلمة الدخول">
        </div>
        <button id="enterCastleBtn">
            <i class="fas fa-key"></i> دخول إلى نظام أحمد
        </button>
        <div class="guest-hint">
            <i class="fas fa-star-of-life"></i> أدخل أي اسم وكلمة سر (أي حرفين أو أكثر)
        </div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="app-main" style="display: none;">
    <div id="main-menu">
        <h1 style="color:#da291c; text-align:center; text-shadow:0 0 8px red;">AHMED PRO SYSTEM</h1>
        <button class="menu-btn" onclick="showGame('chess')">♟️ ساحة الشطرنج</button>
        <button class="menu-btn" onclick="showGame('mafia')">🕵️ موزع المافيا (قانون أحمد)</button>
        <button class="menu-btn" onclick="showGame('spy')">🔍 لعبة الجاسوس (أوفلاين)</button>
        <button class="menu-btn" style="border-color: #0055ff;" onclick="showGame('spyOnline')">🌐 الجاسوس (أونلاين)</button>
    </div>

    <div id="chess-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 القائمة الرئيسية</button>
        <div class="header"><h3>🏆 شطرنج أحمد المحترف 🏆</h3><div id="my-id" style="font-size:0.7em;">جاري الاتصال...</div></div>
        <div id="board"></div>
    </div>

    <div id="mafia-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 القائمة الرئيسية</button>
        <div class="header"><h3>🕵️‍♂️ نظام المافيا المطور</h3></div>
        <div id="mafia-setup">
            <input type="text" id="mafiaPlayerName" placeholder="اسم اللاعب...">
            <button onclick="addMafiaPlayer()">إضافة لاعب</button>
            <div id="mafia-preview" style="margin:10px; color:#888;"></div>
            <button style="background:green;" onclick="startMafiaDist()">توزيع الأدوار + الراوي</button>
        </div>
        <div id="mafia-board" class="hidden">
            <div id="narrator-name"></div>
            <div id="mafia-cards-container"></div>
        </div>
    </div>

    <div id="spy-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 القائمة الرئيسية</button>
        <div class="header"><h3>🔍 لعبة الجاسوس (أوفلاين)</h3></div>
        <div id="spy-setup">
            <input type="text" id="spyPlayerName" placeholder="اسم اللاعب...">
            <button onclick="addSpyPlayer()">إضافة لاعب</button>
            <div id="spy-preview" style="margin:10px; color:#888;"></div>
            <button style="background:green;" onclick="startSpyDist()">توزيع الأماكن</button>
        </div>
        <div id="spy-board" class="hidden">
            <div id="spy-cards-container"></div>
        </div>
    </div>

    <div id="spy-online-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 القائمة الرئيسية</button>
        <div class="header"><h3>🌐 الجاسوس أونلاين (غرف)</h3></div>
        <div id="spy-online-setup">
            <input type="text" id="spyNick" placeholder="اسمك">
            <button onclick="hostRoom()">إنشاء غرفة (أدمن)</button>
            <div style="margin:10px;">--- أو ---</div>
            <input type="text" id="roomCode" placeholder="كود الغرفة">
            <button style="background:#444;" onclick="joinRoom()">دخول الغرفة</button>
        </div>
        <div id="lobby" class="hidden">
            <div id="display-room-id" style="color:yellow; margin-bottom:10px;"></div>
            <div id="online-players-list"></div>
            <button id="start-btn" style="background:green; margin-top:20px; display:none;" onclick="startOnlineGame()">ابدأ اللعبة</button>
        </div>
        <div id="game-play" class="hidden">
            <div class="spy-card" onclick="$(this).find('.role-display').toggle()">
                <p>اضغط لإظهار/إخفاء المكان</p>
                <div id="my-role" class="role-display" style="color:#0f0; display:none;"></div>
            </div>
            <div id="voting-area" style="margin-top:20px;">
                <h4 id="vote-title">صوّت للجاسوس:</h4>
                <div id="vote-btns"></div>
                <div id="vote-log-container" style="margin-top:20px; width:100%;"></div>
                <div id="final-result" style="margin-top:20px; color:red; font-size:1.5em;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
    // تأثير الجسيمات
    function createParticles() {
        const canvas = document.createElement('canvas');
        canvas.id = 'particleCanvas';
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '0';
        document.body.appendChild(canvas);
        
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let particles = [];
        for(let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 1,
                alpha: Math.random() * 0.5 + 0.2,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                color: `rgba(218, 41, 28, ${Math.random() * 0.5 + 0.2})`
            });
        }
        
        function animate() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                if(p.x < 0) p.x = canvas.width;
                if(p.x > canvas.width) p.x = 0;
                if(p.y < 0) p.y = canvas.height;
                if(p.y > canvas.height) p.y = 0;
            }
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    }
    createParticles();

    // نظام الدخول - مبسط ويعمل 100%
    const loginOverlay = document.getElementById('luxury-login');
    const mainApp = document.getElementById('app-main');
    const enterBtn = document.getElementById('enterCastleBtn');
    const usernameInput = document.getElementById('royalUsername');
    const passwordInput = document.getElementById('royalPass');

    function validateAndEnter() {
        let username = usernameInput.value.trim();
        let password = passwordInput.value.trim();
        
        // الشرط: أي اسم غير فارغ وأي كلمة سر غير فارغة (أي حرفين أو أكثر)
        if(username !== "" && password !== "") {
            // تخزين اسم المستخدم
            localStorage.setItem('proUser', username);
            
            // تأثير الخروج الفاخر
            loginOverlay.style.transition = 'opacity 0.5s ease, visibility 0.5s ease';
            loginOverlay.style.opacity = '0';
            
            setTimeout(() => {
                loginOverlay.style.display = 'none';
                mainApp.style.display = 'block';
                document.body.style.overflow = 'auto';
                
                // رسالة ترحيب
                alert(`✨ مرحباً بك يا ${username} في بوابة أحمد المحترف ✨`);
            }, 500);
        } else {
            // اهتزاز للتنبيه
            const card = document.querySelector('.login-card');
            card.style.animation = 'none';
            setTimeout(() => {
                card.style.animation = 'shake 0.3s ease-in-out 0s 2';
            }, 10);
            setTimeout(() => { card.style.animation = ''; }, 600);
            
            alert('⚠️ الرجاء إدخال اسم المستخدم وكلمة السر ⚠️');
        }
    }

    // إضافة تأثير الاهتزاز
    const styleShake = document.createElement('style');
    styleShake.textContent = `
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    `;
    document.head.appendChild(styleShake);
    
    enterBtn.addEventListener('click', validateAndEnter);
    
    // دخول بالضغط على Enter
    usernameInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') validateAndEnter();
    });
    passwordInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') validateAndEnter();
    });

    // باقي كود الألعاب
    let isLocked = false;
    let sPlayers = [];
    let mPlayers = [];
    let peer = null;
    let players = [];
    let myNameOnline = "";
    let host = false;
    let votesReceived = [];

    const spyPlaces = [
        "مستشفى", "مدرسة", "غابة", "طائرة", "مطعم", "فندق", "مطار", "سفينة", "مخيم", "قلعة", "مسجد", "الأردن", "فلسطين", "شاورما", "منسف", "تلفزيون", "هاتف", "غرفة نوم", "سيارة",
        "المول", "السوبر ماركت", "الحلاق", "السينما", "المسرح", "البنك", "مخبز", "صيدلية", "الجامعة", "ملعب كرة قدم", "شاطئ", "جزيرة", "البتراء", "وادي رم", "البحر الميت"
    ];

    window.showGame = function(t) {
        $('#main-menu').hide();
        if(t === 'chess') { 
            $('#chess-section').removeClass('hidden'); 
            initChess(); 
        }
        else if(t === 'mafia') $('#mafia-section').removeClass('hidden');
        else if(t === 'spy') $('#spy-section').removeClass('hidden');
        else if(t === 'spyOnline') $('#spy-online-section').removeClass('hidden');
    };

    window.addMafiaPlayer = function() {
        let n = $('#mafiaPlayerName').val().trim();
        if(n) { 
            mPlayers.push(n); 
            $('#mafia-preview').text("اللاعبين: " + mPlayers.join(" - ")); 
            $('#mafiaPlayerName').val("").focus(); 
        }
    };

    window.startMafiaDist = function() {
        if(mPlayers.length < 4) return alert("لازم 4 لاعبين على الأقل!");
        let nIdx = Math.floor(Math.random() * mPlayers.length);
        let nName = mPlayers[nIdx];
        let acts = mPlayers.filter((_, i) => i !== nIdx);
        let roles = acts.map((_, i) => i === 0 ? "مافيا 🔪" : "مواطن 👨‍🌾");
        roles.sort(() => Math.random() - 0.5);
        
        $('#mafia-setup').hide(); 
        $('#mafia-board').removeClass('hidden');
        $('#narrator-name').html(`<div class="narrator-box">🎤 الراوي: ${nName}</div>`);
        let cont = $('#mafia-cards-container').empty();
        
        acts.forEach((p, i) => {
            let card = $(`<div class="mafia-card" id="mc-${i}"><strong id="mpn-${i}">${p}</strong><div class="role-display" id="mrl-${i}" style="display:none;">${roles[i]}</div></div>`);
            card.click(function() {
                if(isLocked) return;
                isLocked = true;
                $(`#mpn-${i}`).hide();
                $(`#mrl-${i}`).show();
                setTimeout(() => {
                    $(`#mc-${i}`).addClass('fade-out');
                    setTimeout(() => { 
                        $(`#mc-${i}`).css('visibility', 'hidden'); 
                        isLocked = false; 
                    }, 500);
                }, 3000);
            });
            cont.append(card);
        });
    };

    window.addSpyPlayer = function() {
        let n = $('#spyPlayerName').val().trim();
        if(n) { 
            sPlayers.push(n); 
            $('#spy-preview').text("اللاعبين: " + sPlayers.join(" - ")); 
            $('#spyPlayerName').val("").focus(); 
        }
    };

    window.startSpyDist = function() {
        if(sPlayers.length < 3) return alert("لازم 3 لاعبين على الأقل!");
        let place = spyPlaces[Math.floor(Math.random() * spyPlaces.length)];
        let spyIdx = Math.floor(Math.random() * sPlayers.length);
        let roles = sPlayers.map((_, i) => i === spyIdx ? "🕵️ أنت الجاسوس" : `📍 المكان: ${place}`);
        
        $('#spy-setup').hide(); 
        $('#spy-board').removeClass('hidden');
        let cont = $('#spy-cards-container').empty();
        
        sPlayers.forEach((p, i) => {
            let card = $(`<div class="spy-card" id="sc-${i}"><strong id="spn-${i}">${p}</strong><div class="role-display" id="srl-${i}" style="display:none; color:#00ff00;">${roles[i]}</div></div>`);
            card.click(function() {
                if(isLocked) return;
                isLocked = true;
                $(`#spn-${i}`).hide();
                $(`#srl-${i}`).show();
                setTimeout(() => {
                    $(`#sc-${i}`).addClass('fade-out');
                    setTimeout(() => { 
                        $(`#sc-${i}`).css('visibility', 'hidden'); 
                        isLocked = false; 
                    }, 500);
                }, 3000);
            });
            cont.append(card);
        });
    };

    window.hostRoom = function() {
        myNameOnline = $('#spyNick').val();
        if(!myNameOnline) return alert("اكتب اسمك");
        host = true;
        let id = "ROOM_" + Math.floor(100 + Math.random() * 899);
        peer = new Peer(id);
        peer.on('open', (i) => {
            $('#spy-online-setup').hide();
            $('#lobby').removeClass('hidden');
            $('#display-room-id').text("كود الغرفة: " + i);
            players = [{name: myNameOnline, id: i}];
            updateLobby();
            $('#start-btn').show();
        });
        peer.on('connection', c => {
            c.on('data', d => {
                if(d.type === 'join') {
                    players.push({name: d.name, id: c.peer});
                    broadcast({type: 'list', list: players});
                    updateLobby();
                }
                if(d.type === 'vote') handleOnlineVote(d.voter, d.target);
            });
        });
    };

    window.joinRoom = function() {
        myNameOnline = $('#spyNick').val();
        let code = $('#roomCode').val();
        if(!myNameOnline || !code) return alert("اكتب الاسم والكود");
        peer = new Peer();
        peer.on('open', id => {
            let c = peer.connect(code);
            c.on('open', () => {
                c.send({type: 'join', name: myNameOnline});
                $('#spy-online-setup').hide();
                $('#lobby').removeClass('hidden');
            });
            c.on('data', d => {
                if(d.type === 'list') {
                    players = d.list;
                    updateLobby();
                }
                if(d.type === 'start') startOnlineGameView(d.role, d.names);
                if(d.type === 'res') showOnlineFinalResults(d.spy, d.logs);
            });
        });
    };

    function updateLobby() {
        $('#online-players-list').text("المتصلين: " + players.map(p => p.name).join(" - "));
    }

    function broadcast(d) {
        if(peer.connections) {
            Object.values(peer.connections).forEach(c => {
                if(c[0]) c[0].send(d);
            });
        }
    }

    window.startOnlineGame = function() {
        let place = spyPlaces[Math.floor(Math.random() * spyPlaces.length)];
        let spyIdx = Math.floor(Math.random() * players.length);
        peer.actualSpy = players[spyIdx].name;
        votesReceived = [];
        players.forEach((p, i) => {
            let role = (i === spyIdx) ? "🕵️ أنت الجاسوس" : `📍 المكان: ${place}`;
            if(p.name === myNameOnline) {
                startOnlineGameView(role, players.map(pl => pl.name));
            } else {
                let conns = Object.values(peer.connections);
                for(let conn of conns) {
                    if(conn[0] && conn[0].peer === p.id) {
                        conn[0].send({type: 'start', role: role, names: players.map(pl => pl.name)});
                        break;
                    }
                }
            }
        });
    };

    function startOnlineGameView(role, names) {
        $('#lobby').hide();
        $('#game-play').removeClass('hidden');
        $('#my-role').text(role).hide();
        $('#vote-log-container').empty();
        $('#final-result').empty();
        $('#vote-title').show();
        let btns = $('#vote-btns').empty().show();
        names.forEach(n => {
            if(n !== myNameOnline) {
                btns.append(`<button class="vote-btn" onclick="sendOnlineVote('${n}')">${n}</button>`);
            }
        });
    }

    window.sendOnlineVote = function(target) {
        $('.vote-btn').addClass('locked');
        if(host) {
            handleOnlineVote(myNameOnline, target);
        } else {
            let conns = Object.values(peer.connections);
            if(conns[0] && conns[0][0]) {
                conns[0][0].send({type: 'vote', voter: myNameOnline, target: target});
            }
        }
    };

    function handleOnlineVote(voter, target) {
        votesReceived.push(`${voter} صوّت لـ ${target}`);
        if(votesReceived.length >= players.length) {
            let res = {type: 'res', spy: peer.actualSpy, logs: votesReceived};
            broadcast(res);
            showOnlineFinalResults(peer.actualSpy, votesReceived);
        }
    }

    function showOnlineFinalResults(spyName, logs) {
        $('#vote-btns').hide();
        $('#vote-title').hide();
        let logHtml = "<strong>نتائج التصويت النهائية:</strong><br>";
        logs.forEach(l => logHtml += `<div class="vote-log-item" style="background:#111; padding:5px; margin:3px; border-radius:5px;">${l}</div>`);
        $('#vote-log-container').html(logHtml);
        $('#final-result').html(`🎯 الجاسوس الحقيقي هو: <span style="color:yellow; font-size:1.3em;">${spyName}</span>`);
    }

    function initChess() {
        let id = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
        let pC = new Peer(id);
        pC.on('open', (i) => {
            $('#my-id').text("معرفك: " + i);
            Chessboard('board', 'start');
        });
    }
</script>
</body>
</html>
