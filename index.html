<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج 2 ضد 2 - بث مباشر للجميع</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            background: #0a0f0a;
            color: #b3ffb3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            direction: rtl;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }
        .game-card {
            background: #111a11;
            padding: 20px;
            border: 2px solid #2ecc2e;
            border-radius: 20px;
            text-align: center;
        }
        .chat-card {
            background: #0f120f;
            padding: 18px;
            border: 2px solid #2ecc2e;
            border-radius: 20px;
            width: 300px;
        }
        #board {
            width: 520px;
            max-width: 90vw;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            background-color: #f0d9b5;
            border: 3px solid #2ecc2e;
            border-radius: 8px;
            overflow: hidden;
        }
        .square {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
        }
        .square.light {
            background-color: #f0d9b5;
        }
        .square.dark {
            background-color: #b58863;
        }
        .square.selected {
            background-color: #7fff7f !important;
            box-shadow: inset 0 0 0 3px #008800;
        }
        .square.possible {
            background-color: #55ff55aa !important;
            position: relative;
        }
        .square.possible::after {
            content: "●";
            font-size: 28px;
            opacity: 0.7;
        }
        button {
            padding: 10px 18px;
            margin: 5px;
            background: #1e3a1e;
            color: white;
            border: 1px solid #55ff55;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        button:hover {
            background: #2ecc2e;
            color: #000;
        }
        input {
            padding: 10px;
            margin: 5px 0;
            width: 90%;
            background: #0a0f0a;
            color: #b3ffb3;
            border: 1px solid #2ecc2e;
            border-radius: 25px;
            text-align: right;
        }
        .hidden {
            display: none;
        }
        .info-box {
            background: #0c170c;
            padding: 12px;
            margin: 12px 0;
            border-radius: 15px;
            font-size: 14px;
            text-align: right;
        }
        #chat {
            background: #050a05;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 15px;
            font-size: 13px;
        }
        .player-badge {
            background: #1a2a1a;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 3px;
            display: inline-block;
        }
        .white-team {
            background: #2a4a2a;
            color: #ffffff;
        }
        .black-team {
            background: #3a3a3a;
            color: #cccccc;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<div class="container">
    <div class="game-card">
        <h2>♟️ شطرنج 2 ضد 2 | بث مباشر</h2>
        <div id="board"></div>

        <div id="lobby" style="margin-top: 15px;">
            <button id="hostBtn">🏠 إنشاء غرفة جديدة</button><br><br>
            <input id="roomCodeInput" placeholder="كود الغرفة (4 أرقام)">
            <button id="joinBtn">🚪 دخول الغرفة</button>
        </div>

        <div id="gameArea" class="hidden">
            <div id="statusMsg" class="info-box">⏳ جاري تجهيز الغرفة...</div>
            <div id="turnMsg" class="info-box"></div>
            <div id="teamMsg" class="info-box"></div>
            <button id="startGameBtn" class="hidden" style="background:#2a722a;">▶️ بدء المباراة (المضيف)</button>
            <button id="restartBtn" class="hidden" style="background:#5a2a2a;">🔄 إعادة توزيع الفرق</button>
        </div>
    </div>

    <div class="chat-card">
        <h4>💬 الدردشة العامة</h4>
        <div id="chat"></div>
        <input id="chatInput" placeholder="اكتب رسالة...">
        <button id="sendChatBtn">إرسال</button>
        <div id="playersContainer" class="info-box" style="margin-top: 12px;">
            👥 انتظار اللاعبين...
        </div>
    </div>
</div>

<script>
// ====================== المتغيرات ======================
let peer = null;
let myId = null;
let myName = "";
let isHost = false;
let roomCode = "";
let connections = {};        // تخزين كل الاتصالات
let allPlayers = [];
let game = new Chess();
let gameActive = false;
let myTeam = null;           // "white" أو "black"
let whiteTeam = [];
let blackTeam = [];
let currentTurn = "white";
let currentPlayerId = null;
let selectedSquare = null;

// رموز القطع (Unicode)
const pieceSymbols = {
    'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟',
    'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙'
};

// ====================== رسم الرقعة ======================
function renderBoard() {
    const boardDiv = $('#board');
    boardDiv.empty();
    const fen = game.fen();
    const rows = fen.split(' ')[0].split('/');
    
    for (let i = 0; i < 8; i++) {
        let row = rows[i];
        let col = 0;
        for (let j = 0; j < row.length; j++) {
            const ch = row[j];
            if (isNaN(parseInt(ch))) {
                const symbol = pieceSymbols[ch] || ch;
                const square = String.fromCharCode(97 + col) + (8 - i);
                const isLight = (i + col) % 2 === 0;
                const squareDiv = $(`<div class="square ${isLight ? 'light' : 'dark'}" data-square="${square}">${symbol}</div>`);
                boardDiv.append(squareDiv);
                col++;
            } else {
                const empty = parseInt(ch);
                for (let k = 0; k < empty; k++) {
                    const square = String.fromCharCode(97 + col) + (8 - i);
                    const isLight = (i + col) % 2 === 0;
                    const squareDiv = $(`<div class="square ${isLight ? 'light' : 'dark'}" data-square="${square}"></div>`);
                    boardDiv.append(squareDiv);
                    col++;
                }
            }
        }
    }
    attachClickEvents();
}

function attachClickEvents() {
    $('.square').off('click').on('click', function() {
        if (!gameActive) {
            showMessage("⏳ المباراة لم تبدأ بعد!", true);
            return;
        }
        
        if (myId !== currentPlayerId) {
            showMessage("❌ ليس دورك الآن!", true);
            return;
        }
        
        const square = $(this).attr('data-square');
        
        if (selectedSquare === null) {
            const piece = game.get(square);
            if (piece && ((piece.color === 'w' && myTeam === 'white') || (piece.color === 'b' && myTeam === 'black'))) {
                selectedSquare = square;
                $('.square').removeClass('selected possible');
                $(this).addClass('selected');
                
                // عرض الحركات الممكنة
                const moves = game.moves({ verbose: true });
                const possibleMoves = moves.filter(m => m.from === square).map(m => m.to);
                possibleMoves.forEach(moveTo => {
                    $(`[data-square="${moveTo}"]`).addClass('possible');
                });
                showMessage(`🔍 تم تحديد القطعة في ${square}`);
            } else {
                showMessage("⚠️ هذه القطعة ليست من فريقك!", true);
            }
        } else {
            executeMove(selectedSquare, square);
            selectedSquare = null;
            $('.square').removeClass('selected possible');
        }
    });
}

function executeMove(from, to) {
    const move = game.move({ from: from, to: to, promotion: 'q' });
    if (move) {
        renderBoard();
        showMessage(`✅ ${from} → ${to}`);
        
        // ====== أهم جزء: بث الحركة لجميع اللاعبين ======
        broadcastToAll({
            type: 'sync_move',
            fen: game.fen()
        });
        
        // تبديل الدور
        if (currentTurn === 'white') {
            currentTurn = 'black';
            currentPlayerId = blackTeam[0]?.id;
        } else {
            currentTurn = 'white';
            currentPlayerId = whiteTeam[0]?.id;
        }
        
        updateDisplay();
        
        // بث تغيير الدور للجميع
        broadcastToAll({
            type: 'sync_turn',
            turn: currentTurn,
            playerId: currentPlayerId
        });
        
        // التحقق من النهاية
        if (game.game_over()) {
            let winner = game.in_checkmate() ? (game.turn() === 'w' ? 'الأسود' : 'الأبيض') : 'تعادل';
            showMessage(`🏆 انتهت المباراة! الفائز: ${winner}`);
            broadcastToAll({ type: 'game_finished', winner: winner });
            gameActive = false;
        }
    } else {
        showMessage("🚫 حركة غير قانونية!", true);
    }
}

// ====================== دالة البث لجميع اللاعبين ======================
function broadcastToAll(data, excludeId = null) {
    console.log("📡 بث للجميع:", data.type);
    for (let connId in connections) {
        if (connections[connId] && connections[connId].open && connId !== excludeId) {
            connections[connId].send(data);
        }
    }
}

// ====================== معالجة البيانات الواردة ======================
function handleIncoming(data, senderId) {
    console.log("📩 استقبل بيانات:", data.type, "من", senderId);
    
    // لاعب جديد ينضم (فقط المضيف يعالج هذا)
    if (data.type === 'join_request' && isHost) {
        if (!allPlayers.find(p => p.id === data.playerId)) {
            allPlayers.push({ id: data.playerId, name: data.playerName });
            showMessage(`${data.playerName} انضم إلى الغرفة (${allPlayers.length}/4)`);
            
            // تحديث قائمة اللاعبين عند الجميع
            broadcastToAll({ type: 'players_update', players: allPlayers });
            updatePlayersUI();
            
            if (allPlayers.length === 4) {
                $('#startGameBtn').removeClass('hidden');
            }
        }
    }
    
    // تحديث قائمة اللاعبين
    if (data.type === 'players_update') {
        allPlayers = data.players;
        updatePlayersUI();
    }
    
    // بدء المباراة
    if (data.type === 'start_game') {
        whiteTeam = data.whiteTeam;
        blackTeam = data.blackTeam;
        myTeam = whiteTeam.some(p => p.id === myId) ? 'white' : (blackTeam.some(p => p.id === myId) ? 'black' : null);
        gameActive = true;
        currentTurn = 'white';
        currentPlayerId = whiteTeam[0].id;
        game = new Chess();
        renderBoard();
        updateDisplay();
        showMessage(`🎉 بدأت المباراة! أنت في فريق ${myTeam === 'white' ? 'الأبيض 🤍' : 'الأسود 🖤'}`);
        $('#startGameBtn').addClass('hidden');
        $('#restartBtn').removeClass('hidden');
    }
    
    // مزامنة الحركة (هذا هو الحل للمشكلة!)
    if (data.type === 'sync_move') {
        game.load(data.fen);
        renderBoard();
        showMessage(`🔄 تم تحديث الرقعة من لاعب آخر`);
    }
    
    // مزامنة الدور
    if (data.type === 'sync_turn') {
        currentTurn = data.turn;
        currentPlayerId = data.playerId;
        updateDisplay();
    }
    
    // انتهاء المباراة
    if (data.type === 'game_finished') {
        showMessage(`🏆 النتيجة: ${data.winner}`);
        gameActive = false;
    }
    
    // إعادة الضبط
    if (data.type === 'reset_game') {
        whiteTeam = data.whiteTeam;
        blackTeam = data.blackTeam;
        myTeam = whiteTeam.some(p => p.id === myId) ? 'white' : 'black';
        gameActive = true;
        currentTurn = 'white';
        currentPlayerId = whiteTeam[0].id;
        game = new Chess();
        renderBoard();
        updateDisplay();
        showMessage(`🔄 تم إعادة ضبط المباراة!`);
    }
    
    // رسالة شات
    if (data.type === 'chat_message') {
        $('#chat').append(`<div><strong>${data.sender}:</strong> ${data.message}</div>`);
        $('#chat').scrollTop($('#chat')[0].scrollHeight);
    }
}

// ====================== وظائف العرض ======================
function showMessage(msg, isError = false) {
    $('#statusMsg').html(`<span style="color:${isError ? '#ff8888' : '#88ff88'}">${msg}</span>`);
}

function updateDisplay() {
    if (!gameActive) {
        $('#turnMsg').html("⏳ انتظار بدء المباراة");
        return;
    }
    const turnTeam = currentTurn === 'white' ? '🤍 الأبيض' : '🖤 الأسود';
    const playerObj = (currentTurn === 'white' ? whiteTeam : blackTeam).find(p => p.id === currentPlayerId);
    $('#turnMsg').html(`🎲 الدور: ${turnTeam}<br>⚡ يتحرك: ${playerObj?.name || '???'}`);
    $('#teamMsg').html(`🎨 فريقك: ${myTeam === 'white' ? '🤍 أبيض' : '🖤 أسود'}<br>🤍 الأبيض: ${whiteTeam.map(p=>p.name).join(', ')}<br>🖤 الأسود: ${blackTeam.map(p=>p.name).join(', ')}`);
}

function updatePlayersUI() {
    let html = '<div style="display:flex; flex-wrap:wrap; gap:5px;">';
    allPlayers.forEach(p => {
        let teamClass = "";
        let teamIcon = "";
        if (whiteTeam.some(w => w.id === p.id)) { teamClass = "white-team"; teamIcon = "🤍 "; }
        if (blackTeam.some(b => b.id === p.id)) { teamClass = "black-team"; teamIcon = "🖤 "; }
        html += `<span class="player-badge ${teamClass}">${teamIcon}${p.name}</span>`;
    });
    html += '</div>';
    $('#playersContainer').html(html);
}

// ====================== بدء المباراة (للمضيف فقط) ======================
function startMatch() {
    if (!isHost || allPlayers.length !== 4) {
        showMessage("⚠️ يجب أن يكون هناك 4 لاعبين لبدء المباراة!", true);
        return;
    }
    
    // توزيع عشوائي للفرق
    const shuffled = [...allPlayers];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    
    whiteTeam = [shuffled[0], shuffled[1]];
    blackTeam = [shuffled[2], shuffled[3]];
    
    broadcastToAll({
        type: 'start_game',
        whiteTeam: whiteTeam,
        blackTeam: blackTeam
    });
    
    gameActive = true;
    currentTurn = 'white';
    currentPlayerId = whiteTeam[0].id;
    game = new Chess();
    renderBoard();
    updateDisplay();
    showMessage("🎯 انطلقت المباراة! فريق الأبيض يبدأ");
    $('#startGameBtn').addClass('hidden');
    $('#restartBtn').removeClass('hidden');
}

function resetMatch() {
    if (!isHost) return;
    
    const shuffled = [...allPlayers];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    whiteTeam = [shuffled[0], shuffled[1]];
    blackTeam = [shuffled[2], shuffled[3]];
    
    broadcastToAll({
        type: 'reset_game',
        whiteTeam: whiteTeam,
        blackTeam: blackTeam
    });
    
    gameActive = true;
    currentTurn = 'white';
    currentPlayerId = whiteTeam[0].id;
    game = new Chess();
    renderBoard();
    updateDisplay();
    showMessage("🔄 تم إعادة ضبط المباراة!");
}

// ====================== إنشاء غرفة (Host) ======================
$('#hostBtn').click(() => {
    const newRoom = Math.floor(1000 + Math.random() * 9000).toString();
    roomCode = newRoom;
    myName = prompt("أدخل اسمك:", "المضيف") || "المضيف";
    isHost = true;
    myId = 'host_' + Date.now() + '_' + roomCode;
    allPlayers = [{ id: myId, name: myName }];
    
    peer = new Peer('chess2v2_' + roomCode);
    peer.on('open', () => {
        showMessage(`✅ الغرفة جاهزة! كود: ${roomCode}`);
        $('#lobby').hide();
        $('#gameArea').removeClass('hidden');
        $('#restartBtn').addClass('hidden');
        $('#startGameBtn').addClass('hidden');
        updatePlayersUI();
        renderBoard();
        
        peer.on('connection', (conn) => {
            connections[conn.peer] = conn;
            conn.on('data', (data) => handleIncoming(data, conn.peer));
            conn.on('close', () => {
                delete connections[conn.peer];
                showMessage("⚠️ أحد اللاعبين انقطع", true);
            });
        });
    });
});

// ====================== دخول غرفة (Client) ======================
$('#joinBtn').click(() => {
    const code = $('#roomCodeInput').val().trim();
    if (!code) return alert("أدخل كود الغرفة!");
    roomCode = code;
    myName = prompt("أدخل اسمك:", "لاعب") || "لاعب";
    isHost = false;
    myId = 'player_' + Date.now() + '_' + Math.random();
    
    peer = new Peer();
    peer.on('open', () => {
        const conn = peer.connect('chess2v2_' + code);
        conn.on('open', () => {
            connections[code] = conn;
            conn.send({ type: 'join_request', playerId: myId, playerName: myName });
            showMessage("🔗 جاري الاتصال بالغرفة...");
            $('#lobby').hide();
            $('#gameArea').removeClass('hidden');
            $('#startGameBtn').addClass('hidden');
            $('#restartBtn').addClass('hidden');
            renderBoard();
        });
        conn.on('data', (data) => handleIncoming(data, code));
        conn.on('close', () => {
            showMessage("🔌 تم قطع الاتصال بالمضيف", true);
        });
    });
});

// ====================== أزرار التحكم ======================
$('#startGameBtn').click(() => { if (isHost) startMatch(); });
$('#restartBtn').click(() => { if (isHost) resetMatch(); });

$('#sendChatBtn').click(() => {
    const msg = $('#chatInput').val().trim();
    if (!msg) return;
    $('#chat').append(`<div><strong>${myName}:</strong> ${msg}</div>`);
    $('#chat').scrollTop($('#chat')[0].scrollHeight);
    broadcastToAll({ type: 'chat_message', sender: myName, message: msg });
    $('#chatInput').val('');
});

// تشغيل الرقعة في البداية
$(document).ready(() => {
    renderBoard();
});
</script>
</body>
</html>
