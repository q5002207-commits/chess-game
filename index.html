<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - منع الغش</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        #main-menu { text-align: center; margin-top: 50px; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 25px; margin: 20px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.5em; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px #da291c55; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }
        .back-btn { background: #333; color: #fff; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8em; margin-bottom: 10px; border: none; }

        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 10px; color: white; }
        #board { width: 380px !important; max-width: 95vw !important; border: 4px solid #222; border-radius: 8px; }
        .highlight-sq { background: rgba(0, 255, 0, 0.3) !important; }
        .possible-move::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 15px; height: 15px; background: rgba(0, 255, 0, 0.4); border-radius: 50%; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* ستايل كروت المافيا المحسن */
        .mafia-card { background: #1a1a1a; padding: 20px; margin: 10px 0; border-radius: 10px; cursor: pointer; border: 1px solid #444; transition: 0.5s; text-align: center; }
        .mafia-card:active { background: #333; }
        .role-display { display: none; color: #ff0000; font-size: 1.2em; font-weight: bold; margin-top: 10px; text-shadow: 0 0 5px #000; }
        .hidden { display: none; }
        .fade-out { opacity: 0; transform: scale(0.9); pointer-events: none; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="color:#da291c;">AHMED PRO SYSTEM</h1>
        <button class="menu-btn" onclick="switchSection('chess')">♟️ ساحة الشطرنج</button>
        <button class="menu-btn" onclick="switchSection('mafia')">🕵️ موزع المافيا</button>
    </div>

    <div id="chess-section" class="hidden">
        <button class="back-btn" onclick="location.reload()">⬅ القائمة الرئيسية</button>
        <div class="header"><h3>🏆 شطرنج أحمد المحترف 🏆</h3><div id="my-id" style="font-size:0.7em;">Connecting...</div></div>
        <div id="board"></div>
        <div style="width:100%; max-width:400px; margin-top:15px;">
            <input type="text" id="friendId" placeholder="ID الخصم">
            <button onclick="sendChallengeRequest()">تحدي</button>
        </div>
    </div>

    <div id="mafia-section" class="hidden">
        <button class="back-btn" onclick="location.reload()">⬅ القائمة الرئيسية</button>
        <div class="header"><h3>🕵️‍♂️ موزع المافيا (بدون غش)</h3></div>
        <div id="mafia-setup" style="width:100%; max-width:400px;">
            <input type="text" id="mafiaPlayerName" placeholder="اسم اللاعب...">
            <button onclick="addMafiaPlayer()">إضافة لاعب</button>
            <div id="mafia-list-preview" style="margin:10px; color:#888;"></div>
            <button style="background:green; margin-top:10px;" onclick="startMafiaDistribution()">ابدأ التوزيع</button>
        </div>
        <div id="mafia-game-board" class="hidden" style="width:100%; max-width:400px;">
            <p style="font-size: 0.8em; color: #da291c;">اضغط على اسمك لتعرف دورك (سيختفي الاسم فوراً)</p>
            <div id="players-cards-container"></div>
        </div>
    </div>

    <audio id="moveSound" src="https://images.chesscomfiles.com/chess-themes/sounds/_standard/default/move-self.mp3"></audio>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        function switchSection(section) {
            $('#main-menu').hide();
            if(section === 'chess') { $('#chess-section').removeClass('hidden'); initChessPeer(); }
            else { $('#mafia-section').removeClass('hidden'); }
        }

        // --- كود المافيا الجديد (نظام الحذف) ---
        let mafiaPlayers = [];
        function addMafiaPlayer() {
            let name = $('#mafiaPlayerName').val().trim();
            if(name) { 
                mafiaPlayers.push(name); 
                $('#mafia-list-preview').text("اللاعبين: " + mafiaPlayers.join(" - ")); 
                $('#mafiaPlayerName').val("").focus(); 
            }
        }

        function startMafiaDistribution() {
            if(mafiaPlayers.length < 3) return alert("العبوا 3 على الأقل!");
            let roles = [];
            let mCount = Math.max(1, Math.floor(mafiaPlayers.length / 3));
            for(let i=0; i<mCount; i++) roles.push("مافيا 💀");
            roles.push("دكتور 💉");
            while(roles.length < mafiaPlayers.length) roles.push("مواطن 👨‍🌾");
            roles.sort(() => Math.random() - 0.5);

            $('#mafia-setup').hide();
            $('#mafia-game-board').removeClass('hidden');
            let container = $('#players-cards-container');
            container.empty();

            mafiaPlayers.forEach((p, i) => {
                let card = $(`
                    <div class="mafia-card" id="card-${i}">
                        <strong id="pname-${i}">${p}</strong>
                        <div class="role-display" id="mrole-${i}">${roles[i]}</div>
                    </div>
                `);

                card.click(function() {
                    // إظهار الدور وإخفاء الاسم
                    $(`#pname-${i}`).hide();
                    $(`#mrole-${i}`).show();
                    
                    // بعد 3 ثواني يختفي الكرت بالكامل
                    setTimeout(() => {
                        $(`#card-${i}`).addClass('fade-out');
                        setTimeout(() => { $(`#card-${i}`).remove(); }, 500);
                    }, 3000);
                });
                container.append(card);
            });
        }

        // --- كود الشطرنج (مبسط للمساحة) ---
        var board = null, game = new Chess(), peer = null, conn = null, myColor = 'w', sourceSquare = null;
        function initChessPeer() {
            let id = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(id);
            peer.on('open', (i) => { $('#my-id').text("ID: " + i); board = Chessboard('board', {draggable:false, position:'start'}); });
            peer.on('connection', (c) => { conn = c; c.on('data', (d) => { if(d.type==='move'){game.move(d.move); board.position(game.fen());} }); });
        }
        $(document).on('click touchstart', '.square-55d63', function(){
            let sq = $(this).attr('data-square');
            if(sourceSquare === null){ sourceSquare = sq; }
            else { 
                let move = game.move({from:sourceSquare, to:sq, promotion:'q'});
                if(move){ board.position(game.fen()); if(conn) conn.send({type:'move', move:move}); }
                sourceSquare = null;
            }
        });
    </script>
</body>
</html>
