<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محترف الهروب - 10 مراحل</title>
    <style>
        :root { --bg: #2c3e50; --grid: #34495e; --player: #e74c3c; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #ui-top { margin-bottom: 10px; text-align: center; }
        .level-indicator { font-size: 24px; font-weight: bold; color: #f1c40f; }

        #board { 
            position: relative; width: 360px; height: 360px; 
            background: var(--grid); border: 8px solid #1a252f; border-radius: 10px;
        }

        #exit-gate { 
            position: absolute; right: -15px; top: 120px; 
            width: 15px; height: 60px; background: #2ecc71; border-radius: 0 5px 5px 0; 
        }

        /* تصميم السيارة الحقيقي */
        .car {
            position: absolute; border-radius: 8px; cursor: grab;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 2px 2px 5px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        /* تفاصيل السيارة: الزجاج والأضواء */
        .car::before { content: ''; position: absolute; background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        .h-car::before { width: 60%; height: 60%; top: 20%; } /* زجاج للأفقي */
        .v-car::before { width: 60%; height: 60%; left: 20%; } /* زجاج للعمودي */

        .player { background: var(--player); z-index: 10; border: 2px solid #c0392b; }
        .npc-h { background: #f1c40f; border: 2px solid #f39c12; }
        .npc-v { background: #3498db; border: 2px solid #2980b9; }
        .truck { background: #95a5a6; border: 2px solid #7f8c8d; }

        .btn { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .btn:hover { background: #2ecc71; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="level-indicator">المرحلة: <span id="lvl-num">1</span> / 10</div>
        <p>حرك السيارات لفتح مخرج للسيارة الحمراء</p>
    </div>

    <div id="board">
        <div id="exit-gate"></div>
    </div>

    <button class="btn" onclick="resetLevel()">إعادة المحاولة</button>

<script>
    const board = document.getElementById('board');
    let currentLevel = 0;
    let isDragging = false;
    let activeVeh = null;
    let offset = { x: 0, y: 0 };

    // تعريف 10 مراحل (r=row, c=col, l=length, d=direction)
    const levels = [
        [{id:'R', r:2, c:0, l:2, d:'h'}, {id:'1', r:0, c:2, l:2, d:'v'}, {id:'2', r:4, c:3, l:2, d:'h'}], // مرحلة 1
        [{id:'R', r:2, c:1, l:2, d:'h'}, {id:'1', r:0, c:0, l:3, d:'v'}, {id:'2', r:0, c:3, l:2, d:'h'}], // مرحلة 2
        [{id:'R', r:2, c:0, l:2, d:'h'}, {id:'1', r:1, c:2, l:3, d:'v'}, {id:'2', r:4, c:1, l:2, d:'h'}, {id:'3', r:0, c:4, l:2, d:'v'}], // مرحلة 3
        [{id:'R', r:2, c:1, l:2, d:'h'}, {id:'1', r:0, c:3, l:3, d:'v'}, {id:'2', r:3, c:0, l:2, d:'v'}, {id:'3', r:5, c:2, l:3, d:'h'}], // مرحلة 4
        [{id:'R', r:2, c:0, l:2, d:'h'}, {id:'1', r:0, c:0, l:2, d:'h'}, {id:'2', r:0, c:2, l:2, d:'v'}, {id:'3', r:0, c:5, l:3, d:'v'}, {id:'4', r:4, c:4, l:2, d:'v'}], // مرحلة 5
        [{id:'R', r:2, c:2, l:2, d:'h'}, {id:'1', r:0, c:1, l:3, d:'v'}, {id:'2', r:3, c:1, l:2, d:'h'}, {id:'3', r:0, c:4, l:2, d:'h'}, {id:'4', r:4, c:4, l:2, d:'v'}], // مرحلة 6
        [{id:'R', r:2, c:0, l:2, d:'h'}, {id:'1', r:0, c:2, l:2, d:'v'}, {id:'2', r:0, c:3, l:2, d:'v'}, {id:'3', r:3, c:2, l:2, d:'h'}, {id:'4', r:5, c:0, l:3, d:'h'}], // مرحلة 7
        [{id:'R', r:2, c:1, l:2, d:'h'}, {id:'1', r:0, c:0, l:3, d:'v'}, {id:'2', r:0, c:1, l:2, d:'h'}, {id:'3', r:3, c:3, l:3, d:'v'}, {id:'4', r:0, c:5, l:3, d:'v'}], // مرحلة 8
        [{id:'R', r:2, c:0, l:2, d:'h'}, {id:'1', r:0, c:2, l:3, d:'v'}, {id:'2', r:0, c:3, l:3, d:'v'}, {id:'3', r:4, c:0, l:2, d:'h'}, {id:'4', r:5, c:3, l:3, d:'h'}], // مرحلة 9
        [{id:'R', r:2, c:1, l:2, d:'h'}, {id:'1', r:0, c:0, l:3, d:'v'}, {id:'2', r:3, c:0, l:3, d:'v'}, {id:'3', r:0, c:3, l:2, d:'h'}, {id:'4', r:1, c:3, l:2, d:'v'}, {id:'5', r:4, c:4, l:2, d:'h'}]  // مرحلة 10
    ];

    function loadLevel(idx) {
        board.querySelectorAll('.car').forEach(c => c.remove());
        const data = levels[idx];
        document.getElementById('lvl-num').innerText = idx + 1;

        data.forEach(v => {
            const div = document.createElement('div');
            div.className = `car ${v.id === 'R' ? 'player' : (v.d === 'h' ? 'npc-h' : 'npc-v')} ${v.l > 2 ? 'truck' : ''} ${v.d}-car`;
            div.style.width = (v.d === 'h' ? v.l * 60 - 10 : 50) + 'px';
            div.style.height = (v.d === 'v' ? v.l * 60 - 10 : 50) + 'px';
            div.style.left = (v.c * 60 + 5) + 'px';
            div.style.top = (v.r * 60 + 5) + 'px';
            
            div.dataset.id = v.id;
            div.dataset.d = v.d;
            div.dataset.l = v.l;
            
            div.onmousedown = startDrag;
            div.ontouchstart = startDrag;
            board.appendChild(div);
        });
    }

    function startDrag(e) {
        isDragging = true;
        activeVeh = e.target;
        const clientX = e.clientX || e.touches[0].clientX;
        const clientY = e.clientY || e.touches[0].clientY;
        offset.x = clientX - activeVeh.offsetLeft;
        offset.y = clientY - activeVeh.offsetTop;
    }

    window.onmousemove = window.ontouchmove = (e) => {
        if (!isDragging || !activeVeh) return;
        const clientX = e.clientX || e.touches?.[0].clientX;
        const clientY = e.clientY || e.touches?.[0].clientY;
        
        const d = activeVeh.dataset.d;
        let newPos;

        if (d === 'h') {
            newPos = clientX - offset.x;
            newPos = Math.max(5, Math.min(newPos, 360 - activeVeh.offsetWidth - 5));
            activeVeh.style.left = newPos + 'px';
        } else {
            newPos = clientY - offset.y;
            newPos = Math.max(5, Math.min(newPos, 360 - activeVeh.offsetHeight - 5));
            activeVeh.style.top = newPos + 'px';
        }

        checkWin();
    };

    window.onmouseup = window.ontouchend = () => {
        if (activeVeh) {
            // Snap to grid
            if (activeVeh.dataset.d === 'h') {
                activeVeh.style.left = Math.round((activeVeh.offsetLeft - 5) / 60) * 60 + 5 + 'px';
            } else {
                activeVeh.style.top = Math.round((activeVeh.offsetTop - 5) / 60) * 60 + 5 + 'px';
            }
        }
        isDragging = false;
        activeVeh = null;
    };

    function checkWin() {
        if (activeVeh?.dataset.id === 'R') {
            const left = parseInt(activeVeh.style.left);
            if (left > 240) {
                alert("أحسنت يا بطل! انتقلت للمرحلة التالية.");
                currentLevel++;
                if (currentLevel < levels.length) loadLevel(currentLevel);
                else alert("مبروك! أنهيت جميع المراحل.");
                isDragging = false;
            }
        }
    }

    function resetLevel() { loadLevel(currentLevel); }

    loadLevel(0);
</script>
</body>
</html>
