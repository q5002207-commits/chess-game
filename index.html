<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة القفز - بوابة 567</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a2f1f, #051a0e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: #2c4a2e;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 2px solid #d4af37;
            text-align: center;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            background: #2c3e50;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .score-card {
            background: #000000aa;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #ffd966;
            font-size: 1.2rem;
        }
        .controls { margin-top: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        button {
            background: #dba53f;
            border: none;
            font-family: inherit;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.05s;
        }
        button:active { transform: scale(0.95); }
        .reset-btn { background: #e74c3c; color: white; }
        .info {
            margin-top: 15px;
            padding: 8px;
            border-radius: 30px;
            background: #000000aa;
            color: #ffd966;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0a2f1f, #051a0e);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .lock-box {
            background: #2c4a2e;
            padding: 30px;
            border-radius: 60px;
            border: 2px solid #d4af37;
            text-align: center;
            width: 300px;
        }
        .lock-box input {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border-radius: 50px;
            border: none;
            margin: 20px 0;
            font-weight: bold;
            background: #f5e6c4;
        }
        .lock-box button {
            background: #dba53f;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
        }
        @media (max-width: 550px) {
            .score-card { font-size: 0.9rem; padding: 5px 12px; }
            button { padding: 8px 18px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div id="lockScreen" class="lock-screen">
    <div class="lock-box">
        <div style="font-size: 3rem;">🔐</div>
        <h2 style="color:#ffd966;">أدخل كلمة السر</h2>
        <input type="password" id="passwordInput" placeholder="***" maxlength="10" autocomplete="off">
        <button id="unlockBtn">فتح البوابة</button>
    </div>
</div>

<div id="gameApp" style="display: none;">
    <div class="game-container">
        <div class="score-board">
            <div class="score-card">⭐ النقاط: <span id="score">0</span></div>
            <div class="score-card">🏆 أعلى نتيجة: <span id="highScore">0</span></div>
            <div class="score-card">❤️ الصحة: <span id="health">3</span></div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="controls">
            <button class="reset-btn" id="resetBtn">🔄 إعادة اللعبة</button>
        </div>
        
        <div class="info" id="info">🖱️ اضغط على الشاشة أو مفتاح المسافة للقفز! تجنب العوائق 👾</div>
    </div>
</div>

<script>
    // كلمة المرور الصحيحة
    const SECRET_CODE = "567";
    
    // مسح أي رسالة بدون إظهار شيء
    document.getElementById("unlockBtn").addEventListener("click", function() {
        const inputVal = document.getElementById("passwordInput").value;
        if (inputVal === SECRET_CODE) {
            document.getElementById("lockScreen").style.display = "none";
            document.getElementById("gameApp").style.display = "block";
            startGameLogic();
        } else {
            // كلمة سر غلط → بدون رسالة + يفضي الحقل
            document.getElementById("passwordInput").value = "";
            // ما تظهر أي رسالة بالمرة
        }
    });
    
    // السماح بالضغط على Enter
    document.getElementById("passwordInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            document.getElementById("unlockBtn").click();
        }
    });
    
    // لعبة القفز (نفس الكود السليم)
    function startGameLogic() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const OBSTACLE_IMG_URL = 'https://i.imgur.com/Prv0riC.jpeg';
        const PLAYER_IMG_URL = 'https://i.imgur.com/IpswxEw.jpeg';
        
        const GROUND_Y = 340;
        let score = 0;
        let highScore = localStorage.getItem('jumpHighScore567') || 0;
        let health = 3;
        let gameRunning = true;
        
        const player = { x: 100, y: GROUND_Y - 40, width: 45, height: 45, velocityY: 0, isJumping: false, originalY: GROUND_Y - 40 };
        let obstacles = [];
        let stars = [];
        let particles = [];
        let obstacleTimer = 0, starTimer = 0;
        
        const GRAVITY = 0.8, JUMP_POWER = -12;
        
        document.getElementById('highScore').innerHTML = highScore;
        
        const playerImg = new Image();
        const obstacleImg = new Image();
        playerImg.src = PLAYER_IMG_URL;
        obstacleImg.src = OBSTACLE_IMG_URL;
        
        function jump() {
            if (!gameRunning) return;
            if (!player.isJumping) {
                player.velocityY = JUMP_POWER;
                player.isJumping = true;
                for(let i = 0; i < 5; i++) {
                    particles.push({ x: player.x + player.width/2, y: player.y + player.height, vx: (Math.random() - 0.5) * 3, vy: Math.random() * 3, life: 20 });
                }
            }
        }
        
        function addObstacle() { 
            if (gameRunning) obstacles.push({ x: canvas.width, y: GROUND_Y - 40, width: 45, height: 45 }); 
        }
        function addStar() { 
            if (gameRunning) stars.push({ x: canvas.width, y: GROUND_Y - 60 - Math.random() * 40, width: 28, height: 28, collected: false }); 
        }
        
        function updatePlayer() {
            if (!gameRunning) return;
            player.velocityY += GRAVITY;
            player.y += player.velocityY;
            if (player.y >= player.originalY) { player.y = player.originalY; player.isJumping = false; player.velocityY = 0; }
            if (player.y > canvas.height) takeDamage();
            if (player.y < 0) { player.y = 0; player.velocityY = 0; }
        }
        
        function takeDamage() {
            if (!gameRunning) return;
            health--;
            document.getElementById('health').innerHTML = health;
            canvas.style.transform = 'translateX(5px)';
            setTimeout(() => { canvas.style.transform = ''; }, 100);
            if (health <= 0) { gameRunning = false; document.getElementById('info').innerHTML = '💀 انتهت اللعبة! اضغط إعادة 💀'; }
        }
        
        function addPoints(points) {
            if (!gameRunning) return;
            score += points;
            document.getElementById('score').innerHTML = score;
            if (score > highScore) { highScore = score; localStorage.setItem('jumpHighScore567', highScore); document.getElementById('highScore').innerHTML = highScore; }
        }
        
        function updateObjects() {
            if (!gameRunning) return;
            for (let i=0; i<obstacles.length; i++) {
                obstacles[i].x -= 5;
                if (obstacles[i].x < player.x + player.width && obstacles[i].x + obstacles[i].width > player.x &&
                    obstacles[i].y < player.y + player.height && obstacles[i].y + obstacles[i].height > player.y) {
                    takeDamage();
                    obstacles.splice(i,1); i--;
                }
            }
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
            
            for (let i=0; i<stars.length; i++) {
                stars[i].x -= 5;
                if (!stars[i].collected && stars[i].x < player.x + player.width && stars[i].x + stars[i].width > player.x &&
                    stars[i].y < player.y + player.height && stars[i].y + stars[i].height > player.y) {
                    stars[i].collected = true;
                    addPoints(10);
                    for(let j=0;j<8;j++) particles.push({ x: stars[i].x + stars[i].width/2, y: stars[i].y + stars[i].height/2, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 15 });
                }
            }
            stars = stars.filter(star => !star.collected && star.x + star.width > 0);
        }
        
        function updateParticles() {
            for (let i=0; i<particles.length; i++) { particles[i].x += particles[i].vx; particles[i].y += particles[i].vy; particles[i].life--; }
            particles = particles.filter(p => p.life > 0);
        }
        
        function generateObjects() {
            if (!gameRunning) return;
            obstacleTimer++;
            if (obstacleTimer > 65) { obstacleTimer = 0; if (Math.random() < 0.6) addObstacle(); }
            starTimer++;
            if (starTimer > 45) { starTimer = 0; if (Math.random() < 0.4) addStar(); }
        }
        
        function draw() {
            const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
            grad.addColorStop(0, '#1a252f'); grad.addColorStop(1, '#2c3e50');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, GROUND_Y);
            ctx.fillStyle = '#5d4e30'; ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
            ctx.fillStyle = '#4caf50';
            for(let i = 0; i < canvas.width; i += 20) ctx.fillRect(i, GROUND_Y - 5, 10, 8);
            
            for (let obs of obstacles) {
                if (obstacleImg.complete && obstacleImg.naturalWidth > 0) {
                    ctx.drawImage(obstacleImg, obs.x, obs.y, obs.width, obs.height);
                } else {
                    ctx.fillStyle = '#e74c3c'; ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                }
            }
            
            for (let star of stars) {
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                let cx = star.x + star.width/2, cy = star.y + star.height/2, outerR = 12, innerR = 5;
                for(let i = 0; i < 5; i++) {
                    let angle = (i * 72 - 90) * Math.PI/180;
                    let x1 = cx + Math.cos(angle) * outerR;
                    let y1 = cy + Math.sin(angle) * outerR;
                    let angle2 = (i * 72 + 36 - 90) * Math.PI/180;
                    let x2 = cx + Math.cos(angle2) * innerR;
                    let y2 = cy + Math.sin(angle2) * innerR;
                    if(i===0) ctx.moveTo(x1,y1);
                    ctx.lineTo(x2,y2);
                    ctx.lineTo(x1,y1);
                }
                ctx.fill();
                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI*2);
                ctx.fill();
            }
            
            if (playerImg.complete && playerImg.naturalWidth > 0) {
                ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
            } else {
                ctx.fillStyle = '#3498db'; ctx.fillRect(player.x, player.y, player.width, player.height);
            }
            
            for (let p of particles) { ctx.fillStyle = `rgba(255, 215, 0, ${p.life / 20})`; ctx.fillRect(p.x, p.y, 3, 3); }
            
            if (!gameRunning) {
                ctx.fillStyle = '#000000aa'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 30px "Segoe UI"'; ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 30);
                ctx.font = '20px "Segoe UI"'; ctx.fillStyle = '#ffd966';
                ctx.fillText('اضغط زر إعادة اللعبة', canvas.width/2, canvas.height/2 + 30);
                ctx.textAlign = 'left';
            }
        }
        
        function gameLoop() {
            if (gameRunning) {
                updatePlayer();
                updateObjects();
                updateParticles();
                generateObjects();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function resetGame() {
            gameRunning = true; score = 0; health = 3; obstacles = []; stars = []; particles = [];
            obstacleTimer = 0; starTimer = 0; player.y = player.originalY; player.velocityY = 0; player.isJumping = false;
            document.getElementById('score').innerHTML = '0'; document.getElementById('health').innerHTML = '3';
            document.getElementById('info').innerHTML = '🖱️ اضغط على الشاشة أو مفتاح المسافة للقفز! تجنب العوائق 👾';
        }
        
        canvas.addEventListener('click', () => jump());
        document.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); } });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        
        resetGame();
        gameLoop();
    }
</script>
</body>
</html>
