<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - النسخة الكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #main-menu { text-align: center; margin-top: 40px; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 25px; margin: 15px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.4em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }
        .back-home { background: #333; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; border: none; font-size: 0.8em; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 10px; }
        #board { width: 380px !important; max-width: 95vw !important; border: 4px solid #222; border-radius: 8px; position: relative; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; font-size: 1.1em; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .mafia-card, .spy-card { background: #1a1a1a; padding: 20px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; cursor: pointer; text-align: center; color: white; }
        .role-display { display: none; color: #ff0000; font-size: 1.2em; font-weight: bold; margin-top: 10px; }
        .narrator-box { background: #0055ff; color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border: 2px solid white; }
        .hidden { display: none; }
        .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }
        .highlight-hint { width: 16px; height: 16px; background: rgba(0, 255, 0, 0.6); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 999; }
        .vote-btn { background: #222; color: yellow; border: 1px solid yellow; margin: 5px; width: auto; display: inline-block; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="main-menu">
    <h1 style="color:#da291c;">AHMED PRO SYSTEM</h1>
    <button class="menu-btn" onclick="showGame('chess')">♟️ شطرنج أونلاين</button>
    <button class="menu-btn" onclick="showGame('mafia')">🕵️ موزع المافيا</button>
    <button class="menu-btn" onclick="showGame('spy')">🔍 الجاسوس (أوفلاين)</button>
    <button class="menu-btn" style="border-color: #0055ff;" onclick="showGame('spyOnline')">🌐 الجاسوس (أونلاين)</button>
</div>

<div id="chess-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 الرئيسية</button>
    <div class="header"><h3>🏆 شطرنج أحمد أونلاين</h3><div id="chess-status" style="color:yellow;">جاهز للاتصال...</div></div>
    <div id="chess-setup" style="width:100%; max-width:380px;">
        <button onclick="hostChess()">إنشاء طاولة (4 أرقام)</button>
        <div style="margin:10px; text-align:center; color:white;">--- أو ---</div>
        <input type="number" id="chessCodeInput" placeholder="أدخل كود الخصم">
        <button style="background:#444;" onclick="joinChess()">دخول الطاولة</button>
    </div>
    <div id="chess-board-container" class="hidden">
        <div id="board"></div>
        <p id="turn-display" style="text-align:center; color:#0f0; font-weight:bold; margin-top:10px;">انتظر الخصم...</p>
    </div>
</div>

<div id="mafia-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 الرئيسية</button>
    <div class="header"><h3>🕵️‍♂️ نظام المافيا</h3></div>
    <div id="mafia-setup">
        <input type="text" id="mafiaPlayerName" placeholder="اسم اللاعب">
        <button onclick="addMafiaPlayer()">إضافة لاعب</button>
        <div id="mafia-preview" style="color:#888; margin:10px;"></div>
        <button style="background:green;" onclick="startMafiaDist()">توزيع الأدوار</button>
    </div>
    <div id="mafia-board" class="hidden">
        <div id="narrator-name"></div>
        <div id="mafia-cards-container"></div>
    </div>
</div>

<div id="spy-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 الرئيسية</button>
    <div class="header"><h3>🔍 الجاسوس (أوفلاين)</h3></div>
    <div id="spy-setup">
        <input type="text" id="spyPlayerName" placeholder="اسم اللاعب">
        <button onclick="addSpyPlayer()">إضافة لاعب</button>
        <div id="spy-preview" style="color:#888; margin:10px;"></div>
        <button style="background:green;" onclick="startSpyDist()">ابدأ التوزيع</button>
    </div>
    <div id="spy-board" class="hidden"><div id="spy-cards-container"></div></div>
</div>

<div id="spy-online-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 الرئيسية</button>
    <div class="header"><h3>🌐 الجاسوس أونلاين</h3></div>
    <div id="spy-online-setup">
        <input type="text" id="spyNick" placeholder="اسمك">
        <button onclick="hostRoom()">إنشاء غرفة</button>
        <div style="margin:10px; color:white;">--- أو ---</div>
        <input type="text" id="roomCode" placeholder="كود الغرفة">
        <button style="background:#444;" onclick="joinRoom()">دخول</button>
    </div>
    <div id="lobby" class="hidden">
        <div id="display-room-id" style="color:yellow; margin-bottom:10px;"></div>
        <div id="online-players-list" style="color:white;"></div>
        <button id="start-btn" style="background:green; margin-top:20px; display:none;" onclick="startOnlineGame()">ابدأ اللعبة</button>
    </div>
    <div id="game-play" class="hidden">
        <div class="spy-card" onclick="$(this).find('.role-display').toggle()">
            <p>اضغط لإظهار/إخفاء المكان</p>
            <div id="my-role" class="role-display" style="color:#0f0;"></div>
        </div>
        <div id="vote-btns" style="margin-top:20px;"></div>
        <div id="vote-log-container" style="margin-top:20px; color:white;"></div>
        <div id="final-result" style="color:red; font-size:1.5em; margin-top:10px;"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
let board = null, chessGame = new Chess();
let chessPeer = null, chessConn = null, myColor = 'w', selectedSquare = null;
let sPlayers = [], mPlayers = [], peer = null, players = [], myName = "", host = false, votesReceived = [];

const spyPlaces = ["مستشفى", "مدرسة", "غابة", "طائرة", "مطعم", "فندق", "مطار", "سفينة", "مخيم", "قلعة", "مسجد", "الأردن", "فلسطين", "شاورما", "منسف", "تلفزيون", "هاتف", "غرفة نوم", "سيارة", "المول", "السوبر ماركت", "الحلاق", "السينما", "المسرح", "البنك", "كازية", "مخبز", "خياط", "صيدلية", "عيادة أسنان", "مختبر", "الجامعة", "مدرسة سواقة", "حديقة حيوان", "السيرك", "المتحف", "معرض فنون", "صالة أفراح", "ملعب كرة قدم", "نادي رياضي", "مسبح", "شاطئ", "ميناء", "محطة قطار", "موقف باصات", "المترو", "جسر", "نفق", "مطبعة", "ورشة نجارة", "كراج تصليح", "صحراء", "واحة", "كهف", "بركان", "شلال", "جزيرة", "قطب متجمد", "قمة جبل", "وادي", "غابة استوائية", "سفينة فضاء", "محطة مير", "الغواصة", "منطاد", "هليكوبتر", "سفينة حربية", "ناقلة نفط", "كاسحة ثلوج", "أهرامات", "البتراء", "جرش", "قلعة عجلون", "قصر أموي", "معبد قديم", "بيت مهجور", "سفينة قراصنة", "مدينة مفقودة", "المريخ", "عطارد", "ثقب أسود", "غيمة", "تحت الأرض", "المطبخ", "الحمام", "البلكونة", "السطح", "قبو", "علية", "غرفة غسيل", "مستودع", "مكتبة", "ممر", "الحديقة", "داخل الثلاجة", "محفظة نقود", "علبة سردين", "تحت السرير", "فوق النخلة", "طنجرة منسف", "إبريق شاي", "كرتونة بيض", "شاحن تلفون", "سماعة بلوتوث", "مكة", "المدينة المنورة", "القاهرة", "بغداد", "دمشق", "بيروت", "دبي", "الرياض", "لندن", "باريس", "نيويورك", "طوكيو", "برج إيفل", "سور الصين العظيم", "التاج محل", "تمثال الحرية", "محل بلايستيشن", "قهوة شعبية", "محل تصليح تليفونات", "صناعية وادي السير", "البلد", "جبل عمان", "شارع الرينبو", "العبدلي", "دوار الداخلية", "محل كنافة", "فرن مناقيش", "بسطة خضرة", "محل ألعاب", "محل عطور", "محل ساعات", "محكمة", "قسم شرطة", "سجن", "مبنى المخابرات", "البرلمان", "وزارة التربية", "السفارة", "مكتب محامي", "غرفة عمليات", "ثكنة عسكرية", "برج مراقبة", "قاعدة صواريخ", "بيت جدي", "صالة الجيم", "محطة الفضاء الدولية", "نادي الفروسية", "حلبة سباق", "ملعب تنس", "صالة بولينج", "مدينة ملاهي", "زحليقة", "قطار موت", "بيت الرعب", "البحر الميت", "حمامات ماعين", "وادي رم", "العقبة", "جسر عبدون", "المدينة الرياضية", "مجمع بنك الإسكان", "مستشفى البشير", "الجامعة الأردنية", "التكنو", "الهاشمية", "علبة مكياج", "خزانة ملابس", "درج المكتب", "سلة مهملات", "فرن غاز", "غسالة", "نشافة", "مكواة", "مكنسة كهربائية", "اباجورة", "برواز صورة", "ساعة حائط", "سجادة صلاة", "مكتبة عامة", "محل ورد", "دار أيتام", "دار مسنين", "مخيم لاجئين", "خيمة بدو", "مزرعة خيول", "مزرعة دجاج", "منحل عسل", "مشاتل ورد", "داخل كيس شيبس", "تحت الكنباية", "ورا الباب", "جوا الخزانة", "فوق السطح", "جوا الغسالة", "تحت الطاولة", "داخل الشنطة", "جوا الجيبة", "فوق الشجرة", "البرازيل", "ألمانيا", "إسبانيا", "إيطاليا", "الأرجنتين", "تركيا", "المغرب", "تونس", "الجزائر", "مصر", "السودان", "الكويت", "قطر", "البحرين", "عمان", "اليمن", "برج خليفة", "برج العرب", "مول دبي", "جزيرة النخلة", "سوق نايف", "القرية العالمية"];

function showGame(gameType) {
    $('#main-menu').hide();
    $('.hidden').hide(); 
    if(gameType === 'chess') $('#chess-section').show();
    else if(gameType === 'mafia') $('#mafia-section').show();
    else if(gameType === 'spy') $('#spy-section').show();
    else if(gameType === 'spyOnline') $('#spy-online-section').show();
}

// --- منطق الشطرنج ---
function hostChess() {
    let sid = Math.floor(1000 + Math.random() * 9000).toString();
    chessPeer = new Peer("CHESS_PRO_" + sid);
    chessPeer.on('open', () => { 
        $('#chess-setup').hide(); 
        $('#chess-status').text("كود الطاولة: " + sid); 
    });
    chessPeer.on('connection', c => { 
        chessConn = c; 
        myColor = 'w'; 
        initChessBoard(); 
        listenForMoves(); 
    });
}

function joinChess() {
    let code = $('#chessCodeInput').val();
    chessPeer = new Peer();
    chessPeer.on('open', () => {
        chessConn = chessPeer.connect("CHESS_PRO_" + code);
        chessConn.on('open', () => { 
            myColor = 'b'; 
            initChessBoard(); 
            listenForMoves(); 
        });
    });
}

function initChessBoard() {
    $('#chess-setup').hide(); 
    $('#chess-board-container').show();
    board = Chessboard('board', {
        draggable: false,
        orientation: myColor === 'w' ? 'white' : 'black',
        position: 'start',
        pieceTheme: 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/kosal/{piece}.svg'
    });

    $('#board').on('click', '.square-55d63', function() {
        let sq = $(this).data('square');
        if (chessGame.turn() !== myColor) return;

        let piece = chessGame.get(sq);
        if (piece && piece.color === myColor) {
            $('.square-55d63').removeClass('highlight-selected');
            $('.highlight-hint').remove();
            selectedSquare = sq;
            $(this).addClass('highlight-selected');
            let moves = chessGame.moves({square: sq, verbose: true});
            moves.forEach(m => {
                $('.square-' + m.to).append('<div class="highlight-hint"></div>');
            });
        } else if (selectedSquare) {
            let move = chessGame.move({from: selectedSquare, to: sq, promotion: 'q'});
            if (move) {
                board.position(chessGame.fen());
                chessConn.send({f: selectedSquare, t: sq});
                updateTurnInfo();
            }
            $('.square-55d63').removeClass('highlight-selected');
            $('.highlight-hint').remove();
            selectedSquare = null;
        }
    });
    updateTurnInfo();
}

function listenForMoves() {
    chessConn.on('data', data => {
        chessGame.move({from: data.f, to: data.t, promotion: 'q'});
        board.position(chessGame.fen());
        updateTurnInfo();
    });
}

function updateTurnInfo() {
    let t = chessGame.turn() === 'w' ? "الأبيض" : "الأسود";
    let status = "دور: " + t;
    if(chessGame.in_check()) status += " (كش!)";
    $('#turn-display').text(status);
}

// --- منطق المافيا ---
function addMafiaPlayer() {
    let name = $('#mafiaPlayerName').val().trim();
    if(name) { mPlayers.push(name); $('#mafia-preview').text("اللاعبون: " + mPlayers.join(" - ")); $('#mafiaPlayerName').val(""); }
}

function startMafiaDist() {
    if(mPlayers.length < 4) return alert("اقل شي 4 لاعبين!");
    let narratorIdx = Math.floor(Math.random() * mPlayers.length);
    let narratorName = mPlayers[narratorIdx];
    let playersPool = mPlayers.filter((_, i) => i !== narratorIdx);
    let roles = playersPool.map((_, i) => i === 0 ? "مافيا 🔪" : "مواطن 👨‍🌾").sort(() => Math.random() - 0.5);

    $('#mafia-setup').hide();
    $('#mafia-board').show();
    $('#narrator-name').html(`<div class="narrator-box">🎤 الراوي: ${narratorName}</div>`);
    let container = $('#mafia-cards-container').empty();
    playersPool.forEach((p, i) => {
        let card = $(`<div class="mafia-card"><strong>${p}</strong><div class="role-display">${roles[i]}</div></div>`);
        card.click(function() { $(this).find('.role-display').toggle(); });
        container.append(card);
    });
}

// --- منطق الجاسوس أوفلاين ---
function addSpyPlayer() {
    let name = $('#spyPlayerName').val().trim();
    if(name) { sPlayers.push(name); $('#spy-preview').text("اللاعبون: " + sPlayers.join(" - ")); $('#spyPlayerName').val(""); }
}

function startSpyDist() {
    if(sPlayers.length < 3) return alert("اقل شي 3 لاعبين!");
    let place = spyPlaces[Math.floor(Math.random() * spyPlaces.length)];
    let spyIdx = Math.floor(Math.random() * sPlayers.length);
    $('#spy-setup').hide();
    $('#spy-board').show();
    let container = $('#spy-cards-container').empty();
    sPlayers.forEach((p, i) => {
        let role = (i === spyIdx) ? "أنت الجاسوس 🕵️" : place;
        let card = $(`<div class="spy-card"><strong>${p}</strong><div class="role-display">${role}</div></div>`);
        card.click(function() { $(this).find('.role-display').toggle(); });
        container.append(card);
    });
}

// --- منطق الجاسوس أونلاين ---
function hostRoom() {
    myName = $('#spyNick').val().trim();
    if(!myName) return alert("اكتب اسمك!");
    host = true;
    let roomId = "ROOM_" + Math.floor(100 + Math.random() * 899);
    peer = new Peer(roomId);
    peer.on('open', id => {
        $('#spy-online-setup').hide();
        $('#lobby').show();
        $('#display-room-id').text("كود الغرفة: " + id);
        players.push({name: myName, id: id});
        updateLobbyUI();
        $('#start-btn').show();
    });
    peer.on('connection', conn => {
        conn.on('data', data => {
            if(data.type === 'join') {
                players.push({name: data.name, id: conn.peer});
                broadcastData({type: 'list', list: players});
                updateLobbyUI();
            }
            if(data.type === 'vote') handleVote(data.voter, data.target);
        });
    });
}

function joinRoom() {
    myName = $('#spyNick').val().trim();
    let code = $('#roomCode').val().trim();
    if(!myName || !code) return alert("اكمل البيانات!");
    peer = new Peer();
    peer.on('open', () => {
        let conn = peer.connect(code);
        conn.on('open', () => {
            conn.send({type: 'join', name: myName});
            $('#spy-online-setup').hide();
            $('#lobby').show();
        });
        conn.on('data', data => {
            if(data.type === 'list') { players = data.list; updateLobbyUI(); }
            if(data.type === 'start') showOnlineGame(data.role, data.names);
            if(data.type === 'res') showOnlineResults(data.spy, data.logs);
        });
    });
}

function updateLobbyUI() {
    $('#online-players-list').text("اللاعبون المتصلون: " + players.map(p => p.name).join(" - "));
}

function broadcastData(d) {
    if(peer.connections) {
        Object.values(peer.connections).forEach(c => c[0].send(d));
    }
}

function startOnlineGame() {
    let place = spyPlaces[Math.floor(Math.random() * spyPlaces.length)];
    let spyIdx = Math.floor(Math.random() * players.length);
    peer.actualSpy = players[spyIdx].name;
    votesReceived = [];
    players.forEach((p, i) => {
        let role = (i === spyIdx) ? "أنت الجاسوس 🕵️" : place;
        if(p.name === myName) showOnlineGame(role, players.map(pl => pl.name));
        else {
            let conn = Object.values(peer.connections).find(cn => cn[0].peer === p.id);
            if(conn) conn[0].send({type: 'start', role: role, names: players.map(pl => pl.name)});
        }
    });
}

function showOnlineGame(role, names) {
    $('#lobby').hide();
    $('#game-play').show();
    $('#my-role').text(role).hide();
    let btns = $('#vote-btns').empty();
    names.forEach(n => {
        if(n !== myName) btns.append(`<button class="vote-btn" onclick="sendVote('${n}')">${n}</button>`);
    });
}

function sendVote(target) {
    if(host) handleVote(myName, target);
    else {
        let masterConn = Object.values(peer.connections)[0][0];
        masterConn.send({type: 'vote', voter: myName, target: target});
    }
}

function handleVote(voter, target) {
    votesReceived.push(`${voter} صوّت لـ ${target}`);
    if(votesReceived.length >= players.length) {
        broadcastData({type: 'res', spy: peer.actualSpy, logs: votesReceived});
        showOnlineResults(peer.actualSpy, votesReceived);
    }
}

function showOnlineResults(spy, logs) {
    $('#vote-btns').hide();
    $('#vote-log-container').html("<strong>نتائج التصويت:</strong><br>" + logs.join("<br>"));
    $('#final-result').text("الجاسوس كان: " + spy);
}
</script>

</body>
</html>
