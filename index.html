<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة أحمد المحترف</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">

<style>
*{box-sizing:border-box}
body{margin:0;background:#000;color:#0f0;font-family:sans-serif}

/* ===== شاشة الدخول ===== */
#login-screen{
position:fixed; inset:0;
background:#000;
display:flex; justify-content:center; align-items:center;
z-index:9999; overflow:hidden;
}

#bg-canvas{
position:absolute; width:100%; height:100%;
}

.login-box{
position:relative;
background:rgba(0,0,0,0.85);
border:2px solid #da291c;
padding:40px;
border-radius:20px;
text-align:center;
width:320px;
transform-style:preserve-3d;
animation:float 4s ease-in-out infinite;
box-shadow:0 0 30px #da291c;
}

@keyframes float{
0%{transform:rotateY(0deg) translateY(0)}
50%{transform:rotateY(10deg) translateY(-10px)}
100%{transform:rotateY(0deg) translateY(0)}
}

.login-box h1{color:#da291c}
.login-box input{
width:100%; padding:12px; margin:15px 0;
background:#000; border:1px solid #da291c; color:#fff;
border-radius:8px; text-align:center;
}
.login-box button{
width:100%; padding:12px;
background:#da291c; color:#fff;
border:none; border-radius:8px; cursor:pointer;
}

/* باقي كودك */
.hidden{display:none}
</style>
</head>

<body>

<!-- شاشة الدخول -->
<div id="login-screen">
<canvas id="bg-canvas"></canvas>

<div class="login-box">
<h1>AHMED PRO</h1>
<p>بوابة الدخول</p>
<input type="text" id="login-name" placeholder="اكتب اسمك">
<button onclick="enterSystem()">دخول</button>
</div>

<audio id="login-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
</div>

<!-- قائمتك -->
<div id="main-menu">
<h1 style="color:#da291c;">AHMED PRO SYSTEM</h1>
<button onclick="showGame('chess')">♟️ شطرنج</button>
<button onclick="showGame('mafia')">🕵️ مافيا</button>
<button onclick="showGame('spy')">🔍 جاسوس</button>
<button onclick="showGame('spyOnline')">🌐 جاسوس أونلاين</button>
</div>

<!-- الأقسام (كما هي) -->
<div id="chess-section" class="hidden"><div id="board"></div></div>
<div id="mafia-section" class="hidden"></div>
<div id="spy-section" class="hidden"></div>
<div id="spy-online-section" class="hidden"></div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
// ===== دخول =====
function enterSystem(){
let name=document.getElementById("login-name").value.trim();
if(!name)return alert("اكتب اسمك");

document.getElementById("login-sound").play();
document.getElementById("login-screen").style.display="none";
}

// ===== خلفية متحركة =====
const canvas=document.getElementById("bg-canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1
});
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#da291c";
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();

// ===== كودك الأساسي (مختصر) =====
function showGame(t){
document.getElementById("main-menu").style.display="none";
document.getElementById(t+"-section").classList.remove("hidden");

if(t==="chess"){
Chessboard('board','start');
}
}
</script>

</body>
</html>
