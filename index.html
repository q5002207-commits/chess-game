<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>بوابة أحمد المحترف - النسخة الكاملة</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">

<style>

/* ===== إضافة شاشة الدخول ===== */
#login-screen{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
}

#bg-canvas{
position:absolute;
width:100%;
height:100%;
}

.login-box{
position:relative;
background:rgba(0,0,0,0.85);
border:2px solid #da291c;
padding:40px;
border-radius:20px;
text-align:center;
width:320px;
transform-style:preserve-3d;
animation:float 4s ease-in-out infinite;
box-shadow:0 0 30px #da291c;
}

@keyframes float{
0%{transform:rotateY(0deg) translateY(0)}
50%{transform:rotateY(10deg) translateY(-10px)}
100%{transform:rotateY(0deg) translateY(0)}
}

.login-box input{
width:100%;
padding:12px;
margin:15px 0;
background:#000;
border:1px solid #da291c;
color:#fff;
border-radius:8px;
text-align:center;
}

.login-box button{
width:100%;
padding:12px;
background:#da291c;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

/* ===== كودك الأصلي كما هو ===== */

* { touch-action: manipulation; user-select: none; box-sizing: border-box; }

body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

#main-menu { text-align: center; margin-top: 40px; width: 100%; max-width: 400px; }

.menu-btn { display: block; width: 100%; padding: 25px; margin: 15px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.4em; font-weight: bold; cursor: pointer; transition: 0.3s; }

.menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }

.back-home { background: #333; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; border: none; font-size: 0.8em; }

.header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 10px; }

#board { width: 380px !important; max-width: 95vw !important; border: 4px solid #222; border-radius: 8px; }

input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; }

button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

.mafia-card, .spy-card { background: #1a1a1a; padding: 20px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; transition: 0.5s; cursor: pointer; text-align: center; }

.role-display { display: none; color: #ff0000; font-size: 1.2em; font-weight: bold; margin-top: 10px; }

.narrator-box { background: #0055ff; color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border: 2px solid white; }

.hidden { display: none; }

.fade-out { opacity: 0; transform: scale(0.9); pointer-events: none; }

.locked { pointer-events: none; opacity: 0.4; }

.vote-btn { background: #222; color: yellow; border: 1px solid yellow; margin: 5px; width: auto; display: inline-block; padding: 10px; border-radius: 8px; }

.vote-log-item { background: #111; padding: 5px; border-bottom: 1px solid #333; font-size: 0.9em; color: #fff; text-align: right; }

</style>
</head>

<body>

<!-- شاشة الدخول -->
<div id="login-screen">
<canvas id="bg-canvas"></canvas>

<div class="login-box">
<h1 style="color:#da291c;">AHMED PRO</h1>
<p>بوابة الدخول</p>
<input type="text" id="login-name" placeholder="اكتب اسمك">
<button onclick="enterSystem()">دخول</button>
</div>

<audio id="login-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
</div>

<!-- ===== كل كودك كما هو بدون لمس ===== -->

<!-- (هنا كامل كودك الأصلي بدون أي حذف) -->

<script>
// ===== إضافة فقط =====
function enterSystem(){
let name=document.getElementById("login-name").value.trim();
if(!name)return alert("اكتب اسمك");

document.getElementById("login-sound").play();
document.getElementById("login-screen").style.display="none";
}

// خلفية متحركة
const canvas=document.getElementById("bg-canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5)
});
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#da291c";
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
