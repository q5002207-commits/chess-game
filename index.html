<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة أحمد - ساحة التحدي 🧠</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        
        .header { background: #da291c; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 0 15px #da291c; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .btn:hover { background: #da291c; }
        
        /* قسم المسابقة */
        #quiz-section { max-width: 500px; margin: 0 auto; }
        .score-board { font-size: 1.5em; color: #0f0; margin-bottom: 20px; text-shadow: 0 0 10px #0f0; }
        .question-card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; }
        .option-btn { background: #222; border: 1px solid #0f0; color: #0f0; width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .option-btn:hover { background: #0f0; color: #000; }
        
        .hidden { display: none; }
        .correct { background: #0f0 !important; color: #000 !important; }
        .wrong { background: #f00 !important; color: #fff !important; }
    </style>
</head>
<body>

<div id="main-menu">
    <div class="header"><h1>⚔️ نظام أحمد المحترف ⚔️</h1></div>
    <button class="btn" onclick="startQuiz()">🚩 ابدأ مسابقة (س وج)</button>
    <button class="btn" style="border-color: #555; color: #888;">🕵️ المافيا (قريباً)</button>
</div>

<div id="quiz-section" class="hidden">
    <div class="score-board">النقاط: <span id="score">0</span></div>
    <div class="question-card">
        <h3 id="q-text">جاري تحميل السؤال...</h3>
        <div id="options-container"></div>
    </div>
    <button class="btn" onclick="location.reload()" style="background: #333; border: none;">🏠 القائمة الرئيسية</button>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
    let score = 0;
    let currentQ = 0;

    const questions = [
        { q: "ما هو نظام التشغيل المفضل للهكرز؟", a: ["ويندوز", "كالي لينكس", "اندرويد"], c: 1 },
        { q: "ما معنى كلمة (Firewall) بالعربي؟", a: ["جدار الحماية", "حرق الملفات", "سيرفر سريع"], c: 0 },
        { q: "كم بت (Bit) يوجد في البايت الواحد؟", a: ["4", "10", "8"], c: 2 },
        { q: "ما هو أسرع كائن حي في العالم؟", a: ["الفهد", "صقر الشاهين", "السمك الطائر"], c: 1 },
        { q: "في أي لغة برمجية نستخدم وسم <html>؟", a: ["C++", "Python", "HTML"], c: 2 }
    ];

    function startQuiz() {
        $('#main-menu').hide();
        $('#quiz-section').removeClass('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQ >= questions.length) {
            $('#q-text').html("🏆 انتهى التحدي! <br> نقاطك النهائية: " + score);
            $('#options-container').empty();
            return;
        }

        let qData = questions[currentQ];
        $('#q-text').text(qData.q);
        $('#options-container').empty();

        qData.a.forEach((opt, index) => {
            let btn = $(`<button class="option-btn">${opt}</button>`);
            btn.click(() => checkAnswer(index));
            $('#options-container').append(btn);
        });
    }

    function checkAnswer(index) {
        let correctIdx = questions[currentQ].c;
        let btns = $('.option-btn');

        if (index === correctIdx) {
            $(btns[index]).addClass('correct');
            score += 10;
            $('#score').text(score);
        } else {
            $(btns[index]).addClass('wrong');
            $(btns[correctIdx]).addClass('correct');
        }

        $('.option-btn').prop('disabled', true);
        
        setTimeout(() => {
            currentQ++;
            showQuestion();
        }, 1500);
    }
</script>

</body>
</html>
