<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* شاشة الدخول */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .welcome-title { color: #da291c; font-size: 2.2em; font-weight: bold; text-shadow: 0 0 20px #da291c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #main-menu { text-align: center; margin-top: 40px; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 20px; margin: 10px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }
        
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 10px; font-weight: bold; }
        #board { width: 320px !important; max-width: 90vw !important; border: 4px solid #222; border-radius: 8px; margin: auto; }
        
        .mafia-card { background: #1a1a1a; padding: 25px; margin: 10px 0; border-radius: 10px; border: 2px solid #444; text-align: center; cursor: pointer; width: 100%; }
        .role-display { display: none; color: #00ff00; font-size: 1.4em; font-weight: bold; }
        .locked { opacity: 0.1 !important; pointer-events: none; }
        .hidden { display: none !important; }
        
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #da291c; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-title">AHMED PRO SYSTEM</div>
        <div style="color: #444; margin-top: 10px;">جاري تشغيل الأنظمة...</div>
    </div>

    <div id="main-content" class="hidden">
        <div id="main-menu">
            <h1 style="color:#da291c; text-shadow: 0 0 10px #da291c;">بوابة أحمد المحترف</h1>
            <button class="menu-btn" onclick="showGame('chess')">♟️ شطرنج أونلاين</button>
            <button class="menu-btn" onclick="showGame('mafia')">🕵️ مافيا (محلي)</button>
            <button class="menu-btn" onclick="showGame('spy')" style="border-color: #0f0; color: #0f0;">🔍 لعبة الجاسوس</button>
        </div>

        <div id="chess-section" class="hidden">
            <button onclick="location.reload()" style="background:#333; margin-bottom:10px;">🏠 القائمة الرئيسية</button>
            <div class="header">ID: <span id="my-id">...</span></div>
            <div id="board"></div>
            <div style="margin-top:15px; width: 320px;">
                <input type="text" id="friendId" placeholder="ID الخصم">
                <button onclick="sendChallengeRequest()">تحدي الخصم ⚔️</button>
            </div>
        </div>

        <div id="mafia-section" class="hidden">
            <button onclick="location.reload()" style="background:#333; margin-bottom:10px;">🏠 خروج</button>
            <div id="mafia-setup">
                <input type="text" id="playerName" placeholder="اسم اللاعب">
                <button onclick="addPlayer()">إضافة لاعب +</button>
                <div id="player-list" style="margin:15px;"></div>
                <button style="background:green;" onclick="distributeMafiaRoles()">بدء التوزيع</button>
            </div>
            <div id="mafia-display" class="hidden">
                <div id="narrator-name"></div>
                <div id="mafia-cards-container"></div>
            </div>
        </div>

        <div id="spy-section" class="hidden">
            <button onclick="location.reload()" style="background:#333; margin-bottom:10px;">🏠 خروج</button>
            <div id="spy-setup">
                <input type="text" id="spyPlayerName" placeholder="اسم اللاعب">
                <button onclick="addSpyPlayer()">إضافة لاعب +</button>
                <div id="spy-player-list" style="margin:15px;"></div>
                <button style="background:green;" onclick="startSpyGame()">ابدأ اللعبة</button>
            </div>
            <div id="spy-display" class="hidden">
                <div id="spy-cards-container"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        // الحل لمشكلة التعليق على "دخول":
        window.onload = function() {
            setTimeout(function() {
                $('#welcome-screen').hide();
                $('#main-content').removeClass('hidden');
            }, 1000); 
        };

        function showGame(g) {
            $('#main-menu').addClass('hidden');
            $('.hidden').addClass('hidden'); // إخفاء الكل أولاً
            $('#main-content').removeClass('hidden');
            if(g === 'chess') { $('#chess-section').removeClass('hidden'); initChess(); }
            else if(g === 'mafia') { $('#mafia-section').removeClass('hidden'); }
            else if(g === 'spy') { $('#spy-section').removeClass('hidden'); }
        }

        // شطرنج
        var board = null, game = new Chess(), peer = null, conn = null, myColor = 'w';
        function initChess() {
            let id = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(id);
            peer.on('open', i => $('#my-id').text(i));
            peer.on('connection', c => { conn = c; myColor = 'w'; setupListen(); });
            board = Chessboard('board', { 
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
        }
        function sendChallengeRequest() { let fId = $('#friendId').val(); if(fId) { conn = peer.connect(fId); myColor = 'b'; board.orientation('black'); setupListen(); } }
        function setupListen() { conn.on('data', d => { game.move(d); board.position(game.fen()); }); }

        // مافيا
        let players = [];
        function addPlayer() { let p = $('#playerName').val(); if(p) { players.push(p); $('#player-list').append(p + " | "); $('#playerName').val(""); } }
        function distributeMafiaRoles() {
            let rIdx = Math.floor(Math.random() * players.length);
            let narrator = players[rIdx], actives = players.filter((_, i) => i !== rIdx);
            let roles = ["مافيا 💀", "دكتور 💉", "شريف 👮"];
            while(roles.length < actives.length) roles.push("مواطن 👨‍🌾");
            roles.sort(() => Math.random() - 0.5);
            $('#mafia-setup').hide(); $('#mafia-display').removeClass('hidden');
            $('#narrator-name').html(`<div class="header">🎤 الراوي: ${narrator}</div>`);
            actives.forEach((p, i) => {
                let card = $(`<div class="mafia-card"><strong>${p}</strong><div class="role-display">${roles[i]}</div></div>`);
                card.click(function() { showTemp(this); });
                $('#mafia-cards-container').append(card);
            });
        }

        // جاسوس
        let spyPlayers = [];
        let items = ["منسف", "شاورما", "مرسيدس", "بلايستيشن", "مطار"];
        function addSpyPlayer() { let p = $('#spyPlayerName').val(); if(p) { spyPlayers.push(p); $('#spy-player-list').append(p + " | "); $('#spyPlayerName').val(""); } }
        function startSpyGame() {
            let item = items[Math.floor(Math.random() * items.length)];
            let sIdx = Math.floor(Math.random() * spyPlayers.length);
            $('#spy-setup').hide(); $('#spy-display').removeClass('hidden');
            spyPlayers.forEach((p, i) => {
                let card = $(`<div class="mafia-card"><strong>${p}</strong><div class="role-display">${i === sIdx ? "🕵️ جاسوس" : item}</div></div>`);
                card.click(function() { showTemp(this); });
                $('#spy-cards-container').append(card);
            });
        }

        function showTemp(el) {
            $(el).find('strong').hide(); $(el).find('.role-display').show();
            setTimeout(() => { $(el).find('strong').show(); $(el).find('.role-display').hide(); }, 2000);
        }
    </script>
</body>
</html>
