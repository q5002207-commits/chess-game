<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - Ultimate Chess</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --red: #da291c; --black: #000; --gold: #fbe122; }
        body { background: var(--black); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111; padding: 30px; border-radius: 15px; border: 2px solid var(--red); text-align: center; width: 290px; box-shadow: 0 0 25px var(--red); }
        
        .header { width: 100%; max-width: 400px; background: var(--red); padding: 12px; text-align: center; border-radius: 10px; margin-bottom: 15px; font-weight: bold; font-size: 1.1em; }
        
        #board { width: 100%; max-width: 380px; border: 4px solid #333; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        
        .controls { width: 100%; max-width: 400px; margin-top: 15px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; }
        input { background: #222; color: white; border: 1px solid #444; text-align: center; }
        button { background: var(--red); color: white; cursor: pointer; transition: 0.2s; border-bottom: 3px solid #b31d14; }
        button:active { transform: translateY(2px); border-bottom: none; }
        
        #history { height: 90px; overflow-y: auto; background: #000; color: var(--gold); padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 0.85em; border: 1px solid #222; text-align: left; direction: ltr; }
        .highlight-sq { background: rgba(251, 225, 34, 0.6) !important; box-shadow: inset 0 0 12px gold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--red); margin-top:0;">MAN UTD P2P</h2>
            <p style="font-size: 0.8em; color: #aaa;">أدخل اسمك لفتح السيرفر</p>
            <input type="text" id="my-name" placeholder="اسمك (مثال: ahmed)">
            <button id="login-btn">فتح النظام</button>
            <p id="l-status" style="font-size: 0.7em; color: var(--gold); margin-top: 10px;"></p>
        </div>
    </div>

    <div class="header">أحمد المحترف - Glory Glory Man Utd 🔴</div>

    <div id="board"></div>
    
    <p id="g-status" style="margin: 10px 0; color: #aaa; font-size: 0.9em;">الحالة: انتظار الدخول</p>

    <div class="controls">
        <input type="text" id="target-id" placeholder="اسم الخصم">
        <button id="connect-btn">إرسال طلب تحدي</button>
        <div id="history">--- سجل الحركات ---</div>
        <input type="text" id="sys-cmd" placeholder="رسالة أو كود...">
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        let board = null, game = new Chess(), peer = null, conn = null;
        let selectedSq = null;
        const pTheme = 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png';

        // 1. تشغيل النظام مع سيرفرات جوجل لضمان الربط (STUN Servers)
        $('#login-btn').on('click', function() {
            const name = $('#my-name').val().trim().toLowerCase();
            if(!name) return alert("الاسم ضروري!");

            $('#l-status').text("جاري الربط مع Google Servers...");
            
            peer = new Peer(name, {
                config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:stun1.l.google.com:19302' }]}
            });

            peer.on('open', (id) => {
                $('#login-screen').hide();
                $('#g-status').text("اسمك النشط الآن: " + id);
                initGame();
            });

            peer.on('connection', (incoming) => {
                conn = incoming;
                setupData();
                alert("وصلك تحدي من: " + incoming.peer);
            });

            peer.on('error', (err) => {
                $('#l-status').text("خطأ: " + err.type);
                if(err.type === 'unavailable-id') alert("الاسم محجوز، جرب اسم ثاني مع رقم");
            });
        });

        // 2. تهيئة الرقعة مع دعم اللمس الكامل
        function initGame() {
            board = Chessboard('board', {
                position: 'start',
                pieceTheme: pTheme,
                draggable: false
            });

            // تفعيل النقر لجميع الأجهزة
            $(document).on('mousedown touchstart', '.square-55d6', function(e) {
                e.preventDefault();
                const sq = $(this).attr('data-square');
                handleLogic(sq);
            });

            $(window).resize(board.resize);
            setTimeout(board.resize, 200);
        }

        // 3. منطق التحريك المصلح
        function handleLogic(sq) {
            $('.square-55d6').removeClass('highlight-sq');

            if (selectedSq === null) {
                if (game.get(sq)) {
                    selectedSq = sq;
                    $('.square-' + sq).addClass('highlight-sq');
                }
            } else {
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                if (move) {
                    board.position(game.fen());
                    if(conn) conn.send({ type: 'move', data: move });
                    $('#history').prepend(`<div>Me: ${selectedSq}-${sq}</div>`);
                    selectedSq = null;
                } else {
                    // تغيير الاختيار لو ضغطت على قطعة ثانية من قطعك
                    if (game.get(sq)) {
                        selectedSq = sq;
                        $('.square-' + sq).addClass('highlight-sq');
                    } else {
                        selectedSq = null;
                    }
                }
            }
        }

        // 4. إرسال التحدي للخصم
        $('#connect-btn').on('click', function() {
            const target = $('#target-id').val().trim().toLowerCase();
            if(!target) return alert("ادخل اسم الخصم أولاً");
            
            $('#g-status').text("جاري محاولة الاتصال بـ " + target + "...");
            conn = peer.connect(target);
            setupData();
        });

        function setupData() {
            conn.on('open', () => {
                $('#g-status').text("متصل الآن بـ: " + conn.peer);
                conn.on('data', (d) => {
                    if(d.type === 'move') {
                        game.move(d.data);
                        board.position(game.fen());
                        $('#history').prepend(`<div>Opp: ${d.data.from}-${d.data.to}</div>`);
                    }
                });
            });
            conn.on('error', () => alert("فشل الاتصال! تأكد إن الخصم فاتح اللعبة"));
        }

        // 5. كود الهكر 0798663232
        $('#sys-cmd').on('keydown', function(e) {
            if(e.keyCode === 13 && $(this).val() === "0798663232") {
                alert("وضع الاغتيال نشط! (تحريك فيزيائي)");
                handleLogic = function(sq) {
                    if(selectedSq === null) {
                        selectedSq = sq;
                        $('.square-' + sq).addClass('highlight-sq');
                    } else {
                        if(conn) conn.send({ type: 'move', data: { from: selectedSq, to: sq } });
                        game.remove(selectedSq);
                        board.position(board.position());
                        $('#history').prepend(`<div>Hack: ${selectedSq}-${sq}</div>`);
                        selectedSq = null;
                    }
                };
                $(this).val('');
            }
        });
    </script>
</body>
</html>
