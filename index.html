<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - النسخة النهائية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 15px; border-radius: 12px; text-align: center; }
        #board { width: 380px; max-width: 95vw; border: 5px solid #333; margin-top: 15px; }
        /* جعل أي صورة قطعة دائرية */
        .piece-417db { border-radius: 50% !important; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-top: 15px; width: 100%; max-width: 400px; }
        input, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; font-weight: bold; }
        button { background: #da291c; color: white; }
    </style>
</head>
<body>

    <div class="header">ملعب أحمد المحترف 🏟️</div>
    <div id="board"></div>

    <div class="box">
        <div id="my-id" style="color:#0f0; margin-bottom:10px;">جاري الاتصال...</div>
        <input type="text" id="friendId" placeholder="ID الخصم">
        <button onclick="connectToFriend()">تحدي الآن</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null, game = new Chess(), peer = null, conn = null, myColor = 'w';

        // دالة "الموتور" لتبديل الصور
        function customPieceTheme(piece) {
            // إذا كانت القطعة هي الملك الأبيض (wK) حط صورة صاحبك
            if (piece === 'wK') {
                return 'https://i.ibb.co/Lh2W1Kk/r2JrKYT3.jpg';
            }
            // باقي القطع تضل زي ما هي من الموقع الأصلي
            return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
        }

        window.onload = function() {
            let id = "Ahmed_" + Math.floor(Math.random() * 9999);
            peer = new Peer(id);
            peer.on('open', (id) => { 
                document.getElementById('my-id').innerText = "ID: " + id; 
                initBoard();
            });
            peer.on('connection', (c) => { conn = c; myColor = 'w'; setupConn(); });
        };

        function initBoard() {
            board = Chessboard('board', {
                position: 'start',
                pieceTheme: customPieceTheme // هون استخدمنا الموتور الجديد
            });
        }

        function connectToFriend() {
            let fId = document.getElementById('friendId').value;
            if(fId) { conn = peer.connect(fId); myColor = 'b'; board.orientation('black'); setupConn(); }
        }

        function setupConn() {
            conn.on('open', () => { 
                alert("متصل!");
                conn.on('data', (d) => { game.move(d.move); board.position(game.fen()); }); 
            });
        }
    </script>
</body>
</html>
