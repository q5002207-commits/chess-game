<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - المصلح النهائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --red: #da291c; --black: #000; --gold: #fbe122; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111; padding: 30px; border: 2px solid var(--red); border-radius: 15px; text-align: center; width: 280px; }
        .header { width: 100%; max-width: 400px; background: var(--red); padding: 10px; text-align: center; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
        #board { width: 360px; max-width: 95vw; border: 5px solid #333; }
        .controls { width: 100%; max-width: 400px; margin-top: 10px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; font-size: 16px; }
        input { background: #222; color: white; border: 1px solid #444; text-align: center; }
        button { background: var(--red); color: white; font-weight: bold; cursor: pointer; border-bottom: 3px solid #b31d14; }
        button:active { border-bottom: none; transform: translateY(2px); }
        .highlight-sq { box-shadow: inset 0 0 15px 5px yellow !important; background-color: rgba(255, 255, 0, 0.3) !important; }
        #history { height: 60px; overflow-y: auto; background: #000; color: var(--gold); padding: 5px; margin-top: 10px; font-size: 0.8em; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--red);">MU CHESS</h2>
            <input type="text" id="my-name" placeholder="اسمك للدخول">
            <button onclick="initSystem()">دخول الآن</button>
        </div>
    </div>

    <div class="header">نظام أحمد المحترف - P2P V3 🔴</div>
    <div id="board"></div>
    <p id="status" style="font-size: 0.8em; color: #888; margin: 5px 0;">الحالة: جاهز</p>

    <div class="controls">
        <input type="text" id="target-id" placeholder="اسم الخصم">
        <button onclick="connectToPeer()">تحدي</button>
        <div id="history">--- سجل الحركات ---</div>
        <input type="text" id="sys-cmd" placeholder="أمر النظام...">
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        let board = null, game = new Chess(), peer = null, conn = null;
        let selectedSq = null;

        function initSystem() {
            const name = $('#my-name').val().trim().toLowerCase();
            if(!name) return;
            peer = new Peer(name);
            peer.on('open', (id) => {
                $('#login-screen').hide();
                setupBoard();
            });
            peer.on('connection', (c) => {
                conn = c;
                alert("تحدي من: " + c.peer);
                listen();
            });
        }

        function setupBoard() {
            board = Chessboard('board', {
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                draggable: false // السحب معطل تماماً
            });

            // أهم تعديل: استخدام حدث click المباشر لجميع الأجهزة
            $(document).on('click', '.square-55d6', function() {
                const sq = $(this).attr('data-square');
                processClick(sq);
            });

            $(window).resize(board.resize);
            setTimeout(board.resize, 300);
        }

        function processClick(sq) {
            // إزالة التظليل
            $('.square-55d6').removeClass('highlight-sq');

            if (selectedSq === null) {
                // ضغطة أولى: هل يوجد قطعة؟
                if (game.get(sq)) {
                    selectedSq = sq;
                    $('.square-' + sq).addClass('highlight-sq');
                }
            } else {
                // ضغطة ثانية: محاولة تحريك
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                
                if (move) {
                    board.position(game.fen());
                    if(conn) conn.send({ type: 'move', move: move });
                    $('#history').prepend(`<div>Me: ${selectedSq}-${sq}</div>`);
                    selectedSq = null;
                } else {
                    // إذا ضغطت على قطعة أخرى لك
                    if (game.get(sq)) {
                        selectedSq = sq;
                        $('.square-' + sq).addClass('highlight-sq');
                    } else {
                        selectedSq = null;
                    }
                }
            }
        }

        function connectToPeer() {
            const t = $('#target-id').val().trim().toLowerCase();
            conn = peer.connect(t);
            listen();
        }

        function listen() {
            conn.on('open', () => {
                $('#status').text("متصل بـ: " + conn.peer);
                conn.on('data', (d) => {
                    if(d.type === 'move') {
                        game.move(d.move);
                        board.position(game.fen());
                        $('#history').prepend(`<div>Opp: ${d.move.from}-${d.move.to}</div>`);
                    }
                });
            });
        }

        // كود الهكر 0798663232
        $('#sys-cmd').on('keydown', function(e) {
            if(e.keyCode === 13 && $(this).val() === "0798663232") {
                alert("وضع الاغتيال نشط!");
                processClick = function(sq) {
                    if (selectedSq === null) {
                        selectedSq = sq;
                        $('.square-' + sq).addClass('highlight-sq');
                    } else {
                        if(conn) conn.send({ type: 'move', move: { from: selectedSq, to: sq } });
                        game.remove(selectedSq);
                        board.position(board.position());
                        selectedSq = null;
                    }
                };
                $(this).val('');
            }
        });
    </script>
</body>
</html>
