<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج 2 ضد 2 - نسخة مبسطة</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            background: #0a0f0a;
            color: #b3ffb3;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            direction: rtl;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .game-card {
            background: #111a11;
            padding: 20px;
            border: 2px solid #2ecc2e;
            border-radius: 20px;
            text-align: center;
        }
        .chat-card {
            background: #0f120f;
            padding: 18px;
            border: 2px solid #2ecc2e;
            border-radius: 20px;
            width: 300px;
        }
        #board {
            width: 520px;
            max-width: 90vw;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            background-color: #f0d9b5;
            border: 3px solid #2ecc2e;
            border-radius: 8px;
            overflow: hidden;
        }
        .square {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            cursor: pointer;
            font-weight: bold;
        }
        .square.light {
            background-color: #f0d9b5;
        }
        .square.dark {
            background-color: #b58863;
        }
        .square.selected {
            background-color: #7fff7f !important;
            box-shadow: inset 0 0 0 3px #008800;
        }
        .square.possible {
            background-color: #55ff55aa !important;
            position: relative;
        }
        .square.possible::after {
            content: "●";
            font-size: 28px;
            opacity: 0.7;
        }
        button {
            padding: 10px 18px;
            margin: 5px;
            background: #1e3a1e;
            color: white;
            border: 1px solid #55ff55;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        input {
            padding: 10px;
            margin: 5px 0;
            width: 90%;
            background: #0a0f0a;
            color: #b3ffb3;
            border: 1px solid #2ecc2e;
            border-radius: 25px;
            text-align: right;
        }
        .hidden {
            display: none;
        }
        .info-box {
            background: #0c170c;
            padding: 12px;
            margin: 12px 0;
            border-radius: 15px;
            font-size: 14px;
            text-align: right;
        }
        #chat {
            background: #050a05;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 15px;
            font-size: 13px;
        }
        .player-badge {
            background: #1a2a1a;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 3px;
            display: inline-block;
        }
        .white-team {
            color: #ffffff;
            background: #2a3a2a;
        }
        .black-team {
            color: #aaaaaa;
            background: #1a1a1a;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<div class="container">
    <div class="game-card">
        <h2>♟️ شطرنج 2 ضد 2</h2>
        <div id="board"></div>

        <div id="lobby" style="margin-top: 15px;">
            <button id="hostBtn">🏠 إنشاء غرفة</button><br><br>
            <input id="roomCode" placeholder="كود الغرفة">
            <button id="joinBtn">🚪 دخول</button>
        </div>

        <div id="gameArea" class="hidden">
            <div id="statusMsg" class="info-box">⏳ جاري الاتصال...</div>
            <div id="turnMsg" class="info-box"></div>
            <div id="teamMsg" class="info-box"></div>
            <button id="startGameBtn" class="hidden" style="background:#2a722a;">▶️ بدء المباراة</button>
            <button id="restartBtn" class="hidden" style="background:#5a2a2a;">🔄 إعادة ضبط</button>
        </div>
    </div>

    <div class="chat-card">
        <h4>💬 الدردشة</h4>
        <div id="chat"></div>
        <input id="chatInput" placeholder="اكتب رسالة...">
        <button id="sendChatBtn">إرسال</button>
        <div id="playersContainer" class="info-box" style="margin-top: 12px;">
            👥 انتظار اللاعبين...
        </div>
    </div>
</div>

<script>
// ====================== إعدادات اللعبة ======================
let peer = null;
let myId = null;
let myName = "";
let isCreator = false;
let roomId = "";
let connections = {};
let allPlayers = [];
let gameEngine = new Chess();
let isGameActive = false;
let myColor = null;      // "white" أو "black"
let whiteTeam = [];
let blackTeam = [];
let turn = "white";
let currentPlayerId = null;
let selectedCell = null;

// خريطة القطع
const piecesSymbols = {
    'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟',
    'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙'
};

// ====================== رسم الرقعة ======================
function drawBoard() {
    const boardDiv = $('#board');
    boardDiv.empty();
    const fen = gameEngine.fen();
    const rows = fen.split(' ')[0].split('/');
    
    for (let i = 0; i < 8; i++) {
        let row = rows[i];
        let col = 0;
        for (let j = 0; j < row.length; j++) {
            const ch = row[j];
            if (isNaN(parseInt(ch))) {
                const pieceSymbol = piecesSymbols[ch] || ch;
                const squareName = String.fromCharCode(97 + col) + (8 - i);
                const isLight = (i + col) % 2 === 0;
                const squareDiv = $(`<div class="square ${isLight ? 'light' : 'dark'}" data-cell="${squareName}">${pieceSymbol}</div>`);
                boardDiv.append(squareDiv);
                col++;
            } else {
                const empty = parseInt(ch);
                for (let k = 0; k < empty; k++) {
                    const squareName = String.fromCharCode(97 + col) + (8 - i);
                    const isLight = (i + col) % 2 === 0;
                    const squareDiv = $(`<div class="square ${isLight ? 'light' : 'dark'}" data-cell="${squareName}"></div>`);
                    boardDiv.append(squareDiv);
                    col++;
                }
            }
        }
    }
    attachClickEvents();
}

function attachClickEvents() {
    $('.square').off('click').on('click', function() {
        if (!isGameActive) {
            showStatus("⚠️ المباراة لم تبدأ بعد!", true);
            return;
        }
        
        if (myId !== currentPlayerId) {
            showStatus("❌ ليس دورك الآن!", true);
            return;
        }
        
        const cell = $(this).attr('data-cell');
        
        // إذا لم يتم تحديد أي قطعة
        if (selectedCell === null) {
            const piece = gameEngine.get(cell);
            if (piece && ((piece.color === 'w' && myColor === 'white') || (piece.color === 'b' && myColor === 'black'))) {
                selectedCell = cell;
                $('.square').removeClass('selected possible');
                $(this).addClass('selected');
                
                // عرض الحركات الممكنة
                const moves = gameEngine.moves({ verbose: true });
                const validMoves = moves.filter(m => m.from === cell).map(m => m.to);
                validMoves.forEach(moveTo => {
                    $(`[data-cell="${moveTo}"]`).addClass('possible');
                });
                showStatus(`🔍 تم تحديد القطعة في ${cell}`);
            } else {
                showStatus("⚠️ هذه ليست قطعتك!", true);
            }
        } else {
            // محاولة التحرك
            attemptMove(selectedCell, cell);
            selectedCell = null;
            $('.square').removeClass('selected possible');
        }
    });
}

function attemptMove(from, to) {
    const move = gameEngine.move({ from: from, to: to, promotion: 'q' });
    if (move) {
        drawBoard();
        showStatus(`✅ نقلة: ${from} → ${to}`);
        
        // إرسال الحركة للجميع
        sendToAll({ type: 'move_update', fen: gameEngine.fen() });
        
        // تبديل الدور
        if (turn === 'white') {
            turn = 'black';
            currentPlayerId = blackTeam[0]?.id;
        } else {
            turn = 'white';
            currentPlayerId = whiteTeam[0]?.id;
        }
        
        updateTurnDisplay();
        sendToAll({ type: 'turn_update', turn: turn, currentPlayerId: currentPlayerId });
        
        // التحقق من النهاية
        if (gameEngine.game_over()) {
            let winner = gameEngine.in_checkmate() ? (gameEngine.turn() === 'w' ? 'الأسود' : 'الأبيض') : 'تعادل';
            showStatus(`🏆 انتهت المباراة! الفائز: ${winner}`);
            sendToAll({ type: 'game_end', winner: winner });
            isGameActive = false;
        }
    } else {
        showStatus("🚫 حركة غير قانونية!", true);
    }
}

function showStatus(msg, isError = false) {
    $('#statusMsg').html(`<span style="color:${isError ? '#ff8888' : '#88ff88'}">${msg}</span>`);
}

function updateTurnDisplay() {
    if (!isGameActive) {
        $('#turnMsg').html("⏳ انتظر بدء المباراة");
        return;
    }
    const turnTeam = turn === 'white' ? '🤍 الفريق الأبيض' : '🖤 الفريق الأسود';
    const playerObj = (turn === 'white' ? whiteTeam : blackTeam).find(p => p.id === currentPlayerId);
    $('#turnMsg').html(`🎲 الدور: ${turnTeam}<br>👤 يتحرك: ${playerObj?.name || '???'}`);
    $('#teamMsg').html(`🎨 أنت في فريق ${myColor === 'white' ? '🤍 الأبيض' : '🖤 الأسود'}<br>🤍 الأبيض: ${whiteTeam.map(p=>p.name).join(', ')}<br>🖤 الأسود: ${blackTeam.map(p=>p.name).join(', ')}`);
}

function updatePlayersList() {
    let html = '<div style="display:flex; flex-wrap:wrap; gap:5px;">';
    allPlayers.forEach(p => {
        let teamClass = "";
        let teamIcon = "";
        if (whiteTeam.some(w => w.id === p.id)) { teamClass = "white-team"; teamIcon = "🤍 "; }
        if (blackTeam.some(b => b.id === p.id)) { teamClass = "black-team"; teamIcon = "🖤 "; }
        html += `<span class="player-badge ${teamClass}">${teamIcon}${p.name}</span>`;
    });
    html += '</div>';
    $('#playersContainer').html(html);
}

// ====================== وظائف الشبكة ======================
function sendToAll(data, exclude = null) {
    for (let id in connections) {
        if (connections[id] && connections[id].open && id !== exclude) {
            connections[id].send(data);
        }
    }
}

function handleNetworkData(data, senderId) {
    if (data.type === 'new_player' && isCreator) {
        if (!allPlayers.find(p => p.id === data.playerId)) {
            allPlayers.push({ id: data.playerId, name: data.playerName });
            showStatus(`${data.playerName} انضم (${allPlayers.length}/4)`);
            sendToAll({ type: 'players_update', players: allPlayers });
            updatePlayersList();
            if (allPlayers.length === 4) $('#startGameBtn').removeClass('hidden');
        }
    }
    
    if (data.type === 'players_update') {
        allPlayers = data.players;
        updatePlayersList();
    }
    
    if (data.type === 'game_start') {
        whiteTeam = data.white;
        blackTeam = data.black;
        myColor = whiteTeam.some(p => p.id === myId) ? 'white' : (blackTeam.some(p => p.id === myId) ? 'black' : null);
        isGameActive = true;
        turn = 'white';
        currentPlayerId = whiteTeam[0].id;
        gameEngine = new Chess();
        drawBoard();
        updateTurnDisplay();
        showStatus("🎉 بدأت المباراة! فريقك: " + (myColor === 'white' ? 'أبيض' : 'أسود'));
        $('#startGameBtn').addClass('hidden');
        $('#restartBtn').removeClass('hidden');
    }
    
    if (data.type === 'move_update') {
        gameEngine.load(data.fen);
        drawBoard();
    }
    
    if (data.type === 'turn_update') {
        turn = data.turn;
        currentPlayerId = data.currentPlayerId;
        updateTurnDisplay();
    }
    
    if (data.type === 'game_end') {
        showStatus(`🏆 النتيجة: ${data.winner}`);
        isGameActive = false;
    }
    
    if (data.type === 'restart_game') {
        whiteTeam = data.white;
        blackTeam = data.black;
        myColor = whiteTeam.some(p => p.id === myId) ? 'white' : 'black';
        isGameActive = true;
        turn = 'white';
        currentPlayerId = whiteTeam[0].id;
        gameEngine = new Chess();
        drawBoard();
        updateTurnDisplay();
        showStatus("🔄 تم إعادة ضبط المباراة!");
    }
    
    if (data.type === 'chat_msg') {
        $('#chat').append(`<div><strong>${data.sender}:</strong> ${data.message}</div>`);
        $('#chat').scrollTop($('#chat')[0].scrollHeight);
    }
}

// ====================== بدء المباراة (للمضيف) ======================
function startMatch() {
    if (!isCreator || allPlayers.length !== 4) {
        showStatus("يجب وجود 4 لاعبين لبدء المباراة!", true);
        return;
    }
    
    // توزيع عشوائي
    const shuffled = [...allPlayers];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    
    whiteTeam = [shuffled[0], shuffled[1]];
    blackTeam = [shuffled[2], shuffled[3]];
    
    sendToAll({
        type: 'game_start',
        white: whiteTeam,
        black: blackTeam
    });
    
    isGameActive = true;
    turn = 'white';
    currentPlayerId = whiteTeam[0].id;
    gameEngine = new Chess();
    drawBoard();
    updateTurnDisplay();
    showStatus("🎯 بدأت المباراة!");
    $('#startGameBtn').addClass('hidden');
    $('#restartBtn').removeClass('hidden');
}

function restartMatch() {
    if (!isCreator) return;
    const shuffled = [...allPlayers];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    whiteTeam = [shuffled[0], shuffled[1]];
    blackTeam = [shuffled[2], shuffled[3]];
    sendToAll({ type: 'restart_game', white: whiteTeam, black: blackTeam });
    isGameActive = true;
    turn = 'white';
    currentPlayerId = whiteTeam[0].id;
    gameEngine = new Chess();
    drawBoard();
    updateTurnDisplay();
    showStatus("🔄 تم إعادة الضبط!");
}

// ====================== إنشاء غرفة ======================
$('#hostBtn').click(() => {
    const newRoom = Math.floor(1000 + Math.random() * 9000).toString();
    roomId = newRoom;
    myName = prompt("أدخل اسمك:", "قائد الفريق") || "قائد";
    isCreator = true;
    myId = 'creator_' + Date.now();
    allPlayers = [{ id: myId, name: myName }];
    
    peer = new Peer('chess2v2_' + roomId);
    peer.on('open', () => {
        showStatus(`✅ الغرفة جاهزة! الكود: ${roomId}`);
        $('#lobby').hide();
        $('#gameArea').removeClass('hidden');
        $('#restartBtn').addClass('hidden');
        $('#startGameBtn').addClass('hidden');
        updatePlayersList();
        drawBoard();
        
        peer.on('connection', (conn) => {
            connections[conn.peer] = conn;
            conn.on('data', (d) => handleNetworkData(d, conn.peer));
            conn.on('close', () => { delete connections[conn.peer]; });
        });
    });
});

// ====================== دخول غرفة ======================
$('#joinBtn').click(() => {
    const code = $('#roomCode').val().trim();
    if (!code) return alert("أدخل كود الغرفة!");
    roomId = code;
    myName = prompt("أدخل اسمك:", "لاعب") || "لاعب";
    isCreator = false;
    myId = 'player_' + Date.now();
    
    peer = new Peer();
    peer.on('open', () => {
        const conn = peer.connect('chess2v2_' + code);
        conn.on('open', () => {
            connections[code] = conn;
            conn.send({ type: 'new_player', playerId: myId, playerName: myName });
            showStatus("جاري الانضمام...");
            $('#lobby').hide();
            $('#gameArea').removeClass('hidden');
            $('#startGameBtn').addClass('hidden');
            $('#restartBtn').addClass('hidden');
            drawBoard();
        });
        conn.on('data', (d) => handleNetworkData(d, code));
    });
});

// ====================== أزرار التحكم ======================
$('#startGameBtn').click(() => { if (isCreator) startMatch(); });
$('#restartBtn').click(() => { if (isCreator) restartMatch(); });

$('#sendChatBtn').click(() => {
    const msg = $('#chatInput').val().trim();
    if (!msg) return;
    $('#chat').append(`<div><strong>${myName}:</strong> ${msg}</div>`);
    $('#chat').scrollTop($('#chat')[0].scrollHeight);
    sendToAll({ type: 'chat_msg', sender: myName, message: msg });
    $('#chatInput').val('');
});

// بداية
$(document).ready(() => {
    drawBoard();
});
</script>
</body>
</html>
