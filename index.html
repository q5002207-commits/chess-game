<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - سجل الحركات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        #hacker-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 10px; color: white; }
        .clock { flex: 1; background: #111; padding: 10px; border-radius: 8px; text-align: center; border: 2px solid #333; font-family: monospace; font-size: 1.4em; color: #fff; }
        
        #board { width: 380px !important; max-width: 95vw !important; border: 4px solid #222; border-radius: 8px; }
        
        /* تصميم سجل الحركات */
        .history-box { width: 100%; max-width: 400px; background: #111; margin-top: 10px; border-radius: 8px; border: 1px solid #0f0; height: 80px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 0.9em; }
        .history-title { color: #da291c; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #333; }
        .move-item { display: inline-block; background: #222; padding: 2px 8px; margin: 2px; border-radius: 4px; border: 1px solid #444; }

        .leaderboard-box { width: 100%; max-width: 400px; background: #111; margin-top: 10px; border-radius: 12px; border: 1px solid #0f0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #0f02; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        img[class^="piece"] { border-radius: 50% !important; border: 1px solid white !important; }
        .highlight-sq { background: rgba(0, 255, 0, 0.3) !important; }
    </style>
</head>
<body>

    <div id="hacker-overlay"><div id="matrix-console" style="color:#0f0; font-family:monospace;"></div></div>

    <div class="header">
        <h3 style="margin:0;">🏆 اسرائيل و اقطع 🏆</h3>
        <div id="my-id" style="font-size: 0.8em; color: #0f0;">Connecting...</div>
    </div>

    <div style="display:flex; width:100%; max-width:400px; gap:10px; margin-bottom:10px;">
        <div id="opp-clock" class="clock">10:00</div>
        <div id="my-clock" class="clock">10:00</div>
    </div>

    <div id="board"></div>

    <div class="history-box" id="move-history">
        <div class="history-title">📜 سجل الحركات:</div>
        <div id="moves-list"></div>
    </div>

    <div class="leaderboard-box">
        <table>
            <tbody>
                <tr style="color: #0f0;"><td>أنت</td><td id="my-elo-display">1200</td><td>ONLINE</td></tr>
                <tr><td id="opp-name-display">الخصم</td><td id="opp-elo-display">1200</td><td id="opp-status">WAITING</td></tr>
            </tbody>
        </table>
    </div>

    <div style="width:100%; max-width:400px;">
        <input type="text" id="friendId" placeholder="ID الخصم" style="width:100%; padding:12px; border-radius:8px; border:1px solid #0f0; background:#000; color:#0f0; margin-top:10px; text-align:center;">
        <button id="attack-btn" onclick="sendChallengeRequest()">إرسال طلب تحدي</button>
    </div>

    <audio id="moveSound" src="https://images.chesscomfiles.com/chess-themes/sounds/_standard/default/move-self.mp3"></audio>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null, game = new Chess(), peer = null, conn = null;
        var myColor = 'w', sourceSquare = null, gameStarted = false;
        var myTime = 600, oppTime = 600, timer = null;

        var pics = {
            wK: 'https://i.postimg.cc/m27HgYdg/king-black.jpg', 
            wQ: 'https://i.postimg.cc/CxLfkvYW/813f791d-4209-474a-b3ae-32306e3d2632.jpg',
            wN: 'https://i.postimg.cc/d31K4Kx9/download.jpg', 
            wB: 'https://i.postimg.cc/jjn9q4WQ/download.jpg',
            bP: 'https://i.postimg.cc/Nj9dgQFv/download.jpg', // صاحبك
            bK: 'https://i.postimg.cc/T19B8NZh/cbbe2978-b5df-45c8-ad43-05cfb6f57edb.jpg', 
            bQ: 'https://i.postimg.cc/HsbtBvqn/ca232a37-372a-45be-b758-6e90cd5f70a1.jpg',
            bN: 'https://i.postimg.cc/DwFRgXMy/5f98a3d6-1c49-4903-a9c0-8a1b8a2de568.jpg', 
            bB: 'https://i.postimg.cc/RVRx2dfm/download.jpg'
        };

        // أنيميشن الهكر
        const lines = ["Initializing History Log...", "Tracking Moves...", "System Ready."];
        let lIdx = 0;
        function type() {
            if (lIdx < lines.length) {
                let d = document.createElement('div'); d.innerText = "> " + lines[lIdx++];
                document.getElementById('matrix-console').appendChild(d);
                setTimeout(type, 400);
            } else { setTimeout(() => document.getElementById('hacker-overlay').style.display='none', 600); }
        }
        type();

        window.onload = function() {
            let id = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(id);
            peer.on('open', (i) => { document.getElementById('my-id').innerText = "NODE_ID: " + i; initBoard(); });
            peer.on('connection', (c) => { conn = c; setupConnListeners(); });
            updateUI();
        };

        function initBoard() {
            board = Chessboard('board', {
                draggable: false, position: 'start',
                pieceTheme: (p) => pics[p] || 'https://chessboardjs.com/img/chesspieces/wikipedia/' + p + '.png'
            });
            $(document).on('click touchstart', '.square-55d63', function(e) {
                e.preventDefault();
                handleAction($(this).attr('data-square'));
            });
        }

        // دالة تحديث السجل
        function updateMoveHistory(move) {
            let historyDiv = document.getElementById('moves-list');
            let moveSpan = document.createElement('span');
            moveSpan.className = 'move-item';
            moveSpan.innerText = (game.history().length) + ". " + move.san;
            historyDiv.appendChild(moveSpan);
            
            // سكرول تلقائي لآخر حركة
            let box = document.getElementById('move-history');
            box.scrollTop = box.scrollHeight;
        }

        function handleAction(sq) {
            if (!gameStarted || game.turn() !== myColor) return;
            if (sourceSquare === null) {
                let p = game.get(sq);
                if (p && p.color === myColor) { sourceSquare = sq; highlight(sq); }
            } else {
                let move = game.move({ from: sourceSquare, to: sq, promotion: 'q' });
                if (move) {
                    board.position(game.fen());
                    document.getElementById("moveSound").play();
                    updateMoveHistory(move); // تحديث السجل
                    if (conn) conn.send({ type: 'move', move: move, time: myTime });
                    if (game.in_checkmate()) finalizeGame("WIN");
                    sourceSquare = null;
                    $('.square-55d63').removeClass('highlight-sq');
                } else {
                    let p = game.get(sq);
                    if (p && p.color === myColor) { sourceSquare = sq; highlight(sq); }
                    else { sourceSquare = null; $('.square-55d63').removeClass('highlight-sq'); }
                }
            }
        }

        function highlight(sq) {
            $('.square-55d63').removeClass('highlight-sq');
            $('.square-' + sq).addClass('highlight-sq');
        }

        function setupConnListeners() {
            conn.on('data', (d) => {
                if (d.type === 'move') {
                    let move = game.move(d.move);
                    board.position(game.fen());
                    updateMoveHistory(move); // تحديث السجل عند حركة الخصم
                    document.getElementById("moveSound").play();
                    if (game.in_checkmate()) finalizeGame("LOSE");
                }
                // ... باقي أكواد الـ ask والـ accept كما هي في كودك الأصلي
                if (d.type === 'ask') {
                    if (confirm(d.name + " يتحداك!")) {
                        conn.send({ type: 'accept', name: "أحمد", elo: 1200 });
                        startGame();
                    }
                }
                if (d.type === 'accept') { startGame(); }
            });
        }

        function sendChallengeRequest() {
            let fId = document.getElementById('friendId').value;
            if(!fId) return;
            conn = peer.connect(fId);
            myColor = 'b'; board.orientation('black');
            setupConnListeners();
            conn.on('open', () => conn.send({ type: 'ask', name: "أحمد", elo: 1200 }));
        }

        function startGame() {
            gameStarted = true;
            timer = setInterval(() => {
                if (game.turn() === myColor) myTime--; else oppTime--;
                document.getElementById('my-clock').innerText = fmtT(myTime);
                document.getElementById('opp-clock').innerText = fmtT(oppTime);
            }, 1000);
        }

        function finalizeGame(res) {
            clearInterval(timer);
            alert(res === "WIN" ? "فزت!" : "خسرت!");
            location.reload();
        }

        function fmtT(s) { let m=Math.floor(s/60), ss=s%60; return (m<10?'0':'')+m+":"+(ss<10?'0':'')+ss; }
        function updateUI() {
            document.getElementById('my-elo-display').innerText = localStorage.getItem('p_elo') || 1200;
        }
    </script>
</body>
</html>
