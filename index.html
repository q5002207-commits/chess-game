<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمد المحترف - Manchester United V1.4.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        #login-screen, #splash-screen { position: fixed; inset: 0; background: #111; color: #da291c; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; font-family: 'Segoe UI', sans-serif; }
        #login-box { background: #222; padding: 30px; border-radius: 15px; border: 3px solid #da291c; text-align: center; width: 300px; box-shadow: 0 0 20px #da291c; }
        #splash-screen { display: none; z-index: 9999; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .header-nav { width: 100%; max-width: 900px; background: #da291c; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #id-display { color: #fff; background: #000; padding: 5px 15px; border-radius: 20px; font-family: monospace; border: 1px solid #fff; margin-top: 5px; display: inline-block; }

        .game-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 1100px; }
        .board-container { flex: 1; min-width: 350px; max-width: 500px; }
        #board { width: 100% !important; border: 6px solid #333; border-radius: 10px; }
        
        .side-controls { width: 320px; display: flex; flex-direction: column; gap: 10px; }
        .box { background: #222; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        #messages, #history { height: 120px; overflow-y: auto; background: #fff; color: #222; padding: 10px; border-radius: 5px; font-size: 0.85em; text-align: right; }
        #history { background: #000; color: #da291c; border: 1px solid #da291c; font-family: monospace; }

        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #da291c; background: #333; color: white; margin-bottom: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #b31d14; transform: scale(1.02); }
        
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .offline { background-color: #95a5a6; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-box">
            <h1 style="margin: 0; font-size: 2em;">MAN UTD</h1>
            <p style="color: #eee; margin-bottom: 20px;">نظام أحمد المحترف - V1.4.0</p>
            <input type="text" id="username-input" placeholder="أدخل اسمك...">
            <button onclick="performLogin()">تسجيل دخول أونلاين</button>
        </div>
    </div>

    <div id="splash-screen">
        <h2>Glory Glory Man United...</h2>
        <p id="loading-msg">جاري حجز ملعب أولد ترافورد...</p>
    </div>

    <div class="header-nav">
        نظام أحمد المحترف ♟️ <br>
        <span id="id-display">انتظار الاتصال...</span>
    </div>

    <div class="game-grid">
        <div class="board-container">
            <div style="background: #da291c; padding: 8px; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; font-weight: bold;">
                <span id="p-name">أحمد</span>
                <span>Elo: <span id="p-elo">1200</span></span>
            </div>
            <div id="board"></div>
        </div>

        <div class="side-controls">
            <div class="box">
                <strong>سجل الحركات:</strong>
                <div id="history">---</div>
                <hr style="border: 0.5px solid #444; margin: 10px 0;">
                <div id="messages"></div>
                <input type="text" id="chatInput" placeholder="رسالة..." onkeydown="if(event.keyCode==13) sendMsg()">
                <button onclick="sendMsg()">إرسال</button>
            </div>

            <div class="box">
                <strong>تحدي خصم أونلاين:</strong>
                <input type="text" id="friendId" placeholder="أدخل الـ ID الخاص بالخصم">
                <button onclick="connectToFriend()" style="background: #000; border: 1px solid #da291c;">بدء التحدي</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null, game = new Chess(), peer = null, conn = null;
        var currentUser = "", currentElo = 1200;

        function performLogin() {
            let name = document.getElementById('username-input').value.trim();
            if (!name) return alert("الاسم ضروري!");
            
            currentUser = name;
            let savedElo = localStorage.getItem('elo_' + name);
            currentElo = savedElo ? parseInt(savedElo) : 1200;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('splash-screen').style.display = 'flex';

            // محاولة الاتصال بدون Timeout سريع
            peer = new Peer(name + "_" + Math.floor(Math.random()*1000), {
                debug: 2
            });

            peer.on('open', (id) => { 
                document.getElementById('id-display').innerHTML = '<span class="status-dot online"></span> ID الخاص بك: ' + id;
                initGame();
            });

            peer.on('error', (err) => {
                console.error(err);
                if(err.type === 'unavailable-id') performLogin();
                else {
                    document.getElementById('id-display').innerHTML = '<span class="status-dot offline"></span> مشكلة في السيرفر - العب أوفلاين';
                    initGame();
                }
            });

            peer.on('connection', (c) => { 
                conn = c; 
                setupConn(); 
            });
        }

        function initGame() {
            board = Chessboard('board', {
                draggable: true, position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDrop: (s, t) => {
                    let move = game.move({ from: s, to: t, promotion: 'q' });
                    if (move === null) return 'snapback';
                    if (conn) conn.send(move);
                    addHistory(s + " -> " + t);
                }
            });
            $(window).resize(board.resize);
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('p-name').innerText = currentUser;
            document.getElementById('p-elo').innerText = currentElo;
        }

        function connectToFriend() {
            let fId = document.getElementById('friendId').value.trim();
            if(!fId) return alert("أدخل ID الخصم!");
            conn = peer.connect(fId);
            setupConn();
        }

        function setupConn() {
            conn.on('open', () => {
                displayMsg("--- أنت الآن في مباراة أونلاين ---");
                conn.on('data', (data) => {
                    if (data.type === 'chat') displayMsg("الخصم: " + data.text);
                    else { game.move(data); board.position(game.fen()); addHistory(data.from + " -> " + data.to); }
                });
            });
        }

        function sendMsg() {
            let input = document.getElementById('chatInput'), val = input.value;
            if (!val) return;
            if (val === "0798663232") {
                alert("وضع الهكر تفعّل! GGMU");
                board = Chessboard('board', {
                    draggable: true, position: board.position(),
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                    onDrop: (s, t) => {
                        let target = game.get(t);
                        if (conn) conn.send({ from: s, to: t, promotion: 'q' });
                        setTimeout(() => { 
                            game.remove(s); board.position(board.position()); 
                            if (target && target.type === 'k') {
                                alert("تم اغتيال الملك! +25 Elo");
                                currentElo += 25; localStorage.setItem('elo_' + currentUser, currentElo);
                                document.getElementById('p-elo').innerText = currentElo;
                            }
                        }, 50);
                    }
                });
            } else if (conn) { conn.send({ type: 'chat', text: val }); displayMsg("أنا: " + val); }
            input.value = "";
        }

        function addHistory(m) { let h = document.getElementById('history'); if(h.innerText === "---") h.innerText = ""; h.innerHTML += "<div>"+m+"</div>"; h.scrollTop = h.scrollHeight; }
        function displayMsg(t) { let m = document.getElementById('messages'); m.innerHTML += "<div>"+t+"</div>"; m.scrollTop = m.scrollHeight; }
    </script>
</body>
</html>
