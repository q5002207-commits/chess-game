<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - النسخة الكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #main-menu { text-align: center; margin-top: 40px; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 25px; margin: 15px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.4em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }
        .back-home { background: #333; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; border: none; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 10px; }
        #board { width: 380px !important; max-width: 95vw !important; border: 4px solid #222; border-radius: 8px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; outline: none; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        img[class^="piece"] { border-radius: 50% !important; border: 1px solid white !important; }
        .mafia-card { background: #1a1a1a; padding: 25px; margin: 10px 0; border-radius: 10px; border: 2px solid #444; text-align: center; cursor: pointer; position: relative; }
        .role-display { display: none; color: #ff0000; font-size: 1.5em; font-weight: bold; }
        .narrator-box { background: #0055ff; color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border: 2px solid white; text-align: center; width: 100%; }
        .hidden { display: none; }
        .fade-out { opacity: 0; transform: scale(0.8); transition: 0.5s; }
        .locked { pointer-events: none; opacity: 0.2; }
        .highlight-sq { background: rgba(0, 255, 0, 0.4) !important; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="color:#da291c; text-shadow: 0 0 10px #da291c;">AHMED PRO SYSTEM</h1>
        <button class="menu-btn" onclick="showGame('chess')">♟️ ساحة الشطرنج</button>
        <button class="menu-btn" onclick="showGame('mafia')">🕵️ موزع المافيا</button>
    </div>

    <div id="chess-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 خروج</button>
        <div class="header"><h3>🏆 شطرنج أحمد المحترف 🏆</h3><div id="my-id">جاري الاتصال...</div></div>
        <div id="board"></div>
        <div style="width:100%; max-width:400px; margin-top:15px;">
            <input type="text" id="friendId" placeholder="أدخل ID الخصم">
            <button onclick="sendChallengeRequest()">بدء الهجوم (تحدي)</button>
        </div>
    </div>

    <div id="mafia-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 خروج</button>
        <div class="header"><h3>🕵️‍♂️ نظام المافيا الذكي</h3></div>
        <div id="mafia-setup" style="width:100%; max-width:400px;">
            <input type="text" id="mafiaPlayerName" placeholder="اسم اللاعب...">
            <button onclick="addMafiaPlayer()">إضافة لاعب +</button>
            <div id="mafia-preview" style="margin:15px; color:#0f0; font-size: 0.9em;"></div>
            <button style="background:green;" onclick="startMafiaDist()">توزيع الأدوار مخفي</button>
        </div>
        <div id="mafia-board" class="hidden" style="width:100%; max-width:400px;">
            <div id="narrator-name"></div>
            <div id="mafia-cards-container"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        let isLocked = false;
        let mPlayers = [];

        function showGame(type) {
            $('#main-menu').hide();
            if(type === 'chess') { $('#chess-section').removeClass('hidden'); initChess(); }
            else { $('#mafia-section').removeClass('hidden'); }
        }

        // --- منطق الشطرنج ---
        var board = null, game = new Chess(), peer = null, conn = null;
        var myColor = 'w', sourceSquare = null;
        var pics = {
            wK: 'https://i.postimg.cc/m27HgYdg/king-black.jpg', wQ: 'https://i.postimg.cc/CxLfkvYW/813f791d-4209-474a-b3ae-32306e3d2632.jpg',
            wN: 'https://i.postimg.cc/d31K4Kx9/download.jpg', wB: 'https://i.postimg.cc/jjn9q4WQ/download.jpg',
            bK: 'https://i.postimg.cc/T19B8NZh/cbbe2978-b5df-45c8-ad43-05cfb6f57edb.jpg', bQ: 'https://i.postimg.cc/HsbtBvqn/ca232a37-372a-45be-b758-6e90cd5f70a1.jpg',
            bN: 'https://i.postimg.cc/DwFRgXMy/5f98a3d6-1c49-4903-a9c0-8a1b8a2de568.jpg', bB: 'https://i.postimg.cc/RVRx2dfm/download.jpg'
        };

        function initChess() {
            let id = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(id);
            peer.on('open', (i) => { 
                $('#my-id').text("ID الخاص بك: " + i);
                board = Chessboard('board', {
                    draggable: false, position: 'start',
                    pieceTheme: (p) => pics[p] || 'https://chessboardjs.com/img/chesspieces/wikipedia/' + p + '.png'
                });
            });
            peer.on('connection', (c) => { conn = c; myColor = 'w'; setupChessConn(); });
            $(document).on('click', '.square-55d63', function() { handleChessClick($(this).data('square')); });
        }

        function handleChessClick(sq) {
            if (game.turn() !== myColor) return;
            if (sourceSquare === null) {
                let piece = game.get(sq);
                if (piece && piece.color === myColor) { sourceSquare = sq; $('.square-'+sq).addClass('highlight-sq'); }
            } else {
                let move = game.move({ from: sourceSquare, to: sq, promotion: 'q' });
                if (move) {
                    board.position(game.fen());
                    if(conn) conn.send({type:'move', move: move});
                }
                sourceSquare = null;
                $('.square-55d63').removeClass('highlight-sq');
            }
        }

        function sendChallengeRequest() {
            let fId = $('#friendId').val();
            if(fId) { conn = peer.connect(fId); myColor = 'b'; board.orientation('black'); setupChessConn(); }
        }

        function setupChessConn() {
            conn.on('data', (d) => { if(d.type === 'move') { game.move(d.move); board.position(game.fen()); } });
        }

        // --- منطق المافيا ---
        function addMafiaPlayer() {
            let n = $('#mafiaPlayerName').val().trim();
            if(n) { mPlayers.push(n); $('#mafia-preview').text("القائمة: " + mPlayers.join(" | ")); $('#mafiaPlayerName').val("").focus(); }
        }

        function startMafiaDist() {
            if(mPlayers.length < 5) return alert("لازم 5 لاعبين على الأقل (4 لاعبين + راوي)!");
            
            // اختيار الراوي
            let narratorIdx = Math.floor(Math.random() * mPlayers.length);
            let narratorName = mPlayers[narratorIdx];
            let activePlayers = mPlayers.filter((_, i) => i !== narratorIdx);
            
            // توزيع الأدوار
            let roles = [];
            if(activePlayers.length >= 8) {
                roles.push("مافيا 💀", "مافيا 💀", "دكتور 💉", "شرطي 👮");
            } else {
                roles.push("مافيا 💀", "دكتور 💉");
            }
            
            while(roles.length < activePlayers.length) roles.push("مواطن 👨‍🌾");
            roles.sort(() => Math.random() - 0.5);

            $('#mafia-setup').hide();
            $('#mafia-board').removeClass('hidden');
            $('#narrator-name').html(`<div class="narrator-box">🎤 الراوي: ${narratorName}</div>`);
            
            let container = $('#mafia-cards-container');
            container.empty();
            activePlayers.forEach((name, i) => {
                let card = $(`
                    <div class="mafia-card" id="mc-${i}">
                        <strong class="p-name">${name}</strong>
                        <div class="role-display">${roles[i]}</div>
                    </div>
                `);
                
                card.on('click', function() {
                    if(isLocked) return;
                    isLocked = true;
                    $('.mafia-card').addClass('locked');
                    $(this).removeClass('locked').find('.p-name').hide();
                    $(this).find('.role-display').fadeIn();

                    setTimeout(() => {
                        $(this).addClass('fade-out');
                        setTimeout(() => {
                            $(this).css('visibility', 'hidden'); // يخفيها تماماً ولا يحذفها للحفاظ على الترتيب
                            isLocked = false;
                            $('.mafia-card').removeClass('locked');
                        }, 500);
                    }, 3000); // 3 ثواني لمشاهدة الدور
                });
                container.append(card);
            });
        }
    </script>
</body>
</html>
