<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - النسخة الذهبية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; box-sizing: border-box; }
        body { font-family: sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .btn { width: 100%; padding: 20px; margin: 10px 0; background: #111; border: 2px solid #da291c; color: #fff; border-radius: 12px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        .btn-green { background: green; border: none; }
        .header { background: #da291c; color: #fff; width: 100%; max-width: 400px; padding: 10px; text-align: center; border-radius: 10px; margin-bottom: 10px; }
        #board { width: 350px !important; max-width: 90vw !important; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #222; border: 1px solid #0f0; color: #0f0; border-radius: 8px; text-align: center; }
        .hidden { display: none; }
        
        /* ستايل المافيا */
        .mafia-card { background: #1a1a1a; padding: 25px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; text-align: center; cursor: pointer; transition: 0.3s; }
        .role-text { display: none; color: #ff0000; font-size: 1.5em; font-weight: bold; }
        .narrator-box { background: #0055ff; color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; border: 2px solid #fff; width: 100%; }
        .fade-out { opacity: 0; transform: scale(0.9); pointer-events: none; transition: 0.5s; }
        .locked-screen { pointer-events: none; opacity: 0.4; }
    </style>
</head>
<body>

    <div id="menu" style="width: 100%; max-width: 400px; text-align: center;">
        <h1 style="color:#da291c;">AHMED PRO</h1>
        <button class="btn" onclick="openGame('chess')">♟️ شطرنج</button>
        <button class="btn" onclick="openGame('mafia')">🕵️ مافيا</button>
    </div>

    <div id="chess-area" class="hidden" style="width: 100%; max-width: 400px; text-align: center;">
        <button onclick="location.reload()" style="color:#fff; background:#333; border:none; padding:5px 10px; margin-bottom:10px;">🏠 رجوع</button>
        <div class="header">شطرنج أحمد المحترف</div>
        <div id="board" style="margin: 0 auto;"></div>
    </div>

    <div id="mafia-area" class="hidden" style="width: 100%; max-width: 400px; text-align: center;">
        <button onclick="location.reload()" style="color:#fff; background:#333; border:none; padding:5px 10px; margin-bottom:10px;">🏠 رجوع</button>
        <div id="setup">
            <input type="text" id="pName" placeholder="اكتب اسم اللاعب...">
            <button class="btn" style="padding:10px;" onclick="addP()">إضافة لاعب</button>
            <div id="preview" style="color:#777; margin:10px;"></div>
            <button class="btn btn-green" onclick="startM()">توزيع الأدوار</button>
        </div>
        <div id="game-play" class="hidden">
            <div id="narrator-info"></div>
            <div id="cards-list"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        let players = [];
        let screenLocked = false;

        function openGame(g) {
            $('#menu').hide();
            if(g === 'chess') {
                $('#chess-area').removeClass('hidden');
                Chessboard('board', {
                    position: 'start',
                    draggable: true,
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
                });
            } else {
                $('#mafia-area').removeClass('hidden');
            }
        }

        function addP() {
            let n = $('#pName').val().trim();
            if(n) { players.push(n); $('#preview').text(players.join(" - ")); $('#pName').val("").focus(); }
        }

        function startM() {
            if(players.length < 4) return alert("لازم 4 على الأقل!");
            
            let nIdx = Math.floor(Math.random() * players.length);
            let nName = players[nIdx];
            let actives = players.filter((_, i) => i !== nIdx);
            
            let roles = [];
            if(actives.length >= 10) {
                roles.push("مافيا قتل 🔪", "مافيا تسكيت 🤫");
            } else {
                roles.push("مافيا قتل 💀");
            }
            roles.push("دكتور 💉");
            while(roles.length < actives.length) roles.push("مواطن 👨‍🌾");
            roles.sort(() => Math.random() - 0.5);

            $('#setup').hide();
            $('#game-play').removeClass('hidden');
            $('#narrator-info').html(`<div class="narrator-box">🎤 الراوي هو: ${nName}</div>`);
            
            let list = $('#cards-list');
            list.empty();
            actives.forEach((p, i) => {
                let card = $(`
                    <div class="mafia-card" id="c-${i}">
                        <b id="n-${i}">${p}</b>
                        <div class="role-text" id="r-${i}">${roles[i]}</div>
                    </div>
                `);
                
                card.on('click', function() {
                    if(screenLocked) return;
                    screenLocked = true;
                    $('.mafia-card').addClass('locked-screen');
                    $(this).removeClass('locked-screen');

                    $(`#n-${i}`).hide();
                    $(`#r-${i}`).show();

                    setTimeout(() => {
                        $(`#c-${i}`).addClass('fade-out');
                        setTimeout(() => {
                            $(`#c-${i}`).remove();
                            screenLocked = false;
                            $('.mafia-card').removeClass('locked-screen');
                        }, 500);
                    }, 3000);
                });
                list.append(card);
            });
        }
    </script>
</body>
</html>
