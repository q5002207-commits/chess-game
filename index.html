<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمد المحترف - النسخة المعتمدة</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #0f0; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 2px solid #da291c; padding: 20px; border-radius: 15px; background: #111; }
        h1 { color: #da291c; text-shadow: 0 0 10px #da291c; }
        input { width: 85%; padding: 12px; margin: 10px; border-radius: 8px; border: 1px solid #da291c; background: #000; color: #0f0; text-align: center; }
        button { padding: 12px 25px; background: #da291c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .player-list { margin: 15px 0; padding: 15px; border: 1px dashed #444; background: #0a0a0a; color: #fff; }
        .role-box { font-size: 2em; margin-top: 20px; color: #fff; padding: 30px; border: 4px solid #0f0; border-radius: 20px; background: #001a00; display: none; }
        #board { width: 320px; margin: 20px auto; border: 3px solid #444; }
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h1 style="font-size: 2.5em;">AHMED PRO SYSTEM</h1>
    <p>جاري تشغيل النظام...</p>
</div>

<div class="container">
    <h1>بوابة أحمد المحترف</h1>
    
    <div id="game-ui">
        <p>ID الخاص بك: <span id="my-id" style="color: #fff; font-weight: bold;">...</span></p>
        
        <div id="host-zone">
            <div class="player-list" id="players-online">المتصلون: 0</div>
            <button onclick="distributeRoles()">توزيع الأدوار 🃏</button>
        </div>

        <div style="margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
            <input type="text" id="host-id-input" placeholder="ID الراوي">
            <button onclick="joinRoom()">انضمام</button>
        </div>
    </div>

    <div id="role-display" class="role-box"></div>

    <div style="margin-top: 40px; border-top: 2px solid #da291c; padding-top: 20px;">
        <h3>ساحة الشطرنج</h3>
        <div id="board"></div>
        <input type="text" id="chess-target" placeholder="ID الخصم">
        <button onclick="startChess()">تحدي ⚔️</button>
    </div>
</div>

<script>
    window.onload = () => { setTimeout(() => $('#welcome-screen').fadeOut(300), 500); };

    let myId = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
    let peer = new Peer(myId);
    let conns = [];

    peer.on('open', id => $('#my-id').text(id));

    peer.on('connection', conn => {
        if(conn.metadata && conn.metadata.type === 'chess') {
            setupChessConn(conn);
        } else {
            conns.push(conn);
            $('#players-online').text("المتصلون: " + conns.length);
            conn.on('data', data => { if(data.role) showRole(data.role); });
        }
    });

    function joinRoom() {
        let hId = $('#host-id-input').val();
        let conn = peer.connect(hId);
        conn.on('data', data => { if(data.role) showRole(data.role); });
    }

    function distributeRoles() {
        let total = conns.length + 1;
        let roles = [];
        if (total >= 10) {
            roles.push("مافيا (قتل) 🔪", "مافيا (تسكيت) 🤫");
        } else {
            roles.push("مافيا 💀");
        }
        while(roles.length < total) roles.push("مواطن 👨‍🌾");
        roles.sort(() => Math.random() - 0.5);

        conns.forEach((c, i) => c.send({ role: roles[i] }));
        showRole(roles[total-1]);
    }

    function showRole(r) { $('#role-display').text(r).fadeIn(); }

    var game = new Chess(), board = null, chessConn = null;
    board = Chessboard('board', {
        position: 'start',
        draggable: true,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        onDrop: (s, t) => {
            let m = game.move({from: s, to: t, promotion: 'q'});
            if (!m) return 'snapback';
            if(chessConn) chessConn.send(m);
        }
    });

    function startChess() {
        chessConn = peer.connect($('#chess-target').val(), {metadata: {type: 'chess'}});
        setupChessConn(chessConn);
    }

    function setupChessConn(c) {
        chessConn = c;
        c.on('data', m => { game.move(m); board.position(game.fen()); });
    }
</script>
</body>
</html>
