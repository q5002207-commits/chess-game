<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - التحديث الأسطوري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        /* إعدادات الخلفية العامة - طابع مستقبلي */
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #eee; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden; 
        }

        /* تحسين القائمة الرئيسية */
        #main-menu { 
            text-align: center; 
            margin-top: 50px; 
            width: 100%; 
            max-width: 450px; 
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            background: linear-gradient(to bottom, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 5px 15px rgba(255, 65, 108, 0.3);
        }

        /* أزرار القائمة المطورة */
        .menu-btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%; 
            padding: 20px; 
            margin: 18px 0; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(218, 41, 28, 0.5); 
            color: white; 
            border-radius: 20px; 
            font-size: 1.2em; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(10px);
        }

        .menu-btn:hover { 
            background: #da291c; 
            box-shadow: 0 10px 30px rgba(218, 41, 28, 0.4);
            transform: translateY(-5px);
            border-color: #fff;
        }

        /* تحسين العناوين والأقسام */
        .header { 
            width: 100%; 
            max-width: 400px; 
            background: linear-gradient(135deg, #da291c, #910a00); 
            padding: 15px; 
            border-radius: 15px; 
            text-align: center; 
            color: white; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .back-home { 
            background: #222; 
            color: #bbb; 
            padding: 10px 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            margin-bottom: 20px; 
            border: 1px solid #444; 
            font-size: 0.9em;
            transition: 0.3s;
        }
        .back-home:hover { background: #fff; color: #000; }

        /* الشطرنج */
        #board { 
            width: 380px !important; 
            max-width: 95vw !important; 
            border: 8px solid #333; 
            border-radius: 12px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* المدخلات والأزرار داخل الألعاب */
        input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #444; 
            background: rgba(0,0,0,0.6); 
            color: #fff; 
            margin-bottom: 12px; 
            text-align: center; 
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #da291c; box-shadow: 0 0 10px rgba(218, 41, 28, 0.3); }

        button { 
            width: 100%; 
            padding: 14px; 
            background: #da291c; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }
        button:active { transform: scale(0.95); }

        /* كروت المافيا والجاسوس */
        .mafia-card, .spy-card { 
            background: linear-gradient(145deg, #1e1e1e, #111); 
            padding: 30px; 
            margin: 15px 0; 
            border-radius: 20px; 
            border: 1px solid #333; 
            transition: 0.5s; 
            cursor: pointer; 
            text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .mafia-card:hover, .spy-card:hover { border-color: #da291c; }

        .role-display { display: none; color: #ff0000; font-size: 1.5em; font-weight: 800; margin-top: 10px; text-shadow: 0 0 10px rgba(255,0,0,0.5); }

        .narrator-box { 
            background: linear-gradient(to right, #0055ff, #0033aa); 
            color: white; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            font-weight: bold; 
            border: none;
            box-shadow: 0 10px 20px rgba(0, 85, 255, 0.3);
        }

        .hidden { display: none; }
        .fade-out { opacity: 0; transform: translateY(20px); pointer-events: none; }
        .locked { pointer-events: none; opacity: 0.5; }

        /* تصويت الأونلاين */
        .vote-btn { 
            background: rgba(255, 255, 0, 0.1); 
            color: yellow; 
            border: 1px solid yellow; 
            margin: 8px; 
            width: calc(50% - 16px); 
            display: inline-block; 
            padding: 12px; 
            border-radius: 10px; 
            transition: 0.3s;
        }
        .vote-btn:hover { background: yellow; color: black; }

        .vote-log-item { 
            background: rgba(255,255,255,0.05); 
            padding: 10px; 
            border-radius: 8px;
            margin-bottom: 5px; 
            font-size: 0.9em; 
            color: #ddd; 
            text-align: right; 
            border-right: 4px solid #da291c;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div id="main-menu">
        <h1>AHMED PRO</h1>
        <button class="menu-btn" onclick="showGame('chess')"><span>♟️</span> ساحة الشطرنج</button>
        <button class="menu-btn" onclick="showGame('mafia')"><span>🕵️</span> موزع المافيا</button>
        <button class="menu-btn" onclick="showGame('spy')"><span>🔍</span> الجاسوس (أوفلاين)</button>
        <button class="menu-btn" style="border-color: #0055ff; box-shadow: 0 0 15px rgba(0,85,255,0.2);" onclick="showGame('spyOnline')"><span>🌐</span> الجاسوس (أونلاين)</button>
    </div>

    <div id="chess-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 العودة للملف الشخصي</button>
        <div class="header"><h3>🏆 شطرنج أحمد المحترف 🏆</h3><div id="my-id" style="font-size:0.7em; opacity: 0.7;">جاري الاتصال بالنظام...</div></div>
        <div id="board"></div>
    </div>

    <div id="mafia-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 القائمة الرئيسية</button>
        <div class="header"><h3>🕵️‍♂️ نظام المافيا المطور</h3></div>
        <div id="mafia-setup">
            <input type="text" id="mafiaPlayerName" placeholder="أدخل اسم اللاعب...">
            <button onclick="addMafiaPlayer()">+ إضافة لاعب للقائمة</button>
            <div id="mafia-preview" style="margin:20px; color:#aaa; font-style: italic;"></div>
            <button style="background:linear-gradient(to right, #1d976c, #93f9b9); color: #000;" onclick="startMafiaDist()">بدء التوزيع العشوائي</button>
        </div>
        <div id="mafia-board" class="hidden">
            <div id="narrator-name"></div>
            <div id="mafia-cards-container"></div>
        </div>
    </div>

    <div id="spy-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 القائمة الرئيسية</button>
        <div class="header"><h3>🔍 لعبة الجاسوس (أوفلاين)</h3></div>
        <div id="spy-setup">
            <input type="text" id="spyPlayerName" placeholder="اسم اللاعب المختار...">
            <button onclick="addSpyPlayer()">+ إضافة لاعب</button>
            <div id="spy-preview" style="margin:20px; color:#aaa; font-style: italic;"></div>
            <button style="background:linear-gradient(to right, #1d976c, #93f9b9); color: #000;" onclick="startSpyDist()">توزيع الأماكن السرية</button>
        </div>
        <div id="spy-board" class="hidden">
            <div id="spy-cards-container"></div>
        </div>
    </div>

    <div id="spy-online-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 القائمة الرئيسية</button>
        <div class="header"><h3>🌐 الجاسوس أونلاين (الغرف)</h3></div>
        <div id="spy-online-setup">
            <input type="text" id="spyNick" placeholder="لقبك في اللعبة">
            <button onclick="hostRoom()" style="background: #222; border: 1px solid #da291c;">إنشاء غرفة جديدة (أدمن)</button>
            <div style="margin:15px; color: #666;">──────── أو ────────</div>
            <input type="text" id="roomCode" placeholder="أدخل كود الغرفة المكون من 3 أرقام">
            <button style="background:#444;" onclick="joinRoom()">دخول الغرفة الحالية</button>
        </div>
        <div id="lobby" class="hidden">
            <div id="display-room-id" style="color:yellow; margin-bottom:20px; font-size: 1.3em; letter-spacing: 2px;"></div>
            <div id="online-players-list" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;"></div>
            <button id="start-btn" style="background:linear-gradient(to right, #1d976c, #93f9b9); color: #000; margin-top:25px; display:none;" onclick="startOnlineGame()">إطلاق اللعبة الآن</button>
        </div>
        <div id="game-play" class="hidden">
            <div class="spy-card" onclick="$(this).find('.role-display').toggle()" style="border: 2px dashed #555;">
                <p style="color: #888;">اضغط هنا لكشف مكانك السري</p>
                <div id="my-role" class="role-display" style="color:#00ff88; display:none;"></div>
            </div>
            <div id="voting-area" style="margin-top:30px;">
                <h4 id="vote-title" style="color: #ff416c;">من هو الجاسوس؟ صوّت الآن:</h4>
                <div id="vote-btns"></div>
                <div id="vote-log-container" style="margin-top:20px; width:100%;"></div>
                <div id="final-result" style="margin-top:25px; color:#ff416c; font-size:1.6em; font-weight: bold; text-shadow: 0 0 10px rgba(0,0,0,0.5);"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        // هنا تبقى كل وظائفك البرمجية (Functions) كما هي تماماً 
        // سأضعها هنا لضمان عمل الملف بشكل كامل
        let isLocked = false;
        let sPlayers = [];
        let mPlayers = [];
        let peer = null;
        let players = [];
        let myName = "";
        let host = false;
        let votesReceived = [];

        const spyPlaces = [
            "مستشفى", "مدرسة", "غابة", "طائرة", "مطعم", "فندق", "مطار", "سفينة", "مخيم", "قلعة", "مسجد", "الأردن", "فلسطين", "شاورما", "منسف", "تلفزيون", "هاتف", "غرفة نوم", "سيارة",

            "صحراء", "واحة", "كهف", "بركان", "شلال", "جزيرة", "قطب متجمد", "قمة جبل", "وادي", "غابة استوائية", "سفينة فضاء", "محطة مير", "الغواصة", "منطاد", "هليكوبتر", "سفينة حربية", "ناقلة نفط", "كاسحة ثلوج",
            "أهرامات", "البتراء", "جرش", "قلعة عجلون", "قصر أموي", "معبد قديم", "بيت مهجور", "سفينة قراصنة", "مدينة مفقودة", "المريخ", "عطارد", "ثقب أسود", "غيمة", "تحت الأرض",
            "المطبخ", "الحمام", "البلكونة", "السطح", "قبو", "علية", "غرفة غسيل", "مستودع", "مكتبة", "ممر", "الحديقة", "داخل الثلاجة", "محفظة نقود", "علبة سردين", "تحت السرير", "فوق النخلة", "طنجرة منسف", "إبريق شاي", "كرتونة بيض", "شاحن تلفون", "سماعة بلوتوث",
            "مكة", "المدينة المنورة", "القاهرة", "بغداد", "دمشق", "بيروت", "دبي", "الرياض", "لندن", "باريس", "نيويورك", "طوكيو", "برج إيفل", "سور الصين العظيم", "التاج محل", "تمثال الحرية",
            "محل بلايستيشن", "قهوة شعبية", "محل تصليح تليفونات", "صناعية وادي السير", "البلد", "جبل عمان", "شارع الرينبو", "العبدلي", "دوار الداخلية", "محل كنافة", "فرن مناقيش", "بسطة خضرة", "محل ألعاب", "محل عطور", "محل ساعات",
            "محكمة", "قسم شرطة", "سجن", "مبنى المخابرات", "البرلمان", "وزارة التربية", "السفارة", "مكتب محامي", "غرفة عمليات", "ثكنة عسكرية", "برج مراقبة", "قاعدة صواريخ",
            "بيت جدي", "صالة الجيم", "محطة الفضاء الدولية", "نادي الفروسية", "حلبة سباق", "ملعب تنس", "صالة بولينج", "مدينة ملاهي", "زحليقة", "قطار موت", "بيت الرعب",
            "البحر الميت", "حمامات ماعين", "وادي رم", "العقبة", "جسر عبدون", "المدينة الرياضية", "مجمع بنك الإسكان", "مستشفى البشير", "الجامعة الأردنية", "التكنو", "الهاشمية",
            "علبة مكياج", "خزانة ملابس", "درج المكتب", "سلة مهملات", "فرن غاز", "غسالة", "نشافة", "مكواة", "مكنسة كهربائية", "اباجورة", "برواز صورة", "ساعة حائط", "سجادة صلاة",
            "مكتبة عامة", "محل ورد", "دار أيتام", "دار مسنين", "مخيم لاجئين", "خيمة بدو", "مزرعة خيول", "مزرعة دجاج", "منحل عسل", "مشاتل ورد",
            "داخل كيس شيبس", "تحت الكنباية", "ورا الباب", "جوا الخزانة", "فوق السطح", "جوا الغسالة", "تحت الطاولة", "داخل الشنطة", "جوا الجيبة", "فوق الشجرة",
            "البرازيل", "ألمانيا", "إسبانيا", "إيطاليا", "الأرجنتين", "تركيا", "المغرب", "تونس", "الجزائر", "مصر", "السودان", "الكويت", "قطر", "البحرين", "عمان", "اليمن",
            "برج خليفة", "برج العرب", "مول دبي", "جزيرة النخلة", "سوق نايف", "القرية العالمية"
        ];

        function showGame(t) {
            $('#main-menu').hide();
            if(t==='chess') { $('#chess-section').removeClass('hidden'); initChess(); }
            else if(t==='mafia') $('#mafia-section').removeClass('hidden');
            else if(t==='spy') $('#spy-section').removeClass('hidden');
            else if(t==='spyOnline') $('#spy-online-section').removeClass('hidden');
        }

        function addMafiaPlayer() {
            let n = $('#mafiaPlayerName').val().trim();
            if(n) { mPlayers.push(n); $('#mafia-preview').text("اللاعبين: " + mPlayers.join(" - ")); $('#mafiaPlayerName').val("").focus(); }
        }

        function startMafiaDist() {
            if(mPlayers.length < 4) return alert("لازم 4 لاعبين على الأقل!");
            let nIdx = Math.floor(Math.random() * mPlayers.length);
            let nName = mPlayers[nIdx];
            let acts = mPlayers.filter((_, i) => i !== nIdx);
            let roles = acts.map((_, i) => i === 0 ? "مافيا 🔪" : "مواطن 👨‍🌾"); roles.sort(() => Math.random() - 0.5);
            $('#mafia-setup').hide(); $('#mafia-board').removeClass('hidden');
            $('#narrator-name').html(`<div class="narrator-box">🎤 الراوي: ${nName}</div>`);
            let cont = $('#mafia-cards-container').empty();
            acts.forEach((p, i) => {
                let card = $(`<div class="mafia-card" id="mc-${i}"><strong id="mpn-${i}">${p}</strong><div class="role-display" id="mrl-${i}">${roles[i]}</div></div>`);
                card.click(function() {
                    if(isLocked) return;
                    isLocked = true; $('.mafia-card').addClass('locked'); $(this).removeClass('locked');
                    $(`#mpn-${i}`).hide(); $(`#mrl-${i}`).fadeIn();
                    setTimeout(() => {
                        $(`#mc-${i}`).addClass('fade-out');
                        setTimeout(() => { $(`#mc-${i}`).css('visibility', 'hidden'); isLocked = false; $('.mafia-card').removeClass('locked'); }, 500);
                    }, 3000);
                });
                cont.append(card);
            });
        }

        function addSpyPlayer() {
            let n = $('#spyPlayerName').val().trim();
            if(n) { sPlayers.push(n); $('#spy-preview').text("اللاعبين: " + sPlayers.join(" - ")); $('#spyPlayerName').val("").focus(); }
        }

        function startSpyDist() {
            if(sPlayers.length < 3) return alert("لازم 3 لاعبين على الأقل!");
            let place = spyPlaces[Math.floor(Math.random() * spyPlaces.length)];
            let spyIdx = Math.floor(Math.random() * sPlayers.length);
            let roles = sPlayers.map((_, i) => i === spyIdx ? "أنت الجاسوس 🕵️" : place);
            $('#spy-setup').hide(); $('#spy-board').removeClass('hidden');
            let cont = $('#spy-cards-container').empty();
            sPlayers.forEach((p, i) => {
                let card = $(`<div class="spy-card" id="sc-${i}"><strong id="spn-${i}">${p}</strong><div class="role-display" id="srl-${i}" style="color:#00ff00;">${roles[i]}</div></div>`);
                card.click(function() {
                    if(isLocked) return;
                    isLocked = true; $('.spy-card').addClass('locked'); $(this).removeClass('locked');
                    $(`#spn-${i}`).hide(); $(`#srl-${i}`).fadeIn();
                    setTimeout(() => {
                        $(`#sc-${i}`).addClass('fade-out');
                        setTimeout(() => { $(`#sc-${i}`).css('visibility', 'hidden'); isLocked = false; $('.spy-card').removeClass('locked'); }, 500);
                    }, 3000);
                });
                cont.append(card);
            });
        }

        function hostRoom() {
            myName = $('#spyNick').val(); if(!myName) return alert("اكتب اسمك");
            host = true; let id = "ROOM_" + Math.floor(100+Math.random()*899);
            peer = new Peer(id);
            peer.on('open', (i) => {
                $('#spy-online-setup').hide(); $('#lobby').removeClass('hidden');
                $('#display-room-id').text("كود الغرفة: " + i);
                players.push({name: myName, id: i}); updateLobby();
                $('#start-btn').show();
            });
            peer.on('connection', c => {
                c.on('data', d => {
                    if(d.type==='join') { players.push({name: d.name, id: c.peer}); broadcast({type:'list', list:players}); updateLobby(); }
                    if(d.type==='vote') handleOnlineVote(d.voter, d.target);
                });
            });
        }

        function joinRoom() {
            myName = $('#spyNick').val(); let code = $('#roomCode').val(); if(!myName || !code) return alert("اكتب الاسم والكود");
            peer = new Peer();
            peer.on('open', id => {
                let c = peer.connect(code);
                c.on('open', () => { c.send({type:'join', name:myName}); $('#spy-online-setup').hide(); $('#lobby').removeClass('hidden'); });
                c.on('data', d => {
                    if(d.type==='list') { players = d.list; updateLobby(); }
                    if(d.type==='start') startOnlineGameView(d.role, d.names);
                    if(d.type==='res') showOnlineFinalResults(d.spy, d.logs);
                });
            });
        }

        function updateLobby() { $('#online-players-list').text("المتصلين: " + players.map(p=>p.name).join(" - ")); }
        function broadcast(d) { peer.connections && Object.values(peer.connections).forEach(c => c[0].send(d)); }

        function startOnlineGame() {
            let place = spyPlaces[Math.floor(Math.random()*spyPlaces.length)];
            let spyIdx = Math.floor(Math.random()*players.length);
            peer.actualSpy = players[spyIdx].name;
            votesReceived = [];
            players.forEach((p, i) => {
                let role = (i===spyIdx) ? "أنت الجاسوس 🕵️" : place;
                if(p.name === myName) startOnlineGameView(role, players.map(pl=>pl.name));
                else { let c = Object.values(peer.connections).find(conn => conn[0].peer === p.id); if(c) c[0].send({type:'start', role: role, names: players.map(pl=>pl.name)}); }
            });
        }

        function startOnlineGameView(role, names) {
            $('#lobby').hide(); $('#game-play').removeClass('hidden');
            $('#my-role').text(role).hide(); $('#vote-log-container').empty(); $('#final-result').empty();
            $('#vote-title').show(); let btns = $('#vote-btns').empty().show();
            names.forEach(n => { if(n !== myName) btns.append(`<button class="vote-btn" onclick="sendOnlineVote('${n}')">${n}</button>`); });
        }

        function sendOnlineVote(target) {
            $('.vote-btn').addClass('locked');
            if(host) handleOnlineVote(myName, target);
            else peer.connections[Object.keys(peer.connections)[0]][0].send({type:'vote', voter: myName, target: target});
        }

        function handleOnlineVote(voter, target) {
            votesReceived.push(`${voter} صوّت لـ ${target}`);
            if(votesReceived.length >= players.length) {
                let res = {type:'res', spy: peer.actualSpy, logs: votesReceived};
                broadcast(res); showOnlineFinalResults(peer.actualSpy, votesReceived);
            }
        }

        function showOnlineFinalResults(spyName, logs) {
            $('#vote-btns').hide(); $('#vote-title').hide();
            let logHtml = "<strong>نتائج التصويت:</strong><br>";
            logs.forEach(l => logHtml += `<div class="vote-log-item">${l}</div>`);
            $('#vote-log-container').html(logHtml);
            $('#final-result').html(`الجاسوس الحقيقي هو: <span style="color:yellow;">${spyName}</span>`);
        }

        function initChess() {
            let id = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
            let pC = new Peer(id);
            pC.on('open', (i) => { Chessboard('board', 'start'); });
        }
    </script>
</body>
</html>
