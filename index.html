<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - نظام التشفير</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* واجهة الهكر عند الدخول */
        #hacker-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        .matrix-text { font-size: 1.2em; text-shadow: 0 0 8px #0f0; margin: 5px; opacity: 0; animation: scan 0.2s forwards; }
        @keyframes scan { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* تصميم اللعبة الأصلي */
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 10px; color: white; box-shadow: 0 0 20px rgba(218, 41, 28, 0.5); }
        .clocks-container { display: flex; width: 100%; max-width: 400px; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
        .clock { flex: 1; background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; border: 2px solid #333; font-family: monospace; font-size: 1.5em; color: #fff; }
        .active-clock { border-color: #0f0; color: #0f0; text-shadow: 0 0 5px #0f0; }

        #board { width: 380px !important; max-width: 95vw !important; border: 5px solid #222; border-radius: 8px; }
        .leaderboard-box { width: 100%; max-width: 400px; background: #111; margin-top: 15px; border-radius: 12px; border: 1px solid #0f0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #0f02; }
        .controls { width: 100%; max-width: 400px; margin-top: 15px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; outline: none; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        img[class^="piece"], img[src*="postimg"] { border-radius: 50% !important; border: 2px solid white !important; }
        .possible-move::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 18px; height: 18px; background: rgba(0, 255, 0, 0.4); border-radius: 50%; }
    </style>
</head>
<body>

    <div id="hacker-overlay">
        <div id="matrix-console"></div>
    </div>

    <div class="header">
        <h3 style="margin:0;">🏆 تصنيف أحمد المحترف 🏆</h3>
        <div id="my-id" style="font-size: 0.8em; color: #0f0;">جاري اختراق السيرفر...</div>
    </div>

    <div class="clocks-container">
        <div id="opp-clock" class="clock">10:00</div>
        <div id="my-clock" class="clock">10:00</div>
    </div>

    <div id="board"></div>

    <div class="leaderboard-box">
        <table>
            <thead><tr><th>اللاعب</th><th>النقاط</th><th>الوضع</th></tr></thead>
            <tbody id="leaderboard-body">
                <tr style="color: #0f0;"><td>أنت</td><td id="my-elo-display">1200</td><td>ONLINE</td></tr>
                <tr><td id="opp-name-display">الخصم</td><td id="opp-elo-display">1200</td><td id="opp-status">WAITING</td></tr>
            </tbody>
        </table>
    </div>

    <div class="controls">
        <input type="text" id="friendId" placeholder="أدخل كود الاختراق (ID)">
        <button onclick="connectToFriend()">بدء الهجوم الآن</button>
    </div>

    <audio id="moveSound" src="https://images.chesscomfiles.com/chess-themes/sounds/_standard/default/move-self.mp3" preload="auto"></audio>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        // أنيميشن الدخول
        const lines = ["Initializing connection...", "Accessing Ahmed_Pro Server...", "Bypassing Firewalls...", "Injecting Chess Engine...", "Establishing P2P link...", "SUCCESS: Access Granted."];
        let lineIdx = 0;
        function typeLine() {
            if (lineIdx < lines.length) {
                const div = document.createElement('div');
                div.className = 'matrix-text';
                div.innerText = "> " + lines[lineIdx++];
                document.getElementById('matrix-console').appendChild(div);
                setTimeout(typeLine, 400);
            } else {
                setTimeout(() => { document.getElementById('hacker-overlay').style.display = 'none'; }, 1000);
            }
        }
        typeLine();

        // نظام الكود السري (Cheat Code)
        let inputBuffer = "";
        window.addEventListener("keydown", (e) => {
            inputBuffer += e.key;
            if (inputBuffer.endsWith("ahmed77")) { // الكلمة السرية هنا
                if (gameStarted) {
                    if (conn) conn.send({ type: 'opponent_escaped' }); // إيهام الخصم بالانسحاب
                    finalizeGame("win");
                    alert("⚠️ THREAT DETECTED: ADMIN BYPASS ACTIVATED");
                }
                inputBuffer = "";
            }
            if (inputBuffer.length > 20) inputBuffer = inputBuffer.substring(10);
        });

        // كود اللعبة
        var board = null, game = new Chess(), peer = null, conn = null;
        var myColor = 'w', sourceSquare = null, gameStarted = false;
        var myTime = 600, oppTime = 600, timerInterval = null;

        var myName = localStorage.getItem('p_name') || prompt("أدخل اسمك الكودي:", "أحمد المحترف") || "Hacker";
        localStorage.setItem('p_name', myName);
        var myElo = parseInt(localStorage.getItem('p_elo')) || 1200;
        var oppElo = 1200, oppName = "Target";

        var pics = {
            wK: 'https://i.postimg.cc/m27HgYdg/king-black.jpg', wQ: 'https://i.postimg.cc/CxLfkvYW/813f791d-4209-474a-b3ae-32306e3d2632.jpg',
            wN: 'https://i.postimg.cc/d31K4Kx9/download.jpg', wB: 'https://i.postimg.cc/jjn9q4WQ/download.jpg',
            bK: 'https://i.postimg.cc/T19B8NZh/cbbe2978-b5df-45c8-ad43-05cfb6f57edb.jpg', bQ: 'https://i.postimg.cc/HsbtBvqn/ca232a37-372a-45be-b758-6e90cd5f70a1.jpg',
            bN: 'https://i.postimg.cc/DwFRgXMy/5f98a3d6-1c49-4903-a9c0-8a1b8a2de568.jpg', bB: 'https://i.postimg.cc/RVRx2dfm/download.jpg'
        };

        function formatTime(s) {
            let m = Math.floor(s / 60); let ss = s % 60;
            return (m < 10 ? '0' : '') + m + ":" + (ss < 10 ? '0' : '') + ss;
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameStarted) return;
                if (game.turn() === myColor) {
                    myTime--; document.getElementById('my-clock').innerText = formatTime(myTime);
                    if (myTime <= 0) finalizeGame("time_lose");
                } else {
                    oppTime--; document.getElementById('opp-clock').innerText = formatTime(oppTime);
                    if (oppTime <= 0) finalizeGame("time_win");
                }
            }, 1000);
        }

        function finalizeGame(res) {
            clearInterval(timerInterval); gameStarted = false;
            if (res === "win" || res === "time_win" || res === "escaped") {
                myElo += 25; alert("Mission Accomplished! +25 Elo");
            } else {
                myElo -= 25; alert("System Failed. -25 Elo");
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('my-elo-display').innerText = myElo;
            document.getElementById('opp-elo-display').innerText = oppElo;
            document.getElementById('opp-name-display').innerText = oppName;
            localStorage.setItem('p_elo', myElo);
        }

        window.onload = function() {
            updateUI();
            let randomId = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(randomId);
            peer.on('open', (id) => { document.getElementById('my-id').innerText = "NODE_ID: " + id; initBoard(); });
            peer.on('connection', (c) => { 
                conn = c; myColor = 'w'; gameStarted = true; setupConn(); 
                document.getElementById('opp-status').innerText = "CONNECTED";
                startTimer();
            });
        };

        function initBoard() {
            board = Chessboard('board', {
                draggable: false, position: 'start',
                pieceTheme: (p) => pics[p] ? pics[p] : 'https://chessboardjs.com/img/chesspieces/wikipedia/' + p + '.png'
            });
            $(document).on('click touchstart', '.square-55d63', function() { handleAction($(this).attr('data-square')); });
        }

        function handleAction(square) {
            if (!gameStarted || game.turn() !== myColor || game.game_over()) return;
            if (sourceSquare === null) {
                var p = game.get(square);
                if (p && p.color === myColor) { sourceSquare = square; }
            } else {
                var move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                if (move) {
                    board.position(game.fen()); document.getElementById("moveSound").play();
                    if (conn) conn.send({ type: 'move', move: move, time: myTime });
                    if (game.in_checkmate()) finalizeGame("win");
                    sourceSquare = null;
                } else { sourceSquare = null; }
            }
        }

        function setupConn() {
            conn.on('open', () => { conn.send({ type: 'info', name: myName, elo: myElo }); });
            conn.on('data', (d) => {
                if(d.type === 'info') { oppName = d.name; oppElo = d.elo; updateUI(); }
                if(d.type === 'move') {
                    game.move(d.move); board.position(game.fen());
                    oppTime = d.time; document.getElementById("moveSound").play();
                    if (game.in_checkmate()) finalizeGame("lose");
                }
                if(d.type === 'opponent_escaped') finalizeGame("escaped");
            });
        }

        function connectToFriend() {
            let fId = document.getElementById('friendId').value;
            if(fId) { 
                conn = peer.connect(fId); myColor = 'b'; board.orientation('black'); 
                gameStarted = true; setupConn();
                document.getElementById('opp-status').innerText = "CONNECTED";
                startTimer();
            }
        }
    </script>
</body>
</html>
