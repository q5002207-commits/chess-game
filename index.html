<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header-main { color: #da291c; text-shadow: 0 0 10px rgba(218,41,28,0.5); margin: 20px 0; }
        #main-menu { text-align: center; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 20px; margin: 10px 0; background: #151515; border: 2px solid #da291c; color: white; border-radius: 12px; font-size: 1.2em; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 15px #da291c; }
        .back-home { background: #333; color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; margin-bottom: 15px; }
        
        /* شطرنج */
        #board { width: 360px; max-width: 90vw; border: 5px solid #222; border-radius: 10px; }
        .status-box { background: #222; padding: 10px; margin: 10px 0; border-radius: 8px; width: 100%; text-align: center; font-size: 0.9em; }
        
        /* مافيا وجاسوس */
        .card-container { width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #444; text-align: center; cursor: pointer; position: relative; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .role-text { display: none; color: #ff3a2f; font-weight: bold; }
        .hidden { display: none; }
        .revealed { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 class="header-main">AHMED PRO SYSTEM</h1>
        <button class="menu-btn" onclick="showSection('chess')">♟️ شطرنج (قوانين رسمية)</button>
        <button class="menu-btn" onclick="showSection('mafia')">🕵️ المافيا (قانون أحمد)</button>
        <button class="menu-btn" onclick="showSection('spy')">🔍 الجاسوس (50 موقع)</button>
    </div>

    <div id="chess-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 رجوع</button>
        <div class="status-box" id="status">انتظار بدء اللعبة...</div>
        <div id="board"></div>
        <div class="status-box" id="fen-id">ID: Ahmed_Connecting...</div>
    </div>

    <div id="mafia-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 رجوع</button>
        <div id="setup-mafia">
            <input type="text" id="mName" placeholder="اسم اللاعب" style="width:70%; padding:10px; border-radius:5px;">
            <button onclick="addM()" style="width:25%; padding:10px; background:green; color:white; border:none; border-radius:5px;">+</button>
            <p id="mList" style="font-size:0.8em; color:#aaa; margin:10px;"></p>
            <button class="menu-btn" onclick="startM()">توزيع الأدوار</button>
        </div>
        <div id="mafia-game" class="card-container"></div>
    </div>

    <div id="spy-section" class="hidden">
        <button class="back-home" onclick="location.reload()">🏠 رجوع</button>
        <div id="setup-spy">
            <input type="text" id="sName" placeholder="اسم اللاعب" style="width:70%; padding:10px; border-radius:5px;">
            <button onclick="addS()" style="width:25%; padding:10px; background:blue; color:white; border:none; border-radius:5px;">+</button>
            <p id="sList" style="font-size:0.8em; color:#aaa; margin:10px;"></p>
            <button class="menu-btn" onclick="startS()">بدأ اللعبة</button>
        </div>
        <div id="spy-game" class="card-container"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let mPlayers = [];
        let sPlayers = [];

        function showSection(id) {
            $('#main-menu').addClass('hidden');
            $(`#${id}-section`).removeClass('hidden');
            if(id === 'chess') initChess();
        }

        // --- نظام الشطرنج المطور ---
        function initChess() {
            var config = {
                draggable: true,
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png' // روابط رسمية مضمونة
            };
            board = Chessboard('board', config);
            updateStatus();
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () { board.position(game.fen()); }

        function updateStatus () {
            var status = '';
            var moveColor = 'الأبيض';
            if (game.turn() === 'b') moveColor = 'الأسود';

            if (game.in_checkmate()) { status = 'انتهت اللعبة: ' + moveColor + ' خسر (كش ملك).'; }
            else if (game.in_draw()) { status = 'انتهت اللعبة: تعادل.'; }
            else {
                status = 'دور اللاعب: ' + moveColor;
                if (game.in_check()) { status += ' (ملكك في خطر!)'; }
            }
            $('#status').text(status);
            $('#fen-id').text("ID: Ahmed_" + Math.floor(Math.random()*9000));
        }

        // --- نظام المافيا (قانون أحمد) ---
        function addM() { 
            let n = $('#mName').val(); 
            if(n) { mPlayers.push(n); $('#mList').text(mPlayers.join(" - ")); $('#mName').val("").focus(); }
        }

        function startM() {
            if(mPlayers.length < 4) return alert("اقل شي 4 لاعبين!");
            let roles = [];
            // قانون أحمد: إذا 10 أو أكثر يوجد مافيا تسكيت
            if(mPlayers.length >= 10) { roles.push("مافيا قتل 🔪", "مافيا تسكيت 🤫"); } 
            else { roles.push("مافيا قتل 💀"); }
            
            roles.push("دكتور 💉");
            while(roles.length < mPlayers.length) roles.push("مواطن 👨‍🌾");
            roles.sort(() => Math.random() - 0.5);

            $('#setup-mafia').hide();
            mPlayers.forEach((p, i) => {
                let card = $(`<div class="game-card" onclick="reveal(this)"><strong>${p}</strong><span class="role-text">${roles[i]}</span></div>`);
                $('#mafia-game').append(card);
            });
        }

        // --- نظام الجاسوس ---
        const places = ["مستشفى", "غابة", "طائرة", "مطعم", "فندق", "مدرسة", "مطار", "مزرعة", "صحراء", "عرس", "سجن", "مختبر"]; // كمل الـ 50 بنفس النمط
        function addS() { 
            let n = $('#sName').val(); 
            if(n) { sPlayers.push(n); $('#sList').text(sPlayers.join(" - ")); $('#sName').val("").focus(); }
        }

        function startS() {
            if(sPlayers.length < 3) return alert("اقل شي 3 لاعبين!");
            let place = places[Math.floor(Math.random()*places.length)];
            let spyIdx = Math.floor(Math.random()*sPlayers.length);
            $('#setup-spy').hide();
            sPlayers.forEach((p, i) => {
                let role = (i === spyIdx) ? "أنت الجاسوس 🕵️" : place;
                let card = $(`<div class="game-card" onclick="reveal(this)"><strong>${p}</strong><span class="role-text" style="color:#0f0">${role}</span></div>`);
                $('#spy-game').append(card);
            });
        }

        function reveal(el) {
            $(el).find('strong').hide();
            $(el).find('.role-text').fadeIn();
            setTimeout(() => { $(el).addClass('revealed'); $(el).find('.role-text').text("تمت الرؤية ✅"); }, 2500);
        }
    </script>
</body>
</html>
