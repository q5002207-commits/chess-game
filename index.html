<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - نسخة المافيا المطورة</title>
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .header { background: #da291c; padding: 12px; border-radius: 12px; color: white; margin-bottom: 10px; width: 100%; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .mafia-card { background: #1a1a1a; padding: 20px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; transition: 0.5s; }
        .role-display { display: none; color: #ff0000; font-size: 1.2em; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
        .fade-out { opacity: 0; transform: scale(0.9); pointer-events: none; }
        .narrator-box { background: #0055ff; color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border: 2px solid white; }
    </style>
</head>
<body>

    <div class="container">
        <div id="setup-phase">
            <div class="header"><h3>🕵️‍♂️ نظام المافيا المطور</h3></div>
            <input type="text" id="playerName" placeholder="اسم اللاعب...">
            <button onclick="addPlayer()">إضافة لاعب</button>
            <div id="list-preview" style="margin:15px; color:#888; min-height: 20px;"></div>
            <button style="background:green;" onclick="startDistribution()">توزيع الأدوار + اختيار الراوي</button>
        </div>

        <div id="game-phase" class="hidden">
            <div id="narrator-display"></div>
            <p style="color: #da291c; font-size: 0.9em;">الآن ليمسك كل لاعب الهاتف ويضغط على اسمه</p>
            <div id="cards-container"></div>
            <button style="background:#333; margin-top:20px;" onclick="location.reload()">إعادة اللعبة</button>
        </div>
    </div>

    <script>
        let players = [];

        function addPlayer() {
            let name = document.getElementById('playerName').value.trim();
            if(name) {
                players.push(name);
                document.getElementById('list-preview').innerText = "اللاعبين: " + players.join(" - ");
                document.getElementById('playerName').value = "";
                document.getElementById('playerName').focus();
            }
        }

        function startDistribution() {
            if(players.length < 4) return alert("العدد قليل! لازم 4 على الأقل (3 لاعبين + راوي)");

            // 1. اختيار الراوي وحذفه من قائمة الأدوار
            let narratorIndex = Math.floor(Math.random() * players.length);
            let narratorName = players[narratorIndex];
            let activePlayers = players.filter((_, i) => i !== narratorIndex);

            // 2. تجهيز الأدوار
            let roles = [];
            let pCount = activePlayers.length;

            if (pCount >= 10) {
                // نظام المافيا المزدوج (قتل وتسكيت)
                roles.push("مافيا القتل 🔪");
                roles.push("مافيا التسكيت 🤫");
                // إضافة مافيا إضافية إذا العدد كبير جداً (مثلاً فوق 13)
                if (pCount > 13) roles.push("مافيا مساعد 🔫");
            } else {
                // نظام المافيا العادي
                let mCount = Math.max(1, Math.floor(pCount / 3));
                for(let i=0; i<mCount; i++) roles.push("مافيا 💀");
            }

            roles.push("دكتور 💉");
            while(roles.length < pCount) roles.push("مواطن 👨‍🌾");

            // خلط الأدوار
            roles.sort(() => Math.random() - 0.5);

            // 3. العرض
            document.getElementById('setup-phase').classList.add('hidden');
            document.getElementById('game-phase').classList.remove('hidden');

            // عرض الراوي
            document.getElementById('narrator-display').innerHTML = `
                <div class="narrator-box">
                    🎤 الراوي هو: ${narratorName}<br>
                    <span style="font-size:0.8em; font-weight:normal;">(أنت تدير اللعبة يا بطل)</span>
                </div>
            `;

            // عرض كروت اللاعبين
            let container = document.getElementById('cards-container');
            container.innerHTML = "";

            activePlayers.forEach((p, i) => {
                let card = document.createElement('div');
                card.className = 'mafia-card';
                card.id = `card-${i}`;
                card.innerHTML = `
                    <strong id="pname-${i}">${p}</strong>
                    <div class="role-display" id="role-${i}">${roles[i]}</div>
                `;

                card.onclick = function() {
                    document.getElementById(`pname-${i}`).style.display = 'none';
                    document.getElementById(`role-${i}`).style.display = 'block';
                    
                    setTimeout(() => {
                        card.classList.add('fade-out');
                        setTimeout(() => card.remove(), 500);
                    }, 3000);
                };
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
