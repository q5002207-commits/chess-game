<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمد المحترف - P2P Chess</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --mu-red: #da291c; --mu-black: #111; }
        body { background: var(--mu-black); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        
        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #1a1a1a; padding: 40px; border-radius: 15px; border: 2px solid var(--mu-red); text-align: center; width: 300px; }
        
        /* الواجهة الرئيسية */
        .header { width: 100%; max-width: 900px; background: var(--mu-red); padding: 10px; text-align: center; border-radius: 10px; margin-bottom: 15px; font-weight: bold; }
        .game-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        
        #board { width: 100% !important; border: 4px solid #333; border-radius: 8px; }
        .controls { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; box-sizing: border-box; }
        input { background: #222; color: white; border: 1px solid #444; }
        button { background: var(--mu-red); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b31d14; }
        
        #status { font-size: 0.9em; margin-top: 5px; color: #aaa; }
        .history-box { height: 100px; background: #000; overflow-y: auto; padding: 10px; margin-top: 10px; border-radius: 5px; font-family: monospace; color: var(--mu-red); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--mu-red);">MAN UTD P2P</h2>
            <input type="text" id="my-name" placeholder="ادخل اسمك (مثلاً: ahmed)">
            <button onclick="startP2P()">دخول النظام</button>
        </div>
    </div>

    <div class="header">
        نظام أحمد المحترف P2P ♟️ <br>
        <span id="status">غير متصل</span>
    </div>

    <div class="game-container">
        <div class="board-box">
            <div id="board"></div>
            <p>اللاعب: <span id="display-name">--</span> | Elo: <span id="display-elo">1200</span></p>
        </div>

        <div class="controls">
            <strong>اتصال مباشر P2P:</strong>
            <input type="text" id="target-name" placeholder="اسم الخصم للاتصال به...">
            <button onclick="connectToPeer()">تحدي الخصم</button>
            
            <hr style="border: 0.1px solid #333; margin: 20px 0;">
            
            <strong>سجل التحركات:</strong>
            <div id="history-list" class="history-box"></div>
            <input type="text" id="chat-input" placeholder="كلمة السر أو رسالة..." onkeydown="if(event.keyCode==13) handleInput()">
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        let board = null, game = new Chess(), peer = null, conn = null;
        let myUsername = "";

        function startP2P() {
            myUsername = document.getElementById('my-name').value.trim();
            if (!myUsername) return alert("ادخل اسمك أولاً!");

            // الاتصال بالسيرفر باستخدام الاسم كـ ID مباشر
            peer = new Peer(myUsername);

            peer.on('open', (id) => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('status').innerText = "مستعد لاستقبال التحديات باسم: " + id;
                document.getElementById('display-name').innerText = id;
                initGame();
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
                alert("وصلك تحدي جديد من خصم!");
            });

            peer.on('error', (err) => {
                if(err.type === 'unavailable-id') alert("هذا الاسم مستخدم حالياً، اختر اسماً آخر.");
                else console.error(err);
            });
        }

        function initGame() {
            board = Chessboard('board', {
                draggable: true, position: 'start',
                onDrop: (source, target) => {
                    let move = game.move({ from: source, to: target, promotion: 'q' });
                    if (move === null) return 'snapback';
                    if (conn) conn.send({ type: 'move', move: move });
                    updateHistory(source + " -> " + target);
                }
            });
            $(window).resize(board.resize);
        }

        function connectToPeer() {
            let target = document.getElementById('target-name').value.trim();
            if (!target) return alert("ادخل اسم الخصم!");
            conn = peer.connect(target);
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "متصل الآن بـ: " + conn.peer;
                conn.on('data', (data) => {
                    if (data.type === 'move') {
                        game.move(data.move);
                        board.position(game.fen());
                        updateHistory(data.move.from + " -> " + data.move.to);
                    } else if (data.type === 'hacker') {
                        activateHackerMode();
                    }
                });
            });
        }

        function handleInput() {
            let input = document.getElementById('chat-input');
            let val = input.value;
            if (val === "0798663232") {
                activateHackerMode();
                if (conn) conn.send({ type: 'hacker' });
            }
            input.value = "";
        }

        function activateHackerMode() {
            document.body.style.border = "5px solid gold";
            alert("وضع اغتيال الملك نشط - تحريك حر!");
            board = Chessboard('board', {
                draggable: true, position: board.position(),
                onDrop: (s, t) => {
                    let targetPiece = game.get(t);
                    if (conn) conn.send({ type: 'move', move: { from: s, to: t } });
                    
                    // تحريك فيزيائي بدون قيود القوانين
                    setTimeout(() => {
                        game.remove(s);
                        board.position(board.position());
                        if (targetPiece && targetPiece.type === 'k') {
                            alert("GGMU! تم إنهاء الملك");
                        }
                    }, 50);
                }
            });
        }

        function updateHistory(msg) {
            let h = document.getElementById('history-list');
            h.innerHTML += `<div>${msg}</div>`;
            h.scrollTop = h.scrollHeight;
        }
    </script>
</body>
</html>
