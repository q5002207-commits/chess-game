<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملعب أحمد المحترف - النسخة الشغالة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; font-family: sans-serif; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(218, 41, 28, 0.4); }
        #board { width: 380px; max-width: 95vw; border: 5px solid #333; margin-top: 15px; border-radius: 8px; }
        
        /* جعل صورة صاحبك دائرية وفخمة */
        .piece-417db[data-piece="bK"], .piece-417db[data-piece="wK"] { 
            border-radius: 50% !important; 
            border: 2px solid #fff !important;
            box-shadow: 0 0 5px white;
        }

        .box { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-top: 15px; width: 100%; max-width: 400px; border: 1px solid #333; }
        input, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; font-weight: bold; }
        input { background: #252525; color: white; border: 1px solid #444; text-align: center; }
        button { background: #da291c; color: white; cursor: pointer; }
        #my-id { color: #0f0; font-family: monospace; margin-bottom: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0;">♟️ ملعب أحمد المحترف ♟️</h3>
        <div id="my-id">جاري الاتصال بالسيرفر...</div>
    </div>

    <div id="board"></div>

    <div class="controls box">
        <input type="text" id="friendId" placeholder="أدخل ID الخصم">
        <button onclick="connectToFriend()">تحدي الآن</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null, game = new Chess(), peer = null, conn = null, myColor = 'w';

        // دالة تبديل الصور البرمجية - الرابط المباشر الصحيح
        function customPieceTheme(piece) {
            // استبدال الملك الأبيض والأسود بصورة صاحبك المباشرة
            if (piece === 'bK' || piece === 'wK') {
                return 'https://i.ibb.co/Lh2W1Kk/r2JrKYT3.jpg';
            }
            // باقي القطع عادية
            return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
        }

        window.onload = function() {
            let id = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(id);
            peer.on('open', (id) => { 
                document.getElementById('my-id').innerText = "ID الخاص بك: " + id; 
                initBoard();
            });
            peer.on('connection', (c) => { 
                conn = c; myColor = 'w'; setupConn(); 
                alert("تحدي جديد! أنت تلعب بالأبيض.");
            });
        };

        function initBoard() {
            board = Chessboard('board', {
                position: 'start',
                draggable: true,
                pieceTheme: customPieceTheme,
                onDrop: handleMove
            });
        }

        function handleMove(source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            if (conn) conn.send({ type: 'move', move: move });
        }

        function connectToFriend() {
            let fId = document.getElementById('friendId').value;
            if(fId) { 
                conn = peer.connect(fId); 
                myColor = 'b'; 
                board.orientation('black'); 
                setupConn(); 
            }
        }

        function setupConn() {
            conn.on('open', () => { 
                document.getElementById('my-id').innerText = "متصل بـ: " + conn.peer;
                conn.on('data', (d) => { 
                    if(d.type === 'move') {
                        game.move(d.move); 
                        board.position(game.fen()); 
                    }
                }); 
            });
        }
    </script>
</body>
</html>
