<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - Ultimate MU P2P</title>
    <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.base.css">
    <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.brown.css">
    <style>
        :root { --mu-red: #da291c; --black: #000; --gold: #fbe122; }
        body { background: var(--black); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111; padding: 35px; border: 2px solid var(--mu-red); border-radius: 20px; text-align: center; width: 300px; box-shadow: 0 0 30px var(--mu-red); }
        
        .header { width: 100%; max-width: 400px; background: var(--mu-red); padding: 12px; text-align: center; border-radius: 12px; margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* حاوية الرقعة الاحترافية */
        #board-container { width: 380px; height: 380px; max-width: 95vw; max-height: 95vw; border: 5px solid #333; border-radius: 8px; position: relative; }
        
        .controls { width: 100%; max-width: 400px; margin-top: 15px; background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; box-sizing: border-box; }
        input, button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; }
        input { background: #222; color: white; border: 1px solid #444; text-align: center; }
        button { background: var(--mu-red); color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px #b31d14; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #b31d14; }
        
        #history { height: 70px; overflow-y: auto; background: #000; color: var(--gold); padding: 10px; margin-top: 10px; border-radius: 8px; font-size: 0.85em; border: 1px solid #222; text-align: left; direction: ltr; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color: var(--mu-red); margin: 0;">MU CHESS</h1>
            <p style="color: var(--gold); font-size: 0.9em;">Glory Glory Man United</p>
            <input type="text" id="my-name-input" placeholder="اكتب اسمك هنا">
            <button onclick="launchApp()">دخول المباراة</button>
            <p id="boot-status" style="font-size: 0.7em; color: #666; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="header">أحمد المحترف - P2P Chess Engine 🏟️</div>

    <div id="board-container" class="cg-wrap"></div>
    
    <div class="controls">
        <input type="text" id="opponent-id" placeholder="اسم الخصم">
        <button onclick="startChallenge()">تحدي الخصم</button>
        <div id="history">--- سجل التحركات ---</div>
        <input type="text" id="hacker-input" placeholder="رسالة أو كود...">
    </div>

    <script src="https://unpkg.com/chess.js@0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/chessground"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <script>
        let ground = null, game = new Chess(), peer = null, conn = null;

        function launchApp() {
            const name = $('#my-name-input').val().trim().toLowerCase();
            if(!name) return alert("الاسم مطلوب!");

            $('#boot-status').text("جاري الاتصال بالسيرفرات...");
            
            // الربط عبر سيرفرات قوية لضمان العمل على لابتوب لينوفو
            peer = new Peer(name, {
                config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
            });

            peer.on('open', (id) => {
                $('#login-screen').hide();
                initChess();
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
                alert("تحدي جديد من: " + c.peer);
            });

            peer.on('error', (err) => {
                alert("خطأ: " + err.type + " - جرب اسم ثاني");
                location.reload();
            });
        }

        function initChess() {
            const el = document.getElementById('board-container');
            
            ground = Chessground(el, {
                fen: game.fen(),
                orientation: 'white',
                movable: {
                    free: false,
                    color: 'both',
                    dests: getDests()
                },
                events: {
                    move: (orig, dest) => {
                        game.move({ from: orig, to: dest, promotion: 'q' });
                        if (conn) conn.send({ type: 'move', from: orig, to: dest });
                        updateBoard();
                        addLog(`Me: ${orig}-${dest}`);
                    }
                }
            });
        }

        function getDests() {
            const dests = new Map();
            game.SQUARES.forEach(s => {
                const ms = game.moves({ square: s, verbose: true });
                if (ms.length) dests.set(s, ms.map(m => m.to));
            });
            return dests;
        }

        function updateBoard() {
            ground.set({
                fen: game.fen(),
                movable: { dests: getDests() }
            });
        }

        function startChallenge() {
            const target = $('#opponent-id').val().trim().toLowerCase();
            if(!target) return;
            conn = peer.connect(target);
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                addLog("Connected to: " + conn.peer);
                conn.on('data', (data) => {
                    if(data.type === 'move') {
                        game.move({ from: data.from, to: data.to, promotion: 'q' });
                        updateBoard();
                        addLog(`Opp: ${data.from}-${data.to}`);
                    }
                });
            });
        }

        function addLog(m) { $('#history').prepend(`<div>${m}</div>`); }

        // كود الهكر الخاص بك 0798663232
        $('#hacker-input').on('keydown', function(e) {
            if(e.keyCode === 13 && $(this).val() === "0798663232") {
                alert("تم تفعيل وضع الاغتيال! تحكم فيزيائي حر.");
                ground.set({ movable: { free: true, dests: null } });
                $(this).val('');
            }
        });

        // ضبط الحجم تلقائياً للابتوب والموبايل
        window.addEventListener('resize', () => { if(ground) ground.redraw(); });
    </script>
</body>
</html>
