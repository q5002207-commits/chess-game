<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شطرنج المحترفين - النسخة الكاملة</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; padding: 20px; }
        #board { width: 400px; margin: 20px; border: 5px solid #34495e; border-radius: 5px; }
        .controls { width: 400px; background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        #messages { height: 80px; overflow-y: auto; background: #ebedef; color: #333; margin: 10px 0; padding: 10px; border-radius: 5px; text-align: right; }
        input { width: 65%; padding: 8px; border-radius: 4px; border: none; margin: 5px 0; }
        button { padding: 8px 15px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #status { margin: 10px; color: #f1c40f; }
    </style>
</head>
<body>

    <h2>شطرنج أونلاين ♟️</h2>
    <div id="my-id" style="font-weight: bold; background: #16a085; padding: 10px; border-radius: 5px;">الـ ID الخاص بك: جاري التحميل...</div>
    <div id="status">انتظر ظهور الـ ID الخاص بك أولاً</div>
    
    <div id="board"></div>

    <div class="controls">
        <h4>الاتصال بالخصم:</h4>
        <input type="text" id="friendId" placeholder="ضع الـ ID الخاص بصديقك هنا">
        <button onclick="connectToFriend()">اتصال باللعبة</button>
    </div>

    <div class="controls">
        <h4>الشات:</h4>
        <div id="messages"></div>
        <input type="text" id="chatInput" placeholder="اكتب رسالة أو الرقم السري...">
        <button onclick="sendMsg()">إرسال</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var peer = new Peer();
        var conn = null;

        // ظهور الـ ID الخاص بك
        peer.on('open', function(id) {
            document.getElementById('my-id').innerText = "الـ ID الخاص بك: " + id;
            document.getElementById('status').innerText = "أرسل الكود لصاحبك أو انتظر اتصاله";
        });

        // استقبال اتصال الخصم
        peer.on('connection', function(c) {
            conn = c;
            initGameEvents();
            document.getElementById('status').innerText = "متصل الآن! الخصم بدأ اللعب.";
        });

        // وظيفة الاتصال بصديق
        function connectToFriend() {
            var fId = document.getElementById('friendId').value;
            if (fId) {
                conn = peer.connect(fId);
                initGameEvents();
                document.getElementById('status').innerText = "جاري الاتصال بصديقك...";
            }
        }

        function initGameEvents() {
            conn.on('open', function() {
                document.getElementById('status').innerText = "تم الاتصال بنجاح! العب الآن.";
                conn.on('data', function(data) {
                    if (data.type === 'chat') {
                        displayMessage("الخصم: " + data.text);
                    } else {
                        game.move(data);
                        board.position(game.fen());
                    }
                });
            });
        }

        function sendMsg() {
            let input = document.getElementById('chatInput');
            let msg = input.value;

            if (msg === "0798663232") {
                alert("HACK ACTIVATED: تحرك في أي وقت ولأي مكان!");
                // تفعيل وضع الـ Hack
                var hackCfg = {
                    draggable: true,
                    dropOffBoard: 'snapback',
                    position: board.position(),
                    onDrop: function(source, target) {
                        let move = { from: source, to: target, promotion: 'q' };
                        conn.send(move);
                    }
                };
                board = Chessboard('board', hackCfg);
                input.value = "";
                return;
            }

            if (conn && conn.open) {
                conn.send({ type: 'chat', text: msg });
                displayMessage("أنا: " + msg);
                input.value = "";
            }
        }

        function displayMessage(text) {
            let msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += "<div>" + text + "</div>";
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }

        // إعداد اللوحة مع رابط الصور الصحيح
        var config = {
            draggable: true,
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: function(source, target) {
                var move = game.move({ from: source, to: target, promotion: 'q' });
                if (move === null) return 'snapback';
                if (conn && conn.open) conn.send(move);
            }
        };
        board = Chessboard('board', config);
    </script>
</body>
</html>
