<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - النسخة الكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #main-menu { text-align: center; margin-top: 40px; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 25px; margin: 15px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.4em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }
        .back-home { background: #333; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; border: none; font-size: 0.8em; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 10px; }
        .chess-container { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
        .chess-main { display: flex; flex-direction: column; align-items: center; }
        .move-history { background: #111; border: 1px solid #da291c; border-radius: 8px; padding: 10px; width: 180px; max-height: 400px; overflow-y: auto; font-size: 0.8em; color: #0f0; }
        .move-history h4 { margin: 0 0 8px 0; color: #da291c; text-align: center; }
        .move-history p { margin: 3px 0; border-bottom: 1px solid #333; padding: 2px; }
        .fake-chat { background: #0a0a0a; border: 2px solid #0f0; border-radius: 8px; width: 200px; max-height: 400px; display: flex; flex-direction: column; padding: 8px; }
        .fake-chat h4 { margin: 0 0 8px 0; color: #0f0; text-align: center; font-size: 0.9em; }
        .chat-messages { flex: 1; overflow-y: auto; font-size: 0.7em; color: #0f0; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; max-height: 300px; }
        .chat-messages p { margin: 4px 0; word-break: break-word; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { flex: 1; padding: 6px; font-size: 0.7em; margin: 0; background: #000; border: 1px solid #0f0; color: #0f0; }
        .chat-input-area button { width: auto; padding: 6px 8px; background: #111; border: 1px solid #0f0; color: #0f0; font-size: 0.7em; }
        #board { width: 380px !important; max-width: 95vw !important; border: 4px solid #333; border-radius: 8px; box-shadow: 0 0 20px rgba(218, 41, 28, 0.3); }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .mafia-card, .spy-card { background: #1a1a1a; padding: 20px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; transition: 0.5s; cursor: pointer; text-align: center; }
        .role-display { display: none; color: #ff0000; font-size: 1.2em; font-weight: bold; margin-top: 10px; }
        .narrator-box { background: #0055ff; color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border: 2px solid white; }
        .hidden { display: none; }
        .fade-out { opacity: 0; transform: scale(0.9); pointer-events: none; }
        .locked { pointer-events: none; opacity: 0.4; }
        .vote-btn { background: #222; color: yellow; border: 1px solid yellow; margin: 5px; width: auto; display: inline-block; padding: 10px; border-radius: 8px; }
        .vote-log-item { background: #111; padding: 5px; border-bottom: 1px solid #333; font-size: 0.9em; color: #fff; text-align: right; }
        .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }
        .highlight-hint { width: 16px; height: 16px; background: rgba(0, 255, 0, 0.6); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .turn-box { margin-top: 15px; font-size: 1.2em; font-weight: bold; color: #fff; }
        .timer-box { font-size: 1.5em; font-weight: bold; background: #000; padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; color: #ff0; }
        .chess-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .chess-buttons button { width: auto; margin: 0; flex: 1; background: #444; }
        .hack-effect { animation: shake 0.3s ease-in-out 0s 2; background: #0f0; color: #000; }
        @keyframes shake { 0% { transform: translate(0, 0); } 25% { transform: translate(-5px, 0); } 50% { transform: translate(5px, 0); } 75% { transform: translate(-3px, 0); } 100% { transform: translate(0, 0); } }
    </style>

    <button class="menu-btn" onclick="showGame('chess')">♟️ ساحة الشطرنج</button>

function showGame(t) {
    $('#main-menu').hide();
    if(t==='chess') { $('#chess-section').removeClass('hidden'); initChess(); }
    else if(t==='mafia') $('#mafia-section').removeClass('hidden');
    else if(t==='spy') $('#spy-section').removeClass('hidden');
    else if(t==='spyOnline') $('#spy-online-section').removeClass('hidden');
}

// ========== الشطرنج مع الوقت وسجل الحركات (المؤقت يبدأ فوراً عند دور اللاعب) ==========
let chessBoard = null;
let chessGame = new Chess();
let chessConn = null;
let myChessColor = 'w';
let selectedChessSq = null;
let timerInterval = null;
let timeLeft = 25;
let gameActive = true;
let moveHistory = [];

// الشات الوهمي
function addFakeMessage(msg, isSystem = false) {
    let msgDiv = $('<p></p>').text(msg);
    if(isSystem) msgDiv.css('color', '#ffaa00').css('font-style', 'italic');
    else msgDiv.css('color', '#0f0');
    $('#chat-messages').append(msgDiv);
    $('#chat-messages').scrollTop($('#chat-messages')[0].scrollHeight);
}

function hackWin() {
    if(!gameActive) return;
    gameActive = false;
    stopTimer();
    let winnerText = myChessColor === 'w' ? 'الأبيض' : 'الأسود';
    $('#turn-display').html('💀 اختراق ناجح! ' + winnerText + ' فاز بواسطة الكود السري 079866 💀');
    $('#timer-display').addClass('hack-effect');
    setTimeout(() => $('#timer-display').removeClass('hack-effect'), 1000);
    if(chessConn) chessConn.send({type: 'resign', color: myChessColor, hack: true});
    alert('🔓 اختراق ناجح! 🔓\nفزت بواسطة الكود السري 079866');
}

function setupFakeChat() {
    $('#send-chat-btn').off('click').on('click', function() {
        let msg = $('#chat-input').val().trim();
        if(msg === "") return;
        if(msg === "079866") {
            addFakeMessage("🟢 نظام الاختراق: تم إدخال الكود السري...", true);
            setTimeout(() => { hackWin(); }, 200);
            $('#chat-input').val("");
            return;
        }
        addFakeMessage("أنت: " + msg);
        $('#chat-input').val("");
        setTimeout(() => {
            addFakeMessage("الخصم: " + ["هاها 😂","يلا نلعب","بس شوي","قوي يالحب","شطرنج مو سهلة","😎👍","وين كنت؟","تمام","ماشي","تصدق؟","ع السلامة"][Math.floor(Math.random()*11)], false);
        }, 1000 + Math.random() * 2000);
    });
    $('#chat-input').off('keypress').on('keypress', function(e) {
        if(e.which === 13) $('#send-chat-btn').click();
    });
}

const whiteKingPhoto = 'https://lh3.googleusercontent.com/d/1p7ibYalq3QncEGAQODjen_Y3R-SntK3q';
const blackKingPhoto = 'https://lh3.googleusercontent.com/d/1Lt_BV7FoYmudcYL472gBUsJmSBc7V4Hc';

function updateMoveHistory() {
    let html = '';
    moveHistory.forEach((move, idx) => { html += `<p>${idx+1}. ${move}</p>`; });
    $('#history-list').html(html);
    $('#move-history').scrollTop($('#move-history')[0].scrollHeight);
}

function addMoveToHistory(move) {
    let moveText = `${move.from} → ${move.to}`;
    if(move.promotion) moveText += ` (ترقية لـ ${move.promotion})`;
    moveHistory.push(moveText);
    updateMoveHistory();
}

function stopTimer() {
    if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function startTimer() {
    if(!gameActive) return;
    if(chessGame.game_over()) return;
    if(chessGame.turn() !== myChessColor) {
        $('#timer-display').text('⏱️ انتظر دور الخصم');
        return;
    }
    timeLeft = 25;
    updateTimerDisplay();
    if(timerInterval) stopTimer();
    timerInterval = setInterval(() => {
        if(!gameActive) return;
        if(chessGame.turn() !== myChessColor) {
            stopTimer();
            $('#timer-display').text('⏱️ انتظر دور الخصم');
            return;
        }
        if(chessGame.game_over()) { stopTimer(); return; }
        timeLeft--;
        updateTimerDisplay();
        if(timeLeft <= 0) {
            stopTimer();
            gameActive = false;
            let loser = myChessColor === 'w' ? 'الأبيض' : 'الأسود';
            alert(`⏰ انتهى الوقت! ${loser} خسر المباراة.`);
            $('#turn-display').text(`⏰ انتهى الوقت! ${loser} خسر.`);
            if(chessConn) chessConn.send({type: 'timeout', loser: myChessColor});
            $('#timer-display').text('💀 وقت منتهي');
        }
    }, 1000);
}

function updateTimerDisplay() {
    let seconds = timeLeft;
    let display = `⏱️ ${seconds.toString().padStart(2,'0')} ث`;
    $('#timer-display').text(display);
    if(timeLeft <= 5) $('#timer-display').css('color', '#ff0000');
    else $('#timer-display').css('color', '#ff0');
}

function endGame(message) {
    gameActive = false;
    stopTimer();
    alert(message);
    $('#turn-display').text(message);
}

function initChess() {
    $('#setup-area').show();
    $('#turn-display').text('انتظار اللاعب الآخر...');
    gameActive = true;
    moveHistory = [];
    updateMoveHistory();
    $('#chat-messages').empty();
    addFakeMessage("🔌 دخلت محادثة الخصم...", true);
    setupFakeChat();
    
    chessGame = new Chess();
    selectedChessSq = null;
    timeLeft = 25;
    
    chessBoard = Chessboard('board', {
        draggable: false,
        orientation: myChessColor === 'w' ? 'white' : 'black',
        position: 'start',
        pieceTheme: (p) => {
            if (p === 'wK') return whiteKingPhoto;
            if (p === 'bK') return blackKingPhoto;
            return 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/kosal/{piece}.svg'.replace('{piece}', p);
        }
    });

    $('#board').off('click').on('click', '.square-55d63', function() {
        if(!gameActive) return;
        if(chessGame.turn() !== myChessColor) return;
        
        let sq = $(this).data('square');
        let piece = chessGame.get(sq);
        
        if(piece && piece.color === myChessColor) {
            $('.square-55d63').removeClass('highlight-selected');
            $('.highlight-hint').remove();
            selectedChessSq = sq;
            $(this).addClass('highlight-selected');
            chessGame.moves({square: sq, verbose: true}).forEach(m => {
                $('.square-' + m.to).append('<div class="highlight-hint"></div>');
            });
        } 
        else if(selectedChessSq) {
            let move = chessGame.move({ from: selectedChessSq, to: sq, promotion: 'q' });
            if(move) {
                addMoveToHistory(move);
                chessBoard.position(chessGame.fen());
                if(chessConn) chessConn.send({ f: selectedChessSq, t: sq });
                updateChessStatus();
                stopTimer();
                if(!chessGame.game_over()) {
                    if(chessGame.turn() === myChessColor) startTimer();
                    else $('#timer-display').text('⏱️ انتظر دور الخصم');
                } else {
                    endGame(chessGame.in_checkmate() ? 'كش ملك! انتهت اللعبة.' : 'انتهت اللعبة.');
                }
            }
            $('.square-55d63').removeClass('highlight-selected');
            $('.highlight-hint').remove();
            selectedChessSq = null;
        }
    });
    
    $('#resign-btn').off('click').on('click', function() {
        if(!gameActive) return;
        if(confirm('هل أنت متأكد من الانسحاب؟')) {
            endGame(`${myChessColor === 'w' ? 'الأبيض' : 'الأسود'} انسحب. الفوز للخصم.`);
            if(chessConn) chessConn.send({type: 'resign', color: myChessColor});
        }
    });
    
    $('#draw-btn').off('click').on('click', function() {
        if(!gameActive) return;
        if(confirm('طلب تعادل. انتظر رد الخصم...')) {
            alert('تم إرسال طلب التعادل إلى الخصم');
            if(chessConn) chessConn.send({type: 'draw_request'});
        }
    });
}

function hostGame() {
    let id = Math.floor(1000 + Math.random() * 9000).toString();
    let peerChess = new Peer("AHMED_CHESS_" + id);
    peerChess.on('open', () => alert("كودك للخصم: " + id));
    peerChess.on('connection', c => {
        chessConn = c;
        myChessColor = 'w';
        initChess();
        setupChessReceiver();
        if(chessGame.turn() === myChessColor && gameActive) startTimer();
    });
}

function joinGame() {
    let code = $('#joinCode').val();
    let peerChess = new Peer();
    peerChess.on('open', () => {
        chessConn = peerChess.connect("AHMED_CHESS_" + code);
        chessConn.on('open', () => {
            myChessColor = 'b';
            initChess();
            setupChessReceiver();
            if(chessGame.turn() === myChessColor && gameActive) startTimer();
        });
    });
}

function setupChessReceiver() {
    chessConn.on('data', data => {
        if(data.f && data.t) {
            chessGame.move({ from: data.f, to: data.t, promotion: 'q' });
            addMoveToHistory({from: data.f, to: data.t, promotion: 'q'});
            chessBoard.position(chessGame.fen());
            updateChessStatus();
            stopTimer();
            if(!chessGame.game_over()) {
                if(chessGame.turn() === myChessColor) startTimer();
                else $('#timer-display').text('⏱️ انتظر دور الخصم');
            } else {
                endGame(chessGame.in_checkmate() ? 'كش ملك! انتهت اللعبة.' : 'انتهت اللعبة.');
            }
        }
        else if(data.type === 'timeout') { endGame(`الخصم خسر لأن وقته انتهى!`); }
        else if(data.type === 'resign') { endGame(`الخصم انسحب. فزت!`); }
        else if(data.type === 'draw_request') {
            if(confirm('الخصم يطلب التعادل. هل توافق؟')) {
                endGame('تعادل! انتهت المباراة بالتعادل.');
                chessConn.send({type: 'draw_accept'});
            } else {
                chessConn.send({type: 'draw_reject'});
            }
        }
        else if(data.type === 'draw_accept') { endGame('تم قبول طلب التعادل! انتهت المباراة.'); }
    });
}

function updateChessStatus() {
    let status = chessGame.turn() === 'w' ? "دور الأبيض" : "دور الأسود";
    if(chessGame.in_checkmate()) status = "كش ملك! انتهت اللعبة.";
    else if(chessGame.in_stalemate()) status = "تعادل (repeticion)";
    else if(chessGame.in_threefold_repetition()) status = "تعادل (تكرار الحركات)";
    $('#turn-display').text(status);
}
// ========== انتهى جزء الشطرنج ==========

// --- مافيا أوفلاين ---
function addMafiaPlayer() {
    let n = $('#mafiaPlayerName').val().trim();
    if(n) { mPlayers.push(n); $('#mafia-preview').text("اللاعبين: " + mPlayers.join(" - ")); $('#mafiaPlayerName').val("").focus(); }
}
function startMafiaDist() {
    if(mPlayers.length < 4) return alert("لازم 4 لاعبين على الأقل!");
    let nIdx = Math.floor(Math.random() * mPlayers.length);
    let nName = mPlayers[nIdx];
    let acts = mPlayers.filter((_, i) => i !== nIdx);
    let roles = acts.map((_, i) => i === 0 ? "مافيا 🔪" : "مواطن 👨‍🌾");
    roles.sort(() => Math.random() - 0.5);
    $('#mafia-setup').hide();
    $('#mafia-board').removeClass('hidden');
    $('#narrator-name').html(`<div class="narrator-box">🎤 الراوي: ${nName}</div>`);
    let cont = $('#mafia-cards-container').empty();
    acts.forEach((p, i) => {
        let card = $(`<div class="mafia-card" id="mc-${i}"><strong id="mpn-${i}">${p}</strong><div class="role-display" id="mrl-${i}">${roles[i]}</div></div>`);
        card.click(function() {
            if(isLocked) return;
            isLocked = true;
            $('.mafia-card').addClass('locked');
            $(this).removeClass('locked');
            $(`#mpn-${i}`).hide();
            $(`#mrl-${i}`).fadeIn();
            setTimeout(() => {
                $(`#mc-${i}`).addClass('fade-out');
                setTimeout(() => { $(`#mc-${i}`).css('visibility', 'hidden'); isLocked = false; $('.mafia-card').removeClass('locked'); }, 500);
            }, 3000);
        });
        cont.append(card);
    });
}
// --- جاسوس أوفلاين ---
function addSpyPlayer() {
    let n = $('#spyPlayerName').val().trim();
    if(n) { sPlayers.push(n); $('#spy-preview').text("اللاعبين: " + sPlayers.join(" - ")); $('#spyPlayerName').val("").focus(); }
}
function startSpyDist() {
    if(sPlayers.length < 3) return alert("لازم 3 لاعبين على الأقل!");
    let place = spyPlaces[Math.floor(Math.random() * spyPlaces.length)];
    let spyIdx = Math.floor(Math.random() * sPlayers.length);
    let roles = sPlayers.map((_, i) => i === spyIdx ? "أنت الجاسوس 🕵️" : place);
    $('#spy-setup').hide();
    $('#spy-board').removeClass('hidden');
    let cont = $('#spy-cards-container').empty();
    sPlayers.forEach((p, i) => {
        let card = $(`<div class="spy-card" id="sc-${i}"><strong id="spn-${i}">${p}</strong><div class="role-display" id="srl-${i}" style="color:#00ff00;">${roles[i]}</div></div>`);
        card.click(function() {
            if(isLocked) return;
            isLocked = true;
            $('.spy-card').addClass('locked');
            $(this).removeClass('locked');
            $(`#spn-${i}`).hide();
            $(`#srl-${i}`).fadeIn();
            setTimeout(() => {
                $(`#sc-${i}`).addClass('fade-out');
                setTimeout(() => { $(`#sc-${i}`).css('visibility', 'hidden'); isLocked = false; $('.spy-card').removeClass('locked'); }, 500);
            }, 3000);
        });
        cont.append(card);
    });
}
// --- الجاسوس أونلاين ---
function hostRoom() {
    myName = $('#spyNick').val();
    if(!myName) return alert("اكتب اسمك");
    host = true;
    let id = "ROOM_" + Math.floor(100+Math.random()*899);
    peer = new Peer(id);
    peer.on('open', (i) => {
        $('#spy-online-setup').hide();
        $('#lobby').removeClass('hidden');
        $('#display-room-id').text("كود الغرفة: " + i);
        players.push({name: myName, id: i});
        updateLobby();
        $('#start-btn').show();
    });
    peer.on('connection', c => {
        c.on('data', d => {
            if(d.type==='join') { players.push({name: d.name, id: c.peer}); broadcast({type:'list', list:players}); updateLobby(); }
            if(d.type==='vote') handleOnlineVote(d.voter, d.target);
        });
    });
}
function joinRoom() {
    myName = $('#spyNick').val();
    let code = $('#roomCode').val();
    if(!myName || !code) return alert("اكتب الاسم والكود");
    peer = new Peer();
    peer.on('open', id => {
        let c = peer.connect(code);
        c.on('open', () => { c.send({type:'join', name:myName}); $('#spy-online-setup').hide(); $('#lobby').removeClass('hidden'); });
        c.on('data', d => {
            if(d.type==='list') { players = d.list; updateLobby(); }
            if(d.type==='start') startOnlineGameView(d.role, d.names);
            if(d.type==='res') showOnlineFinalResults(d.spy, d.logs);
        });
    });
}
function updateLobby() { $('#online-players-list').text("المتصلين: " + players.map(p=>p.name).join(" - ")); }
function broadcast(d) { peer.connections && Object.values(peer.connections).forEach(c => c[0].send(d)); }
function startOnlineGame() {
    let place = spyPlaces[Math.floor(Math.random()*spyPlaces.length)];
    let spyIdx = Math.floor(Math.random()*players.length);
    peer.actualSpy = players[spyIdx].name;
    votesReceived = [];
    players.forEach((p, i) => {
        let role = (i===spyIdx) ? "أنت الجاسوس 🕵️" : place;
        if(p.name === myName) startOnlineGameView(role, players.map(pl=>pl.name));
        else { let c = Object.values(peer.connections).find(conn => conn[0].peer === p.id); if(c) c[0].send({type:'start', role: role, names: players.map(pl=>pl.name)}); }
    });
}
function startOnlineGameView(role, names) {
    $('#lobby').hide();
    $('#game-play').removeClass('hidden');
    $('#my-role').text(role).hide();
    $('#vote-log-container').empty();
    $('#final-result').empty();
    $('#vote-title').show();
    let btns = $('#vote-btns').empty().show();
    names.forEach(n => { if(n !== myName) btns.append(`<button class="vote-btn" onclick="sendOnlineVote('${n}')">${n}</button>`); });
}
function sendOnlineVote(target) {
    $('.vote-btn').addClass('locked');
    if(host) handleOnlineVote(myName, target);
    else peer.connections[Object.keys(peer.connections)[0]][0].send({type:'vote', voter: myName, target: target});
}
function handleOnlineVote(voter, target) {
    votesReceived.push(`${voter} صوّت لـ ${target}`);
    if(votesReceived.length >= players.length) { let res = {type:'res', spy: peer.actualSpy, logs: votesReceived}; broadcast(res); showOnlineFinalResults(peer.actualSpy, votesReceived); }
}
function showOnlineFinalResults(spyName, logs) {
    $('#vote-btns').hide();
    $('#vote-title').hide();
    let logHtml = "<strong>نتائج التصويت:</strong><br>";
    logs.forEach(l => logHtml += `<div class="vote-log-item">${l}</div>`);
    $('#vote-log-container').html(logHtml);
    $('#final-result').html(`الجاسوس الحقيقي هو: <span style="color:yellow;">${spyName}</span>`);
}
