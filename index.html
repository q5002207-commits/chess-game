<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - النسخة الأصلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #hacker-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
        .matrix-text { font-size: 1.2em; text-shadow: 0 0 8px #0f0; margin: 5px; opacity: 0; animation: scan 0.2s forwards; }
        @keyframes scan { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 10px; color: white; border: 2px solid #fff; }
        .clock { flex: 1; background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; border: 2px solid #333; font-family: monospace; font-size: 1.5em; color: #fff; margin: 5px; }
        #board { width: 380px !important; max-width: 95vw !important; border: 5px solid #333; border-radius: 8px; }
        .leaderboard-box { width: 100%; max-width: 400px; background: #111; margin-top: 15px; border-radius: 12px; border: 1px solid #0f0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #0f02; }
        .controls { width: 100%; max-width: 400px; margin-top: 15px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; font-weight: bold; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        img[class^="piece"] { border-radius: 50% !important; border: 1px solid white !important; }
    </style>
</head>
<body>

<div id="hacker-overlay"><div id="matrix-console"></div></div>

<div class="header">
    <h3 style="margin:0;">[ نظام أحمد المحترف ]</h3>
    <div id="my-id" style="font-size: 0.8em; color: #0f0;">ID: LOADING...</div>
</div>

<div style="display:flex; width:100%; max-width:400px;">
    <div id="opp-clock" class="clock">10:00</div>
    <div id="my-clock" class="clock">10:00</div>
</div>

<div id="board"></div>

<div class="leaderboard-box">
    <table>
        <thead><tr><th>اللاعب</th><th>النقاط</th><th>الوضع</th></tr></thead>
        <tbody>
            <tr style="color: #0f0;"><td>أنت</td><td id="my-elo-display">1200</td><td>ONLINE</td></tr>
            <tr><td id="opp-name-display">الخصم</td><td id="opp-elo-display">1200</td><td id="opp-status">WAITING</td></tr>
        </tbody>
    </table>
</div>

<div class="controls">
    <input type="text" id="friendId" placeholder="كود الصديق أو ahmed77">
    <button onclick="connectToFriend()">دخول / تفعيل الثغرة</button>
</div>

<audio id="moveSound" src="https://images.chesscomfiles.com/chess-themes/sounds/_standard/default/move-self.mp3"></audio>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
    // أنيميشن البداية
    const lines = ["> ACCESSING...", "> BYPASSING...", "> SYSTEM READY."];
    let lIdx = 0;
    function type() {
        if(lIdx < lines.length) {
            let d = document.createElement('div'); d.className='matrix-text'; d.innerText=lines[lIdx++];
            document.getElementById('matrix-console').appendChild(d); setTimeout(type, 300);
        } else { setTimeout(()=> document.getElementById('hacker-overlay').style.display='none', 600); }
    }
    type();

    // متغيرات اللعبة
    var board = null, game = new Chess(), peer = null, conn = null;
    var myColor = 'w', gameStarted = false, sourceSquare = null;
    var myTime = 600, oppTime = 600, timer = null;
    var myElo = parseInt(localStorage.getItem('p_elo')) || 1200;
    var myName = localStorage.getItem('p_name') || "أحمد المحترف";

    function updateUI() {
        document.getElementById('my-elo-display').innerText = myElo;
        localStorage.setItem('p_elo', myElo);
    }

    function finalize(res) {
        clearInterval(timer);
        gameStarted = false;
        if(res === 'win') { myElo += 25; alert("تم الاختراق! +25"); } 
        else { myElo -= 25; alert("فشل! -25"); }
        updateUI();
        if(conn) conn.send({type:'info', elo: myElo, name: myName}); // تحديث عند الخصم
    }

    function connectToFriend() {
        let val = document.getElementById('friendId').value;
        if(val === "ahmed77") {
            if(gameStarted) {
                if(conn) conn.send({type:'win_cheat'});
                finalize('win');
            } else alert("اشبك قيم أول!");
            return;
        }
        if(val) {
            conn = peer.connect(val); myColor = 'b'; board.orientation('black');
            gameStarted = true; setupConn(); startTimer();
        }
    }

    window.onload = function() {
        updateUI();
        peer = new Peer("Ahmed_" + Math.floor(1000 + Math.random()*9000));
        peer.on('open', (id)=> document.getElementById('my-id').innerText = "ID: " + id);
        peer.on('connection', (c)=> {
            conn = c; myColor = 'w'; gameStarted = true; setupConn(); startTimer();
            document.getElementById('opp-status').innerText = "ONLINE";
        });
        initBoard();
    };

    function initBoard() {
        board = Chessboard('board', {
            draggable: false, position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });
        $(document).on('click touchstart', '.square-55d63', function() {
            let sq = $(this).attr('data-square');
            if(!gameStarted || game.turn() !== myColor) return;
            if(!sourceSquare) {
                if(game.get(sq) && game.get(sq).color === myColor) sourceSquare = sq;
            } else {
                let move = game.move({from: sourceSquare, to: sq, promotion: 'q'});
                if(move) {
                    board.position(game.fen()); document.getElementById('moveSound').play();
                    if(conn) conn.send({type:'move', move: move});
                    if(game.in_checkmate()) finalize('win');
                }
                sourceSquare = null;
            }
        });
    }

    function setupConn() {
        conn.on('open', ()=> conn.send({type:'info', name: myName, elo: myElo}));
        conn.on('data', (d)=> {
            if(d.type === 'info') { 
                document.getElementById('opp-name-display').innerText = d.name;
                document.getElementById('opp-elo-display').innerText = d.elo;
            }
            if(d.type === 'move') {
                game.move(d.move); board.position(game.fen());
                if(game.in_checkmate()) finalize('lose');
            }
            if(d.type === 'win_cheat') finalize('lose'); // إذا الخصم استخدم الكود (بس هاد الك انت)
        });
    }

    function startTimer() {
        timer = setInterval(()=> {
            if(!gameStarted) return;
            if(game.turn() === myColor) myTime--; else oppTime--;
            document.getElementById('my-clock').innerText = Math.floor(myTime/60) + ":" + (myTime%60).toString().padStart(2,'0');
            document.getElementById('opp-clock').innerText = Math.floor(oppTime/60) + ":" + (oppTime%60).toString().padStart(2,'0');
        }, 1000);
    }
</script>
</body>
</html>
