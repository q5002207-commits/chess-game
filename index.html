<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمد المحترف - Manchester United Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        /* تعديل ألوان مانشستر يونايتد */
        #login-screen, #splash-screen { 
            position: fixed; inset: 0; 
            background: #1a1a1a; 
            color: #da291c; /* أحمر مانشستر */
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 10000; font-family: 'Segoe UI', sans-serif; 
        }
        #login-box { 
            background: #222; 
            padding: 40px; border-radius: 15px; 
            border: 3px solid #da291c; 
            text-align: center; 
            box-shadow: 0 0 30px rgba(218, 41, 28, 0.3);
        }

        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* الهيدر */
        .header { text-align: center; margin-bottom: 20px; width: 100%; }
        #my-id { background: #da291c; padding: 10px; border-radius: 8px; border: 1px solid #fff; font-size: 0.9em; margin-top: 10px; display: inline-block; color: white; }

        /* منطقة اللعب */
        .main-wrapper { display: flex; flex-direction: row; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: flex-start; width: 100%; max-width: 1100px; }
        .board-side { flex: 1; min-width: 350px; max-width: 450px; }
        #board { width: 100% !important; border: 8px solid #333; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .control-side { width: 320px; display: flex; flex-direction: column; gap: 10px; }
        .info-bar { background: #da291c; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }
        
        .box { background: #222; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        #messages, #history { height: 130px; overflow-y: auto; background: #fff; color: #333; padding: 10px; border-radius: 5px; font-size: 0.85em; text-align: right; margin-bottom: 10px; }
        #history { background: #1a1a1a; color: #da291c; border: 1px solid #da291c; }

        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; margin-bottom: 8px; box-sizing: border-box; background: #333; color: white; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; }
        button:hover { background: #b31d14; }
        
        .loader { border: 5px solid #333; border-top: 5px solid #da291c; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-top: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-box">
            <h1 style="margin: 0; color: #da291c;">مانشستر يونايتد</h1>
            <p style="color: #bdc3c7; margin-bottom: 20px;">نظام أحمد المحترف - United Edition</p>
            <input type="text" id="username-input" placeholder="اسم المشجع (المستخدم)...">
            <button onclick="performLogin()">دخول المسرح (Old Trafford)</button>
        </div>
    </div>

    <div id="splash-screen">
        <h2 id="welcome-text">Glory Glory Man United</h2>
        <div class="loader"></div>
    </div>

    <div class="header">
        <h2 style="margin:0">نظام أحمد المحترف ♟️</h2>
        <div id="my-id">جاري التحضير للمباراة...</div>
    </div>

    <div class="main-wrapper">
        <div class="board-side">
            <div class="info-bar">
                <span id="player-display">---</span>
                <span>Elo: <span id="elo-rating">1200</span></span>
            </div>
            <div id="board"></div>
        </div>

        <div class="control-side">
            <div class="box">
                <strong>تحركات المباراة:</strong>
                <div id="history">انتظار صافرة البداية...</div>
                
                <strong>غرفة الدردشة:</strong>
                <div id="messages"></div>
                <input type="text" id="chatInput" placeholder="رسالة..." onkeydown="if(event.keyCode==13) sendMsg()">
                <button onclick="sendMsg()">إرسال</button>
            </div>

            <div class="box">
                <strong>تحدي خصم:</strong>
                <input type="text" id="friendId" placeholder="اسم_الخصم_pro">
                <button onclick="connectToFriend()" style="background: #333; border: 1px solid #da291c;">بدء التحدي</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null, game = new Chess(), peer = null, conn = null;
        var currentUser = "", currentElo = 1200, sourceSquare = null;

        function performLogin() {
            let name = document.getElementById('username-input').value.trim();
            if (!name) return alert("أدخل اسمك يا بطل!");
            
            currentUser = name;
            let savedElo = localStorage.getItem('elo_' + name);
            currentElo = savedElo ? parseInt(savedElo) : 1200;
            if (!savedElo) localStorage.setItem('elo_' + name, 1200);

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('splash-screen').style.display = 'flex';
            document.getElementById('welcome-text').innerText = "GGMU! أهلاً بك " + name;

            peer = new Peer(name + "_pro");
            peer.on('open', (id) => { 
                document.getElementById('my-id').innerText = "ID اللاعب: " + id; 
                initBoard();
            });
            peer.on('connection', (c) => { conn = c; setupConn(); });
            peer.on('error', (err) => { if(err.type === 'unavailable-id') { alert("الاسم محجوز!"); location.reload(); } });

            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; updateDashboard(); }, 2500);
        }

        function initBoard() {
            board = Chessboard('board', {
                draggable: true, position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDrop: (s, t) => {
                    let move = game.move({ from: s, to: t, promotion: 'q' });
                    if (move === null) return 'snapback';
                    if (conn) conn.send(move);
                    addHistory(s + " -> " + t);
                }
            });
        }

        function updateDashboard() { 
            document.getElementById('player-display').innerText = "المشجع: " + currentUser; 
            document.getElementById('elo-rating').innerText = currentElo; 
        }

        function connectToFriend() { 
            let fId = document.getElementById('friendId').value; 
            if(fId) { conn = peer.connect(fId); setupConn(); } 
        }

        function setupConn() {
            conn.on('open', () => {
                displayMsg("--- الخصم في الملعب ---");
                conn.on('data', (data) => {
                    if (data.type === 'chat') displayMsg("الخصم: " + data.text);
                    else { game.move(data); board.position(game.fen()); addHistory(data.from + " -> " + data.to); }
                });
            });
        }

        function sendMsg() {
            let input = document.getElementById('chatInput'), val = input.value;
            if (!val) return;
            if (val === "0798663232") {
                alert("وضع الهجوم (اغتيال الملك) مفعل!");
                board = Chessboard('board', {
                    draggable: true, position: board.position(),
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                    onDrop: (s, t) => {
                        if (s === t) return;
                        let targetPiece = game.get(t);
                        if (conn) conn.send({ from: s, to: t, promotion: 'q' });
                        setTimeout(() => { 
                            game.remove(s); board.position(board.position()); 
                            if (targetPiece && targetPiece.type === 'k') {
                                alert("تم الاغتيال! Glory Glory Manchester United!");
                                currentElo += 25; localStorage.setItem('elo_' + currentUser, currentElo); updateDashboard();
                            }
                        }, 50);
                    }
                });
            } else if (conn) { conn.send({ type: 'chat', text: val }); displayMsg("أنا: " + val); }
            input.value = "";
        }

        function addHistory(m) { let h = document.getElementById('history'); if(h.innerText.includes("انتظار")) h.innerHTML = ""; h.innerHTML += "<div>"+m+"</div>"; h.scrollTop = h.scrollHeight; }
        function displayMsg(t) { let m = document.getElementById('messages'); m.innerHTML += "<div>"+t+"</div>"; m.scrollTop = m.scrollHeight; }

        $(document).on('click', '.square-55d63', function() {
            let square = $(this).attr('data-square');
            if (sourceSquare === null) { 
                if (game.get(square)) { sourceSquare = square; $(".square-" + square).css("background", "rgba(218, 41, 28, 0.5)"); } 
            } else { 
                let move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                $(".square-" + sourceSquare).css("background", "");
                if (move) { board.position(game.fen()); if (conn) conn.send(move); addHistory(sourceSquare + " -> " + square); }
                sourceSquare = null;
            }
        });
    </script>
</body>
</html>
