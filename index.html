<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>مافيا أون لاين - نسخة شغالة</title>
<style>
body{background:#000;color:#0f0;font-family:Arial;padding:20px;text-align:center}
button{background:#da291c;color:#fff;padding:12px;margin:5px;border:none;border-radius:10px;cursor:pointer}
input{padding:12px;margin:5px;border-radius:10px;background:#111;color:#0f0;border:1px solid #da291c}
.hidden{display:none}
.player-item{background:#222;padding:8px;margin:5px;border-radius:10px}
.role-card{background:#1a1a1a;padding:20px;border-radius:15px;margin-top:15px}
.secret-box{background:#000;padding:20px;margin:15px 0;border-radius:10px;filter:blur(8px);transition:0.3s}
.secret-box.revealed{filter:none}
</style>
</head>
<body>
<div id="app">
    <h1 style="color:#da291c;">🌐 مافيا أون لاين</h1>
    <div id="lobby">
        <input type="text" id="name" placeholder="اسمك">
        <button id="create">🔪 إنشاء غرفة</button>
        <button id="join">🚪 انضمام</button>
        <div id="joinBox" class="hidden">
            <input type="text" id="hostId" placeholder="معرف المضيف">
            <button id="confirmJoin">دخول</button>
        </div>
    </div>
    <div id="room" class="hidden">
        <div style="background:#111;padding:10px;border-radius:10px;margin:10px">🆔 معرفك: <strong id="myId"></strong> <button id="copyBtn" style="width:auto;padding:5px 15px">📋 نسخ</button></div>
        <div id="players"></div>
        <div id="playerCount" style="margin:5px">👥 0 لاعب</div>
        <button id="startGame" style="background:#2e7d32">🎬 بدء اللعبة (4+ لاعبين)</button>
        <button id="leave" style="background:#3a2a2a">🚪 مغادرة</button>
    </div>
    <div id="game" class="hidden">
        <div id="phase" style="background:#0055ff;padding:10px;border-radius:10px;margin-bottom:15px">🎙️ الراوي: اضغط على زر الكشف لتعرف دورك</div>
        <div class="role-card">
            <strong id="playerName" style="font-size:1.3rem;"></strong>
            <div id="secretBox" class="secret-box">❓ دورك مخفي ❓</div>
            <button id="revealBtn" style="background:#da291c;font-size:1.1rem">🗝️ كشف دوري (مرة واحدة)</button>
        </div>
        <button id="reset" style="background:#2c2f36;margin-top:15px">🏠 رجوع</button>
    </div>
</div>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
<script>
let peer, conns=[], players=[], isHost=false, myId, myName, gameStarted=false, myRole;
let lobby=document.getElementById('lobby'), roomDiv=document.getElementById('room'), gameDiv=document.getElementById('game');
let nameInput=document.getElementById('name'), playersDiv=document.getElementById('players'), myIdSpan=document.getElementById('myId');

document.getElementById('create').onclick=()=>{
    myName=nameInput.value.trim(); if(!myName) return alert("ادخل اسمك");
    peer=new Peer(); peer.on('open',id=>{myId=id; myIdSpan.innerText=id; isHost=true; players=[{id:id,name:myName,alive:true}]; updatePlayers(); lobby.classList.add('hidden'); roomDiv.classList.remove('hidden');
        peer.on('connection',c=>{conns.push(c); c.on('data',d=>handleData(c,d)); c.on('close',()=>{conns=conns.filter(x=>x!==c); if(!gameStarted&&isHost){players=players.filter(p=>p.id!==c.peer); broadcast('sync',{players}); updatePlayers();}});});
    });
    document.getElementById('copyBtn').onclick=()=>{navigator.clipboard.writeText(myId); alert("✅ تم نسخ المعرف");};
};

document.getElementById('join').onclick=()=>{document.getElementById('joinBox').classList.remove('hidden');};
document.getElementById('confirmJoin').onclick=()=>{
    let hostId=document.getElementById('hostId').value.trim(); if(!hostId) return;
    myName=nameInput.value.trim(); if(!myName) return;
    peer=new Peer(); peer.on('open',id=>{myId=id; myIdSpan.innerText=id; isHost=false; players=[]; lobby.classList.add('hidden'); roomDiv.classList.remove('hidden');
        let conn=peer.connect(hostId); conns.push(conn); conn.on('data',d=>handleData(conn,d));
        conn.on('open',()=>{conn.send({type:'join',player:{id:myId,name:myName}});});
    });
};

function handleData(conn,data){
    if(data.type=='join' && isHost){ if(!players.find(p=>p.id==data.player.id)) players.push(data.player); broadcast('sync',{players}); updatePlayers();}
    if(data.type=='sync'){ players=data.players; updatePlayers();}
    if(data.type=='start' && !isHost){ myRole=data.role; startGame();}
}

function broadcast(type,data){conns.forEach(c=>{if(c.open)c.send({type,...data});});}

function updatePlayers(){
    playersDiv.innerHTML=players.map(p=>`<div class="player-item">${p.name} ${p.id==myId?'(أنت)':''} ${p.isHost?'👑':''}</div>`).join('');
    document.getElementById('playerCount').innerHTML=`👥 ${players.length} لاعب`;
    document.getElementById('startGame').style.display=isHost?'block':'none';
}

document.getElementById('startGame').onclick=()=>{
    if(!isHost) return; if(players.length<4){alert("لازم 4 لاعبين"); return;}
    let roles=[]; 
    if(players.length>=10) roles.push("مافيا 🔪","مافيا 🔪"); 
    else roles.push("مافيا 🔪"); 
    roles.push("دكتور 💉"); 
    while(roles.length<players.length) roles.push("مواطن 👨‍🌾");
    for(let i=roles.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[roles[i],roles[j]]=[roles[j],roles[i]];}
    players.forEach((p,idx)=>{
        let role=roles[idx]; 
        let c=conns.find(x=>x.peer==p.id); 
        if(c && c.open) c.send({type:'start',role:role}); 
        if(p.id==myId) myRole=role;
    });
    startGame();
};

function startGame(){
    gameStarted=true; 
    roomDiv.classList.add('hidden'); 
    gameDiv.classList.remove('hidden');
    document.getElementById('playerName').innerHTML = myName;
    document.getElementById('phase').innerHTML = '🎙️ الراوي: اضغط على زر الكشف لتعرف دورك';
    
    let revealed = false;
    let secretBox = document.getElementById('secretBox');
    let revealBtn = document.getElementById('revealBtn');
    
    revealBtn.onclick = () => {
        if(revealed) {
            document.getElementById('phase').innerHTML = '🎭 لقد كشفت دورك مسبقاً!';
            return;
        }
        revealed = true;
        secretBox.classList.add('revealed');
        let roleText = "";
        if(myRole.includes("مافيا")) roleText = "🔪 أنت مافيا - مهمتك قتل المواطنين 🔪";
        else if(myRole.includes("دكتور")) roleText = "💉 أنت الدكتور - تقدر تنقذ شخص كل ليلة 💉";
        else roleText = "👨‍🌾 أنت مواطن - صوت مع العدالة 👨‍🌾";
        secretBox.innerHTML = `<div style="font-size:1.8rem;color:#ff6666">🎭 ${myRole}</div><div style="margin-top:10px">${roleText}</div>`;
        revealBtn.disabled = true;
        revealBtn.style.opacity = '0.5';
        revealBtn.innerHTML = '✓ تم الكشف ✓';
        document.getElementById('phase').innerHTML = `🎙️ الراوي: ${myName} عرف دوره. استعدوا!`;
    };
}

document.getElementById('leave').onclick=()=>location.reload();
document.getElementById('reset').onclick=()=>location.reload();
</script>
</body>
</html>
