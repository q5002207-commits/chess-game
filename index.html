<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج 2 ضد 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background:#000; color:#0f0; font-family:Segoe UI; margin:0; padding:15px; }
        .container { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
        .game { background:#111; padding:15px; border:2px solid #0f0; border-radius:10px; text-align:center; }
        .panel { background:#111; padding:15px; border:2px solid #0f0; border-radius:10px; width:300px; }
        #board { width:460px; max-width:95vw; }
        button { padding:12px 20px; margin:8px; background:#da291c; color:white; border:none; border-radius:8px; cursor:pointer; font-size:16px; }
        input { padding:10px; margin:5px; width:220px; background:#000; color:#0f0; border:1px solid #0f0; }
        .hidden { display:none; }
        .status { background:#1a1a1a; padding:15px; margin:10px 0; border-radius:8px; font-size:15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="game">
        <h2>♟️ شطرنج 2 ضد 2</h2>
        <div id="board"></div>

        <div id="lobby">
            <button id="hostBtn">إنشاء غرفة جديدة</button><br><br>
            <input id="codeInput" placeholder="أدخل كود الغرفة"><br>
            <button id="joinBtn">دخول الغرفة</button>
        </div>

        <div id="gameUI" class="hidden">
            <div id="status" class="status">⏳ جاري الانتظار...</div>
            <div id="turnStatus" class="status">الدور: ...</div>
            <button id="startBtn" class="hidden" style="background:#00aa00; width:100%;">بدء المباراة</button>
        </div>
    </div>

    <div class="panel">
        <h4>الشات</h4>
        <div id="chat" style="height:320px; overflow-y:auto; background:#0a0a0a; padding:10px; margin-bottom:10px;"></div>
        <input id="chatInput" placeholder="اكتب رسالة..." style="width:100%;">
        <button id="sendBtn">إرسال</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
let peer = null;
let myId = null;
let myName = "";
let isHost = false;
let connections = {};
let players = [];
let game = new Chess();
let board = null;
let gameActive = false;
let myTeam = null;
let teamWhite = [];
let teamBlack = [];
let currentTurn = "white";
let expectedPlayerId = null;

// ==================== مساعدات ====================
function log(msg, isError = false) {
    const color = isError ? "#ff5555" : "#55ff55";
    $("#status").html(`<span style="color:${color}">${msg}</span>`);
}

function addChat(sender, msg) {
    $("#chat").append(`<div><strong>${sender}:</strong> ${msg}</div>`);
    $("#chat").scrollTop($("#chat")[0].scrollHeight);
}

function broadcast(data) {
    Object.values(connections).forEach(c => {
        if (c && c.open) c.send(data);
    });
}

function canPlay() {
    return gameActive && (myId === expectedPlayerId);
}

function updateUI() {
    if (!gameActive) {
        $("#turnStatus").html("المباراة لم تبدأ بعد");
        return;
    }
    const teamText = currentTurn === "white" ? "🤍 الفريق الأبيض" : "🖤 الفريق الأسود";
    const currentPlayer = (currentTurn === "white" ? teamWhite : teamBlack).find(p => p.id === expectedPlayerId);
    $("#turnStatus").html(`${teamText}<br>يلعب الآن: ${currentPlayer ? currentPlayer.name : "؟"}`);
}

// ==================== إنشاء غرفة (Host) ====================
$("#hostBtn").click(() => {
    const roomId = Math.floor(1000 + Math.random() * 9000).toString();
    myId = "HOST_" + roomId;
    myName = prompt("أدخل اسمك:", "المنشئ") || "Host";
    isHost = true;

    peer = new Peer("CH2V2_" + roomId);

    peer.on("open", () => {
        players = [{id: myId, name: myName}];
        $("#lobby").hide();
        $("#gameUI").removeClass("hidden");
        log(`✅ تم إنشاء الغرفة!<br>كود الغرفة: <b>${roomId}</b>`);

        peer.on("connection", (conn) => {
            connections[conn.peer] = conn;
            conn.on("data", (data) => handleIncoming(data, conn));
        });
    });
});

// ==================== دخول غرفة ====================
$("#joinBtn").click(() => {
    const code = $("#codeInput").val().trim();
    if (!code) return alert("أدخل كود الغرفة");

    myName = prompt("أدخل اسمك:", "لاعب") || "Player";
    myId = "PLAYER_" + Date.now();

    peer = new Peer();

    peer.on("open", () => {
        const conn = peer.connect("CH2V2_" + code);
        connections[code] = conn;

        conn.on("open", () => {
            conn.send({type: "join", name: myName, id: myId});
            $("#lobby").hide();
            $("#gameUI").removeClass("hidden");
            log("جاري الاتصال بالغرفة...");
        });

        conn.on("data", handleIncoming);
    });
});

function handleIncoming(data, conn = null) {
    console.log("Received:", data);

    if (data.type === "join" && isHost) {
        players.push({id: data.id, name: data.name});
        log(`${data.name} انضم (${players.length}/4)`);
        broadcast({type: "players", players: players});
        if (players.length === 4) $("#startBtn").removeClass("hidden");
    }

    if (data.type === "players") {
        players = data.players;
    }

    if (data.type === "start") {
        teamWhite = data.white;
        teamBlack = data.black;
        myTeam = teamWhite.some(p => p.id === myId) ? "white" : "black";
        gameActive = true;
        currentTurn = "white";
        expectedPlayerId = data.expectedPlayerId;
        updateUI();
        log("🎉 بدأت المباراة!");
    }

    if (data.type === "turn") {
        currentTurn = data.currentTurn;
        expectedPlayerId = data.expectedPlayerId;
        updateUI();
    }
}

// ==================== بدء المباراة ====================
$("#startBtn").click(() => {
    if (!isHost || players.length !== 4) return log("يجب أن يكون هناك 4 لاعبين", true);

    const shuffled = [...players].sort(() => Math.random() - 0.5);
    teamWhite = [shuffled[0], shuffled[1]];
    teamBlack = [shuffled[2], shuffled[3]];

    expectedPlayerId = teamWhite[0].id;

    broadcast({
        type: "start",
        white: teamWhite,
        black: teamBlack,
        expectedPlayerId: expectedPlayerId
    });

    gameActive = true;
    currentTurn = "white";
    updateUI();
    log("🎉 المباراة بدأت! الأبيض يلعب أولاً");
});

// ==================== الرقعة + النقل (مبسط) ====================
board = Chessboard('board', { draggable: false, position: 'start' });

$("#board").on("click", ".square-55d63", function() {
    if (!canPlay()) {
        log("⚠️ ليس دورك الآن!", true);
        return;
    }
    log("دورك! (سيتم إضافة منطق النقل الكامل قريبًا)", false);
});

// شات
$("#sendBtn").click(() => {
    const msg = $("#chatInput").val().trim();
    if (msg) {
        broadcast({type: "chat", name: myName, msg: msg});
        addChat(myName, msg);
        $("#chatInput").val("");
    }
});
</script>
</body>
</html>
