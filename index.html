<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Clash Arena - Advanced Edition</title>
    <style>
        :root { --player-color: #3498db; --enemy-color: #e74c3c; }
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* الساحة */
        #arena { width: 350px; height: 500px; background: #4caf50; border: 10px solid #5d4037; position: relative; margin-top: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); background-image: radial-gradient(#66bb6a 20%, transparent 20%), radial-gradient(#66bb6a 20%, transparent 20%); background-size: 40px 40px; }

        /* القلاع */
        .tower { width: 50px; height: 50px; position: absolute; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; transition: all 0.3s; }
        .tower.player { bottom: 10px; left: 150px; background: var(--player-color); border: 3px solid #fff; }
        .tower.enemy { top: 10px; left: 150px; background: var(--enemy-color); border: 3px solid #fff; }
        .hp-bar { width: 40px; height: 5px; background: #000; position: absolute; top: -10px; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.2s; }

        /* الجنود */
        .unit { width: 25px; height: 25px; position: absolute; border-radius: 50%; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 10; transition: transform 0.2s; }
        .unit.player { background: var(--player-color); border: 2px solid white; }
        .unit.enemy { background: var(--enemy-color); border: 2px solid white; }

        /* التحكم والإكسير */
        #ui { width: 350px; padding: 10px; background: #333; display: flex; flex-direction: column; gap: 10px; }
        #elixir-bar { width: 100%; height: 15px; background: #444; border-radius: 10px; overflow: hidden; border: 2px solid #8e44ad; }
        #elixir-fill { height: 100%; background: #9b59b6; width: 0%; transition: width 0.1s linear; }
        .cards { display: flex; justify-content: space-around; }
        .card { width: 70px; height: 90px; background: #ecf0f1; border-radius: 5px; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; border: 3px solid transparent; }
        .card.active { border-color: #f1c40f; transform: scale(1.05); }
        .cost { font-weight: bold; color: #8e44ad; }
    </style>
</head>
<body>

    <div id="arena">
        <!-- قلاع -->
        <div class="tower enemy" id="e-tower"><div class="hp-bar"><div id="e-hp" class="hp-fill"></div></div>قلعة الخصم</div>
        <div class="tower player" id="p-tower"><div class="hp-bar"><div id="p-hp" class="hp-fill"></div></div>قلعتك</div>
    </div>

    <div id="ui">
        <div id="elixir-bar"><div id="elixir-fill"></div></div>
        <div style="font-size: 12px; text-align: left;">الإكسير: <span id="elixir-text">0</span>/10</div>
        <div class="cards">
            <div class="card" onclick="selectCard(this, 3, '⚔️')">فارس<br><span class="cost">3</span><br>⚔️</div>
            <div class="card" onclick="selectCard(this, 5, '🛡️')">عملاق<br><span class="cost">5</span><br>🛡️</div>
            <div class="card" onclick="selectCard(this, 2, '🏹')">رامية<br><span class="cost">2</span><br>🏹</div>
        </div>
    </div>

<script>
    let elixir = 0;
    let selectedCard = null;
    let units = [];
    let towers = {
        enemy: { hp: 100, x: 150, y: 10, element: document.getElementById('e-hp') },
        player: { hp: 100, x: 150, y: 440, element: document.getElementById('p-hp') }
    };

    // زيادة الإكسير
    setInterval(() => {
        if (elixir < 10) {
            elixir += 0.1;
            document.getElementById('elixir-fill').style.width = (elixir * 10) + '%';
            document.getElementById('elixir-text').innerText = Math.floor(elixir);
        }
    }, 200);

    function selectCard(el, cost, icon) {
        if (elixir < cost) return;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedCard = { cost, icon };
    }

    document.getElementById('arena').onclick = function(e) {
        if (!selectedCard || elixir < selectedCard.cost) return;

        const rect = this.getBoundingClientRect();
        spawnUnit(e.clientX - rect.left - 12, e.clientY - rect.top - 12, 'player', selectedCard.icon);
        elixir -= selectedCard.cost;
        selectedCard = null;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    };

    function spawnUnit(x, y, team, icon) {
        const div = document.createElement('div');
        div.className = `unit ${team}`;
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.innerText = icon;
        document.getElementById('arena').appendChild(div);
        
        units.push({
            el: div, x, y, team, hp: 20, 
            target: team === 'player' ? towers.enemy : towers.player
        });
    }

    // محرك اللعبة (الحركة والقتال)
    setInterval(() => {
        units.forEach((unit, index) => {
            if (unit.hp <= 0) return;

            // التحرك نحو الهدف
            const dx = unit.target.x - unit.x;
            const dy = unit.target.y - unit.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist > 30) {
                unit.x += dx / dist * 2;
                unit.y += dy / dist * 2;
                unit.el.style.left = unit.x + 'px';
                unit.el.style.top = unit.y + 'px';
            } else {
                // الهجوم على البرج
                unit.target.hp -= 0.5;
                unit.target.element.style.width = unit.target.hp + '%';
                if (unit.target.hp <= 0) alert(unit.team === 'player' ? "فزت!" : "خسرت!");
            }
        });
    }, 50).

    // إنزال عشوائي للخصم
    setInterval(() => {
        spawnUnit(Math.random() * 300, 50, 'enemy', '👺');
    }, 4000);

</script>
</body>
</html>
