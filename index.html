<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHMED PRO - ONLINE HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.8s; }
        .welcome-title { color: #da291c; font-size: 2.2em; font-weight: bold; text-shadow: 0 0 20px #da291c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .menu-btn { display: block; width: 100%; max-width: 400px; padding: 25px; margin: 15px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.3em; font-weight: bold; cursor: pointer; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 10px; }
        
        #board { width: 380px !important; max-width: 95vw !important; border: 4px solid #222; }
        .piece-417db { border-radius: 50% !important; border: 2px solid white !important; object-fit: cover; }
        .highlight-possible::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 18px; height: 18px; background: rgba(0, 255, 0, 0.5); border-radius: 50%; pointer-events: none; }

        .mafia-card { background: #1a1a1a; padding: 25px; margin: 10px 0; border-radius: 10px; border: 2px solid #444; text-align: center; }
        .role-display { display: none; color: #00ff00; font-size: 1.8em; font-weight: bold; }
        .locked { opacity: 0.1 !important; pointer-events: none; }
        .hidden { display: none !important; }
        
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #da291c; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .online-tag { background: #0055ff; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; vertical-align: middle; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-title">AHMED PRO SYSTEM</div>
        <div class="welcome-sub">INITIALIZING ONLINE MODULE... [OK]</div>
    </div>

    <div id="main-content" class="hidden">
        <div id="main-menu">
            <h1 style="color:#da291c; text-align:center;">AHMED PRO SYSTEM</h1>
            <button class="menu-btn" onclick="showGame('chess')">♟️ شطرنج (أونلاين)</button>
            <button class="menu-btn" onclick="showGame('mafia_hand')">🃏 موزع مافيا (يدوي)</button>
            <button class="menu-btn" onclick="showGame('mafia_online')" style="border-color: #0055ff;">🌐 مافيا أونلاين <span class="online-tag">LIVE</span></button>
        </div>

        <div id="mafia-online-section" class="hidden">
            <button onclick="location.reload()" style="background:#333; margin-bottom:10px;">🏠 خروج</button>
            <div class="header">نظام المافيا الجماعي</div>
            <div id="online-setup">
                <input type="text" id="onlineName" placeholder="اسمك في اللعبة">
                <div id="my-online-id" style="color:#0055ff; margin:10px 0; font-size:0.8em;">جاري إنشاء هويتك...</div>
                <button onclick="hostRoom()" style="background:#0055ff;">فتح غرفة (أنا الراوي)</button>
                <div style="margin:10px 0; color:#444;">--- أو ---</div>
                <input type="text" id="joinID" placeholder="ID الغرفة (الراوي)">
                <button onclick="joinRoom()">انضمام للغرفة</button>
            </div>

            <div id="narrator-panel" class="hidden">
                <div class="header">لوحة التحكم (الراوي)</div>
                <div id="connected-players" style="margin:10px 0;">اللاعبين المتصلين: 0</div>
                <button onclick="distributeOnlineRoles()" style="background:green;">توزيع الأدوار على الجميع</button>
            </div>

            <div id="player-screen" class="hidden">
                <div class="header">انتظر توزيع الأدوار...</div>
                <div id="your-role-online" class="mafia-card" style="display:none;">
                    <div style="color:#888;">دورك السري هو:</div>
                    <div id="role-text" style="color:#00ff00; font-size:2em; font-weight:bold;"></div>
                </div>
            </div>
        </div>

        <div id="chess-section" class="hidden">
            <button onclick="location.reload()" style="background:#333; margin-bottom:10px;">🏠 خروج</button>
            <div class="header">ID الشطرنج: <span id="chess-id">...</span></div>
            <div id="board"></div>
            <input type="text" id="friendId" placeholder="ID الخصم" style="margin-top:10px;">
            <button onclick="sendChallenge()">بدء التحدي</button>
        </div>

        <div id="mafia-hand-section" class="hidden">
            <button onclick="location.reload()" style="background:#333; margin-bottom:10px;">🏠 خروج</button>
            <div class="header">الموزع اليدوي</div>
            <input type="text" id="pNameHand" placeholder="اسم اللاعب">
            <button onclick="addPHand()">إضافة +</button>
            <div id="listHand" style="margin:10px;"></div>
            <button onclick="distHand()" style="background:green;">توزيع</button>
            <div id="displayHand" class="hidden"><div id="cardsHand"></div></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        $(document).ready(function() {
            setTimeout(() => { $('#welcome-screen').css('opacity', '0'); 
            setTimeout(() => { $('#welcome-screen').remove(); $('#main-content').removeClass('hidden'); }, 800); }, 1800);
        });

        var peer = null;
        var conns = []; // للراوي: لتخزين كل اللاعبين
        var myConn = null; // للاعب: لتخزين اتصاله بالراوي

        function showGame(g) {
            $('#main-menu').addClass('hidden');
            if(g === 'mafia_online') { 
                $('#mafia-online-section').removeClass('hidden'); 
                initOnlinePeer();
            } else if(g === 'chess') {
                $('#chess-section').removeClass('hidden');
                initChess();
            } else {
                $('#mafia-hand-section').removeClass('hidden');
            }
        }

        function initOnlinePeer() {
            let id = "MAFIA_" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(id);
            peer.on('open', i => $('#my-online-id').text("ID الخاص بك: " + i));
            
            // استقبال الاتصالات (للراوي)
            peer.on('connection', c => {
                conns.push(c);
                $('#connected-players').text("اللاعبين المتصلين: " + conns.length);
                c.on('data', data => { if(data.type === 'JOIN') console.log(data.name + " انضم"); });
            });
        }

        // الراوي يفتح غرفة
        function hostRoom() {
            if(!$('#onlineName').val()) return alert("دخل اسمك أول!");
            $('#online-setup').addClass('hidden');
            $('#narrator-panel').removeClass('hidden');
        }

        // لاعب ينضم
        function joinRoom() {
            let name = $('#onlineName').val();
            let roomID = $('#joinID').val();
            if(!name || !roomID) return alert("دخل اسمك والـ ID");
            
            myConn = peer.connect(roomID);
            myConn.on('open', () => {
                myConn.send({type: 'JOIN', name: name});
                $('#online-setup').addClass('hidden');
                $('#player-screen').removeClass('hidden');
            });

            myConn.on('data', data => {
                if(data.type === 'ROLE_ASSIGNED') {
                    $('#player-screen .header').text("وصل الدور!");
                    $('#role-text').text(data.role);
                    $('#your-role-online').fadeIn();
                }
            });
        }

        // توزيع الأدوار (عند الراوي)
        function distributeOnlineRoles() {
            if(conns.length < 3) return alert("لازم 3 لاعبين على الأقل غير الراوي!");
            let numPlayers = conns.length;
            let roles = [];
            
            // قانون أحمد (10 لاعبين أو أكثر)
            if (numPlayers >= 10) {
                roles.push("مافيا القتل 🔪", "مافيا التسكيت 🤫", "دكتور 💉");
            } else {
                roles.push("مافيا 💀", "دكتور 💉");
            }
            while(roles.length < numPlayers) roles.push("مواطن 👨‍🌾");
            roles.sort(() => Math.random() - 0.5);

            conns.forEach((c, i) => {
                c.send({type: 'ROLE_ASSIGNED', role: roles[i]});
            });
            alert("تم إرسال الأدوار للجميع!");
        }

        // --- كود الشطرنج واليدوي (موجود مسبقاً) ---
        var game = new Chess(), board = null, myColor = 'w', src = null;
        var pics = { 'wK': 'https://i.postimg.cc/m27HgYdg/king-black.jpg', 'wQ': 'https://i.postimg.cc/CxLfkvYW/813f791d-4209-474a-b3ae-32306e3d2632.jpg', 'wN': 'https://i.postimg.cc/d31K4Kx9/download.jpg', 'wB': 'https://i.postimg.cc/jjn9q4WQ/download.jpg', 'bK': 'https://i.postimg.cc/T19B8NZh/cbbe2978-b5df-45c8-ad43-05cfb6f57edb.jpg', 'bQ': 'https://i.postimg.cc/HsbtBvqn/ca232a37-372a-45be-b758-6e90cd5f70a1.jpg', 'bN': 'https://i.postimg.cc/DwFRgXMy/5f98a3d6-1c49-4903-a9c0-8a1b8a2de568.jpg', 'bB': 'https://i.postimg.cc/RVRx2dfm/download.jpg', 'bP': 'https://i.postimg.cc/Nj9dgQFv/download.jpg' };
        
        function initChess() {
            peer = new Peer("CH_" + Math.floor(1000+Math.random()*9000));
            peer.on('open', i => $('#chess-id').text(i));
            peer.on('connection', c => { myConn = c; myColor='w'; c.on('data', d => { game.move(d); board.position(game.fen()); }); });
            board = Chessboard('board', { draggable: false, position: 'start', pieceTheme: p => pics[p] || 'https://chessboardjs.com/img/chesspieces/wikipedia/'+p+'.png' });
            $(document).on('click', '.square-55d63', function() {
                let sq = $(this).attr('data-square');
                $('.square-55d63').removeClass('highlight-possible');
                if(!src) {
                    let p = game.get(sq);
                    if(p && p.color === myColor && p.color === game.turn()) {
                        src = sq; game.moves({square:sq, verbose:true}).forEach(m => $('.square-'+m.to).addClass('highlight-possible'));
                    }
                } else {
                    let m = game.move({from:src, to:sq, promotion:'q'});
                    if(m) { board.position(game.fen()); if(myConn) myConn.send(m); }
                    src = null;
                }
            });
        }
        function sendChallenge() { myConn = peer.connect($('#friendId').val()); myColor='b'; board.orientation('black'); myConn.on('data', d => { game.move(d); board.position(game.fen()); }); }

        let playersHand = [];
        function addPHand() { let n = $('#pNameHand').val(); if(n){ playersHand.push(n); $('#listHand').append(n+" | "); $('#pNameHand').val(""); } }
        function distHand() {
            let rIdx = Math.floor(Math.random()*playersHand.length);
            let nar = playersHand[rIdx], acts = playersHand.filter((_,i)=>i!==rIdx);
            let rls = [];
            if(acts.length>=10) rls.push("مافيا قتل 🔪","مافيا تسكيت 🤫","دكتور 💉"); else rls.push("مافيا 💀","دكتور 💉");
            while(rls.length<acts.length) rls.push("مواطن 👨‍🌾");
            rls.sort(()=>Math.random()-0.5);
            $('#mafia-hand-section div').hide(); $('#displayHand').show();
            acts.forEach((p,i) => {
                let c = $(`<div class="mafia-card"><strong>${p}</strong><div class="role-display">${rls[i]}</div></div>`);
                c.click(function(){ 
                    $(this).find('strong').hide(); $(this).find('.role-display').show(); $(this).css({'background':'#000','border-color':'#0f0'});
                    setTimeout(()=> $(this).fadeOut(500), 3000);
                });
                $('#cardsHand').append(c);
            });
        }
    </script>
</body>
</html>
