<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>مافيا أون لاين - بطاقات مخفية</title>
<style>
body{background:#000;color:#0f0;font-family:Arial;padding:20px;text-align:center}
button{background:#da291c;color:#fff;padding:12px;margin:5px;border:none;border-radius:10px;cursor:pointer}
input{padding:12px;margin:5px;border-radius:10px;background:#111;color:#0f0;border:1px solid #da291c}
.hidden{display:none}
.player-item{background:#222;padding:8px;margin:5px;border-radius:10px}
.role-card{background:#1a1a1a;padding:25px;border-radius:20px;border:2px solid #da291c;margin:15px 0}
.secret-role{background:#000;padding:25px;border-radius:15px;margin:15px 0;font-size:1.3rem;filter:blur(8px);transition:0.3s}
.secret-role.revealed{filter:none;background:#0a0a0a}
.blur-text{filter:blur(5px)}
</style>
</head>
<body>
<div id="app">
    <h1 style="color:#da291c;">🌐 مافيا أون لاين</h1>
    <div id="lobby">
        <input type="text" id="name" placeholder="اسمك">
        <button id="create">🔪 إنشاء غرفة</button>
        <button id="join">🚪 انضمام</button>
        <div id="joinBox" class="hidden">
            <input type="text" id="hostId" placeholder="معرف المضيف">
            <button id="confirmJoin">دخول</button>
        </div>
    </div>
    <div id="room" class="hidden">
        <div style="background:#000;padding:10px;border-radius:10px;margin:10px">🆔 معرفك: <strong id="myId"></strong> <button id="copyBtn" style="width:auto;padding:5px 15px">📋 نسخ</button></div>
        <div id="players" style="background:#0a0a0a;border-radius:10px;padding:10px;min-height:150px"></div>
        <div id="playerCount" style="margin:5px">👥 0 لاعب</div>
        <button id="startGame" style="background:#2e7d32">🎬 بدء اللعبة (4+ لاعبين)</button>
        <button id="leave" style="background:#3a2a2a">🚪 مغادرة</button>
    </div>
    <div id="game" class="hidden">
        <div style="background:#0055ff;padding:12px;border-radius:15px;margin-bottom:15px">
            🎙️ الراوي الآلي: اضغط على زر "كشف دوري" لتعرف من تكون
        </div>
        <div class="role-card">
            <h2 id="playerNameDisplay" style="color:#da291c;margin:0 0 15px 0"></h2>
            <div class="secret-role" id="secretRole">
                <span class="blur-text">❓ دورك مخفي تماماً ❓</span>
            </div>
            <button id="revealBtn" style="background:#da291c;font-size:1.1rem;padding:15px">🗝️ كشف دوري (مرة واحدة)</button>
            <div style="margin-top:15px;font-size:0.8rem;color:#888">⚠️ اضغط الزر فقط عندما تكون متأكداً من عدم وجود أحد ينظر إلى شاشتك</div>
        </div>
        <button id="resetBtn" style="background:#2c2f36;margin-top:15px">🏠 العودة للقائمة</button>
    </div>
</div>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
<script>
let peer, conns=[], players=[], isHost=false, myId, myName, gameStarted=false, myRole;
let lobby=document.getElementById('lobby'), roomDiv=document.getElementById('room'), gameDiv=document.getElementById('game');
let nameInput=document.getElementById('name'), playersDiv=document.getElementById('players'), myIdSpan=document.getElementById('myId');

// إنشاء غرفة
document.getElementById('create').onclick=()=>{
    myName=nameInput.value.trim(); if(!myName) return alert("ادخل اسمك");
    peer=new Peer(); 
    peer.on('open',id=>{
        myId=id; myIdSpan.innerText=id; 
        isHost=true; 
        players=[{id:id,name:myName,alive:true,isHost:true}]; 
        updatePlayers(); 
        lobby.classList.add('hidden'); 
        roomDiv.classList.remove('hidden');
        
        peer.on('connection',c=>{
            conns.push(c); 
            c.on('data',d=>handleData(c,d)); 
            c.on('close',()=>{
                conns=conns.filter(x=>x!==c); 
                if(!gameStarted&&isHost){
                    players=players.filter(p=>p.id!==c.peer); 
                    broadcast('sync',{players}); 
                    updatePlayers();
                }
            });
        });
    });
    document.getElementById('copyBtn').onclick=()=>{navigator.clipboard.writeText(myId); alert("✅ تم نسخ المعرف");};
};

// انضمام
document.getElementById('join').onclick=()=>{document.getElementById('joinBox').classList.remove('hidden');};
document.getElementById('confirmJoin').onclick=()=>{
    let hostId=document.getElementById('hostId').value.trim(); if(!hostId) return;
    myName=nameInput.value.trim(); if(!myName) return;
    peer=new Peer(); 
    peer.on('open',id=>{
        myId=id; myIdSpan.innerText=id; 
        isHost=false; 
        players=[]; 
        lobby.classList.add('hidden'); 
        roomDiv.classList.remove('hidden');
        let conn=peer.connect(hostId); 
        conns.push(conn); 
        conn.on('data',d=>handleData(conn,d));
        conn.on('open',()=>{conn.send({type:'join',player:{id:myId,name:myName}});});
    });
};

function handleData(conn,data){
    if(data.type=='join' && isHost){ 
        if(!players.find(p=>p.id==data.player.id)) {
            players.push({...data.player, alive:true}); 
            broadcast('sync',{players}); 
            updatePlayers();
        }
    }
    if(data.type=='sync'){ players=data.players; updatePlayers();}
    if(data.type=='start' && !isHost){ myRole=data.role; startGame();}
}

function broadcast(type,data){conns.forEach(c=>{if(c.open)c.send({type,...data});});}

function updatePlayers(){
    playersDiv.innerHTML=players.map(p=>`<div class="player-item" style="display:flex;justify-content:space-between;align-items:center">
        <span>${escapeHtml(p.name)}</span>
        <span>${p.id==myId?'(أنت)':''} ${p.isHost?'👑':''}</span>
    </div>`).join('');
    document.getElementById('playerCount').innerHTML=`👥 ${players.length} لاعب`;
    document.getElementById('startGame').style.display=isHost?'block':'none';
}

// بدء اللعبة (المضيف فقط)
document.getElementById('startGame').onclick=()=>{
    if(!isHost) return; 
    if(players.length<4){alert("لازم 4 لاعبين على الأقل!"); return;}
    
    // توزيع الأدوار
    let roles=[];
    if(players.length>=10) roles.push("مافيا 🔪","مافيا 🔪"); 
    else roles.push("مافيا 🔪"); 
    roles.push("دكتور 💉"); 
    while(roles.length<players.length) roles.push("مواطن 👨‍🌾");
    
    // خلط
    for(let i=roles.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[roles[i],roles[j]]=[roles[j],roles[i]];}
    
    // إرسال لكل لاعب دوره
    players.forEach((p,idx)=>{
        let role=roles[idx];
        let c=conns.find(x=>x.peer==p.id); 
        if(c && c.open) c.send({type:'start',role:role});
        if(p.id==myId) myRole=role;
    });
    startGame();
};

function startGame(){
    gameStarted=true; 
    roomDiv.classList.add('hidden'); 
    gameDiv.classList.remove('hidden');
    
    // عرض اسم اللاعب فقط بدون دوره
    document.getElementById('playerNameDisplay').innerHTML = escapeHtml(myName);
    
    // إخفاء الدور تماماً
    let secretDiv = document.getElementById('secretRole');
    secretDiv.innerHTML = '<span class="blur-text">❓ دورك مخفي تماماً ❓</span>';
    secretDiv.classList.remove('revealed');
    
    let revealed = false;
    let revealBtn = document.getElementById('revealBtn');
    let oldBtnText = revealBtn.innerHTML;
    
    revealBtn.onclick = () => {
        if(revealed) {
            document.getElementById('game').querySelector('div[style*="background:#0055ff"]').innerHTML = 
                "🎭 لقد كشفت دورك مسبقاً! لا يمكن إعادة الكشف.";
            return;
        }
        revealed = true;
        secretDiv.classList.add('revealed');
        
        // عرض الدور بشكل واضح
        let roleDisplay = "";
        if(myRole.includes("مافيا")) roleDisplay = "🔪 أنت مافيا - مهمتك قتل المواطنين 🔪";
        else if(myRole.includes("دكتور")) roleDisplay = "💉 أنت الدكتور - تقدر تنقذ شخص كل ليلة 💉";
        else roleDisplay = "👨‍🌾 أنت مواطن - صوت مع العدالة 👨‍🌾";
        
        secretDiv.innerHTML = `<div style="font-size:1.5rem;color:#ff6666">🎭 دورك الحقيقي:</div>
                               <div style="font-size:2rem;margin-top:10px">${myRole}</div>
                               <div style="font-size:1rem;margin-top:10px;color:#aaa">${roleDisplay}</div>`;
        revealBtn.disabled = true;
        revealBtn.style.opacity = '0.5';
        revealBtn.innerHTML = '✓ تم الكشف ✓';
        
        document.getElementById('game').querySelector('div[style*="background:#0055ff"]').innerHTML = 
            `🎙️ الراوي: ${escapeHtml(myName)} عرف دوره. استعدوا للعبة!`;
    };
}

document.getElementById('leave').onclick=()=>location.reload();
document.getElementById('resetBtn').onclick=()=>location.reload();

function escapeHtml(str){
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m){
        if(m==='&') return '&amp;';
        if(m==='<') return '&lt;';
        if(m==='>') return '&gt;';
        return m;
    });
}
</script>
</body>
</html>
