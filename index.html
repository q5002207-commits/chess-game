<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمد المحترف - مساعد النقلات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 800px; background: #da291c; padding: 10px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        #my-id-box { background: #000; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; border: 1px solid #fff; font-family: monospace; }
        
        .game-area { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; width: 100%; max-width: 1000px; }
        .board-container { flex: 1; min-width: 300px; max-width: 450px; position: relative; }
        #board { width: 100% !important; border: 5px solid #333; border-radius: 10px; }
        
        /* ميزة النقطة الخضراء للنقلات المتاحة */
        .possible-move { position: relative; }
        .possible-move::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 15px; height: 15px; background: rgba(0, 255, 0, 0.4); border-radius: 50%; pointer-events: none; }
        .highlight-chosen { background: rgba(218, 41, 28, 0.4) !important; box-shadow: inset 0 0 5px 2px #da291c; }

        .side-bar { width: 310px; display: flex; flex-direction: column; gap: 10px; }
        .box { background: #222; padding: 12px; border-radius: 10px; border: 1px solid #444; }
        #messages, #history { height: 90px; overflow-y: auto; background: #fff; color: #222; padding: 8px; border-radius: 6px; font-size: 0.85em; text-align: right; }
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #da291c; background: #333; color: white; margin-bottom: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #da291c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0;">نظام أحمد المحترف ♟️</h3>
        <div id="my-id-box">اتصال...</div>
    </div>

    <div class="game-area">
        <div class="board-container">
            <div id="board"></div>
        </div>
        <div class="side-bar">
            <div class="box">
                <strong>الحركات:</strong>
                <div id="history">---</div>
                <div id="messages"></div>
                <input type="text" id="chatInput" placeholder="دردشة..." onkeydown="if(event.keyCode==13) sendMsg()">
                <button onclick="sendMsg()">إرسال</button>
            </div>
            <div class="box">
                <input type="text" id="friendId" placeholder="ID الخصم">
                <button onclick="connectToFriend()" style="background:#000; border:1px solid #da291c;">اتصال</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null, game = new Chess(), peer = null, conn = null;
        var sourceSquare = null;

        window.onload = function() {
            let randomID = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(randomID);
            peer.on('open', (id) => { document.getElementById('my-id-box').innerText = "ID: " + id; initBoard(); });
            peer.on('connection', (c) => { conn = c; setupConn(); });
        };

        function initBoard() {
            board = Chessboard('board', {
                draggable: true, position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDrop: handleDragMove
            });
            $(window).resize(board.resize);
            
            // التحكم بالنقر (للتلفون)
            $(document).on('click', '.square-55d63', function() {
                var square = $(this).attr('data-square');
                onSquareClick(square);
            });
        }

        function onSquareClick(square) {
            if (sourceSquare === null) {
                var piece = game.get(square);
                // تأكد إنه اختار قطعة من لونه
                if (piece && piece.color === game.turn()) {
                    sourceSquare = square;
                    showMoves(square);
                }
            } else {
                var move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                if (move) {
                    board.position(game.fen());
                    if (conn) conn.send(move);
                    addHistory(sourceSquare + " -> " + square);
                    sourceSquare = null;
                    clearHighlights();
                } else {
                    // إذا ضغط على قطعة ثانية من قطعه، غير التحديد
                    var piece = game.get(square);
                    if (piece && piece.color === game.turn()) {
                        sourceSquare = square;
                        showMoves(square);
                    } else {
                        sourceSquare = null;
                        clearHighlights();
                    }
                }
            }
        }

        function showMoves(sq) {
            clearHighlights();
            $('.square-' + sq).addClass('highlight-chosen');
            var moves = game.moves({ square: sq, verbose: true });
            moves.forEach(m => {
                $('.square-' + m.to).addClass('possible-move');
            });
        }

        function clearHighlights() {
            $('.square-55d63').removeClass('possible-move highlight-chosen');
        }

        function handleDragMove(source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            if (conn) conn.send(move);
            addHistory(source + " -> " + target);
            clearHighlights();
            sourceSquare = null;
        }

        function connectToFriend() {
            let fId = document.getElementById('friendId').value.trim();
            if(fId) { conn = peer.connect(fId); setupConn(); }
        }

        function setupConn() {
            conn.on('open', () => {
                displayMsg("--- متصل! ---");
                conn.on('data', (data) => {
                    if (data.type === 'chat') displayMsg("الخصم: " + data.text);
                    else { game.move(data); board.position(game.fen()); addHistory(data.from + " -> " + data.to); }
                });
            });
        }

        function sendMsg() {
            let input = document.getElementById('chatInput'), val = input.value;
            if (val && conn) { conn.send({ type: 'chat', text: val }); displayMsg("أنا: " + val); input.value = ""; }
        }

        function addHistory(m) { let h = document.getElementById('history'); h.innerHTML += "<div>"+m+"</div>"; h.scrollTop = h.scrollHeight; }
        function displayMsg(t) { let m = document.getElementById('messages'); m.innerHTML += "<div>"+t+"</div>"; m.scrollTop = m.scrollHeight; }
    </script>
</body>
</html>
