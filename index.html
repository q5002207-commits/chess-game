<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة أحمد المحترف - نسخة الدسكورد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e11; color: #00ff41; margin: 0; text-align: center; }
        .header-title { color: #da291c; text-shadow: 0 0 10px #da291c; font-size: 2.5em; margin: 20px 0; }
        .menu-btn { display: block; width: 85%; max-width: 320px; padding: 18px; margin: 12px auto; background: #1a1a1a; border: 2px solid #da291c; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1em; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 15px #da291c; }
        .panel { background: #161b22; border: 1px solid #30363d; padding: 20px; margin: 10px auto; width: 95%; max-width: 500px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        input { width: 85%; padding: 12px; margin: 8px 0; background: #0d1117; color: #00ff41; border: 1px solid #da291c; border-radius: 8px; text-align: center; }
        button { padding: 12px 25px; background: #da291c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .player-tag { background: #21262d; padding: 8px 15px; margin: 5px; display: inline-block; border-radius: 20px; border: 1px solid #0055ff; color: #fff; }
        #board { width: 350px !important; margin: 15px auto; border: 5px solid #333; border-radius: 5px; }
        .mafia-card { background: #0d1117; padding: 20px; margin: 10px auto; border: 1px solid #da291c; border-radius: 10px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 class="header-title">AHMED PRO SYSTEM</h1>
        <p style="color: #888;">نظام متصل مع Discord للصوت</p>
        <button class="menu-btn" onclick="switchTab('online')">🌐 مافيا أونلاين (سريع)</button>
        <button class="menu-btn" onclick="switchTab('chess')">♟️ تحدي الشطرنج</button>
        <button class="menu-btn" onclick="switchTab('manual')">🕵️ موزع مافيا يدوي</button>
    </div>

    <div id="online-sec" class="hidden panel">
        <button onclick="location.reload()" style="background:#333">🏠 رجوع</button>
        <h2 style="color:#5865F2">MAFIA ONLINE</h2>
        <div id="on-init">
            <input type="text" id="on-name" placeholder="دخل اسمك المستعار">
            <button onclick="startOnline(true)" style="background:#0055ff">أنا الراوي (Host)</button>
            <hr style="border: 0.5px solid #333; margin: 15px;">
            <input type="text" id="room-input" placeholder="ID الغرفة">
            <button onclick="startOnline(false)">انضمام للروم</button>
            <p id="room-id-display" style="font-family: monospace; color: #f0ad4e; margin-top:10px;"></p>
        </div>
        
        <div id="on-game" class="hidden">
            <div id="narrator-ui" class="hidden">
                <h3 style="color:orange">لوحة تحكم الراوي</h3>
                <div id="online-list"></div>
                <button onclick="distributeOnline()" style="background:green; width: 100%; font-size: 1.2em;">توزيع الأدوار الآن 🎲</button>
            </div>
            <div id="player-ui" class="hidden">
                <p>حالة الاتصال: <span style="color:green">متصل ✅</span></p>
                <h1 id="role-tag" style="color:yellow; font-size: 2em; background: #000; padding: 20px; border-radius: 10px;">بانتظار الراوي...</h1>
                <p style="color: #888;">استخدم ديسكورد للتحدث مع اللاعبين</p>
            </div>
        </div>
    </div>

    <div id="chess-sec" class="hidden panel">
        <button onclick="location.reload()" style="background:#333">🏠 رجوع</button>
        <div id="board"></div>
        <p>ID الخاص بك: <span id="my-chess-id" style="color:yellow">...</span></p>
        <input type="text" id="opp-id" placeholder="ID الخصم">
        <button onclick="connectToOpponent()">بدء اللعب</button>
    </div>

    <div id="manual-sec" class="hidden panel">
        <button onclick="location.reload()" style="background:#333">🏠 رجوع</button>
        <input type="text" id="p-name" placeholder="اسم اللاعب">
        <button onclick="addManualPlayer()">إضافة</button>
        <div id="manual-list" style="margin:10px;"></div>
        <button onclick="distributeManual()" style="background:green">توزيع</button>
        <div id="manual-cards"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        function switchTab(t) {
            $('#main-menu').addClass('hidden');
            $(`#${t}-sec`).removeClass('hidden');
            if(t === 'chess') initChess();
        }

        // --- أونلاين سريع ---
        let oPeer, oConns = [], isHost = false;

        function startOnline(host) {
            isHost = host;
            oPeer = new Peer();
            oPeer.on('open', id => {
                if(host) {
                    $('#room-id-display').text("ID الغرفة: " + id);
                    $('#narrator-ui').removeClass('hidden');
                } else {
                    let c = oPeer.connect($('#room-input').val());
                    handleConn(c);
                    $('#player-ui').removeClass('hidden');
                }
                $('#on-init').addClass('hidden');
                $('#on-game').removeClass('hidden');
            });
            oPeer.on('connection', handleConn);
        }

        function handleConn(c) {
            c.on('open', () => {
                if(!isHost) {
                    c.send({type: 'JOIN', name: $('#on-name').val() || "لاعب مجهول"});
                } else {
                    oConns.push(c);
                }
            });
            c.on('data', d => {
                if(d.type === 'JOIN') {
                    $('#online-list').append(`<div class="player-tag">${d.name}</div>`);
                }
                if(d.type === 'ROLE') {
                    $('#role-tag').text("دورك: " + d.role);
                    alert("يا بطل دورك طلع: " + d.role);
                }
            });
        }

        function distributeOnline() {
            if(oConns.length === 0) return alert("ما في حد دخل الغرفة!");
            let roles = ["مافيا 💀", "دكتور 💉"];
            while(roles.length < oConns.length) roles.push("مواطن 👨‍🌾");
            roles.sort(() => Math.random() - 0.5);
            oConns.forEach((c, i) => c.send({type: 'ROLE', role: roles[i]}));
            alert("تم توزيع الأدوار على الجميع!");
        }

        // --- شطرنج ويدوي (نفس الأكواد السابقة لضمان الشغل) ---
        function addManualPlayer() {
            let n = $('#p-name').val();
            if(n) { $('#manual-list').append(`<span class="player-tag">${n}</span>`); $('#p-name').val(''); }
        }
        function distributeManual() {
            let pDivs = $('#manual-list .player-tag');
            if(pDivs.length < 2) return;
            let roles = ["مافيا", "دكتور"]; while(roles.length < pDivs.length) roles.push("مواطن");
            roles.sort(() => Math.random() - 0.5);
            $('#manual-cards').empty();
            pDivs.each((i, el) => {
                let name = $(el).text();
                $('#manual-cards').append(`<div class="mafia-card" onclick="alert('${roles[i]}')">${name} (اضغط لمعرفة دورك)</div>`);
            });
        }
        function initChess() {
            let cp = new Peer(); cp.on('open', id => $('#my-chess-id').text(id));
            Chessboard('board', { draggable: true, position: 'start' });
        }
    </script>
</body>
</html>
