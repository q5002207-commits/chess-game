<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ملعب أحمد المحترف - الإصدار الذهبي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(218, 41, 28, 0.4); }
        #my-id { color: #0f0; font-family: monospace; font-weight: bold; margin-top: 5px; }
        #board { width: 380px !important; max-width: 95vw !important; border: 5px solid #333; border-radius: 8px; position: relative; }
        .possible-move::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 18px; height: 18px; background: rgba(0, 255, 0, 0.4); border-radius: 50%; z-index: 999; pointer-events: none; }
        .highlight-chosen { background: rgba(255, 255, 0, 0.5) !important; }
        img[data-piece="wK"], img[src*="wK"], img[data-piece="wN"], img[src*="wN"] { border-radius: 50% !important; border: 2px solid white !important; }
        .controls { width: 100%; max-width: 400px; margin-top: 15px; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; margin-bottom: 8px; text-align: center; outline: none; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0;">♟️ ملعب أحمد المحترف ♟️</h3>
        <div id="my-id">جاري الاتصال بالسيرفر...</div>
    </div>

    <div id="board"></div>

    <div class="controls box">
        <input type="text" id="friendId" placeholder="أدخل ID الخصم">
        <button onclick="connectToFriend()">تحدي الآن</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null, game = new Chess(), peer = null, conn = null;
        var myColor = 'w', sourceSquare = null;
        var kingPic = 'https://i.postimg.cc/m27HgYdg/king-black.jpg';
        var knightPic = 'https://i.postimg.cc/d31K4Kx9/download.jpg';

        window.onload = function() {
            let randomId = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(randomId);
            peer.on('open', (id) => { 
                document.getElementById('my-id').innerText = "ID: " + id; 
                initBoard(); 
            });
            peer.on('connection', (c) => { conn = c; myColor = 'w'; setupConn(); alert("اتصل الخصم!"); });
            peer.on('error', (err) => { alert("مشكلة في السيرفر: " + err.type); });
        };

        function initBoard() {
            board = Chessboard('board', {
                draggable: false, 
                position: 'start',
                pieceTheme: function(p) {
                    if (p === 'wK') return kingPic;
                    if (p === 'wN') return knightPic;
                    return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + p + '.png';
                }
            });
            $(document).on('click touchstart', '.square-55d63', function() { handleAction($(this).attr('data-square')); });
        }

        function handleAction(square) {
            if (game.turn() !== myColor) return;
            if (sourceSquare === null) {
                var p = game.get(square);
                if (p && p.color === myColor) { sourceSquare = square; drawHints(square); }
            } else {
                var move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
                if (move) {
                    board.position(game.fen());
                    if (conn) conn.send({ type: 'move', move: move });
                    sourceSquare = null; clearHints();
                } else {
                    var p = game.get(square);
                    if (p && p.color === myColor) { sourceSquare = square; drawHints(square); }
                    else { sourceSquare = null; clearHints(); }
                }
            }
        }

        function drawHints(sq) {
            clearHints();
            $('.square-' + sq).addClass('highlight-chosen');
            game.moves({ square: sq, verbose: true }).forEach(m => { $('.square-' + m.to).addClass('possible-move'); });
        }
        function clearHints() { $('.square-55d63').removeClass('possible-move highlight-chosen'); }
        function connectToFriend() { let fId = document.getElementById('friendId').value; if(fId) { conn = peer.connect(fId); myColor = 'b'; board.orientation('black'); setupConn(); } }
        function setupConn() { conn.on('open', () => { conn.on('data', (d) => { if(d.type === 'move') { game.move(d.move); board.position(game.fen()); } }); }); }
    </script>
</body>
</html>
