<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمد المحترف - Click-to-Move Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --mu-red: #da291c; --mu-black: #000; --mu-gold: #fbe122; }
        body { background: var(--mu-black); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111; padding: 30px; border-radius: 15px; border: 2px solid var(--mu-red); text-align: center; width: 280px; }
        .header { width: 100%; max-width: 600px; background: var(--mu-red); padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 15px; }
        #board { width: 350px; max-width: 100vw; border: 3px solid #333; margin: auto; }
        .controls { width: 100%; max-width: 400px; margin-top: 15px; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 5px; border: none; box-sizing: border-box; }
        input { background: #222; color: white; border: 1px solid #444; }
        button { background: var(--mu-red); color: white; font-weight: bold; cursor: pointer; }
        #history { height: 80px; overflow-y: auto; background: #000; color: var(--mu-gold); padding: 8px; font-size: 0.9em; margin-top: 10px; border-radius: 5px; border: 1px solid #222; }
        /* تمييز المربع المختار */
        .highlight { background-color: rgba(251, 225, 34, 0.5) !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--mu-red);">MU CHESS P2P</h2>
            <input type="text" id="my-name" placeholder="اسمك">
            <button onclick="startApp()">دخول</button>
        </div>
    </div>

    <div class="header">أحمد المحترف - تحكم بالنقر ♟️</div>

    <div id="board"></div>
    <p id="status" style="font-size: 0.8em; color: #aaa; margin-top: 5px;">اضغط على قطعة للبدء</p>

    <div class="controls">
        <input type="text" id="target-name" placeholder="اسم الخصم للاتصال">
        <button onclick="connectPeer()">اتصال وتحدي</button>
        <div id="history">---</div>
        <input type="text" id="sys-input" placeholder="رسالة أو كود..." onkeydown="if(event.keyCode==13) execSys()">
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        let board = null, game = new Chess(), peer = null, conn = null;
        let selectedSquare = null;
        const pTheme = 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png';

        function startApp() {
            let name = $('#my-name').val().trim();
            if(!name) return;
            peer = new Peer(name);
            peer.on('open', (id) => {
                $('#login-screen').hide();
                $('#status').text("مستعد باسم: " + id);
                initGame();
            });
            peer.on('connection', (c) => { conn = c; listenData(); alert("وصلك تحدي!"); });
        }

        function initGame() {
            board = Chessboard('board', {
                position: 'start',
                pieceTheme: pTheme,
                draggable: false // نعتمد على النقر فقط
            });

            // ربط حدث النقر بمربعات الرقعة
            $('#board').on('click', '.square-55d6', function() {
                let square = $(this).data('square');
                handleSquareClick(square);
            });

            $(window).resize(board.resize);
        }

        function handleSquareClick(square) {
            // تنظيف التمييز السابق
            $('.square-55d6').removeClass('highlight');

            if (selectedSquare === null) {
                // المرة الأولى: اختيار قطعة
                let piece = game.get(square);
                if (piece) {
                    selectedSquare = square;
                    $('.square-' + square).addClass('highlight');
                }
            } else {
                // المرة الثانية: محاولة تحريك
                let move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                
                if (move === null) {
                    // إذا ضغطت على قطعة ثانية من قطعك، غير الاختيار لها
                    let piece = game.get(square);
                    if (piece) {
                        selectedSquare = square;
                        $('.square-' + square).addClass('highlight');
                    } else {
                        selectedSquare = null;
                    }
                } else {
                    // حركة ناجحة
                    board.position(game.fen());
                    if(conn) conn.send({ type: 'move', move: move });
                    addLog("أنت: " + selectedSquare + "-" + square);
                    selectedSquare = null;
                }
            }
        }

        function connectPeer() {
            let t = $('#target-name').val().trim();
            if(!t) return;
            conn = peer.connect(t);
            listenData();
        }

        function listenData() {
            conn.on('open', () => {
                $('#status').text("متصل بـ: " + conn.peer);
                conn.on('data', (d) => {
                    if(d.type === 'move') {
                        game.move(d.move);
                        board.position(game.fen());
                        addLog("الخصم: " + d.move.from + "-" + d.move.to);
                    }
                });
            });
        }

        function execSys() {
            let val = $('#sys-input').val();
            if(val === "0798663232") {
                alert("وضع الاغتيال نشط بالنقر!");
                handleSquareClick = function(square) {
                    if(selectedSquare === null) {
                        selectedSquare = square;
                        $('.square-' + square).addClass('highlight');
                    } else {
                        if(conn) conn.send({ type: 'move', move: { from: selectedSquare, to: square } });
                        game.remove(selectedSquare);
                        board.position(board.position());
                        addLog("هكر: " + selectedSquare + "-" + square);
                        selectedSquare = null;
                    }
                };
            }
            $('#sys-input').val('');
        }

        function addLog(m) {
            $('#history').prepend(`<div>${m}</div>`);
        }
    </script>
</body>
</html>
