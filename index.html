<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج 2 ضد 2 - نسخة مستقرة</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            background: #0a0f0a;
            color: #b3ffb3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            direction: rtl;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            align-items: flex-start;
        }
        .game {
            background: #111a11;
            padding: 20px;
            border: 2px solid #2ecc2e;
            border-radius: 24px;
            text-align: center;
        }
        .panel {
            background: #0f120f;
            padding: 18px;
            border: 2px solid #2ecc2e;
            border-radius: 24px;
            width: 320px;
        }
        #chessboard {
            width: 520px;
            max-width: 90vw;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            background-color: #f0d9b5;
            border: 3px solid #2ecc2e;
            border-radius: 8px;
            overflow: hidden;
        }
        .square {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
            transition: 0.1s;
        }
        .square.light {
            background-color: #f0d9b5;
        }
        .square.dark {
            background-color: #b58863;
        }
        .square.highlight {
            background-color: #7fff7f !important;
            box-shadow: inset 0 0 0 3px #00aa00;
        }
        .square.possible-move {
            background-color: #55ff5555 !important;
            position: relative;
        }
        .square.possible-move::after {
            content: "●";
            font-size: 24px;
            opacity: 0.6;
        }
        button {
            padding: 10px 18px;
            margin: 6px;
            background: #1e3a1e;
            color: #c2f0c2;
            border: 1px solid #55ff55;
            border-radius: 40px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }
        button:hover {
            background: #2ecc2e;
            color: #000;
        }
        input {
            padding: 10px;
            margin: 5px 0;
            width: 90%;
            background: #0a0f0a;
            color: #b3ffb3;
            border: 1px solid #2ecc2e;
            border-radius: 30px;
            text-align: right;
        }
        .hidden {
            display: none;
        }
        .status {
            background: #0c170c;
            padding: 12px;
            margin: 12px 0;
            border-radius: 20px;
            font-size: 14px;
        }
        #chat {
            background: #050a05;
            height: 280px;
            overflow-y: auto;
            padding: 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .players-list {
            background: #0c110c;
            border-radius: 18px;
            padding: 8px;
            margin-top: 10px;
            font-size: 13px;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<div class="container">
    <div class="game">
        <h2>⚔️ شطرنج 2 ضد 2</h2>
        <div id="chessboard"></div>

        <div id="lobby" style="margin-top: 20px;">
            <button id="hostBtn">🚀 إنشاء غرفة</button><br><br>
            <input id="codeInput" placeholder="كود الغرفة">
            <button id="joinBtn">🔗 دخول</button>
        </div>

        <div id="gameUI" class="hidden">
            <div id="status" class="status">⏳ جاري...</div>
            <div id="turnStatus" class="status"></div>
            <div id="teamInfo" class="status"></div>
            <button id="startBtn" class="hidden" style="background:#2a722a;">▶️ بدء المباراة</button>
            <button id="resetBtn" class="hidden" style="background:#5a2a2a;">🔄 إعادة ضبط</button>
        </div>
    </div>

    <div class="panel">
        <h4>💬 الشات</h4>
        <div id="chat"></div>
        <input id="chatInput" placeholder="رسالة...">
        <button id="sendBtn">إرسال</button>
        <div class="players-list" id="playersList"></div>
    </div>
</div>

<script>
// ====================== المتغيرات ======================
let peer = null;
let myId = null;
let myName = "";
let isHost = false;
let connections = {};
let players = [];
let game = new Chess();
let gameActive = false;
let myTeam = null;
let teamWhite = [];
let teamBlack = [];
let currentTurn = "white";
let expectedPlayerId = null;
let selectedSquare = null;
let possibleMoves = [];

// ====================== رسم الرقعة يدوياً ======================
const pieceMap = {
    'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟',
    'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙'
};

function renderBoard() {
    const boardElement = $('#chessboard');
    boardElement.empty();
    const fen = game.fen();
    const rows = fen.split(' ')[0].split('/');
    
    for (let i = 0; i < 8; i++) {
        let row = rows[i];
        let colIndex = 0;
        for (let j = 0; j < row.length; j++) {
            const char = row[j];
            if (isNaN(parseInt(char))) {
                const piece = pieceMap[char] || char;
                const squareName = String.fromCharCode(97 + colIndex) + (8 - i);
                const isLight = (i + colIndex) % 2 === 0;
                const squareDiv = $(`<div class="square ${isLight ? 'light' : 'dark'}" data-square="${squareName}">${piece}</div>`);
                boardElement.append(squareDiv);
                colIndex++;
            } else {
                const emptyCount = parseInt(char);
                for (let k = 0; k < emptyCount; k++) {
                    const squareName = String.fromCharCode(97 + colIndex) + (8 - i);
                    const isLight = (i + colIndex) % 2 === 0;
                    const squareDiv = $(`<div class="square ${isLight ? 'light' : 'dark'}" data-square="${squareName}"></div>`);
                    boardElement.append(squareDiv);
                    colIndex++;
                }
            }
        }
    }
    bindSquareEvents();
}

function showPossibleMoves(square) {
    clearHighlights();
    const moves = game.moves({ verbose: true });
    possibleMoves = moves.filter(m => m.from === square).map(m => m.to);
    possibleMoves.forEach(moveTo => {
        $(`[data-square="${moveTo}"]`).addClass('possible-move');
    });
}

function clearHighlights() {
    $('.square').removeClass('highlight possible-move');
    possibleMoves = [];
}

function bindSquareEvents() {
    $('.square').off('click').on('click', function() {
        if (!gameActive) {
            updateStatusMsg("⏳ المباراة لم تبدأ", true);
            return;
        }
        if (!canPlay()) {
            updateStatusMsg("❌ ليس دورك!", true);
            return;
        }
        
        const square = $(this).attr('data-square');
        
        if (selectedSquare === null) {
            const piece = game.get(square);
            if (piece && ((piece.color === 'w' && myTeam === 'white') || (piece.color === 'b' && myTeam === 'black'))) {
                selectedSquare = square;
                $(this).addClass('highlight');
                showPossibleMoves(square);
                updateStatusMsg(`🔍 تم تحديد ${square}`);
            } else {
                updateStatusMsg("⚠️ هذه ليست قطعتك!", true);
            }
        } else {
            // محاولة التحرك
            makeMove(selectedSquare, square);
            selectedSquare = null;
            clearHighlights();
        }
    });
}

function makeMove(from, to) {
    const move = game.move({ from: from, to: to, promotion: 'q' });
    if (move) {
        renderBoard();
        updateStatusMsg(`✅ ${from} → ${to}`);
        
        // بث الحركة للجميع
        broadcast({
            type: 'move',
            fen: game.fen(),
            from: from,
            to: to
        });
        
        // تبديل الدور
        if (currentTurn === 'white') {
            currentTurn = 'black';
            expectedPlayerId = teamBlack[0]?.id;
        } else {
            currentTurn = 'white';
            expectedPlayerId = teamWhite[0]?.id;
        }
        
        updateUI();
        broadcast({
            type: 'turn',
            currentTurn: currentTurn,
            expectedPlayerId: expectedPlayerId
        });
        
        if (game.game_over()) {
            let winner = game.in_checkmate() ? (game.turn() === 'w' ? 'الأسود' : 'الأبيض') : 'تعادل';
            updateStatusMsg(`🏆 انتهت المباراة! الفائز: ${winner}`);
            broadcast({ type: 'gameover', winner: winner });
            gameActive = false;
        }
    } else {
        updateStatusMsg("🚫 حركة غير قانونية!", true);
    }
}

function canPlay() {
    return gameActive && (myId === expectedPlayerId);
}

function updateStatusMsg(msg, isErr = false) {
    $('#status').html(`<span style="color:${isErr ? '#ff8888' : '#88ff88'}">${msg}</span>`);
}

function updateUI() {
    if (!gameActive) {
        $('#turnStatus').html('⏳ انتظار البدء');
        return;
    }
    const team = currentTurn === 'white' ? '🤍 الأبيض' : '🖤 الأسود';
    const player = (currentTurn === 'white' ? teamWhite : teamBlack).find(p => p.id === expectedPlayerId);
    $('#turnStatus').html(`🎲 الدور: ${team}<br>⚡ يتحرك: ${player?.name || '?'}`);
    $('#teamInfo').html(`🎯 أنت في فريق ${myTeam === 'white' ? '🤍 أبيض' : '🖤 أسود'}<br>👥 الأبيض: ${teamWhite.map(p=>p.name).join(', ')}<br>👥 الأسود: ${teamBlack.map(p=>p.name).join(', ')}`);
}

function updatePlayersUI() {
    let html = '<div style="display:flex; flex-wrap:wrap; gap:5px;">';
    players.forEach(p => {
        let teamBadge = '';
        if (teamWhite.some(t => t.id === p.id)) teamBadge = '🤍';
        if (teamBlack.some(t => t.id === p.id)) teamBadge = '🖤';
        html += `<span style="background:#162016; padding:3px 10px; border-radius:20px;">${teamBadge} ${p.name}</span>`;
    });
    html += '</div>';
    $('#playersList').html(html);
}

function broadcast(data, excludeId = null) {
    for (let pid in connections) {
        if (connections[pid] && connections[pid].open && pid !== excludeId) {
            connections[pid].send(data);
        }
    }
}

// ====================== معالجة الإشارات ======================
function handleData(data, senderId) {
    if (data.type === 'join' && isHost) {
        if (!players.find(p => p.id === data.id)) {
            players.push({ id: data.id, name: data.name });
            updateStatusMsg(`${data.name} انضم (${players.length}/4)`);
            broadcast({ type: 'players', players: players });
            updatePlayersUI();
            if (players.length === 4) $('#startBtn').removeClass('hidden');
        }
    }
    if (data.type === 'players') {
        players = data.players;
        updatePlayersUI();
    }
    if (data.type === 'start') {
        teamWhite = data.whiteTeam;
        teamBlack = data.blackTeam;
        myTeam = teamWhite.some(p => p.id === myId) ? 'white' : (teamBlack.some(p => p.id === myId) ? 'black' : null);
        gameActive = true;
        currentTurn = 'white';
        expectedPlayerId = teamWhite[0].id;
        game = new Chess();
        renderBoard();
        updateUI();
        updateStatusMsg('🎉 بدأت المباراة!');
        $('#startBtn').addClass('hidden');
        $('#resetBtn').removeClass('hidden');
    }
    if (data.type === 'move') {
        game.load(data.fen);
        renderBoard();
        updateUI();
    }
    if (data.type === 'turn') {
        currentTurn = data.currentTurn;
        expectedPlayerId = data.expectedPlayerId;
        updateUI();
    }
    if (data.type === 'gameover') {
        updateStatusMsg(`🏆 النهاية: ${data.winner}`);
        gameActive = false;
    }
    if (data.type === 'reset') {
        teamWhite = data.whiteTeam;
        teamBlack = data.blackTeam;
        myTeam = teamWhite.some(p => p.id === myId) ? 'white' : 'black';
        gameActive = true;
        currentTurn = 'white';
        expectedPlayerId = teamWhite[0].id;
        game = new Chess();
        renderBoard();
        updateUI();
        updateStatusMsg('🔄 تم إعادة الضبط!');
    }
    if (data.type === 'chat') {
        $('#chat').append(`<div><strong>${data.name}:</strong> ${data.msg}</div>`);
        $('#chat').scrollTop($('#chat')[0].scrollHeight);
    }
}

// ====================== إنشاء غرفة ======================
$('#hostBtn').click(() => {
    const code = Math.floor(1000 + Math.random() * 9000).toString();
    myName = prompt('اسمك:', 'المضيف') || 'Host';
    isHost = true;
    myId = 'host_' + Date.now();
    players = [{ id: myId, name: myName }];
    
    peer = new Peer('chess2v2_' + code);
    peer.on('open', () => {
        updateStatusMsg(`✅ الغرفة جاهزة! كود: ${code}`);
        $('#lobby').hide();
        $('#gameUI').removeClass('hidden');
        $('#resetBtn').addClass('hidden');
        $('#startBtn').addClass('hidden');
        updatePlayersUI();
        renderBoard();
        
        peer.on('connection', (conn) => {
            connections[conn.peer] = conn;
            conn.on('data', (d) => handleData(d, conn.peer));
            conn.on('close', () => { delete connections[conn.peer]; });
        });
    });
});

$('#joinBtn').click(() => {
    const code = $('#codeInput').val().trim();
    if (!code) return alert('أدخل الكود!');
    myName = prompt('اسمك:', 'لاعب') || 'Player';
    myId = 'player_' + Date.now();
    isHost = false;
    
    peer = new Peer();
    peer.on('open', () => {
        const conn = peer.connect('chess2v2_' + code);
        conn.on('open', () => {
            connections[code] = conn;
            conn.send({ type: 'join', name: myName, id: myId });
            $('#lobby').hide();
            $('#gameUI').removeClass('hidden');
            $('#startBtn').addClass('hidden');
            $('#resetBtn').addClass('hidden');
            renderBoard();
        });
        conn.on('data', (d) => handleData(d, code));
    });
});

$('#startBtn').click(() => {
    if (!isHost || players.length !== 4) {
        updateStatusMsg('يلزم 4 لاعبين!', true);
        return;
    }
    const shuffled = [...players].sort(() => Math.random() - 0.5);
    teamWhite = [shuffled[0], shuffled[1]];
    teamBlack = [shuffled[2], shuffled[3]];
    currentTurn = 'white';
    const startData = {
        type: 'start',
        whiteTeam: teamWhite,
        blackTeam: teamBlack,
        expectedPlayerId: teamWhite[0].id
    };
    broadcast(startData);
    gameActive = true;
    game = new Chess();
    renderBoard();
    updateUI();
    updateStatusMsg('🎯 انطلقت المباراة!');
    $('#startBtn').addClass('hidden');
    $('#resetBtn').removeClass('hidden');
});

$('#resetBtn').click(() => {
    if (!isHost) return;
    const shuffled = [...players].sort(() => Math.random() - 0.5);
    teamWhite = [shuffled[0], shuffled[1]];
    teamBlack = [shuffled[2], shuffled[3]];
    broadcast({ type: 'reset', whiteTeam: teamWhite, blackTeam: teamBlack });
    gameActive = true;
    currentTurn = 'white';
    expectedPlayerId = teamWhite[0].id;
    game = new Chess();
    renderBoard();
    updateUI();
    updateStatusMsg('🔄 تم إعادة الضبط!');
});

$('#sendBtn').click(() => {
    const msg = $('#chatInput').val().trim();
    if (!msg) return;
    $('#chat').append(`<div><strong>${myName}:</strong> ${msg}</div>`);
    $('#chat').scrollTop($('#chat')[0].scrollHeight);
    broadcast({ type: 'chat', name: myName, msg: msg });
    $('#chatInput').val('');
});
</script>
</body>
</html>
