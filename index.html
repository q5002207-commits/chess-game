    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            user-select: none;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* شبكة خلفية فاخرة */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(218, 41, 28, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(218, 41, 28, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* تأثير الجسيمات الخلفية المتوهجة */
        .glow-particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* واجهة الدخول الفخمة */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .login-card {
            background: linear-gradient(145deg, #0f121f, #03060c);
            width: 90%;
            max-width: 480px;
            border-radius: 48px;
            padding: 40px 28px 50px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(218, 41, 28, 0.2), 0 0 0 5px rgba(0,0,0,0.3);
            border: 1px solid rgba(218, 41, 28, 0.5);
            transition: transform 0.3s ease;
            animation: floatGlow 3s infinite alternate;
        }

        @keyframes floatGlow {
            0% { box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(218, 41, 28, 0.2); transform: translateY(0px);}
            100% { box-shadow: 0 40px 60px rgba(218, 41, 28, 0.3), 0 0 0 3px rgba(218, 41, 28, 0.6); transform: translateY(-6px);}
        }

        .login-icon {
            font-size: 80px;
            color: #da291c;
            text-shadow: 0 0 15px #da291c, 0 0 30px rgba(218,41,28,0.5);
            margin-bottom: 15px;
        }

        .login-card h1 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #da291c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .login-sub {
            color: #b0b7d0;
            font-weight: 400;
            border-bottom: 1px dashed #da291c;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .input-group {
            position: relative;
            margin: 25px 0;
        }

        .input-group i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #da291c;
            font-size: 1.4rem;
            transition: 0.3s;
        }

        .login-card input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(10, 15, 30, 0.8);
            border: 1.5px solid #2a2f45;
            border-radius: 60px;
            font-size: 1.1rem;
            color: #fff;
            font-family: 'Cairo', monospace;
            transition: all 0.3s;
            text-align: right;
            backdrop-filter: blur(4px);
        }

        .login-card input:focus {
            outline: none;
            border-color: #da291c;
            box-shadow: 0 0 18px rgba(218, 41, 28, 0.5);
            background: #080c18;
        }

        .login-card button {
            background: linear-gradient(95deg, #da291c, #b71c0e);
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            color: white;
            margin-top: 20px;

            box-shadow: 0 10px 20px rgba(218, 41, 28, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;

            transform: scale(1.02);
            background: linear-gradient(95deg, #f32c1c, #da291c);
            box-shadow: 0 12px 28px rgba(218, 41, 28, 0.6);
            letter-spacing: 1px;
        }

            color: #9aa2bf;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .hidden {

            opacity: 0;

    </style>
</head>

    // تأثير جسيمات خلفية متحركة (لمسة فخمة)
    function createParticles() {
        const canvas = document.getElementById('glowCanvas');
        if(!canvas) return;
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '0';
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0;i<70;i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 3 + 1,
                alpha: Math.random() * 0.5 + 0.2,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.2 + 0.1,
                color: `rgba(218, 41, 28, ${Math.random() * 0.5 + 0.2})`
            });
        }
        function animate() {
            if(!canvas || !ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                if(p.x < 0) p.x = canvas.width;
                if(p.x > canvas.width) p.x = 0;
                if(p.y < 0) p.y = canvas.height;
                if(p.y > canvas.height) p.y = 0;
            }
            requestAnimationFrame(animate);
        }
        animate();
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    }
    createParticles();

    window.showGame = function(t) {
        $('#main-menu').hide();
        if(t==='chess') { $('#chess-section').removeClass('hidden'); initChess(); }
        else if(t==='mafia') $('#mafia-section').removeClass('hidden');
        else if(t==='spy') $('#spy-section').removeClass('hidden');
        else if(t==='spyOnline') $('#spy-online-section').removeClass('hidden');
    };

    // مافيا
    window.addMafiaPlayer = function() {
        let n = $('#mafiaPlayerName').val().trim();
        if(n) { mPlayers.push(n); $('#mafia-preview').text("اللاعبين: " + mPlayers.join(" - ")); $('#mafiaPlayerName').val("").focus(); }
    };
    window.startMafiaDist = function() {
        if(mPlayers.length < 4) return alert("لازم 4 لاعبين على الأقل!");
        let nIdx = Math.floor(Math.random() * mPlayers.length);
        let nName = mPlayers[nIdx];
        let acts = mPlayers.filter((_, i) => i !== nIdx);
        let roles = acts.map((_, i) => i === 0 ? "مافيا 🔪" : "مواطن 👨‍🌾"); roles.sort(() => Math.random() - 0.5);
        $('#mafia-setup').hide(); $('#mafia-board').removeClass('hidden');
        $('#narrator-name').html(`<div class="narrator-box">🎤 الراوي: ${nName}</div>`);
        let cont = $('#mafia-cards-container').empty();
        acts.forEach((p, i) => {
            let card = $(`<div class="mafia-card" id="mc-${i}"><strong id="mpn-${i}">${p}</strong><div class="role-display" id="mrl-${i}">${roles[i]}</div></div>`);
            card.click(function() {
                if(isLocked) return;
                isLocked = true; $('.mafia-card').addClass('locked'); $(this).removeClass('locked');
                $(`#mpn-${i}`).hide(); $(`#mrl-${i}`).fadeIn();
                setTimeout(() => {
                    $(`#mc-${i}`).addClass('fade-out');
                    setTimeout(() => { $(`#mc-${i}`).css('visibility', 'hidden'); isLocked = false; $('.mafia-card').removeClass('locked'); }, 500);
                }, 3000);
            });
            cont.append(card);
        });
    };
    // جاسوس أوفلاين
    window.addSpyPlayer = function() {
        let n = $('#spyPlayerName').val().trim();
        if(n) { sPlayers.push(n); $('#spy-preview').text("اللاعبين: " + sPlayers.join(" - ")); $('#spyPlayerName').val("").focus(); }
    };
    window.startSpyDist = function() {
        if(sPlayers.length < 3) return alert("لازم 3 لاعبين على الأقل!");
        let place = spyPlaces[Math.floor(Math.random() * spyPlaces.length)];
        let spyIdx = Math.floor(Math.random() * sPlayers.length);
        let roles = sPlayers.map((_, i) => i === spyIdx ? "أنت الجاسوس 🕵️" : place);
        $('#spy-setup').hide(); $('#spy-board').removeClass('hidden');
        let cont = $('#spy-cards-container').empty();
        sPlayers.forEach((p, i) => {
            let card = $(`<div class="spy-card" id="sc-${i}"><strong id="spn-${i}">${p}</strong><div class="role-display" id="srl-${i}" style="color:#00ff00;">${roles[i]}</div></div>`);
            card.click(function() {
                if(isLocked) return;
                isLocked = true; $('.spy-card').addClass('locked'); $(this).removeClass('locked');
                $(`#spn-${i}`).hide(); $(`#srl-${i}`).fadeIn();
                setTimeout(() => {
                    $(`#sc-${i}`).addClass('fade-out');
                    setTimeout(() => { $(`#sc-${i}`).css('visibility', 'hidden'); isLocked = false; $('.spy-card').removeClass('locked'); }, 500);
                }, 3000);
            });
            cont.append(card);
        });
    };
    // أونلاين
    window.hostRoom = function() {
        myName = $('#spyNick').val(); if(!myName) return alert("اكتب اسمك");
        host = true; let id = "ROOM_" + Math.floor(100+Math.random()*899);
        peer = new Peer(id);
        peer.on('open', (i) => {
            $('#spy-online-setup').hide(); $('#lobby').removeClass('hidden');
            $('#display-room-id').text("كود الغرفة: " + i);
            players = [{name: myName, id: i}]; updateLobby();
            $('#start-btn').show();
        });
        peer.on('connection', c => {
            c.on('data', d => {
                if(d.type==='join') { players.push({name: d.name, id: c.peer}); broadcast({type:'list', list:players}); updateLobby(); }
                if(d.type==='vote') handleOnlineVote(d.voter, d.target);
            });
        });
    };
    window.joinRoom = function() {
        myName = $('#spyNick').val(); let code = $('#roomCode').val(); if(!myName || !code) return alert("اكتب الاسم والكود");
        peer = new Peer();
        peer.on('open', id => {
            let c = peer.connect(code);
            c.on('open', () => { c.send({type:'join', name:myName}); $('#spy-online-setup').hide(); $('#lobby').removeClass('hidden'); });
            c.on('data', d => {
                if(d.type==='list') { players = d.list; updateLobby(); }
                if(d.type==='start') startOnlineGameView(d.role, d.names);
                if(d.type==='res') showOnlineFinalResults(d.spy, d.logs);
            });
        });
    };
    function updateLobby() { $('#online-players-list').text("المتصلين: " + players.map(p=>p.name).join(" - ")); }
    function broadcast(d) { peer.connections && Object.values(peer.connections).forEach(c => c[0].send(d)); }
    window.startOnlineGame = function() {
        let place = spyPlaces[Math.floor(Math.random()*spyPlaces.length)];
        let spyIdx = Math.floor(Math.random()*players.length);
        peer.actualSpy = players[spyIdx].name;
        votesReceived = [];
        players.forEach((p, i) => {
            let role = (i===spyIdx) ? "أنت الجاسوس 🕵️" : place;
            if(p.name === myName) startOnlineGameView(role, players.map(pl=>pl.name));
            else { let c = Object.values(peer.connections).find(conn => conn[0].peer === p.id); if(c) c[0].send({type:'start', role: role, names: players.map(pl=>pl.name)}); }
        });
    };
    function startOnlineGameView(role, names) {
        $('#lobby').hide(); $('#game-play').removeClass('hidden');
        $('#my-role').text(role).hide(); $('#vote-log-container').empty(); $('#final-result').empty();
        $('#vote-title').show(); let btns = $('#vote-btns').empty().show();
        names.forEach(n => { if(n !== myName) btns.append(`<button class="vote-btn" onclick="sendOnlineVote('${n}')">${n}</button>`); });
    }
    window.sendOnlineVote = function(target) {
        $('.vote-btn').addClass('locked');
        if(host) handleOnlineVote(myName, target);
        else peer.connections[Object.keys(peer.connections)[0]][0].send({type:'vote', voter: myName, target: target});
    };
    function handleOnlineVote(voter, target) {
        votesReceived.push(`${voter} صوّت لـ ${target}`);
        if(votesReceived.length >= players.length) {
            let res = {type:'res', spy: peer.actualSpy, logs: votesReceived};
            broadcast(res); showOnlineFinalResults(peer.actualSpy, votesReceived);
        }
    }
    function showOnlineFinalResults(spyName, logs) {
        $('#vote-btns').hide(); $('#vote-title').hide();
        let logHtml = "<strong>نتائج التصويت:</strong><br>";
        logs.forEach(l => logHtml += `<div class="vote-log-item">${l}</div>`);
        $('#vote-log-container').html(logHtml);
        $('#final-result').html(`الجاسوس الحقيقي هو: <span style="color:yellow;">${spyName}</span>`);
    }
    function initChess() {
        let id = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
        let pC = new Peer(id);
        pC.on('open', (i) => { Chessboard('board', 'start'); });
    }
</script>
</body>
</html>
