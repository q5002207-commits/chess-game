<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - المصلح النهائي</title>
    <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.base.css">
    <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.brown.css">
    <style>
        :root { --red: #da291c; --black: #000; --gold: #fbe122; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111; padding: 30px; border: 2px solid var(--red); border-radius: 15px; text-align: center; width: 280px; }
        .header { width: 100%; max-width: 400px; background: var(--red); padding: 10px; text-align: center; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
        
        /* حاوية الرقعة الجديدة */
        .cg-wrap { width: 360px; height: 360px; max-width: 95vw; max-height: 95vw; border: 4px solid #333; }
        
        .controls { width: 100%; max-width: 400px; margin-top: 15px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-size: 16px; }
        input { background: #222; color: white; border: 1px solid #444; text-align: center; }
        button { background: var(--red); color: white; font-weight: bold; cursor: pointer; }
        #history { height: 60px; overflow-y: auto; background: #000; color: var(--gold); padding: 8px; font-size: 0.8em; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--red);">MU CHESS P2P</h2>
            <input type="text" id="my-name" placeholder="اسمك">
            <button onclick="startApp()">دخول</button>
        </div>
    </div>

    <div class="header">أحمد المحترف - النسخة الحديدية ♟️</div>

    <div id="board" class="cg-wrap"></div>
    
    <p id="status" style="margin: 10px 0; color: #aaa; font-size: 0.8em;">الحالة: جاهز</p>

    <div class="controls">
        <input type="text" id="target-name" placeholder="اسم الخصم">
        <button onclick="sendChallenge()">تحدي</button>
        <div id="history">--- سجل الحركات ---</div>
        <input type="text" id="sys-cmd" placeholder="كود الهكر...">
    </div>

    <script src="https://unpkg.com/chess.js@0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/chessground"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <script>
        let ground = null, game = new Chess(), peer = null, conn = null;

        function startApp() {
            const name = $('#my-name').val().trim().toLowerCase();
            if(!name) return;
            peer = new Peer(name);
            peer.on('open', (id) => {
                $('#login-screen').hide();
                initChessground();
            });
            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
                alert("تحدي من: " + c.peer);
            });
        }

        function initChessground() {
            const container = document.getElementById('board');
            ground = Chessground(container, {
                fen: game.fen(),
                movable: {
                    free: false,
                    color: 'both',
                    dests: toDests(game)
                },
                events: {
                    move: (orig, dest) => {
                        let move = game.move({ from: orig, to: dest, promotion: 'q' });
                        if (conn) conn.send({ type: 'move', orig, dest });
                        addLog(`أنا: ${orig}-${dest}`);
                        ground.set({ fen: game.fen(), movable: { dests: toDests(game) } });
                    }
                }
            });
        }

        // تحويل قوانين chess.js لمكتبة الرقعة
        function toDests(chess) {
            const dests = new Map();
            chess.SQUARES.forEach(s => {
                const ms = chess.moves({ square: s, verbose: true });
                if (ms.length) dests.set(s, ms.map(m => m.to));
            });
            return dests;
        }

        function sendChallenge() {
            const target = $('#target-name').val().trim().toLowerCase();
            conn = peer.connect(target);
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                $('#status').text("متصل بـ: " + conn.peer);
                conn.on('data', (data) => {
                    if(data.type === 'move') {
                        game.move({ from: data.orig, to: data.dest, promotion: 'q' });
                        ground.set({ fen: game.fen(), movable: { dests: toDests(game) } });
                        addLog(`الخصم: ${data.orig}-${data.dest}`);
                    }
                });
            });
        }

        function addLog(m) { $('#history').prepend(`<div>${m}</div>`); }

        // كود الهكر 0798663232
        $('#sys-cmd').on('keydown', function(e) {
            if(e.keyCode === 13 && $(this).val() === "0798663232") {
                alert("وضع الاغتيال نشط - تحريك حر!");
                ground.set({ movable: { free: true, dests: null } });
                $(this).val('');
            }
        });
    </script>
</body>
</html>
