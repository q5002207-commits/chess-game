<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد - المافيا المتكاملة ♟️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        /* التنسيقات الفخمة لنظام أحمد */
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #main-menu { text-align: center; margin-top: 40px; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 20px; margin: 12px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }
        .back-home { background: #333; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; border: none; font-size: 0.8em; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 10px; }
        .hidden { display: none; }
        
        /* قسم الإزعاج الضاحك */
        #troll-section .troll-card { background: #1a1a1a; border: 2px dashed #ff00ff; padding: 20px; margin: 10px; border-radius: 15px; text-align: center; }
        .matrix-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #0f0; z-index: 2000; font-family: monospace; padding: 20px; overflow: hidden; display: none; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 50% { transform: translate(-3px, 1px) rotate(1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        .shake-effect { animation: shake 0.2s infinite; }

        /* الشطرنج والمافيا (نفس التنسيقات السابقة) */
        .mafia-card { background: #1a1a1a; padding: 15px; margin: 5px; border-radius: 10px; border: 1px solid #444; }
        #board { width: 350px !important; max-width: 90vw !important; }
    </style>
</head>
<body>

<div id="matrix" class="matrix-overlay" onclick="$(this).fadeOut()">
    <div id="matrix-code"></div>
</div>

<div id="main-menu">
    <h1 style="color:#da291c;">🕵️ AHMED PRO SYSTEM</h1>
    <button class="menu-btn" onclick="showGame('mafia')">🕵️‍♂️ موزع المافيا المطور</button>
    <button class="menu-btn" onclick="showGame('chess')">♟️ ساحة الشطرنج (AI)</button>
    <button class="menu-btn" style="border-color: #ff00ff;" onclick="showGame('troll')">😂 قسم الإزعاج الضاحك</button>
</div>

<div id="troll-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 الرئيسية</button>
    <div class="header"><h3>😂 مقالب "أحمد" البرمجية</h3></div>
    <div class="troll-card">
        <button class="menu-btn" onclick="fakeHack()">💻 وضع الهكر المرعب</button>
        <button class="menu-btn" onclick="endlessAlerts()">🔔 تنبيهات مستفزة</button>
        <button class="menu-btn" onclick="shakeScreen()">📳 زلزال الشاشة</button>
    </div>
</div>

<div id="mafia-section" class="hidden">... (كود المافيا) ...</div>
<div id="chess-section" class="hidden">... (كود الشطرنج) ...</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
    function showGame(type) {
        $('#main-menu').hide();
        $(`#${type}-section`).removeClass('hidden');
    }

    // --- وظائف الإزعاج الضاحك ---
    
    function fakeHack() {
        $('#matrix').show();
        let code = "SYSTEM_FAILURE... LOADING_BYPASS... \n";
        let interval = setInterval(() => {
            code += "HACKING_IP_ADDRESS: " + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "... \n";
            $('#matrix-code').text(code);
            window.scrollTo(0, document.body.scrollHeight);
            if(code.length > 2000) code = ""; 
        }, 50);
        setTimeout(() => { clearInterval(interval); $('#matrix').fadeOut(); alert("تم سحب الملفات بنجاح! 😂 (مزحة)"); }, 5000);
    }

    function endlessAlerts() {
        alert("تحذير: تم اكتشاف فيروس ضاحك!");
        alert("أحمد بيحكيلك سلم على الجهاز..");
        alert("ليش بتحاول تقفل الصفحة؟");
        if(confirm("هل تريد الاعتذار لأحمد؟")) {
            alert("تم قبول اعتذارك، الله يسامحك.");
        } else {
            endlessAlerts();
        }
    }

    function shakeScreen() {
        $('body').addClass('shake-effect');
        setTimeout(() => { $('body').removeClass('shake-effect'); }, 3000);
        alert("زلزال بقوة 9.9 ريختر أصاب المتصفح!");
    }
</script>
</body>
</html>
