<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج 2 ضد 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background:#000; color:#0f0; font-family:Segoe UI; margin:0; padding:15px; }
        .container { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
        .game { background:#111; padding:15px; border:2px solid #0f0; border-radius:10px; text-align:center; }
        .panel { background:#111; padding:15px; border:2px solid #0f0; border-radius:10px; width:300px; }
        #board { width:460px; max-width:95vw; }
        button { padding:12px 20px; margin:8px; background:#da291c; color:white; border:none; border-radius:8px; cursor:pointer; }
        .hidden { display:none; }
        .status { background:#1a1a1a; padding:12px; margin:10px 0; border-radius:8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="game">
        <h2>♟️ شطرنج 2 ضد 2</h2>
        <div id="board"></div>

        <div id="lobby">
            <button id="hostBtn">إنشاء غرفة</button><br>
            <input id="codeInput" placeholder="كود الغرفة" style="width:200px;padding:10px;">
            <button id="joinBtn">دخول الغرفة</button>
        </div>

        <div id="gameUI" class="hidden">
            <div id="status" class="status">⏳ جاري الانتظار...</div>
            <div id="turnStatus" class="status">الدور: ...</div>
            <button id="startBtn" class="hidden" style="background:green;width:100%;">بدء المباراة</button>
        </div>
    </div>

    <div class="panel">
        <h4>الشات</h4>
        <div id="chat" style="height:300px;overflow-y:auto;background:#0a0a0a;padding:10px;margin-bottom:10px;"></div>
        <input id="chatInput" placeholder="رسالة..." style="width:100%;padding:8px;">
        <button id="sendBtn">إرسال</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
let peer, myId, myName, isHost = false;
let connections = {};
let players = [];
let game = new Chess();
let board;
let gameActive = false;
let myTeam = null;
let teamWhite = [], teamBlack = [];
let currentTurn = "white";
let expectedId = null;

// ==================== دوال أساسية ====================
function log(msg, error=false) {
    const color = error ? "red" : "#0f0";
    $("#status").html(`<span style="color:${color}">${msg}</span>`);
}

function addChat(name, msg) {
    $("#chat").append(`<div><b>${name}:</b> ${msg}</div>`);
    $("#chat").scrollTop($("#chat")[0].scrollHeight);
}

function broadcast(data) {
    Object.values(connections).forEach(c => c.open && c.send(data));
}

function canIPlay() {
    return gameActive && myId === expectedId;
}

function updateTurnUI() {
    if (!gameActive) {
        $("#turnStatus").html("المباراة لم تبدأ");
        return;
    }
    const team = currentTurn === "white" ? "🤍 الأبيض" : "🖤 الأسود";
    const player = (currentTurn==="white" ? teamWhite : teamBlack).find(p => p.id === expectedId);
    $("#turnStatus").html(`الدور: ${team}<br>يلعب الآن: ${player ? player.name : "؟"}`);
}

// ==================== Host ====================
$("#hostBtn").click(() => {
    const room = Math.floor(1000 + Math.random()*9000) + "";
    myId = "H" + room;
    myName = prompt("اسمك؟", "Host") || "Host";
    isHost = true;

    peer = new Peer("CH2V2_" + room);
    peer.on("open", () => {
        players = [{id: myId, name: myName}];
        $("#lobby").hide();
        $("#gameUI").removeClass("hidden");
        log(`✅ غرفة جاهزة! الكود: <b>${room}</b>`);

        peer.on("connection", conn => {
            connections[conn.peer] = conn;
            conn.on("data", data => handleData(data, conn));
        });
    });
});

// ==================== Join ====================
$("#joinBtn").click(() => {
    const code = $("#codeInput").val().trim();
    if (!code) return alert("أدخل الكود");

    myName = prompt("اسمك؟", "لاعب") || "Player";
    myId = "P" + Date.now();

    peer = new Peer();
    peer.on("open", () => {
        const conn = peer.connect("CH2V2_" + code);
        connections[code] = conn;

        conn.on("open", () => {
            conn.send({type:"name", name:myName});
            $("#lobby").hide();
            $("#gameUI").removeClass("hidden");
            log("جاري الاتصال...");
        });

        conn.on("data", handleData);
    });
});

function handleData(data, conn=null) {
    if (data.type === "name") {
        if (isHost) {
            players.push({id: conn.peer, name: data.name});
            log(`${data.name} انضم (${players.length}/4)`);
            broadcast({type:"playerlist", players});
            if (players.length === 4) $("#startBtn").removeClass("hidden");
        }
    }
    else if (data.type === "playerlist") {
        players = data.players;
    }
    else if (data.type === "start") {
        teamWhite = data.white;
        teamBlack = data.black;
        myTeam = teamWhite.some(p=>p.id===myId) ? "white" : "black";
        gameActive = true;
        currentTurn = "white";
        expectedId = data.expectedId;
        updateTurnUI();
        log("🎉 المباراة بدأت!");
    }
    else if (data.type === "move") {
        game.move({from:data.from, to:data.to, promotion:'q'});
        board.position(game.fen());
    }
    else if (data.type === "turn") {
        currentTurn = data.currentTurn;
        expectedId = data.expectedId;
        updateTurnUI();
    }
}

// ==================== بدء المباراة ====================
$("#startBtn").click(() => {
    if (!isHost || players.length !== 4) return;

    const shuffled = [...players].sort(() => Math.random()-0.5);
    teamWhite = [shuffled[0], shuffled[1]];
    teamBlack = [shuffled[2], shuffled[3]];

    myTeam = teamWhite.some(p => p.id === myId) ? "white" : "black";

    game = new Chess();
    gameActive = true;
    currentTurn = "white";
    expectedId = teamWhite[0].id;

    broadcast({
        type: "start",
        white: teamWhite,
        black: teamBlack,
        expectedId: expectedId
    });

    updateTurnUI();
    log("المباراة بدأت - الأبيض يلعب أولاً");
});

// ==================== الرقعة ====================
board = Chessboard('board', {
    draggable: false,
    position: 'start',
    pieceTheme: 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/kosal/{piece}.svg'
});

$("#board").on("click", ".square-55d63", function() {
    if (!canIPlay()) {
        log("⚠️ ليس دورك الآن!", true);
        return;
    }

    // هنا يمكنك إضافة منطق اختيار القطعة والنقل (مبسط حالياً)
    alert("دورك! (سيتم تطوير منطق النقل في النسخة القادمة)");
});

// شات
$("#sendBtn").click(() => {
    const text = $("#chatInput").val().trim();
    if (text) {
        broadcast({type:"chat", name:myName, msg:text});
        addChat(myName, text);
        $("#chatInput").val("");
    }
});
</script>
</body>
</html>
