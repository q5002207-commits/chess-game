<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - الألعاب المتكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* شاشة القائمة الرئيسية */
        #main-menu { text-align: center; margin-top: 50px; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 25px; margin: 20px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.5em; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px #da291c55; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }
        .back-btn { background: #333; color: #fff; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8em; margin-bottom: 10px; border: none; }

        /* ستايلات الشطرنج */
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 10px; color: white; }
        .clocks-container { display: flex; width: 100%; max-width: 400px; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
        .clock { flex: 1; background: #111; padding: 10px; border-radius: 8px; text-align: center; border: 2px solid #333; font-family: monospace; font-size: 1.4em; color: #fff; }
        .active-clock { border-color: #0f0; color: #0f0; box-shadow: 0 0 10px #0f05; }
        #board { width: 380px !important; max-width: 95vw !important; border: 4px solid #222; border-radius: 8px; }
        .highlight-sq { background: rgba(0, 255, 0, 0.3) !important; }
        .possible-move::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 15px; height: 15px; background: rgba(0, 255, 0, 0.4); border-radius: 50%; }
        .leaderboard-box { width: 100%; max-width: 400px; background: #111; margin-top: 15px; border-radius: 12px; border: 1px solid #0f0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #0f02; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        img[class^="piece"] { border-radius: 50% !important; border: 1px solid white !important; }

        /* ستايلات المافيا */
        .mafia-card { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; border-left: 5px solid #da291c; }
        .role-display { display: none; color: #0f0; font-weight: bold; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="color:#da291c; text-shadow: 0 0 10px #f00;">AHMED PRO SYSTEM</h1>
        <button class="menu-btn" onclick="switchSection('chess')">♟️ ساحة الشطرنج</button>
        <button class="menu-btn" onclick="switchSection('mafia')">🕵️ موزع المافيا</button>
        <p style="color:#555; font-size: 0.8em;">V 2.5 - Stable Edition</p>
    </div>

    <div id="chess-section" class="hidden">
        <button class="back-btn" onclick="location.reload()">⬅ العودة للقائمة</button>
        <div class="header">
            <h3 style="margin:0;">🏆 اسرائيل و اقطع 🏆</h3>
            <div id="my-id" style="font-size: 0.8em; color: #0f0;">جاري الاتصال...</div>
        </div>
        <div class="clocks-container">
            <div id="opp-clock" class="clock">10:00</div>
            <div id="my-clock" class="clock">10:00</div>
        </div>
        <div id="board"></div>
        <div class="leaderboard-box">
            <table>
                <tbody>
                    <tr style="color: #0f0;"><td>أنت</td><td id="my-elo-display">1200</td><td>ONLINE</td></tr>
                    <tr><td id="opp-name-display">الخصم</td><td id="opp-elo-display">1200</td><td id="opp-status">WAITING</td></tr>
                </tbody>
            </table>
        </div>
        <div style="width:100%; max-width:400px; margin-top:15px;">
            <input type="text" id="friendId" placeholder="أدخل ID الخصم">
            <button id="attack-btn" onclick="sendChallengeRequest()">إرسال طلب تحدي</button>
        </div>
    </div>

    <div id="mafia-section" class="hidden">
        <button class="back-btn" onclick="location.reload()">⬅ العودة للقائمة</button>
        <div class="header"><h3>🕵️‍♂️ موزع أدوار المافيا</h3></div>
        <div id="mafia-setup" style="width:100%; max-width:400px;">
            <input type="text" id="mafiaPlayerName" placeholder="اسم اللاعب...">
            <button onclick="addMafiaPlayer()">إضافة لاعب</button>
            <div id="mafia-list-preview" style="margin:10px; font-size:0.9em;"></div>
            <button style="background:green; margin-top:10px;" onclick="startMafiaDistribution()">توزيع الأدوار</button>
        </div>
        <div id="mafia-game-board" class="hidden" style="width:100%; max-width:400px;">
            <div id="players-cards-container"></div>
        </div>
    </div>

    <audio id="moveSound" src="https://images.chesscomfiles.com/chess-themes/sounds/_standard/default/move-self.mp3"></audio>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        // --- إدارة الأقسام ---
        function switchSection(section) {
            $('#main-menu').hide();
            if(section === 'chess') {
                $('#chess-section').removeClass('hidden');
                initChessPeer(); // تشغيل الشطرنج فقط عند طلبه
            } else {
                $('#mafia-section').removeClass('hidden');
            }
        }

        // --- كود الشطرنج (كودك اللي بعته) ---
        var board = null, game = new Chess(), peer = null, conn = null;
        var myColor = 'w', sourceSquare = null, gameStarted = false;
        var myTime = 600, oppTime = 600, timer = null;
        var myElo = parseInt(localStorage.getItem('p_elo')) || 1200;
        var myName = localStorage.getItem('p_name') || "أحمد";

        var pics = {
            wK: 'https://i.postimg.cc/m27HgYdg/king-black.jpg', wQ: 'https://i.postimg.cc/CxLfkvYW/813f791d-4209-474a-b3ae-32306e3d2632.jpg',
            wN: 'https://i.postimg.cc/d31K4Kx9/download.jpg', wB: 'https://i.postimg.cc/jjn9q4WQ/download.jpg',
            bP: 'https://i.postimg.cc/Nj9dgQFv/download.jpg', bK: 'https://i.postimg.cc/T19B8NZh/cbbe2978-b5df-45c8-ad43-05cfb6f57edb.jpg',
            bQ: 'https://i.postimg.cc/HsbtBvqn/ca232a37-372a-45be-b758-6e90cd5f70a1.jpg', bN: 'https://i.postimg.cc/DwFRgXMy/5f98a3d6-1c49-4903-a9c0-8a1b8a2de568.jpg',
            bB: 'https://i.postimg.cc/RVRx2dfm/download.jpg'
        };

        function initChessPeer() {
            updateUI();
            let id = "Ahmed_" + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(id);
            peer.on('open', (i) => { $('#my-id').text("ID: " + i); initBoard(); });
            peer.on('connection', (c) => { conn = c; setupConnListeners(); });
        }

        function initBoard() {
            board = Chessboard('board', {
                draggable: false, position: 'start',
                pieceTheme: (p) => pics[p] || 'https://chessboardjs.com/img/chesspieces/wikipedia/' + p + '.png'
            });
            $(document).on('click touchstart', '.square-55d63', function(e) {
                e.preventDefault();
                handleAction($(this).attr('data-square'));
            });
        }

        function handleAction(sq) {
            if (!gameStarted || game.turn() !== myColor) return;
            if (sourceSquare === null) {
                let p = game.get(sq);
                if (p && p.color === myColor) { sourceSquare = sq; highlight(sq); }
            } else {
                let move = game.move({ from: sourceSquare, to: sq, promotion: 'q' });
                if (move) {
                    board.position(game.fen());
                    document.getElementById("moveSound").play();
                    conn.send({ type: 'move', move: move, time: myTime });
                    if (game.in_checkmate()) finalizeGame("WIN");
                    sourceSquare = null;
                    $('.square-55d63').removeClass('highlight-sq possible-move');
                } else {
                    let p = game.get(sq);
                    if (p && p.color === myColor) { sourceSquare = sq; highlight(sq); }
                    else { sourceSquare = null; $('.square-55d63').removeClass('highlight-sq possible-move'); }
                }
            }
        }

        function highlight(sq) {
            $('.square-55d63').removeClass('highlight-sq possible-move');
            $('.square-' + sq).addClass('highlight-sq');
            game.moves({ square: sq, verbose: true }).forEach(m => { $('.square-' + m.to).addClass('possible-move'); });
        }

        function setupConnListeners() {
            conn.on('data', (data) => {
                if (data.type === 'ask_challenge') {
                    if (confirm(`تحدي من ${data.name}?`)) {
                        conn.send({ type: 'accept_challenge', name: myName, elo: myElo });
                        startGame();
                    }
                }
                if (data.type === 'accept_challenge') startGame();
                if (data.type === 'move') {
                    game.move(data.move);
                    board.position(game.fen());
                    document.getElementById("moveSound").play();
                    if (game.in_checkmate()) finalizeGame("LOSE");
                }
            });
        }

        function sendChallengeRequest() {
            let fId = $('#friendId').val();
            if(!fId) return;
            conn = peer.connect(fId);
            myColor = 'b'; board.orientation('black');
            setupConnListeners();
            conn.on('open', () => conn.send({ type: 'ask_challenge', name: myName, elo: myElo }));
        }

        function startGame() { gameStarted = true; updateUI(); }
        function updateUI() { $('#my-elo-display').text(myElo); localStorage.setItem('p_elo', myElo); }

        // --- كود المافيا ---
        let mafiaPlayers = [];
        function addMafiaPlayer() {
            let name = $('#mafiaPlayerName').val();
            if(name) { mafiaPlayers.push(name); $('#mafia-list-preview').text("الموجودين: " + mafiaPlayers.join(", ")); $('#mafiaPlayerName').val(""); }
        }

        function startMafiaDistribution() {
            if(mafiaPlayers.length < 3) return alert("العبوا 3 على الأقل!");
            let roles = [];
            let mCount = Math.max(1, Math.floor(mafiaPlayers.length / 3));
            for(let i=0; i<mCount; i++) roles.push("مافيا 💀");
            roles.push("دكتور 💉");
            while(roles.length < mafiaPlayers.length) roles.push("مواطن 👨‍🌾");
            roles.sort(() => Math.random() - 0.5);

            $('#mafia-setup').hide();
            $('#mafia-game-board').removeClass('hidden');
            let container = $('#players-cards-container');
            container.empty();

            mafiaPlayers.forEach((p, i) => {
                let card = $(`<div class="mafia-card"><strong>${p}</strong><div class="role-display" id="mrole-${i}">${roles[i]}</div></div>`);
                card.click(function() {
                    $(`#mrole-${i}`).fadeIn();
                    setTimeout(() => $(`#mrole-${i}`).fadeOut(), 3000);
                });
                container.append(card);
            });
        }
    </script>
</body>
</html>
