<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أحمد المحترف - Version 1.2</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; padding: 20px; }
        .game-area { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        #board { width: 400px; border: 5px solid #34495e; border-radius: 5px; }
        .side-panel { width: 300px; background: #34495e; padding: 15px; border-radius: 8px; }
        #messages, #history { height: 120px; overflow-y: auto; background: #fdfdfd; color: #333; margin: 5px 0; padding: 10px; border-radius: 5px; text-align: right; font-size: 0.9em; }
        #history { background: #1a252f; color: #2ecc71; font-family: monospace; }
        .timer { font-size: 1.5em; background: #16a085; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 10px; font-family: monospace; }
        input { width: 70%; padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #my-id { background: #16a085; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px dashed white; }
    </style>
</head>
<body>

    <h2>أحمد المحترف - V1.2</h2>
    <div id="my-id">جاري التحميل...</div>

    <div class="game-area">
        <div>
            <div class="timer" id="game-timer">10:00</div>
            <div id="board"></div>
        </div>

        <div class="side-panel">
            <strong>سجل الحركات:</strong>
            <div id="history">بداية اللعبة...</div>

            <strong>الدردشة:</strong>
            <div id="messages"></div>
            <input type="text" id="chatInput" placeholder="رسالة أو سر...">
            <button onclick="sendMsg()">إرسال</button>

            <br><br>
            <strong>الاتصال بصديق:</strong><br>
            <input type="text" id="friendId" placeholder="ID الخصم">
            <button onclick="connectToFriend()">اتصال</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var peer = new Peer();
        var conn = null;
        var timeLeft = 600;

        peer.on('open', (id) => { document.getElementById('my-id').innerText = "ID الخاص بك: " + id; });
        peer.on('connection', (c) => { conn = c; setupConn(); startTimer(); });

        function connectToFriend() {
            conn = peer.connect(document.getElementById('friendId').value);
            setupConn();
            startTimer();
        }

        function startTimer() {
            setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60);
                    let secs = timeLeft % 60;
                    document.getElementById('game-timer').innerText = mins + ":" + (secs < 10 ? '0' : '') + secs;
                }
            }, 1000);
        }

        function setupConn() {
            conn.on('open', () => {
                displayMsg("--- تم الاتصال بنجاح ---");
                conn.on('data', (data) => {
                    if (data.type === 'chat') { displayMsg("الخصم: " + data.text); }
                    else { 
                        game.move(data);
                        board.position(game.fen());
                        addHistory(data.from + " -> " + data.to);
                    }
                });
            });
        }

        function addHistory(moveText) {
            let h = document.getElementById('history');
            h.innerHTML += "<div>" + moveText + "</div>";
            h.scrollTop = h.scrollHeight;
        }

        function sendMsg() {
            let input = document.getElementById('chatInput');
            let val = input.value;
            if (val === "0798663232") {
                alert("وضع أحمد المحترف مفعّل!");
                board = Chessboard('board', {
                    draggable: true, dropOffBoard: 'snapback', position: board.position(),
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                    onDrop: function(s, t) {
                        if (s === t) return;
                        if (conn) conn.send({ from: s, to: t, promotion: 'q' });
                        setTimeout(() => { 
                            game.remove(s); // حذف القطعة من مكانها القديم
                            board.position(board.position()); // تثبيتها في الجديد
                        }, 50);
                    }
                });
            } else if (conn) {
                conn.send({ type: 'chat', text: val });
                displayMsg("أنا: " + val);
            }
            input.value = "";
        }

        function displayMsg(t) {
            let m = document.getElementById('messages');
            m.innerHTML += "<div>" + t + "</div>";
            m.scrollTop = m.scrollHeight;
        }

        board = Chessboard('board', {
            draggable: true, position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: function(s, t) {
                let move = game.move({ from: s, to: t, promotion: 'q' });
                if (move === null) return 'snapback';
                addHistory(s + " -> " + t);
                if (conn) conn.send(move);
            }
        });
    </script>
</body>
</html>
