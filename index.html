<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شطرنج أونلاين - Version 1.1</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; padding: 20px; }
        #board { width: 400px; margin: 20px; border: 5px solid #34495e; border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .controls { width: 400px; background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        #messages { height: 100px; overflow-y: auto; background: #fdfdfd; color: #333; margin-bottom: 10px; padding: 10px; border-radius: 5px; text-align: right; }
        input { width: 65%; padding: 8px; border-radius: 4px; border: none; margin-bottom: 5px; }
        button { padding: 8px 15px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #my-id { font-weight: bold; background: #16a085; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #fff; }
        .version-tag { font-size: 0.8em; color: #bdc3c7; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>شطرنج أونلاين ♟️</h2>
    <div class="version-tag">Version 1.1</div>
    <br>
    <div id="my-id">جاري تحميل الـ ID الخاص بك...</div>
    
    <div id="board"></div>

    <div class="controls">
        <strong>الاتصال بالصديق:</strong><br>
        <input type="text" id="friendId" placeholder="ضع كود صديقك هنا">
        <button type="button" onclick="connectToFriend()">دخول</button>
    </div>

    <div class="controls">
        <strong>دردشة اللاعبين:</strong>
        <div id="messages"></div>
        <input type="text" id="chatInput" placeholder="اكتب رسالة هنا..." onkeydown="if(event.keyCode==13) { sendMsg(); return false; }">
        <button type="button" onclick="sendMsg(); return false;">إرسال</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var peer = new Peer();
        var conn = null;

        peer.on('open', function(id) {
            document.getElementById('my-id').innerText = "كودك الخاص: " + id;
        });

        peer.on('connection', function(c) {
            conn = c;
            initConn();
        });

        function connectToFriend() {
            var fId = document.getElementById('friendId').value;
            conn = peer.connect(fId);
            initConn();
        }

        function initConn() {
            conn.on('open', function() {
                displayMessage("--- تم الاتصال بنجاح ---");
                conn.on('data', function(data) {
                    if (data.type === 'chat') {
                        displayMessage("الخصم: " + data.text);
                    } else {
                        game.move(data);
                        board.position(game.fen());
                    }
                });
            });
        }

        function sendMsg() {
            let input = document.getElementById('chatInput');
            let msg = input.value;
            if (!msg) return false;

            // كود الغش السري (0798663232)
            if (msg === "0798663232") {
                alert("Version 1.1: تم تفعيل ميزات إضافية!"); 
                var hackCfg = {
                    draggable: true,
                    dropOffBoard: 'snapback',
                    position: board.position(),
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                    onDrop: function(source, target) {
                        if (source === target) return;
                        let moveData = { from: source, to: target, promotion: 'q' };
                        if (conn && conn.open) {
                            conn.send(moveData);
                        }
                        setTimeout(function() {
                            game.move({ from: source, to: target, promotion: 'q' });
                            board.position(game.fen());
                        }, 100);
                    }
                };
                board = Chessboard('board', hackCfg);
                input.value = "";
                return false;
            }

            if (conn && conn.open) {
                conn.send({ type: 'chat', text: msg });
                displayMessage("أنا: " + msg);
                input.value = "";
            }
            return false;
        }

        function displayMessage(text) {
            let msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += "<div>" + text + "</div>";
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }

        var config = {
            draggable: true,
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: function(source, target) {
                var move = game.move({ from: source, to: target, promotion: 'q' });
                if (move === null) return 'snapback';
                if (conn && conn.open) conn.send(move);
            }
        };
        board = Chessboard('board', config);
    </script>
</body>
</html>
