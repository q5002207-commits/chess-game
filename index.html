<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مونوبولي عمان - العب مع أصدقائك (Peer to Peer)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
            min-height: 100vh;
            padding: 15px;
            color: #ffd700;
        }

        .main-menu {
            text-align: center;
            max-width: 500px;
            margin: 50px auto;
            background: rgba(0,0,0,0.8);
            border-radius: 30px;
            padding: 30px;
            border: 3px solid #ffd700;
        }

        .main-menu h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #ffd700;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
        }

        .menu-btn:hover {
            transform: scale(1.02);
        }

        .game-container {
            max-width: 100%;
            margin: 0 auto;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #ffd700;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .back-btn {
            background: #da291c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .turn-indicator {
            background: #ffd700;
            color: #1a1a2e;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .online-status {
            background: #4caf50;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
        }

        .board {
            background: #0a2e1a;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        .amman-board {
            background: #f5e6ca;
            border-radius: 20px;
            padding: 15px;
            min-width: 750px;
        }

        .board-row {
            display: flex;
            gap: 4px;
            margin: 4px 0;
            justify-content: center;
        }

        .corner-cell {
            background: linear-gradient(135deg, #daa520, #b8860b);
            border-radius: 15px;
            padding: 12px 5px;
            text-align: center;
            font-weight: bold;
            color: #1a1a2e;
            min-width: 110px;
        }

        .side-cell {
            background: white;
            border-radius: 10px;
            padding: 10px 3px;
            text-align: center;
            font-size: 0.7em;
            font-weight: bold;
            flex: 1;
            min-width: 70px;
            position: relative;
        }

        .owner-tag {
            font-size: 0.55em;
            background: rgba(0,0,0,0.85);
            color: white;
            border-radius: 12px;
            padding: 2px 5px;
            margin-top: 3px;
            display: inline-block;
        }

        .houses-display {
            font-size: 0.6em;
            margin-top: 3px;
            color: #8B4513;
        }

        .player-token-on-cell {
            display: inline-block;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
            line-height: 22px;
            text-align: center;
            margin: 0 1px;
            border: 1.5px solid white;
        }

        .info-panel {
            background: rgba(0,0,0,0.85);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid #ffd700;
        }

        .players-stats {
            margin-bottom: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .player-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-card.active {
            background: rgba(255,215,0,0.3);
            border: 2px solid #ffd700;
        }

        .player-money {
            color: #4caf50;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .controls button {
            flex: 1;
            padding: 10px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .dice {
            display: inline-block;
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            margin: 0 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2em;
            font-weight: bold;
            color: #333;
        }

        .connection-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }

        .connection-panel input {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            width: 200px;
            text-align: center;
        }

        .connection-panel button {
            background: #ffd700;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .room-code {
            font-size: 1.3em;
            background: #1a1a2e;
            padding: 10px;
            border-radius: 10px;
            margin: 10px;
            font-family: monospace;
        }

        .log-area {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 10px;
            height: 180px;
            overflow-y: auto;
            font-size: 0.8em;
            margin-top: 15px;
        }

        .log-entry {
            padding: 4px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            color: #ddd;
        }

        .log-entry.special {
            color: #ffd700;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            z-index: 1000;
            min-width: 280px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .side-cell { min-width: 55px; font-size: 0.6em; padding: 6px 2px; }
            .corner-cell { min-width: 80px; font-size: 0.7em; padding: 8px 3px; }
            .player-token-on-cell { width: 18px; height: 18px; font-size: 8px; line-height: 18px; }
        }
    </style>
</head>
<body>

<div id="mainMenu" class="main-menu">
    <h1>🏆 مونوبولي عمان أونلاين 🏆</h1>
    <h3>العب مع أصدقائك - اتصال مباشر</h3>
    <button class="menu-btn" onclick="showHostMenu()">🎮 إنشاء غرفة (Host)</button>
    <button class="menu-btn" onclick="showJoinMenu()">🚪 دخول إلى غرفة (Join)</button>
    <button class="menu-btn" onclick="showRules()">📖 قواعد اللعبة</button>
</div>

<div id="hostMenu" class="main-menu hidden">
    <button class="back-btn" onclick="backToMain()" style="margin-bottom:20px;">🔙 رجوع</button>
    <h2>🏠 إنشاء غرفة جديدة</h2>
    <input type="text" id="hostName" placeholder="اسمك" value="المالك">
    <button onclick="createRoom()" style="background:#4caf50;">✨ إنشاء غرفة</button>
    <div id="hostWaiting" class="hidden" style="margin-top:20px;">
        <div class="room-code" id="roomCodeDisplay"></div>
        <p>📋 أعط هذا الكود لصديقك للانضمام</p>
        <div id="waitingPlayers"></div>
        <button onclick="startGame()" id="startGameBtn" style="background:#ffd700;">🎮 بدء اللعبة</button>
    </div>
</div>

<div id="joinMenu" class="main-menu hidden">
    <button class="back-btn" onclick="backToMain()" style="margin-bottom:20px;">🔙 رجوع</button>
    <h2>🚪 دخول إلى غرفة</h2>
    <input type="text" id="joinCode" placeholder="أدخل كود الغرفة">
    <input type="text" id="joinName" placeholder="اسمك" value="زائر">
    <button onclick="joinRoom()" style="background:#2196F3;">🔗 انضمام</button>
    <div id="joinWaiting" class="hidden" style="margin-top:20px;">
        <p>⏳ جاري الاتصال... انتظر بدء اللعبة</p>
    </div>
</div>

<div id="gameArea" class="game-container hidden">
    <div class="game-header">
        <button class="back-btn" onclick="exitGame()">🏠 القائمة الرئيسية</button>
        <div class="turn-indicator" id="turnIndicator"></div>
        <div class="online-status" id="onlineStatus">🟢 متصل</div>
    </div>

    <div class="board">
        <div id="ammanBoard" class="amman-board"></div>
    </div>

    <div class="info-panel">
        <div class="controls">
            <button id="rollBtn" onclick="rollDice()" disabled>🎲 رمي النرد</button>
            <button id="endTurnBtn" onclick="endTurn()" disabled>⏭️ إنهاء الدور</button>
            <button onclick="showMyProperties()">🏠 عقاراتي</button>
            <button onclick="showBuildMenu()">🏗️ بناء/بيع</button>
        </div>

        <div class="players-stats" id="playersStats"></div>

        <div class="log-area" id="logArea">
            <div class="log-entry special">✨ مرحباً بك في مونوبولي عمان أونلاين! ✨</div>
        </div>
    </div>
</div>

<div id="purchaseModal" class="hidden">
    <div class="overlay"></div>
    <div class="modal">
        <h2>💰 شراء عقار</h2>
        <p id="purchaseText"></p>
        <button onclick="confirmPurchase(true)" style="background:#4caf50;">✅ شراء</button>
        <button onclick="confirmPurchase(false)" style="background:#f44336;">❌ تخطي</button>
    </div>
</div>

<div id="buildModal" class="hidden">
    <div class="overlay"></div>
    <div class="modal">
        <h2>🏗️ بناء وبيع</h2>
        <div id="buildList"></div>
        <button onclick="closeBuildModal()" style="background:#da291c;">إغلاق</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    // ===================== بيانات اللعبة =====================
    let peer = null;
    let connections = [];
    let myId = null;
    let isHostPlayer = false;
    let gameStarted = false;
    
    let players = [];
    let currentPlayer = 0;
    let gameActive = false;
    let diceRolledThisTurn = false;
    let doubleCount = 0;
    let waitingForPurchase = false;
    let currentPropertyIndex = -1;
    let myTurn = false;

    // أسماء مناطق عمان
    const ammanPlaces = [
        "🚀 الانطلاق", "شارع مكة", "❓ حظ", "شارع المدينة", "💸 ضريبة",
        "🚆 مجمع الشمال", "شارع زهران", "❓ حظ", "شارع الرينبو", "شارع السلام",
        "🏆 جائزة", "جبل الحسين", "⚡ كهرباء", "جبل اللويبدة", "جبل عمان",
        "🚆 مجمع الجيزة", "عبدون", "❓ حظ", "الشميساني", "الربوة",
        "🅿️ دوار الداخلية", "ضاحية الحسين", "❓ حظ", "خلدا", "تلاع العلي",
        "🚆 مجمع رغدان", "الغاردنز", "الصويفية", "💧 مياه عمان", "الدوار السابع",
        "🚔 سجن ماركا", "مرج الحمام", "ضاحية الرشيد", "❓ حظ", "مقابلين",
        "🚆 مجمع جنوب", "❓ حظ", "أم أذينة", "💸 ضريبة", "خلدا الجديدة"
    ];

    const ammanPrices = [
        0, 70, 0, 90, 0, 220, 110, 0, 130, 150, 0, 170, 160, 190, 210,
        220, 240, 0, 260, 280, 0, 300, 0, 320, 350, 220, 380, 410, 160, 430,
        0, 470, 500, 0, 540, 220, 0, 600, 0, 650
    ];

    const ammanRents = [
        0, 6, 0, 8, 200, 30, 10, 0, 12, 14, 200, 16, 10, 18, 20,
        30, 24, 0, 26, 28, 0, 30, 0, 32, 35, 30, 38, 45, 10, 50,
        0, 55, 60, 0, 65, 30, 0, 70, 150, 80
    ];

    const placeTypes = [];
    const placeColors = [];
    
    for(let i = 0; i < 40; i++) {
        if(i === 0) placeTypes[i] = "start";
        else if(i === 2 || i === 7 || i === 17 || i === 22 || i === 33 || i === 36) placeTypes[i] = "chance";
        else if(i === 4 || i === 38) placeTypes[i] = "tax";
        else if(i === 10) placeTypes[i] = "reward";
        else if(i === 20) placeTypes[i] = "free";
        else if(i === 30) placeTypes[i] = "goToJail";
        else if(i === 5 || i === 15 || i === 25 || i === 35) placeTypes[i] = "railroad";
        else if(i === 12 || i === 28) placeTypes[i] = "utility";
        else placeTypes[i] = "property";
        
        if(i === 1 || i === 3) placeColors[i] = "#8B4513";
        else if(i === 6 || i === 8 || i === 9) placeColors[i] = "#87CEEB";
        else if(i === 11 || i === 13 || i === 14) placeColors[i] = "#FF69B4";
        else if(i === 16 || i === 18 || i === 19) placeColors[i] = "#FF4500";
        else if(i === 21 || i === 23 || i === 24) placeColors[i] = "#9370DB";
        else if(i === 26 || i === 27 || i === 29) placeColors[i] = "#2E8B57";
        else if(i === 31 || i === 32 || i === 34) placeColors[i] = "#1E90FF";
        else if(i === 37 || i === 39) placeColors[i] = "#8B008B";
        else if(i === 5 || i === 15 || i === 25 || i === 35) placeColors[i] = "#808080";
        else if(i === 12 || i === 28) placeColors[i] = "#FFA500";
        else placeColors[i] = "#D2B48C";
    }

    let properties = [];
    for(let i = 0; i < 40; i++) {
        properties.push({
            id: i, name: ammanPlaces[i], type: placeTypes[i],
            price: ammanPrices[i], rent: ammanRents[i],
            houseCount: 0, owner: -1, color: placeColors[i]
        });
    }

    const playerColors = ['#FF4444', '#44FF44', '#4444FF', '#FFFF44', '#FF44FF', '#44FFFF', '#FF8844', '#88FF44'];
    const playerShapes = ['🔴', '🟢', '🔵', '🟡', '🟣', '🩵', '🟠', '🟤'];

    // دوال مساعدة
    function calculateRent(property) {
        if(property.type === 'railroad') {
            let count = properties.filter(p => p.type === 'railroad' && p.owner === property.owner).length;
            return [30, 60, 120, 240][count - 1] || 30;
        }
        if(property.type === 'utility') {
            let count = properties.filter(p => p.type === 'utility' && p.owner === property.owner).length;
            return property.rent * (count === 2 ? 10 : 4);
        }
        if(property.type === 'property') {
            if(property.houseCount === 0) return property.rent;
            if(property.houseCount === 1) return property.rent * 5;
            if(property.houseCount === 2) return property.rent * 15;
            if(property.houseCount === 3) return property.rent * 45;
            if(property.houseCount === 4) return property.rent * 80;
            if(property.houseCount === 5) return property.rent * 160;
        }
        return property.rent;
    }

    function sendToAll(data) {
        connections.forEach(conn => {
            if(conn.open) conn.send(data);
        });
    }

    function sendToHost(data) {
        if(connections[0] && connections[0].open) connections[0].send(data);
    }

    function updateGameState(state) {
        players = state.players;
        properties = state.properties;
        currentPlayer = state.currentPlayer;
        gameActive = state.gameActive;
        if(!waitingForPurchase) {
            renderBoard();
            updateUI();
        }
    }

    function renderBoard() {
        const board = document.getElementById('ammanBoard');
        if(!board) return;
        board.innerHTML = '';
        
        let topRow = '<div class="board-row">';
        for(let i = 21; i <= 29; i++) topRow += renderCell(i);
        topRow += renderCell(30) + '</div>';
        
        let middleRow = '<div class="board-row">';
        middleRow += renderCell(20);
        for(let i = 19; i >= 11; i--) middleRow += renderCell(i);
        middleRow += renderCell(10) + '</div>';
        
        let bottomRow = '<div class="board-row">';
        bottomRow += renderCell(0);
        for(let i = 1; i <= 9; i++) bottomRow += renderCell(i);
        bottomRow += renderCell(10) + '</div>';
        
        board.innerHTML = topRow + middleRow + bottomRow;
    }
    
    function renderCell(position) {
        const prop = properties[position];
        const owner = prop.owner !== -1 && players[prop.owner] ? players[prop.owner] : null;
        
        let tokens = '';
        players.forEach((player, idx) => {
            if(player.isActive && player.position === position) {
                tokens += `<span class="player-token-on-cell" style="background:${player.color};">${idx+1}</span>`;
            }
        });
        
        let className = (position === 0 || position === 10 || position === 20 || position === 30) ? 'corner-cell' : 'side-cell';
        let bgStyle = className === 'corner-cell' ? '' : `background:${prop.color};`;
        
        let ownerHtml = '';
        if(owner) ownerHtml = `<div class="owner-tag" style="background:${owner.color};">${owner.name}</div>`;
        
        let housesHtml = '';
        if(prop.type === 'property' && prop.houseCount > 0) {
            housesHtml = `<div class="houses-display">${prop.houseCount === 5 ? '🏨 فندق' : '🏠'.repeat(prop.houseCount)}</div>`;
        }
        
        return `
            <div class="${className}" style="${bgStyle}">
                <div style="font-size:0.7em; font-weight:bold;">${prop.name}</div>
                ${prop.price > 0 ? `<div style="font-size:0.6em;">💰${prop.price}</div>` : ''}
                ${ownerHtml}
                ${housesHtml}
                <div style="margin-top: 4px;">${tokens}</div>
            </div>
        `;
    }

    function updateUI() {
        const statsDiv = document.getElementById('playersStats');
        if(!statsDiv) return;
        statsDiv.innerHTML = '';
        
        players.forEach((player, idx) => {
            const playerCard = document.createElement('div');
            playerCard.className = `player-card ${idx === currentPlayer && gameActive ? 'active' : ''}`;
            playerCard.innerHTML = `
                <div>
                    <div style="color:${player.color}">${playerShapes[idx]} ${player.name}</div>
                    <div style="font-size:0.7em;">🏠 ${player.properties.length}</div>
                </div>
                <div class="player-money">💰 ${player.money}</div>
            `;
            statsDiv.appendChild(playerCard);
        });
        
        document.getElementById('turnIndicator').innerHTML = `🎮 دور: ${players[currentPlayer]?.name || '...'}`;
        
        const rollBtn = document.getElementById('rollBtn');
        const endTurnBtn = document.getElementById('endTurnBtn');
        
        if(gameActive && myTurn && players[currentPlayer]?.id === myId) {
            rollBtn.disabled = diceRolledThisTurn;
            endTurnBtn.disabled = !diceRolledThisTurn;
        } else {
            rollBtn.disabled = true;
            endTurnBtn.disabled = true;
        }
    }

    function addLog(message, isSpecial = false) {
        const logArea = document.getElementById('logArea');
        if(!logArea) return;
        const logEntry = document.createElement('div');
        logEntry.className = `log-entry ${isSpecial ? 'special' : ''}`;
        logEntry.textContent = message;
        logArea.appendChild(logEntry);
        logArea.scrollTop = logArea.scrollHeight;
    }

    // ===================== إنشاء غرفة =====================
    function showHostMenu() {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('hostMenu').classList.remove('hidden');
    }

    function showJoinMenu() {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('joinMenu').classList.remove('hidden');
    }

    function backToMain() {
        document.getElementById('hostMenu').classList.add('hidden');
        document.getElementById('joinMenu').classList.add('hidden');
        document.getElementById('mainMenu').classList.remove('hidden');
        if(peer) peer.destroy();
    }

    function createRoom() {
        const playerName = document.getElementById('hostName').value.trim() || "المالك";
        
        peer = new Peer();
        
        peer.on('open', (id) => {
            myId = id;
            isHostPlayer = true;
            
            document.getElementById('roomCodeDisplay').innerHTML = `🔑 كود الغرفة: <strong>${id}</strong>`;
            document.getElementById('hostWaiting').classList.remove('hidden');
            
            // إضافة نفسك كلاعب
            players = [{
                id: myId,
                name: playerName,
                money: 1500,
                position: 0,
                properties: [],
                color: playerColors[0],
                isActive: true
            }];
            updateWaitingPlayers();
        });
        
        peer.on('connection', (conn) => {
            connections.push(conn);
            
            conn.on('data', (data) => {
                handleGameData(data, conn);
            });
            
            conn.on('open', () => {
                // إرسال حالة اللعبة الحالية للاعب الجديد
                conn.send({
                    type: 'init',
                    players: players,
                    properties: properties,
                    myId: conn.peer
                });
            });
        });
    }

    function joinRoom() {
        const roomCode = document.getElementById('joinCode').value.trim();
        const playerName = document.getElementById('joinName').value.trim() || "زائر";
        
        if(!roomCode) {
            alert("أدخل كود الغرفة!");
            return;
        }
        
        peer = new Peer();
        
        peer.on('open', (id) => {
            myId = id;
            isHostPlayer = false;
            
            document.getElementById('joinWaiting').classList.remove('hidden');
            
            const conn = peer.connect(roomCode);
            connections.push(conn);
            
            conn.on('open', () => {
                conn.send({
                    type: 'join',
                    player: { id: myId, name: playerName, color: '' }
                });
            });
            
            conn.on('data', (data) => {
                handleGameData(data, conn);
            });
        });
    }

    function handleGameData(data, conn) {
        switch(data.type) {
            case 'init':
                players = data.players;
                properties = data.properties;
                players.push({ id: myId, name: "اللاعب الجديد", money: 1500, position: 0, properties: [], isActive: true, color: playerColors[players.length] });
                sendToHost({ type: 'player-joined', player: players[players.length-1] });
                renderBoard();
                updateUI();
                break;
                
            case 'player-joined':
                players.push(data.player);
                updateWaitingPlayers();
                break;
                
            case 'game-start':
                gameStarted = true;
                gameActive = true;
                currentPlayer = 0;
                players = data.players;
                properties = data.properties;
                document.getElementById('hostWaiting').classList.add('hidden');
                document.getElementById('joinWaiting').classList.add('hidden');
                document.getElementById('hostMenu').classList.add('hidden');
                document.getElementById('joinMenu').classList.add('hidden');
                document.getElementById('gameArea').classList.remove('hidden');
                myTurn = players[currentPlayer]?.id === myId;
                renderBoard();
                updateUI();
                addLog(`🎉 بدأت اللعبة!`, true);
                break;
                
            case 'game-state':
                players = data.players;
                properties = data.properties;
                currentPlayer = data.currentPlayer;
                diceRolledThisTurn = data.diceRolledThisTurn;
                gameActive = data.gameActive;
                myTurn = players[currentPlayer]?.id === myId;
                renderBoard();
                updateUI();
                if(data.message) addLog(data.message, true);
                break;
                
            case 'dice-result':
                addLog(`🎲 ${data.playerName} رمى: ${data.dice1} + ${data.dice2} = ${data.steps}`);
                break;
                
            case 'purchase-request':
                currentPropertyIndex = data.propertyId;
                showPurchaseModal(properties[currentPropertyIndex].name, properties[currentPropertyIndex].price);
                break;
        }
    }

    function updateWaitingPlayers() {
        const div = document.getElementById('waitingPlayers');
        if(div) {
            div.innerHTML = '<h4>👥 اللاعبين:</h4>';
            players.forEach(p => {
                div.innerHTML += `<div style="margin:5px; padding:5px; background:rgba(255,255,255,0.1); border-radius:5px;">${p.name} ${p.id === myId ? '(أنت)' : ''}</div>`;
            });
        }
    }

    function startGame() {
        if(isHostPlayer && players.length >= 2) {
            sendToAll({ type: 'game-start', players: players, properties: properties });
            gameStarted = true;
            gameActive = true;
            currentPlayer = 0;
            document.getElementById('hostWaiting').classList.add('hidden');
            document.getElementById('hostMenu').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            myTurn = players[currentPlayer]?.id === myId;
            renderBoard();
            updateUI();
            addLog(`🎉 بدأت اللعبة!`, true);
        } else {
            alert("يجب أن يكون هناك على الأقل لاعبين لبدء اللعبة!");
        }
    }

    // ===================== حركات اللعبة =====================
    function rollDice() {
        if(!gameActive || !myTurn || diceRolledThisTurn) return;
        
        const dice1 = Math.floor(Math.random() * 6) + 1;
        const dice2 = Math.floor(Math.random() * 6) + 1;
        const steps = dice1 + dice2;
        
        sendToAll({ type: 'dice-result', playerName: players.find(p => p.id === myId)?.name, dice1, dice2, steps });
        
        // تحديث الموقع
        const player = players.find(p => p.id === myId);
        const newPos = (player.position + steps) % 40;
        player.position = newPos;
        
        diceRolledThisTurn = true;
        sendGameState();
        renderBoard();
    }

    function endTurn() {
        if(!gameActive || !myTurn || !diceRolledThisTurn) return;
        
        currentPlayer = (currentPlayer + 1) % players.length;
        diceRolledThisTurn = false;
        doubleCount = 0;
        myTurn = players[currentPlayer]?.id === myId;
        
        sendGameState();
        addLog(`🔄 دور ${players[currentPlayer]?.name} يبدأ الآن`, true);
    }

    function confirmPurchase(buy) {
        if(buy) {
            const player = players.find(p => p.id === myId);
            const prop = properties[currentPropertyIndex];
            if(player.money >= prop.price) {
                player.money -= prop.price;
                prop.owner = players.findIndex(p => p.id === myId);
                player.properties.push(currentPropertyIndex);
                addLog(`🏠 ${player.name} اشترى ${prop.name} بـ ${prop.price} دينار!`, true);
            }
        }
        document.getElementById('purchaseModal').classList.add('hidden');
        waitingForPurchase = false;
        sendGameState();
    }

    function showPurchaseModal(propertyName, price) {
        waitingForPurchase = true;
        document.getElementById('purchaseText').innerHTML = `شراء ${propertyName}؟<br>السعر: ${price} دينار`;
        document.getElementById('purchaseModal').classList.remove('hidden');
    }

    function showMyProperties() {
        const player = players.find(p => p.id === myId);
        if(!player) return;
        alert(player.properties.map(pid => {
            const prop = properties[pid];
            return `${prop.name} - ${prop.houseCount === 5 ? '🏨 فندق' : prop.houseCount > 0 ? `🏠${'🏠'.repeat(prop.houseCount-1)}` : 'لا بيوت'}`;
        }).join('\n') || 'لا تمتلك عقارات بعد');
    }

    function showBuildMenu() {
        alert("🏗️ نظام البناء:\n\nاشتري جميع عقارات نفس اللون، ثم ابنِ بيوت وفنادق لزيادة الإيجار!");
    }

    function closeBuildModal() {
        document.getElementById('buildModal').classList.add('hidden');
    }

    function sendGameState() {
        const state = {
            type: 'game-state',
            players: players,
            properties: properties,
            currentPlayer: currentPlayer,
            diceRolledThisTurn: diceRolledThisTurn,
            gameActive: gameActive
        };
        sendToAll(state);
    }

    function exitGame() {
        if(peer) peer.destroy();
        location.reload();
    }

    function showRules() {
        alert("🎲 قواعد مونوبولي عمان:\n\n" +
              "💰 كل لاعب يبدأ بـ 1500 دينار\n" +
              "🎲 رمي النرد لتحريك القطعة\n" +
              "🏠 شراء العقارات غير المملوكة\n" +
              "🏗️ امتلك جميع عقارات نفس اللون لبناء البيوت\n" +
              "💸 الإيجار يزيد مع كل بيت وفندق\n" +
              "🏆 آخر لاعب لم يفلس هو الفائز");
    }
</script>
</body>
