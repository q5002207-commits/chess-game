<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة أحمد المحترف - النسخة الصافية</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 10px; }
        .header { color: #da291c; font-size: 24px; margin-bottom: 10px; }
        
        /* شطرنج مبسط وقوي */
        #chess-board { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            width: 360px; height: 360px; 
            margin: 20px auto; 
            border: 4px solid #444; 
        }
        .square { 
            width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 30px; cursor: pointer; 
        }
        .white-sq { background: #eee; color: #000; }
        .black-sq { background: #888; color: #000; }
        .selected { background: #da291c !important; }
        
        .menu-btn { 
            background: #da291c; color: #fff; border: none; 
            padding: 15px 30px; border-radius: 10px; 
            font-weight: bold; cursor: pointer; margin: 10px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1 class="header">AHMED PRO SYSTEM</h1>

    <div id="main-menu">
        <button class="menu-btn" onclick="openChess()">♟️ ابدأ الشطرنج (صور ثابتة)</button>
        <p style="color: #666;">نسخة أحمد: صور الإيموجي مستحيل تختفي</p>
    </div>

    <div id="chess-section" class="hidden">
        <button onclick="location.reload()" style="background:#333; color:white; border:none; padding:5px 15px; cursor:pointer;">🏠 القائمة الرئيسية</button>
        <h3 id="status">دور اللاعب: الأبيض</h3>
        <div id="chess-board"></div>
        <p>اضغط على القطعة ثم على المربع الذي تريد الانتقال إليه</p>
    </div>

    <script>
        const boardElement = document.getElementById('chess-board');
        const statusElement = document.getElementById('status');
        let selectedSquare = null;
        let turn = 'white';

        // قطع الشطرنج (رموز نصية لا تحتاج لروابط صور)
        const pieces = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        const initialBoard = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        function openChess() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('chess-section').classList.remove('hidden');
            createBoard();
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 === 0 ? 'white-sq' : 'black-sq'}`;
                    square.dataset.row = r;
                    square.dataset.col = c;
                    square.innerText = pieces[initialBoard[r][c]] || '';
                    square.onclick = () => handleSquareClick(r, c, square);
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c, el) {
            if (selectedSquare) {
                // تنفيذ الحركة
                const prevR = selectedSquare.row;
                const prevC = selectedSquare.col;
                const piece = initialBoard[prevR][prevC];

                initialBoard[r][c] = piece;
                initialBoard[prevR][prevC] = '';
                
                selectedSquare = null;
                turn = (turn === 'white' ? 'black' : 'white');
                statusElement.innerText = `دور اللاعب: ${turn === 'white' ? 'الأبيض' : 'الأسود'}`;
                createBoard();
            } else {
                // اختيار قطعة
                if (initialBoard[r][c] !== '') {
                    selectedSquare = { row: r, col: c };
                    el.classList.add('selected');
                }
            }
        }
    </script>
</body>
</html>
