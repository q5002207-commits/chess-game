<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - Pro Chess V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --red: #da291c; --black: #000; --gold: #fbe122; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111; padding: 30px; border-radius: 15px; border: 2px solid var(--red); text-align: center; width: 280px; }
        
        .header { width: 100%; max-width: 400px; background: var(--red); padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        
        #board { width: 100%; max-width: 380px; border: 3px solid #333; }
        
        .controls { width: 100%; max-width: 400px; margin-top: 15px; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-size: 16px; }
        input { background: #222; color: white; border: 1px solid #444; text-align: center; }
        button { background: var(--red); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #b31d14; }
        
        #history { height: 80px; overflow-y: auto; background: #000; color: var(--gold); padding: 8px; margin-top: 10px; border-radius: 5px; font-size: 0.8em; border: 1px solid #222; }
        .highlight-sq { background: rgba(251, 225, 34, 0.5) !important; box-shadow: inset 0 0 10px gold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--red);">MU CHESS</h2>
            <input type="text" id="my-name" placeholder="ادخل اسمك هنا">
            <button id="login-btn">دخول الآن</button>
            <p id="login-status" style="font-size: 0.7em; color: #888; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="header">أحمد المحترف - مسرح الأحلام 🏟️</div>

    <div id="board"></div>
    
    <p id="game-status" style="margin: 10px 0; font-size: 0.9em; color: #aaa;">سجل دخولك للبدء</p>

    <div class="controls">
        <input type="text" id="target-id" placeholder="اسم الخصم">
        <button id="connect-btn">تحدي الخصم</button>
        <div id="history">---</div>
        <input type="text" id="sys-msg" placeholder="رسالة أو كود...">
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        let board = null, game = new Chess(), peer = null, conn = null;
        let selectedSq = null;
        const pieceUrl = 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png';

        // وظيفة تسجيل الدخول المصلحة
        $('#login-btn').on('click touchstart', function() {
            const name = $('#my-name').val().trim();
            if(!name) return alert("اكتب اسمك أولاً!");

            $('#login-status').text("جاري الاتصال بالسيرفر...");
            
            // استخدام سيرفر افتراضي لضمان العمل
            peer = new Peer(name);

            peer.on('open', (id) => {
                $('#login-screen').hide();
                $('#game-status').text("متصل باسم: " + id);
                initBoard();
            });

            peer.on('error', (err) => {
                $('#login-status').text("خطأ: " + err.type);
                console.error(err);
                if(err.type === 'unavailable-id') alert("الاسم محجوز، اختر اسم ثاني");
            });

            peer.on('connection', (c) => {
                conn = c;
                setupData();
                alert("وصلك تحدي من: " + c.peer);
            });
        });

        function initBoard() {
            board = Chessboard('board', {
                position: 'start',
                pieceTheme: pieceUrl,
                draggable: false
            });

            // تحكم بالنقر للموبايل واللابتوب
            $(document).on('mousedown touchstart', '.square-55d6', function(e) {
                const sq = $(this).attr('data-square');
                handleMove(sq);
            });

            $(window).resize(board.resize);
            setTimeout(board.resize, 200);
        }

        function handleMove(sq) {
            $('.square-55d6').removeClass('highlight-sq');

            if (selectedSq === null) {
                if (game.get(sq)) {
                    selectedSq = sq;
                    $('.square-' + sq).addClass('highlight-sq');
                }
            } else {
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                if (move) {
                    board.position(game.fen());
                    if(conn) conn.send({ type: 'move', move: move });
                    $('#history').prepend(`<div>أنا: ${selectedSq}-${sq}</div>`);
                    selectedSq = null;
                } else {
                    if (game.get(sq)) {
                        selectedSq = sq;
                        $('.square-' + sq).addClass('highlight-sq');
                    } else {
                        selectedSq = null;
                    }
                }
            }
        }

        $('#connect-btn').on('click touchstart', function() {
            const tid = $('#target-id').val().trim();
            if(!tid) return;
            conn = peer.connect(tid);
            setupData();
        });

        function setupData() {
            conn.on('open', () => {
                $('#game-status').text("في مباراة ضد: " + conn.peer);
                conn.on('data', (d) => {
                    if(d.type === 'move') {
                        game.move(d.move);
                        board.position(game.fen());
                        $('#history').prepend(`<div>الخصم: ${d.move.from}-${d.move.to}</div>`);
                    }
                });
            });
        }

        // كود الهكر 0798663232
        $('#sys-msg').on('keydown', function(e) {
            if(e.keyCode === 13 && $(this).val() === "0798663232") {
                alert("تم تفعيل وضع الاغتيال!");
                handleMove = function(sq) {
                    if(selectedSq === null) {
                        selectedSq = sq;
                        $('.square-' + sq).addClass('highlight-sq');
                    } else {
                        if(conn) conn.send({ type: 'move', move: { from: selectedSq, to: sq } });
                        game.remove(selectedSq);
                        board.position(board.position());
                        $('#history').prepend(`<div>هكر: ${selectedSq}-${sq}</div>`);
                        selectedSq = null;
                    }
                };
                $(this).val('');
            }
        });
    </script>
</body>
</html>
