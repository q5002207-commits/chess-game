<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أحمد المحترف - Version 1.2</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; padding: 20px; }
        .game-area { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        #board { width: 400px; border: 8px solid #34495e; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .side-panel { width: 300px; background: #34495e; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        #messages, #history { height: 120px; overflow-y: auto; background: #fdfdfd; color: #333; padding: 10px; border-radius: 5px; text-align: right; font-size: 0.9em; }
        #history { background: #1a252f; color: #2ecc71; font-family: monospace; border: 1px solid #16a085; }
        .timer { font-size: 1.5em; background: #16a085; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 10px; font-family: monospace; border: 2px solid #fff; }
        input { width: 100%; padding: 10px; border-radius: 4px; border: none; box-sizing: border-box; margin-bottom: 5px; }
        button { width: 100%; padding: 10px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2ecc71; }
        #my-id { background: #16a085; padding: 12px; border-radius: 5px; margin-bottom: 15px; border: 2px dashed white; font-size: 0.9em; text-align: center; width: 400px; }
    </style>
</head>
<body>

    <h2>أحمد المحترف ♟️</h2>
    <div style="font-size: 0.8em; color: #bdc3c7; margin-bottom: 10px;">Version 1.2</div>
    
    <div id="my-id">جاري تحميل المعرف الخاص بك...</div>

    <div class="game-area">
        <div>
            <div class="timer" id="game-timer">10:00</div>
            <div id="board"></div>
        </div>

        <div class="side-panel">
            <strong>سجل الحركات:</strong>
            <div id="history">انتظار الحركات...</div>

            <strong>الدردشة:</strong>
            <div id="messages"></div>
            <input type="text" id="chatInput" placeholder="اكتب رسالة..." onkeydown="if(event.keyCode==13) { sendMsg(); return false; }">
            <button type="button" onclick="sendMsg()">إرسال</button>

            <hr style="width:100%; border: 0.5px solid #555;">
            
            <strong>الاتصال بالخصم:</strong>
            <input type="text" id="friendId" placeholder="ضع ID الصديق">
            <button type="button" onclick="connectToFriend()">دخول اللعبة</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var peer = new Peer();
        var conn = null;
        var timeLeft = 600;
        var timerStarted = false;

        peer.on('open', (id) => { document.getElementById('my-id').innerText = "ID الخاص بك: " + id; });
        peer.on('connection', (c) => { conn = c; setupConn(); startTimer(); });

        function connectToFriend() {
            let fId = document.getElementById('friendId').value;
            if(fId) {
                conn = peer.connect(fId);
                setupConn();
                startTimer();
            }
        }

        function startTimer() {
            if(timerStarted) return;
            timerStarted = true;
            setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60);
                    let secs = timeLeft % 60;
                    document.getElementById('game-timer').innerText = mins + ":" + (secs < 10 ? '0' : '') + secs;
                }
            }, 1000);
        }

        function setupConn() {
            conn.on('open', () => {
                displayMsg("--- متصل مع الخصم ---");
                conn.on('data', (data) => {
                    if (data.type === 'chat') { displayMsg("الخصم: " + data.text); }
                    else { 
                        game.move(data);
                        board.position(game.fen());
                        addHistory(data.from + " -> " + data.to);
                    }
                });
            });
        }

        function addHistory(moveText) {
            let h = document.getElementById('history');
            if(h.innerText.includes("انتظار")) h.innerHTML = "";
            h.innerHTML += "<div>" + moveText + "</div>";
            h.scrollTop = h.scrollHeight;
        }

        function sendMsg() {
            let input = document.getElementById('chatInput');
            let val = input.value;
            if(!val) return;

            if (val === "0798663232") {
                alert("أحمد المحترف: ميزات إضافية نشطة!");
                board = Chessboard('board', {
                    draggable: true, dropOffBoard: 'snapback', position: board.position(),
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                    onDrop: function(s, t) {
                        if (s === t) return;
                        if (conn) conn.send({ from: s, to: t, promotion: 'q' });
                        setTimeout(() => { 
                            game.remove(s); 
                            board.position(board.position()); 
                        }, 50);
                    }
                });
            } else if (conn) {
                conn.send({ type: 'chat', text: val });
                displayMsg("أنا: " + val);
            }
            input.value = "";
        }

        function displayMsg(t) {
            let m = document.getElementById('messages');
            m.innerHTML += "<div>" + t + "</div>";
            m.scrollTop = m.scrollHeight;
        }

        board = Chessboard('board', {
            draggable: true, position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: function(s, t) {
                let move = game.move({ from: s, to: t, promotion: 'q' });
                if (move === null) return 'snapback';
                addHistory(s + " -> " + t);
                if (conn) conn.send(move);
            }
        });
    </script>
</body>
</html>
