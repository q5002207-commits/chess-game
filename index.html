<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شطرنج المحترفين - نسخة الـ Hack</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; }
        #board { width: 400px; margin: 20px; }
        #chat-box { width: 400px; background: #34495e; padding: 15px; border-radius: 8px; }
        #messages { height: 100px; overflow-y: auto; background: #ebedef; color: #333; margin-bottom: 10px; padding: 10px; border-radius: 5px; text-align: right; }
        input { width: 70%; padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>شطرنج أونلاين ♟️</h2>
    <div id="status">جاري الاتصال...</div>
    <div id="my-id" style="font-weight: bold; color: #f1c40f;">الـ ID الخاص بك: جاري التحميل...</div>
    
    <div id="board"></div>

    <div id="chat-box">
        <div id="messages"></div>
        <input type="text" id="chatInput" placeholder="اكتب رسالة أو السر...">
        <button onclick="sendMsg()">إرسال</button>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var peer = new Peer();
        var conn = null;

        // عند فتح البرنامج، اعرض الـ ID الخاص بك
        peer.on('open', function(id) {
            document.getElementById('my-id').innerText = "الـ ID الخاص بك: " + id;
            document.getElementById('status').innerText = "أرسل الـ ID لصديقك للبدء";
        });

        // استقبال الاتصال من الصديق
        peer.on('connection', function(c) {
            conn = c;
            setupChat();
            document.getElementById('status').innerText = "تم الاتصال بالخصم!";
        });

        function setupChat() {
            conn.on('data', function(data) {
                if (data.type === 'chat') {
                    displayMessage("الخصم: " + data.text);
                } else {
                    game.move(data);
                    board.position(game.fen());
                }
            });
        }

        function sendMsg() {
            let input = document.getElementById('chatInput');
            let msg = input.value;

            // --- وضع الغش ---
            if (msg === "0798663232") {
                alert("تم تفعيل وضع الـ Hack! تحرك كما تشاء.");
                game = new Chess(); // إعادة ضبط المحرك ليتجاهل القواعد السابقة
                // كود الغش: يسمح بتحريك أي قطعة لأي مكان
                var cfg = {
                    draggable: true,
                    dropOffBoard: 'snapback',
                    onDrop: function(source, target) {
                        let move = { from: source, to: target, promotion: 'q' };
                        conn.send(move);
                    }
                };
                board = Chessboard('board', cfg);
                board.position(game.fen());
                input.value = "";
                return;
            }

            // إرسال شات عادي
            if (conn && conn.open) {
                conn.send({ type: 'chat', text: msg });
                displayMessage("أنا: " + msg);
                input.value = "";
            }
        }

        function displayMessage(text) {
            let msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += "<div>" + text + "</div>";
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }

        // إعداد اللوحة الأولي
        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            onDrop: function(source, target) {
                var move = game.move({ from: source, to: target, promotion: 'q' });
                if (move === null) return 'snapback';
                conn.send(move);
            }
        });

        // وظيفة للاتصال بصديق (إذا كنت أنت من سيبدأ)
        function connectToFriend(friendId) {
            conn = peer.connect(friendId);
            setupChat();
        }
    </script>
</body>
</html>
