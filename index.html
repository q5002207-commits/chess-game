<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - النسخة الشاملة</title>
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.8s; }
        .welcome-title { color: #da291c; font-size: 2.2em; font-weight: bold; text-shadow: 0 0 20px #da291c; animation: pulse 1.5s infinite; }
        
        #main-menu { text-align: center; margin-top: 40px; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 20px; margin: 10px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }
        
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 10px; font-weight: bold; }
        .mafia-card { background: #1a1a1a; padding: 25px; margin: 10px 0; border-radius: 10px; border: 2px solid #444; text-align: center; cursor: pointer; width: 100%; }
        .role-display { display: none; color: #00ff00; font-size: 1.3em; font-weight: bold; }
        .locked { opacity: 0.1 !important; pointer-events: none; }
        .hidden { display: none !important; }
        
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #da291c; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-title">AHMED PRO SYSTEM</div>
        <div class="welcome-sub">LOADING CATEGORIES: CARS, TECH, FOOD... [OK]</div>
    </div>

    <div id="main-content" class="hidden">
        <div id="main-menu">
            <h1 style="color:#da291c; text-shadow: 0 0 10px #da291c;">AHMED PRO SYSTEM</h1>
            <button class="menu-btn" onclick="showGame('chess')">♟️ ساحة الشطرنج</button>
            <button class="menu-btn" onclick="showGame('mafia')">🕵️ موزع المافيا</button>
            <button class="menu-btn" onclick="showGame('spy')" style="border-color: #00ff00; color: #00ff00;">🔍 الجاسوس (نسخة كل شيء)</button>
        </div>

        <div id="spy-section" class="hidden">
            <button onclick="location.reload()" style="background:#333; margin-bottom:10px;">🏠 خروج</button>
            <div class="header">الجاسوس: تحدي المحترفين 🏎️🖥️🍲</div>
            <div id="spy-setup">
                <input type="text" id="spyPlayerName" placeholder="اسم اللاعب">
                <button onclick="addSpyPlayer()">إضافة لاعب +</button>
                <div id="spy-player-list" style="margin:15px; color:#0f0;"></div>
                <button style="background:green;" onclick="startSpyGame()">ابدأ اللعبة</button>
            </div>
            <div id="spy-display" class="hidden">
                <div id="spy-cards-container" style="width:350px;"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        $(document).ready(function() {
            setTimeout(function() { $('#welcome-screen').fadeOut(500, () => $('#main-content').removeClass('hidden')); }, 1500);
        });

        function showGame(g) {
            $('#main-menu').addClass('hidden');
            if(g === 'spy') $('#spy-section').removeClass('hidden');
        }

        let spyPlayers = [];
        let dataList = [
            // سيارات
            "تويوتا لاند كروزر", "مرسيدس G-Class", "بي ام دبليو M5", "تسلا", "فراري", "نيسان باترول", "دودج تشارجر", "لمبورغيني",
            // تقنية وهاردوير
            "كيبورد ميكانيكال", "كارت شاشة RTX", "معالج i9", "بلايستيشن 5", "نظارة VR", "آيفون 15", "ساعة آبل", "ماوس قيمنق",
            // كرتون قديم
            "توم وجيري", "سبيستون", "كابتن ماجد", "كونان", "باباي", "بوكيمون", "ون بيس", "دراغون بول",
            // طبايخ
            "منسف بالجميد", "شاورما دجاج", "مقلوبة فلسطينية", "بيتزا ايطالية", "برجر دبل شيز", "ورق عنب", "سوشي",
            // ماركات
            "نايك (Nike)", "اديداس", "رولكس", "غوتشي", "شانيل", "بوما",
            // أماكن
            "برج خليفة", "سور الصين العظيم", "مكة المكرمة", "البتراء", "برج إيفل", "نيويورك"
        ];

        function addSpyPlayer() {
            let p = $('#spyPlayerName').val();
            if(p) { spyPlayers.push(p); $('#spy-player-list').append(p + " | "); $('#spyPlayerName').val(""); }
        }

        function startSpyGame() {
            if(spyPlayers.length < 3) return alert("3 لاعبين على الأقل!");
            let selectedItem = dataList[Math.floor(Math.random() * dataList.length)];
            let spyIdx = Math.floor(Math.random() * spyPlayers.length);
            
            $('#spy-setup').hide(); $('#spy-display').removeClass('hidden');
            $('#spy-cards-container').empty();
            
            spyPlayers.forEach((p, i) => {
                let isSpy = (i === spyIdx);
                let card = $(`<div class="mafia-card"><strong>${p}</strong><div class="role-display">${isSpy ? "🕵️ أنت الجاسوس!" : "🏷️ السر: " + selectedItem}</div></div>`);
                
                card.click(function() {
                    if($(this).hasClass('locked')) return;
                    $(this).find('strong').hide(); $(this).find('.role-display').show();
                    $(this).css({ 'background': '#000', 'border-color': '#00ff00' });
                    $('.mafia-card').not(this).addClass('locked');
                    setTimeout(() => {
                        $(this).fadeOut(500, function() { $(this).css('visibility', 'hidden').show(); $('.mafia-card').removeClass('locked'); });
                    }, 3000);
                });
                $('#spy-cards-container').append(card);
            });
        }
    </script>
</body>
</html>
