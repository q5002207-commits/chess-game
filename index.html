<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مونوبولي أحمد - لعبة العقارات المتكاملة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
            min-height: 100vh;
            padding: 15px;
            color: #ffd700;
        }

        /* القائمة الرئيسية */
        .main-menu {
            text-align: center;
            max-width: 500px;
            margin: 50px auto;
            background: rgba(0,0,0,0.8);
            border-radius: 30px;
            padding: 30px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .main-menu h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .main-menu h3 {
            color: #ccc;
            margin-bottom: 30px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            border: none;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .menu-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        /* شاشة اللعبة */
        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ffd700;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .back-btn {
            background: #da291c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }

        .turn-indicator {
            background: #ffd700;
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: bold;
        }

        /* لوحة اللعب */
        .board {
            background: #f5e6ca;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
            overflow-x: auto;
        }

        .board-grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 800px;
        }

        .board-row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .cell {
            background: white;
            border: 2px solid #333;
            border-radius: 8px;
            text-align: center;
            padding: 15px 5px;
            font-size: 0.75em;
            font-weight: bold;
            position: relative;
            min-width: 80px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .cell:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .cell-owner {
            font-size: 0.7em;
            margin-top: 5px;
            padding: 2px;
            border-radius: 5px;
        }

        .player-token {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            margin: 0 2px;
        }

        /* لوحة المعلومات الجانبية */
        .info-panel {
            background: rgba(0,0,0,0.8);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid #ffd700;
        }

        .players-stats {
            margin-bottom: 20px;
        }

        .player-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .player-card.active {
            background: rgba(255,215,0,0.3);
            border: 2px solid #ffd700;
            transform: scale(1.02);
        }

        .player-name {
            font-weight: bold;
            font-size: 1.1em;
        }

        .player-money {
            color: #4caf50;
            font-weight: bold;
            font-size: 1.2em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .controls button {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1em;
        }

        .controls button:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
        }

        .controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .dice-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .dice {
            display: inline-block;
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 15px;
            margin: 0 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: bold;
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: roll 0.3s ease-in-out;
        }

        @keyframes roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .purchase-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .purchase-modal button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }

        .log-area {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-size: 0.85em;
            margin-top: 15px;
        }

        .log-entry {
            padding: 5px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            color: #ddd;
        }

        .log-entry.special {
            color: #ffd700;
        }

        .properties-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .property-item {
            background: rgba(255,255,255,0.1);
            margin: 5px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .cell {
                min-width: 60px;
                font-size: 0.6em;
                padding: 10px 3px;
            }
            .player-token {
                width: 18px;
                height: 18px;
                font-size: 8px;
                bottom: -12px;
            }
            .controls button {
                font-size: 0.85em;
                padding: 8px;
            }
        }
    </style>
</head>
<body>

<div id="mainMenu" class="main-menu">
    <h1>🏆 مونوبولي أحمد 🏆</h1>
    <h3>لعبة العقارات المتكاملة</h3>
    <button class="menu-btn" onclick="startGameSetup()">🎮 بدء لعبة جديدة</button>
    <button class="menu-btn" onclick="showRules()">📖 قواعد اللعبة</button>
</div>

<div id="gameArea" class="game-container hidden">
    <div class="game-header">
        <button class="back-btn" onclick="backToMenu()">🏠 القائمة الرئيسية</button>
        <div class="turn-indicator" id="turnIndicator"></div>
    </div>

    <div class="board">
        <div class="board-grid" id="boardGrid"></div>
    </div>

    <div class="info-panel">
        <div class="controls">
            <button id="rollBtn" onclick="rollDice()">🎲 رمي النرد</button>
            <button id="endTurnBtn" onclick="endTurn()" disabled>⏭️ إنهاء الدور</button>
            <button onclick="showMyProperties()">🏠 عقاراتي</button>
            <button onclick="showTradeMenu()">🔄 تجارة</button>
        </div>

        <div class="dice-area" id="diceArea" style="display: none;">
            <div class="dice" id="dice1">⚀</div>
            <div class="dice" id="dice2">⚀</div>
        </div>

        <div class="players-stats" id="playersStats"></div>

        <div class="log-area" id="logArea">
            <div class="log-entry special">✨ مرحباً بك في مونوبولي أحمد! ✨</div>
        </div>
    </div>
</div>

<div id="purchaseModal" class="hidden">
    <div class="overlay"></div>
    <div class="purchase-modal">
        <h2>💰 شراء عقار</h2>
        <p id="purchaseText"></p>
        <button onclick="confirmPurchase(true)" style="background: #4caf50; color: white;">✅ شراء</button>
        <button onclick="confirmPurchase(false)" style="background: #f44336; color: white;">❌ تخطي</button>
    </div>
</div>

<div id="propertiesModal" class="hidden">
    <div class="overlay"></div>
    <div class="purchase-modal" style="width: 90%; max-width: 500px;">
        <h2>🏠 عقاراتي</h2>
        <div id="propertiesList" class="properties-list"></div>
        <button onclick="closePropertiesModal()" style="background: #ffd700; color: #1a1a2e;">إغلاق</button>
    </div>
</div>

    // ===================== بيانات اللعبة =====================
    let players = [];
    let currentPlayer = 0;
    let gameActive = false;
    let diceRolledThisTurn = false;
    let doubleCount = 0;
    let waitingForPurchase = false;
    let currentPropertyIndex = -1;

    // العقارات (40 خانة كاملة)
    const properties = [

        { id: 7, name: "❓ صندوق الحظ", type: "chance", price: 0, rent: 0, owner: -1, color: "#D2B48C" },
        { id: 8, name: "الشارع الرابع", type: "property", price: 120, rent: 10, rent1: 50, rent2: 120, rent3: 360, rent4: 500, houseCount: 0, owner: -1, color: "#87CEEB" },
        { id: 9, name: "الشارع الخامس", type: "property", price: 140, rent: 12, rent1: 60, rent2: 150, rent3: 450, rent4: 600, houseCount: 0, owner: -1, color: "#87CEEB" },
        { id: 10, name: "🏆 جائزة", type: "reward", price: 0, rent: 200, owner: -1, color: "#FFD700" },
        { id: 11, name: "الشارع السادس", type: "property", price: 160, rent: 14, rent1: 70, rent2: 180, rent3: 500, rent4: 700, houseCount: 0, owner: -1, color: "#FF69B4" },
        { id: 12, name: "🔌 شركة كهرباء", type: "utility", price: 150, rent: 8, owner: -1, color: "#FFA500" },
        { id: 13, name: "الشارع السابع", type: "property", price: 180, rent: 16, rent1: 80, rent2: 220, rent3: 600, rent4: 800, houseCount: 0, owner: -1, color: "#FF69B4" },
        { id: 14, name: "الشارع الثامن", type: "property", price: 200, rent: 18, rent1: 90, rent2: 250, rent3: 700, rent4: 900, houseCount: 0, owner: -1, color: "#FF69B4" },
        { id: 15, name: "🚆 محطة القطار", type: "railroad", price: 200, rent: 25, owner: -1, color: "#808080" },
        { id: 16, name: "الشارع التاسع", type: "property", price: 220, rent: 20, rent1: 100, rent2: 300, rent3: 750, rent4: 950, houseCount: 0, owner: -1, color: "#FF4500" },
        { id: 17, name: "❓ صندوق الحظ", type: "chance", price: 0, rent: 0, owner: -1, color: "#D2B48C" },
        { id: 18, name: "الشارع العاشر", type: "property", price: 240, rent: 22, rent1: 110, rent2: 330, rent3: 800, rent4: 1000, houseCount: 0, owner: -1, color: "#FF4500" },
        { id: 19, name: "الشارع الحادي عشر", type: "property", price: 260, rent: 24, rent1: 120, rent2: 360, rent3: 850, rent4: 1050, houseCount: 0, owner: -1, color: "#FF4500" },
        { id: 20, name: "🅿️ موقف سيارات", type: "free", price: 0, rent: 0, owner: -1, color: "#90EE90" },
        { id: 21, name: "الشارع الثاني عشر", type: "property", price: 280, rent: 26, rent1: 130, rent2: 390, rent3: 900, rent4: 1100, houseCount: 0, owner: -1, color: "#9370DB" },
        { id: 22, name: "❓ صندوق الحظ", type: "chance", price: 0, rent: 0, owner: -1, color: "#D2B48C" },
        { id: 23, name: "الشارع الثالث عشر", type: "property", price: 300, rent: 28, rent1: 140, rent2: 420, rent3: 950, rent4: 1150, houseCount: 0, owner: -1, color: "#9370DB" },
        { id: 24, name: "الشارع الرابع عشر", type: "property", price: 320, rent: 30, rent1: 150, rent2: 450, rent3: 1000, rent4: 1200, houseCount: 0, owner: -1, color: "#9370DB" },
        { id: 25, name: "🚆 محطة القطار", type: "railroad", price: 200, rent: 25, owner: -1, color: "#808080" },
        { id: 26, name: "الشارع الخامس عشر", type: "property", price: 350, rent: 35, rent1: 175, rent2: 500, rent3: 1100, rent4: 1300, houseCount: 0, owner: -1, color: "#2E8B57" },
        { id: 27, name: "الشارع السادس عشر", type: "property", price: 380, rent: 40, rent1: 200, rent2: 550, rent3: 1200, rent4: 1400, houseCount: 0, owner: -1, color: "#2E8B57" },
        { id: 28, name: "🔌 شركة مياه", type: "utility", price: 150, rent: 8, owner: -1, color: "#4169E1" },
        { id: 29, name: "الشارع السابع عشر", type: "property", price: 400, rent: 50, rent1: 250, rent2: 600, rent3: 1300, rent4: 1500, houseCount: 0, owner: -1, color: "#2E8B57" },
        { id: 30, name: "🚔 اذهب إلى السجن", type: "goToJail", price: 0, rent: 0, owner: -1, color: "#FF0000" },
        { id: 31, name: "الشارع الثامن عشر", type: "property", price: 450, rent: 55, rent1: 275, rent2: 650, rent3: 1400, rent4: 1600, houseCount: 0, owner: -1, color: "#1E90FF" },
        { id: 32, name: "الشارع التاسع عشر", type: "property", price: 500, rent: 60, rent1: 300, rent2: 700, rent3: 1500, rent4: 1700, houseCount: 0, owner: -1, color: "#1E90FF" },
        { id: 33, name: "❓ صندوق الحظ", type: "chance", price: 0, rent: 0, owner: -1, color: "#D2B48C" },
        { id: 34, name: "الشارع العشرون", type: "property", price: 550, rent: 65, rent1: 325, rent2: 750, rent3: 1600, rent4: 1800, houseCount: 0, owner: -1, color: "#1E90FF" },
        { id: 35, name: "🚆 محطة القطار", type: "railroad", price: 200, rent: 25, owner: -1, color: "#808080" },
        { id: 36, name: "❓ صندوق الحظ", type: "chance", price: 0, rent: 0, owner: -1, color: "#D2B48C" },
        { id: 37, name: "الشارع الحادي والعشرون", type: "property", price: 600, rent: 70, rent1: 350, rent2: 800, rent3: 1700, rent4: 1900, houseCount: 0, owner: -1, color: "#8B008B" },
        { id: 38, name: "💸 ضريبة الرفاهية", type: "tax", price: 0, rent: 100, owner: -1, color: "#FF6347" },
        { id: 39, name: "الشارع الثاني والعشرون", type: "property", price: 700, rent: 100, rent1: 400, rent2: 900, rent3: 1800, rent4: 2000, houseCount: 0, owner: -1, color: "#8B008B" }
    ];

    // ألوان اللاعبين
    const playerColors = ['#FF4444', '#44FF44', '#4444FF', '#FFFF44', '#FF44FF', '#44FFFF', '#FF8844', '#88FF44'];

    // ===================== بدء اللعبة =====================
    function startGameSetup() {
        let numPlayers = prompt("كم عدد اللاعبين؟ (2-8)", "4");
        numPlayers = Math.min(8, Math.max(2, parseInt(numPlayers) || 4));
        
        players = [];
        for(let i = 0; i < numPlayers; i++) {
            let name = prompt(`اسم اللاعب ${i+1}:`, `لاعب ${i+1}`);
            players.push({
                id: i,
                name: name || `لاعب ${i+1}`,
                money: 1500,
                position: 0,
                properties: [],
                color: playerColors[i % playerColors.length],
                inJail: false,
                jailTurns: 0,
                isActive: true
            });
        }
        
        currentPlayer = 0;
        gameActive = true;
        diceRolledThisTurn = false;
        doubleCount = 0;
        waitingForPurchase = false;
        
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        
        renderBoard();
        updateUI();
        addLog(`🎉 بدأت اللعبة! ${players.length} لاعبين.`);
        addLog(`💰 ${players[0].name} يبدأ اللعب!`, true);
    }

    function backToMenu() {
        if(confirm("هل تريد العودة للقائمة الرئيسية؟ سيتم فقدان التقدم.")) {
            location.reload();
        }
    }

    function showRules() {
        alert("📖 قواعد لعبة المونوبولي:\n\n" +
              "1️⃣ كل لاعب يبدأ بـ 1500 دينار\n" +
              "2️⃣ رمي النرد لتحريك القطعة\n" +
              "3️⃣ إذا وقفت على عقار غير مملوك - يمكنك شراؤه\n" +
              "4️⃣ إذا وقفت على عقار مملوك - تدفع الإيجار للمالك\n" +
              "5️⃣ مرورك من نقطة البداية يمنحك 200 دينار\n" +
              "6️⃣ الفائز هو آخر لاعب لم يفلس");
    }

    // ===================== عرض اللوحة =====================
    function renderBoard() {
        const board = document.getElementById('boardGrid');
        board.innerHTML = '';
        
        // عرض العقارات في صفوف
        for(let i = 0; i < properties.length; i += 5) {
            const row = document.createElement('div');
            row.className = 'board-row';
            
            for(let j = 0; j < 5 && i + j < properties.length; j++) {
                const prop = properties[i + j];
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.background = prop.color;
                cell.style.backgroundImage = 'linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.1) 100%)';
                
                let ownerText = '';
                if(prop.owner !== -1 && players[prop.owner]) {
                    ownerText = `<div class="cell-owner" style="background:${players[prop.owner].color}">${players[prop.owner].name}</div>`;
                }
                
                cell.innerHTML = `
                    <div><strong>${prop.name}</strong></div>
                    ${prop.type === 'property' ? `<div style="font-size:0.7em;">💰 ${prop.price}</div>` : ''}
                    ${ownerText}
                `;
                
                // عرض رموز اللاعبين على العقار
                players.forEach((player, idx) => {
                    if(player.position === prop.id && player.isActive) {
                        const token = document.createElement('div');
                        token.className = 'player-token';
                        token.style.background = player.color;
                        token.style.left = `${10 + (idx * 15)}px`;
                        token.textContent = idx + 1;
                        cell.appendChild(token);
                    }
                });
                
                row.appendChild(cell);
            }
            board.appendChild(row);
        }
    }

    // ===================== تحديث واجهة المستخدم =====================
    function updateUI() {
        const statsDiv = document.getElementById('playersStats');
        statsDiv.innerHTML = '';
        
        players.forEach((player, idx) => {
            const playerCard = document.createElement('div');
            playerCard.className = `player-card ${idx === currentPlayer && gameActive ? 'active' : ''}`;
            playerCard.innerHTML = `
                <div>
                    <div class="player-name" style="color:${player.color}">${player.name}</div>
                    <div style="font-size:0.8em;">🏠 ${player.properties.length} عقار</div>
                </div>
                <div class="player-money">💰 ${player.money} دينار</div>
            `;
            statsDiv.appendChild(playerCard);
        });
        
        document.getElementById('turnIndicator').innerHTML = `🎮 دور: ${players[currentPlayer].name}`;
        
        const rollBtn = document.getElementById('rollBtn');
        const endTurnBtn = document.getElementById('endTurnBtn');
        
        if(gameActive && players[currentPlayer].isActive) {
            rollBtn.disabled = diceRolledThisTurn;
            endTurnBtn.disabled = !diceRolledThisTurn;
        } else {
            rollBtn.disabled = true;
            endTurnBtn.disabled = true;
        }
    }

    function addLog(message, isSpecial = false) {
        const logArea = document.getElementById('logArea');
        const logEntry = document.createElement('div');
        logEntry.className = `log-entry ${isSpecial ? 'special' : ''}`;
        logEntry.textContent = message;
        logArea.appendChild(logEntry);
        logArea.scrollTop = logArea.scrollHeight;
        
        // حذف الرسائل القديمة
        while(logArea.children.length > 50) {
            logArea.removeChild(logArea.firstChild);
        }
    }

    // ===================== رمي النرد =====================
    async function rollDice() {
        if(!gameActive || diceRolledThisTurn || waitingForPurchase) return;
        if(players[currentPlayer].inJail) {
            handleJailTurn();
            return;
        }
        
        // تأثير الحركة
        const diceArea = document.getElementById('diceArea');
        diceArea.style.display = 'block';
        
        // رمي النرد مع تأثير
        const dice1 = Math.floor(Math.random() * 6) + 1;
        const dice2 = Math.floor(Math.random() * 6) + 1;
        
        animateDice(dice1, dice2);
        
        await sleep(800);
        
        const isDouble = dice1 === dice2;
        const steps = dice1 + dice2;
        
        addLog(`🎲 ${players[currentPlayer].name} رمى: ${dice1} + ${dice2} = ${steps} ${isDouble ? '(مزدوج! 🎯)' : ''}`);
        
        if(isDouble) {
            doubleCount++;
            if(doubleCount === 3) {
                addLog(`🚔 ${players[currentPlayer].name} رمى مزدوج 3 مرات -> يذهب إلى السجن!`, true);
                goToJail(currentPlayer);
                diceRolledThisTurn = true;
                updateUI();
                return;
            }
        } else {
            doubleCount = 0;
        }
        
        // تحريك اللاعب
        await movePlayer(currentPlayer, steps);
        
        diceRolledThisTurn = true;
        
        // إذا كان مزدوجاً، يمكنه اللعب مرة أخرى
        if(isDouble && !players[currentPlayer].inJail) {
            addLog(`🎲 ${players[currentPlayer].name} حصل على مزدوج -> يلعب مرة أخرى!`, true);
            diceRolledThisTurn = false;
            document.getElementById('endTurnBtn').disabled = true;
        }
        
        updateUI();
        
        if(diceRolledThisTurn && !isDouble) {
            document.getElementById('endTurnBtn').disabled = false;
        }
    }

    function animateDice(value1, value2) {
        const dice1El = document.getElementById('dice1');
        const dice2El = document.getElementById('dice2');
        
        const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        dice1El.textContent = diceFaces[value1 - 1];
        dice2El.textContent = diceFaces[value2 - 1];
        
        dice1El.style.animation = 'none';
        dice2El.style.animation = 'none';
        setTimeout(() => {
            dice1El.style.animation = 'roll 0.3s ease-in-out';
            dice2El.style.animation = 'roll 0.3s ease-in-out';
        }, 10);
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function movePlayer(playerIdx, steps) {
        const player = players[playerIdx];
        const oldPosition = player.position;
        let newPosition = (oldPosition + steps) % properties.length;
        
        // مرور من نقطة البداية
        if(newPosition < oldPosition || oldPosition + steps >= properties.length) {
            player.money += 200;
            addLog(`💰 ${player.name} مر من نقطة البداية وحصل على 200 دينار!`, true);
        }
        
        player.position = newPosition;
        renderBoard();
        
        addLog(`🚶 ${player.name} انتقل من ${properties[oldPosition].name} إلى ${properties[newPosition].name}`);
        
        await sleep(500);
        
        // معالجة الخانة
        await handleCell(playerIdx);
    }

    async function handleCell(playerIdx) {
        const player = players[playerIdx];
        const cell = properties[player.position];
        
        addLog(`📍 وقف ${player.name} على: ${cell.name}`);
        
        switch(cell.type) {
            case 'property':
                if(cell.owner === -1) {
                    // عقار غير مملوك - عرض شراء
                    currentPropertyIndex = player.position;
                    showPurchaseModal(cell.name, cell.price);
                } else if(cell.owner !== player.id) {
                    // دفع الإيجار
                    let rent = calculateRent(cell);
                    const owner = players[cell.owner];
                    if(owner && owner.isActive) {
                        const canPay = player.money >= rent;
                        if(canPay) {
                            player.money -= rent;
                            owner.money += rent;
                            addLog(`💰 ${player.name} دفع ${rent} دينار إيجار لـ ${owner.name}`);
                            checkBankruptcy(playerIdx);
                        } else {
                            addLog(`💀 ${player.name} ليس لديه مال كافٍ لدفع ${rent} دينار!`, true);
                            handleBankruptcy(playerIdx, cell.owner);
                        }
                    }
                }
                break;
                
            case 'railroad':
            case 'utility':
                if(cell.owner === -1) {
                    currentPropertyIndex = player.position;
                    showPurchaseModal(cell.name, cell.price);
                } else if(cell.owner !== player.id) {
                    let rent = calculateRent(cell);
                    const owner = players[cell.owner];
                    if(owner && owner.isActive) {
                        if(player.money >= rent) {
                            player.money -= rent;
                            owner.money += rent;
                            addLog(`💰 ${player.name} دفع ${rent} دينار لـ ${owner.name}`);
                        } else {
                            handleBankruptcy(playerIdx, cell.owner);
                        }
                    }
                }
                break;
                
            case 'tax':
                player.money -= cell.rent;
                addLog(`💸 ${player.name} دفع ${cell.rent} دينار ضريبة!`);
                checkBankruptcy(playerIdx);
                break;
                
            case 'reward':
                player.money += cell.rent;
                addLog(`🎉 ${player.name} حصل على ${cell.rent} دينار مكافأة!`, true);
                break;
                
            case 'chance':
                await handleChance(playerIdx);
                break;
                
            case 'goToJail':
                goToJail(playerIdx);
                break;
                
            case 'start':
            case 'free':
                // لا شيء
                break;
        }
        
        updateUI();
        renderBoard();
        
        // التحقق من الفوز
        checkWinner();
    }

    function calculateRent(property) {
        if(property.type === 'railroad') {
            // حساب عدد محطات القطار المملوكة لنفس المالك
            const owner = property.owner;
            let railroadCount = properties.filter(p => p.type === 'railroad' && p.owner === owner).length;
            return [25, 50, 100, 200][railroadCount - 1] || 25;
        }
        if(property.type === 'utility') {
            // شركات الخدمات
            const owner = property.owner;
            let utilityCount = properties.filter(p => p.type === 'utility' && p.owner === owner).length;
            return property.rent * (utilityCount === 2 ? 10 : 4);
        }
        if(property.type === 'property') {
            if(property.houseCount === 0) return property.rent;
            if(property.houseCount === 1) return property.rent1;
            if(property.houseCount === 2) return property.rent2;
            if(property.houseCount === 3) return property.rent3;
            if(property.houseCount === 4) return property.rent4;
        }
        return property.rent;
    }

    async function handleChance(playerIdx) {
        const player = players[playerIdx];
        const chances = [
            { text: "تقدم إلى نقطة الانطلاق واحصل على 200 دينار", action: () => {
                player.position = 0;
                player.money += 200;
                addLog(`🚀 ${player.name} تقدم إلى نقطة الانطلاق!`);
            }},
            { text: "البنك يمنحك 150 دينار", action: () => {
                player.money += 150;
            }},
            { text: "ادفع 100 دينار كضريبة", action: () => {
                player.money -= 100;
                checkBankruptcy(playerIdx);
            }},
            { text: "تقدم 3 خطوات للأمام", action: async () => {
                await movePlayer(playerIdx, 3);
            }},
            { text: "اخرج من السجن مجاناً", action: () => {
                if(player.inJail) {
                    player.inJail = false;
                    addLog(`🔓 ${player.name} حصل على بطاقة الخروج من السجن!`);
                }
            }},
            { text: "اربح 50 دينار", action: () => {
                player.money += 50;
            }},
            { text: "إصلاح المنازل - ادفع 40 دينار لكل بيت", action: () => {
                let total = player.properties.filter(p => properties[p].houseCount > 0).length * 40;
                player.money -= total;
                addLog(`🔧 ${player.name} دفع ${total} دينار إصلاحات`);
                checkBankruptcy(playerIdx);
            }}
        ];
        
        const chance = chances[Math.floor(Math.random() * chances.length)];
        addLog(`🎲 ${player.name} حصل على: ${chance.text}`);
        await chance.action();
        updateUI();
        renderBoard();
    }

    function goToJail(playerIdx) {
        const player = players[playerIdx];
        player.inJail = true;
        player.jailTurns = 0;
        player.position = 10; // موقع السجن
        addLog(`🚔 ${player.name} دخل السجن! غيِّب دورين`, true);
        renderBoard();
    }

    function handleJailTurn() {
        const player = players[currentPlayer];
        player.jailTurns++;
        
        if(player.jailTurns >= 3) {
            player.inJail = false;
            addLog(`🔓 ${player.name} خرج من السجن بعد 3 أدوار`, true);
            rollDice();
        } else {
            addLog(`⛓️ ${player.name} في السجن (الدور ${player.jailTurns}/3)`);
            diceRolledThisTurn = true;
            updateUI();
        }
    }

    function showPurchaseModal(propertyName, price) {
        waitingForPurchase = true;
        document.getElementById('purchaseText').innerHTML = `
            هل تريد شراء ${propertyName}؟<br>
            السعر: ${price} دينار<br>
            رصيدك: ${players[currentPlayer].money} دينار
        `;
        document.getElementById('purchaseModal').classList.remove('hidden');
    }

    function confirmPurchase(buy) {
        if(buy && players[currentPlayer].money >= properties[currentPropertyIndex].price) {
            players[currentPlayer].money -= properties[currentPropertyIndex].price;
            properties[currentPropertyIndex].owner = currentPlayer;
            players[currentPlayer].properties.push(currentPropertyIndex);
            addLog(`🏠 ${players[currentPlayer].name} اشترى ${properties[currentPropertyIndex].name} مقابل ${properties[currentPropertyIndex].price} دينار!`, true);
        } else if(buy) {
            addLog(`💰 رصيد غير كافٍ لشراء ${properties[currentPropertyIndex].name}`);
        } else {
            addLog(`❌ ${players[currentPlayer].name} رفض شراء ${properties[currentPropertyIndex].name}`);
        }
        
        document.getElementById('purchaseModal').classList.add('hidden');
        waitingForPurchase = false;
        updateUI();
        renderBoard();
    }

    function endTurn() {
        if(!diceRolledThisTurn) return;
        
        currentPlayer = (currentPlayer + 1) % players.length;
        while(!players[currentPlayer].isActive && players.filter(p => p.isActive).length > 1) {
            currentPlayer = (currentPlayer + 1) % players.length;
        }
        
        diceRolledThisTurn = false;
        doubleCount = 0;
        
        addLog(`🔄 دور ${players[currentPlayer].name} يبدأ الآن`, true);
        updateUI();
        
        document.getElementById('diceArea').style.display = 'none';
    }

    function checkBankruptcy(playerIdx) {
        if(players[playerIdx].money < 0) {
            handleBankruptcy(playerIdx, -1);
        }
    }

    function handleBankruptcy(bankruptIdx, debtToIdx) {
        const bankrupt = players[bankruptIdx];
        addLog(`💀 إفلاس! ${bankrupt.name} خسر اللعبة!`, true);
        
        // نقل العقارات للدائن أو للبنك
        if(debtToIdx !== -1 && players[debtToIdx]) {
            bankrupt.properties.forEach(propId => {
                properties[propId].owner = debtToIdx;
                players[debtToIdx].properties.push(propId);
                addLog(`🏠 تم نقل ${properties[propId].name} إلى ${players[debtToIdx].name}`);
            });
        } else {
            bankrupt.properties.forEach(propId => {
                properties[propId].owner = -1;
                addLog(`🏠 تم إعادة ${properties[propId].name} إلى البنك`);
            });
        }
        
        bankrupt.isActive = false;
        bankrupt.properties = [];
        
        updateUI();
        renderBoard();
        checkWinner();
    }

    function checkWinner() {
        const activePlayers = players.filter(p => p.isActive);
        if(activePlayers.length === 1) {
            gameActive = false;
            addLog(`🏆 🎉 الفائز هو ${activePlayers[0].name}! 🎉 🏆`, true);
            setTimeout(() => {
                alert(`🏆 الفائز باللعبة هو ${activePlayers[0].name}! 🏆\nتهانينا!`);
            }, 500);
        }
    }

    function showMyProperties() {
        const player = players[currentPlayer];
        const propsList = document.getElementById('propertiesList');
        propsList.innerHTML = '';
        
        if(player.properties.length === 0) {
            propsList.innerHTML = '<div style="text-align:center; padding:20px;">لا تمتلك أي عقارات بعد</div>';
        } else {
            player.properties.forEach(propId => {
                const prop = properties[propId];
                const propDiv = document.createElement('div');
                propDiv.className = 'property-item';
                propDiv.innerHTML = `
                    <div>
                        <strong>${prop.name}</strong>
                        <div style="font-size:0.8em;">💰 قيمته: ${prop.price} دينار</div>
                        <div style="font-size:0.8em;">🏠 إيجار: ${prop.rent} دينار</div>
                    </div>
                `;
                propsList.appendChild(propDiv);
            });
        }
        
        document.getElementById('propertiesModal').classList.remove('hidden');
    }

    function closePropertiesModal() {
        document.getElementById('propertiesModal').classList.add('hidden');
    }

    function showTradeMenu() {
        alert("🔄 نظام التجارة قيد التطوير...\nيمكنك التداول يدوياً مع اللاعبين الآخرين");
    }
</script>
</body>
