<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #000; color: #0f0; margin: 0; text-align: center; }
        #main-menu { padding: 20px; }
        .menu-btn { display: block; width: 90%; max-width: 300px; padding: 20px; margin: 15px auto; background: #111; border: 2px solid #da291c; color: #fff; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .hidden { display: none !important; }
        .panel { background: #111; border: 1px solid #444; padding: 15px; margin: 10px; border-radius: 10px; }
        input { width: 80%; padding: 10px; margin: 5px; background: #000; color: #0f0; border: 1px solid #da291c; }
        button { padding: 10px 20px; background: #da291c; color: #fff; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="color:#da291c">AHMED PRO SYSTEM</h1>
        <button class="menu-btn" onclick="showSection('chess')">♟️ شطرنج</button>
        <button class="menu-btn" onclick="showSection('mafia')">🕵️ مافيا يدوي</button>
        <button class="menu-btn" onclick="showSection('online')" style="border-color:#0055ff">🌐 مافيا أونلاين (صوت)</button>
    </div>

    <div id="online-sec" class="hidden panel">
        <button onclick="location.reload()">🏠 خروج</button>
        <h3>نظام المافيا المتطور</h3>
        <div id="init-box">
            <input type="text" id="nick" placeholder="اسمك">
            <br>
            <button onclick="startVoiceGame(true)" style="background:#0055ff">أنا الراوي (إنشاء)</button>
            <hr>
            <input type="text" id="rid" placeholder="ID الغرفة">
            <button onclick="startVoiceGame(false)">انضمام للغرفة</button>
        </div>
        
        <div id="game-box" class="hidden">
            <p id="room-display" style="color:yellow"></p>
            <div id="narrator-tools" class="hidden">
                <div id="players-list"></div>
                <button onclick="distribute()">توزيع الأدوار</button>
            </div>
            <div id="player-tools" class="hidden">
                <h2 id="my-role">بانتظار التوزيع...</h2>
                <div id="mic-indicator" style="padding:10px; border:1px solid #333">🎙️ المايك: صامت</div>
            </div>
        </div>
    </div>

    <div id="chess-sec" class="hidden">
        <button onclick="location.reload()">🏠 خروج</button>
        <div id="board" style="width: 350px; margin: auto;"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        function showSection(s) {
            $('#main-menu').addClass('hidden');
            if(s === 'chess') $('#chess-sec').removeClass('hidden');
            if(s === 'online') $('#online-sec').removeClass('hidden');
        }

        let peer, stream, conns = [];

        async function startVoiceGame(isHost) {
            // طلب المايك فقط عند بدء اللعبة
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getAudioTracks()[0].enabled = false; // ابدأ صامت دائماً
            } catch (e) {
                alert("لن يعمل الصوت لأنك لم تعطي صلاحية المايك");
            }

            peer = new Peer();
            
            peer.on('open', id => {
                $('#room-display').text("رقم الغرفة: " + id);
                if(!isHost) {
                    let c = peer.connect($('#rid').val());
                    bindEvents(c);
                }
            });

            peer.on('connection', c => {
                bindEvents(c);
            });

            peer.on('call', call => {
                call.answer(stream);
                call.on('stream', s => {
                    let audio = new Audio();
                    audio.srcObject = s;
                    audio.play();
                });
            });

            $('#init-box').addClass('hidden');
            $('#game-box').removeClass('hidden');
            if(isHost) $('#narrator-tools').removeClass('hidden');
            else $('#player-tools').removeClass('hidden');
        }

        function bindEvents(c) {
            c.on('open', () => {
                if(c.peer !== peer.id) {
                    conns.push(c);
                    c.send({type: 'JOIN', name: $('#nick').val()});
                    peer.call(c.peer, stream);
                }
            });
            c.on('data', d => {
                if(d.type === 'MIC') {
                    if(stream) stream.getAudioTracks()[0].enabled = d.state;
                    $('#mic-indicator').text(d.state ? "🎙️ المايك: شغال!" : "🎙️ المايك: صامت");
                    $('#mic-indicator').css('background', d.state ? 'blue' : 'none');
                }
            });
        }
    </script>
</body>
</html>
