<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شطرنج 2 ضد 2 - متزامن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background: #000; color: #0f0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: flex-start; }
        .game-area { text-align: center; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #0f0; }
        .info-panel { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #0f0; width: 280px; }
        #board { width: 480px; max-width: 85vw; margin: 0 auto; }
        button { background: #da291c; color: white; border: none; padding: 10px 18px; margin: 5px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 8px; border-radius: 5px; margin: 5px; width: calc(100% - 22px); }
        .chat-box { height: 300px; overflow-y: auto; border: 1px solid #0f0; padding: 8px; margin-bottom: 10px; font-size: 13px; text-align: right; background: #0a0a0a; }
        .team-status { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-top: 10px; border-right: 3px solid #da291c; }
        .turn-status { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold; border-right: 3px solid #ff0; }
        .hidden { display: none; }
        .error { color: #ff5555; }
        .success { color: #55ff55; }
        .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }
        .highlight-hint { width: 16px; height: 16px; background: rgba(0, 255, 0, 0.7); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="game-area">
        <h3>♟️ شطرنج 2 ضد 2 (فريق × فريق)</h3>
        <div id="board"></div>
        <div id="controls">
            <div id="lobby">
                <button id="hostBtn">🎮 إنشاء غرفة (Host)</button>
                <input type="text" id="codeInput" placeholder="كود الغرفة">
                <button id="joinBtn">🚪 دخول الغرفة</button>
            </div>
            <div id="gameControls" class="hidden">
                <div id="statusMessages" class="chat-box" style="height: auto; max-height: 150px;"></div>
                <div id="teamInfo" class="team-status">⏳ انتظار بدء المباراة...</div>
                <div id="turnInfo" class="turn-status">⏳ انتظار...</div>
                <button id="startGameBtn" class="hidden" style="background: green; padding: 12px;">🌟 بدء المباراة (توزيع عشوائي) 🌟</button>
            </div>
        </div>
    </div>
    <div class="info-panel">
        <h4>💬 شات الفريق</h4>
        <div id="chatMessages" class="chat-box"></div>
        <input type="text" id="chatInput" placeholder="رسالة...">
        <button id="sendChatBtn">📨 إرسال</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
// ===================== متغيرات عامة =====================
let conn = null;
let isHost = false;
let myId = null;
let myName = "";
let players = [];
let game = new Chess();
let board = null;
let gameActive = false;
let myTeam = null;
let teamWhite = [];
let teamBlack = [];
let currentTurn = 'white';
let expectedPlayerId = null;
let selectedSquare = null;
let boardOrientation = 'white'; // اتجاه الرقعة عندي

// ===================== دوال مساعدة =====================
function addSystemMessage(msg, isError = false) {
    let color = isError ? '#ff5555' : '#55ff55';
    $('#statusMessages').append(`<div style="color: ${color}; margin: 3px 0;">${msg}</div>`);
    $('#statusMessages').scrollTop($('#statusMessages')[0].scrollHeight);
}

function addChatMessage(sender, msg) {
    $('#chatMessages').append(`<div><span style="color: #ffaa00;">${sender}:</span> <span style="color: #0f0;">${msg}</span></div>`);
    $('#chatMessages').scrollTop($('#chatMessages')[0].scrollHeight);
}

function broadcast(data) {
    if (conn && conn.connections) {
        Object.values(conn.connections).forEach(c => {
            if (c[0]) c[0].send(data);
        });
    }
}

function updateBoardOrientation() {
    if (!board) return;
    let orientation = 'white';
    if (myTeam === 'white') orientation = 'white';
    else if (myTeam === 'black') orientation = 'black';
    else orientation = 'white';
    
    if (boardOrientation !== orientation) {
        boardOrientation = orientation;
        board.destroy();
        board = Chessboard('board', {
            draggable: false,
            position: game.fen(),
            orientation: boardOrientation,
            pieceTheme: 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/kosal/{piece}.svg'
        });
        reattachBoardEvents();
    } else {
        board.position(game.fen());
    }
}

function reattachBoardEvents() {
    $('#board').off('click').on('click', '.square-55d63', function() {
        if (!canPlay()) {
            addSystemMessage("⚠️ ليس دورك الآن!", true);
            return;
        }
        let sq = $(this).data('square');
        let piece = game.get(sq);
        if (piece && piece.color === currentTurn.charAt(0)) {
            $('.square-55d63').removeClass('highlight-selected');
            $('.highlight-hint').remove();
            selectedSquare = sq;
            $(this).addClass('highlight-selected');
            game.moves({ square: sq, verbose: true }).forEach(m => {
                $('.square-' + m.to).append('<div class="highlight-hint"></div>');
            });
        } else if (selectedSquare) {
            makeMove({ from: selectedSquare, to: sq, promotion: 'q' });
            $('.square-55d63').removeClass('highlight-selected');
            $('.highlight-hint').remove();
            selectedSquare = null;
        }
    });
}

function updateUI() {
    // تحديث حالة الفريق
    if (!myTeam) {
        $('#teamInfo').html('⏳ انتظار بدء المباراة...');
    } else {
        let whiteNames = teamWhite.map(p => p.name).join(' & ');
        let blackNames = teamBlack.map(p => p.name).join(' & ');
        $('#teamInfo').html(`
            🎯 <strong>فريقي: ${myTeam === 'white' ? 'الأبيض 🤍' : 'الأسود 🖤'}</strong><br>
            🤍 الأبيض: ${whiteNames || '؟'}<br>
            🖤 الأسود: ${blackNames || '؟'}
        `);
    }
    
    // تحديث حالة الدور
    if (!gameActive) {
        $('#turnInfo').html('⏳ المباراة لم تبدأ');
    } else {
        let turnText = currentTurn === 'white' ? '🤍 الفريق الأبيض' : '🖤 الفريق الأسود';
        let currentPlayers = currentTurn === 'white' ? teamWhite : teamBlack;
        let currentPlayer = currentPlayers.find(p => p.id === expectedPlayerId);
        let playerName = currentPlayer ? currentPlayer.name : '?';
        $('#turnInfo').html(`🎲 ${turnText}<br>⏳ يلعب الآن: ${playerName}`);
    }
    
    // تحديث الرقعة واتجاهها
    updateBoardOrientation();
}

function updateBoard() {
    if (board) board.position(game.fen());
}

function canPlay() {
    if (!gameActive || game.game_over()) return false;
    if (game.turn() !== currentTurn.charAt(0)) return false;
    if (expectedPlayerId !== myId) return false;
    return true;
}

function makeMove(move) {
    let result = game.move(move);
    if (result) {
        let playerName = players.find(p => p.id === myId)?.name || '?';
        addChatMessage("🎮 حركة", `${playerName} نقل: ${result.from} → ${result.to}`);
        updateBoard();
        broadcast({ type: 'move', from: result.from, to: result.to, playerId: myId, fen: game.fen() });
        
        if (game.game_over()) {
            let winner = game.turn() === 'w' ? 'الأسود' : 'الأبيض';
            addSystemMessage(`🏆 ${winner} فاز بالمباراة! 🏆`);
            gameActive = false;
            broadcast({ type: 'end', winner: winner });
            $('#turnInfo').html(`🏆 الفائز: ${winner}`);
            return;
        }
        
        // تبديل الدور
        currentTurn = currentTurn === 'white' ? 'black' : 'white';
        let nextPlayers = currentTurn === 'white' ? teamWhite : teamBlack;
        expectedPlayerId = nextPlayers[0]?.id;
        updateUI();
        broadcast({ type: 'turn', team: currentTurn, expectedPlayerId: expectedPlayerId, fen: game.fen() });
    }
}

function startGame() {
    if (!isHost) {
        addSystemMessage("❌ فقط الـ Host يمكنه بدء المباراة", true);
        return;
    }
    if (players.length !== 4) {
        addSystemMessage(`❌ تحتاج 4 لاعبين! (العدد الحالي: ${players.length})`, true);
        return;
    }
    
    // توزيع عشوائي للفرق
    let shuffled = [...players];
    for (let i = shuffled.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    teamWhite = [shuffled[0], shuffled[1]];
    teamBlack = [shuffled[2], shuffled[3]];
    
    broadcast({
        type: 'teams',
        white: teamWhite.map(p => p.id),
        black: teamBlack.map(p => p.id),
        whiteNames: teamWhite.map(p => p.name),
        blackNames: teamBlack.map(p => p.name)
    });
    
    // تطبيق الفرق محلياً
    if (teamWhite.some(p => p.id === myId)) myTeam = 'white';
    else if (teamBlack.some(p => p.id === myId)) myTeam = 'black';
    
    broadcast({ type: 'start' });
    game = new Chess();
    gameActive = true;
    currentTurn = 'white';
    expectedPlayerId = teamWhite[0]?.id;
    updateUI();
    addSystemMessage("🎉 بدأت المباراة! النقلة الأولى للفريق الأبيض.");
    broadcast({ type: 'sync', fen: game.fen(), turn: currentTurn, expectedPlayerId: expectedPlayerId });
}

// ===================== دوال الاتصال =====================
function setupDataReceiver() {
    if (!conn) return;
    conn.on('data', (data) => {
        console.log("Received:", data);
        if (data.type === 'teams') {
            teamWhite = data.white.map((id, i) => ({ id, name: data.whiteNames[i] }));
            teamBlack = data.black.map((id, i) => ({ id, name: data.blackNames[i] }));
            if (teamWhite.some(p => p.id === myId)) myTeam = 'white';
            else if (teamBlack.some(p => p.id === myId)) myTeam = 'black';
            updateUI();
            addSystemMessage("✅ تم توزيع الفرق!");
        }
        else if (data.type === 'start') {
            game = new Chess();
            gameActive = true;
            currentTurn = 'white';
            expectedPlayerId = teamWhite[0]?.id;
            updateUI();
            addSystemMessage("🎉 بدأت المباراة!");
        }
        else if (data.type === 'move') {
            game.move({ from: data.from, to: data.to, promotion: 'q' });
            let player = players.find(p => p.id === data.playerId);
            addChatMessage("🎮 حركة", `${player?.name || '?'} نقل: ${data.from} → ${data.to}`);
            updateUI();
            if (game.game_over()) {
                let winner = game.turn() === 'w' ? 'الأسود' : 'الأبيض';
                addSystemMessage(`🏆 ${winner} فاز بالمباراة! 🏆`);
                gameActive = false;
                $('#turnInfo').html(`🏆 الفائز: ${winner}`);
            }
        }
        else if (data.type === 'turn') {
            currentTurn = data.team;
            expectedPlayerId = data.expectedPlayerId;
            if (data.fen) game.load(data.fen);
            updateUI();
        }
        else if (data.type === 'sync') {
            if (data.fen) game.load(data.fen);
            currentTurn = data.turn;
            expectedPlayerId = data.expectedPlayerId;
            updateUI();
        }
        else if (data.type === 'end') {
            gameActive = false;
            $('#turnInfo').html(`🏆 الفائز: ${data.winner}`);
            addSystemMessage(`🏆 ${data.winner} فاز بالمباراة! 🏆`);
        }
        else if (data.type === 'chat') {
            addChatMessage(data.name, data.msg);
        }
        else if (data.type === 'new_player') {
            if (!players.some(p => p.id === data.id)) {
                players.push({ id: data.id, name: data.name });
                addSystemMessage(`👤 ${data.name} انضم (${players.length}/4)`);
                if (players.length === 4 && isHost) {
                    $('#startGameBtn').removeClass('hidden');
                    addSystemMessage("✅ اكتمل العدد! اضغط 'بدء المباراة'");
                }
            }
        }
        else if (data.type === 'sync_players') {
            players = data.players;
            addSystemMessage(`👥 تحديث القائمة (${players.length}/4)`);
            if (players.length === 4 && isHost) $('#startGameBtn').removeClass('hidden');
            updateUI();
        }
        else if (data.type === 'ask_name') {
            conn.send({ type: 'give_name', name: myName });
        }
    });
}

function hostGame() {
    let roomId = Math.floor(1000 + Math.random() * 9000).toString();
    myId = "host_" + roomId;
    myName = prompt("ادخل اسمك:", "المنشئ") || "Host";
    isHost = true;
    
    conn = new Peer("CHESS2V2_" + roomId);
    conn.on('open', () => {
        alert("🎮 تم إنشاء الغرفة!\nكود الغرفة: " + roomId);
        players.push({ id: myId, name: myName });
        $('#lobby').hide();
        $('#gameControls').removeClass('hidden');
        addSystemMessage(`✅ مرحباً ${myName}! أنت Host الغرفة.`);
        addSystemMessage(`📌 كود الغرفة: ${roomId}`);
        addSystemMessage(`👥 عدد اللاعبين: ${players.length}/4`);
    });
    
    conn.on('connection', (c) => {
        // طلب الاسم من اللاعب الجديد
        c.send({ type: 'ask_name' });
        c.on('data', (d) => {
            if (d.type === 'give_name') {
                let newPlayer = { id: c.peer, name: d.name };
                if (!players.some(p => p.id === c.peer)) {
                    players.push(newPlayer);
                    addSystemMessage(`👤 ${d.name} انضم (${players.length}/4)`);
                    broadcast({ type: 'sync_players', players: players });
                    if (players.length === 4 && isHost) {
                        $('#startGameBtn').removeClass('hidden');
                        addSystemMessage("✅ اكتمل العدد! اضغط 'بدء المباراة'");
                    }
                }
            }
        });
    });
    
    setupDataReceiver();
}

function joinGame() {
    let roomId = $('#codeInput').val().trim();
    if (!roomId) {
        alert("الرجاء إدخال كود الغرفة");
        return;
    }
    
    myId = "player_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
    myName = prompt("ادخل اسمك:", "لاعب") || "Player";
    
    conn = new Peer();
    conn.on('open', () => {
        let c = conn.connect("CHESS2V2_" + roomId);
        c.on('open', () => {
            c.send({ type: 'give_name', name: myName });
            $('#lobby').hide();
            $('#gameControls').removeClass('hidden');
            addSystemMessage(`✅ مرحباً ${myName}! جاري الاتصال...`);
        });
    });
    
    setupDataReceiver();
}

// ===================== إعداد الرقعة والشات =====================
function setupBoard() {
    board = Chessboard('board', {
        draggable: false,
        position: 'start',
        orientation: 'white',
        pieceTheme: 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/kosal/{piece}.svg'
    });
    reattachBoardEvents();
}

function setupChat() {
    $('#sendChatBtn').off('click').on('click', () => {
        let msg = $('#chatInput').val().trim();
        if (msg && conn) {
            broadcast({ type: 'chat', name: myName, msg: msg });
            addChatMessage(myName, msg);
            $('#chatInput').val('');
        }
    });
    $('#chatInput').off('keypress').on('keypress', (e) => {
        if (e.which === 13) $('#sendChatBtn').click();
    });
}

// ===================== بدء التشغيل =====================
$(document).ready(() => {
    setupBoard();
    setupChat();
    
    $('#hostBtn').on('click', hostGame);
    $('#joinBtn').on('click', joinGame);
    $('#startGameBtn').on('click', startGame);
});
</script>
</body>
</html>
