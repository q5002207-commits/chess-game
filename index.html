<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة أحمد المحترف - سين جيم</title>
    <style>
        :root { --red: #da291c; --green: #0f0; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; padding: 10px; text-align: center; }
        .header { background: var(--red); padding: 15px; border-radius: 10px; box-shadow: 0 0 15px var(--red); margin-bottom: 15px; }
        .btn { padding: 12px 20px; background: #111; border: 2px solid var(--red); color: white; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn:hover { background: var(--red); }
        input { padding: 10px; border-radius: 8px; border: 1px solid var(--green); background: #111; color: #fff; text-align: center; margin: 5px; }
        
        /* شبكة الاختيار */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 500px; margin: 0 auto; }
        .card { background: #1a1a1a; padding: 15px; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-size: 0.9em; }
        .card.selected { border-color: var(--gold); background: #332b00; }
        .card.disabled { opacity: 0.3; pointer-events: none; }

        /* شاشة اللعب */
        .q-box { background: #111; border: 2px solid var(--red); padding: 30px; border-radius: 15px; margin: 20px 0; font-size: 1.4em; min-height: 120px; display: flex; align-items: center; justify-content: center; }
        .score-bar { display: flex; justify-content: space-around; background: #222; padding: 10px; border-radius: 10px; margin-top: 20px; border-bottom: 3px solid var(--gold); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header"><h1>⚔️ نظام أحمد: جولة الـ 6 فئات ⚔️</h1></div>

<div id="step1">
    <h3>تسجيل الأبطال</h3>
    <input type="text" id="t1" placeholder="الفريق الأول">
    <input type="text" id="t2" placeholder="الفريق الثاني">
    <br><button class="btn" onclick="goToStep2()">التالي</button>
</div>

<div id="step2" class="hidden">
    <h3>اختر 6 فئات للجولة (<span id="count">0</span>/6)</h3>
    <div class="grid" id="cat-grid"></div>
    <br><button class="btn" id="start-btn" onclick="startGame()" style="display:none;">ابدأ الجولة الحقيقية 🔥</button>
</div>

<div id="step3" class="hidden">
    <div style="color: var(--gold); font-weight: bold;">
        فئة: <span id="cur-cat"></span> (<span id="cat-num">1</span>/6) | 
        سؤال: <span id="q-num">1</span>/6
    </div>
    <div id="turn-name" style="margin: 10px; font-size: 1.2em; color: var(--green);"></div>
    <div class="q-box" id="q-text"></div>
    
    <div id="ans-box" class="hidden" style="color: var(--gold); margin-bottom: 10px; border: 1px dashed; padding: 10px;"></div>
    
    <button class="btn" id="show-btn" onclick="showAns()">إظهار الإجابة</button>
    
    <div id="actions" class="hidden">
        <button class="btn" style="border-color: var(--green);" onclick="addPoint(true)">✅ صح (+50)</button>
        <button class="btn" style="border-color: var(--red);" onclick="addPoint(false)">❌ خطأ (0)</button>
    </div>

    <div class="score-bar">
        <div><span id="n1"></span>: <span id="s1">0</span></div>
        <div><span id="n2"></span>: <span id="s2">0</span></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
    let team1, team2, sc1 = 0, sc2 = 0;
    let selectedCats = [];
    let curCatIdx = 0, curQIdx = 0, turn = 1;

    const db = [
        { n: "أمن سيبراني", q: ["ما هو الـ Phishing؟", "معنى كلمة Malware؟", "وظيفة الـ Firewall؟", "ما هو التشفير؟", "أخطر أنواع الهكر؟", "ما هو الـ Brute Force؟"], a: ["التصيد الاحتيالي", "برامج خبيثة", "جدار حماية", "تحويل البيانات لرموز", "Black Hat", "تخمين كلمة المرور"] },
        { n: "تكنولوجيا", q: ["مخترع الأيفون؟", "معنى RAM؟", "لغة برمجة المواقع؟", "صاحب شركة تسلا؟", "ما هو الـ CPU؟", "أول متصفح مشهور؟"], a: ["ستيف جوبز", "ذاكرة عشوائية", "HTML/JS", "إيلون ماسك", "المعالج", "Netscape/Mosaic"] },
        { n: "كرة قدم", q: ["بطل مونديال 2022؟", "أكثر لاعب فاز بالكرة الذهبية؟", "أين يقع نادي الهلال؟", "عدد لاعبي الفريق؟", "مدة الشوط الواحد؟", "بطل دوري أبطال أوروبا التاريخي؟"], a: ["الأرجنتين", "ميسي", "السعودية", "11 لاعب", "45 دقيقة", "ريال مدريد"] },
        { n: "أمثال شعبية", q: ["الوقت كالسيف إن لم تقطعه...", "الطيور على أشكالها...", "من حفر حفرة لأخيه...", "الباب اللي بيجيك منه ريح...", "عند الامتحان يكرم المرء أو...", "رجعت حليمة لـ..."], a: ["قطعك", "تقع", "وقع فيها", "سده واستريح", "يهان", "عادتها القديمة"] },
        { n: "عواصم دول", q: ["عاصمة فلسطين؟", "عاصمة السعودية؟", "عاصمة مصر؟", "عاصمة فرنسا؟", "عاصمة العراق؟", "عاصمة قطر؟"], a: ["القدس الشريف", "الرياض", "القاهرة", "باريس", "بغداد", "الدوحة"] },
        { n: "معلومات عامة", q: ["أطول نهر؟", "أضخم حيوان؟", "أكبر محيط؟", "أصغر قارة؟", "معدن سائل؟", "كوكب أحمر؟"], a: ["النيل", "الحوت الأزرق", "الهادي", "أستراليا", "الزئبق", "المريخ"] },
        { n: "أفلام ومسلسلات", q: ["بطل تايتانيك؟", "صاحب شخصية الجوكر؟", "مسلسل كوري مشهور؟", "فيلم الأسد الملك؟", "بطل المهمة المستحيلة؟", "عدو باتمان الأول؟"], a: ["ليوناردو", "واكين فينيكس", "لعبة الحبار", "سيمبا", "توم كروز", "الجوكر"] },
        { n: "برمجة", q: ["لغة الذكاء الاصطناعي؟", "وسم البداية في HTML؟", "معنى Loop؟", "ما هي Python؟", "لغة برمجة الأندرويد؟", "معنى Bug؟"], a: ["بايثون", "<html>", "تكرار", "لغة برمجة", "Java/Kotlin", "خطأ برمجبي"] },
        { n: "تاريخ إسلامي", q: ["أول الخلفاء الراشدين؟", "فاتح الأندلس؟", "أين ولد الرسول؟", "باني الأهرامات؟", "قائد معركة اليرموك؟", "أول هجرة للمسلمين كانت؟"], a: ["أبو بكر الصديق", "طارق بن زياد", "مكة المكرمة", "الفراعنة", "خالد بن الوليد", "الحبشة"] },
        { n: "جغرافيا", q: ["أعلى قمة جبل؟", "دولة تمتلك أكبر مساحة؟", "البحر الميت يقع في؟", "قارة الغابات الأمازون؟", "أكبر صحراء؟", "قناة تربط البحرين؟"], a: ["إيفرست", "روسيا", "الأردن وفلسطين", "أمريكا الجنوبية", "الصحراء الكبرى", "قناة السويس"] }
    ];
    // إضافة باقي الفئات للـ 20
    for(let i=db.length; i<20; i++) db.push({n: "قسم "+(i+1), q:["س1","س2","س3","س4","س5","س6"], a:["ج1","ج2","ج3","ج4","ج5","ج6"]});

    function goToStep2() {
        team1 = $('#t1').val() || "الفريق A";
        team2 = $('#t2').val() || "الفريق B";
        $('#step1').hide(); $('#step2').removeClass('hidden');
        db.forEach((item, i) => {
            $('#cat-grid').append(`<div class="card" id="c${i}" onclick="selectCat(${i})">${item.n}</div>`);
        });
    }

    function selectCat(i) {
        if (selectedCats.includes(i)) return;
        if (selectedCats.length < 6) {
            selectedCats.push(i);
            $(`#c${i}`).addClass('selected');
            $('#count').text(selectedCats.length);
        }
        if (selectedCats.length === 6) $('#start-btn').fadeIn();
    }

    function startGame() {
        $('#step2').hide(); $('#step3').removeClass('hidden');
        $('#n1').text(team1); $('#n2').text(team2);
        loadQuestion();
    }

    function loadQuestion() {
        if (curQIdx >= 6) {
            curCatIdx++; curQIdx = 0;
            if (curCatIdx >= 6) return alert("انتهت البطولة! الفائز: " + (sc1>sc2?team1:team2));
        }
        let cat = db[selectedCats[curCatIdx]];
        $('#cur-cat').text(cat.n);
        $('#cat-num').text(curCatIdx + 1);
        $('#q-num').text(curQIdx + 1);
        $('#turn-name').text("دور: " + (turn === 1 ? team1 : team2));
        $('#q-text').text(cat.q[curQIdx]);
        $('#ans-box').addClass('hidden');
        $('#actions').addClass('hidden');
        $('#show-btn').show();
    }

    function showAns() {
        $('#ans-box').text("الإجابة: " + db[selectedCats[curCatIdx]].a[curQIdx]).removeClass('hidden');
        $('#show-btn').hide(); $('#actions').removeClass('hidden');
    }

    function addPoint(win) {
        if (win) {
            if (turn === 1) { sc1 += 50; $('#s1').text(sc1); }
            else { sc2 += 50; $('#s2').text(sc2); }
        }
        curQIdx++; turn = (turn === 1) ? 2 : 1;
        loadQuestion();
    }
</script>
</body>
</html>
