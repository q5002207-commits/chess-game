<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أحمد المحترف ♟️ - المسابقة الكبرى</title>
    <style>
        :root { --red: #da291c; --green: #0f0; --gold: #ffd700; --dark: #0a0a0a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* الهيدر */
        .header { background: linear-gradient(45deg, #000, var(--red)); padding: 20px; border-radius: 15px; border-bottom: 4px solid var(--gold); box-shadow: 0 0 25px rgba(218, 41, 28, 0.5); margin-bottom: 30px; }
        
        /* الحاويات */
        .container { max-width: 900px; margin: 0 auto; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        .hidden { display: none; }
        
        /* الأزرار والمدخلات */
        input { width: 80%; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid var(--green); background: #000; color: #fff; text-align: center; font-size: 1.1em; }
        .btn { padding: 15px 35px; background: #000; border: 2px solid var(--red); color: white; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.2em; transition: 0.3s; margin: 10px; }
        .btn:hover { background: var(--red); transform: scale(1.05); box-shadow: 0 0 15px var(--red); }
        
        /* شبكة الفئات */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 20px; border: 2px solid #333; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .card:hover { border-color: var(--gold); background: #222; }
        .card.selected { border-color: var(--green); background: #002200; box-shadow: 0 0 10px var(--green); }
        
        /* شاشة اللعب */
        .q-box { background: #000; border: 3px solid var(--red); padding: 40px; border-radius: 20px; margin: 25px 0; font-size: 1.8em; min-height: 200px; display: flex; align-items: center; justify-content: center; line-height: 1.6; position: relative; }
        .q-level { position: absolute; top: 10px; right: 20px; font-size: 0.5em; color: var(--gold); background: #222; padding: 5px 10px; border-radius: 5px; }
        
        .score-bar { display: flex; justify-content: space-around; background: #1a1a1a; padding: 20px; border-radius: 15px; margin-top: 30px; border-top: 3px solid var(--green); }
        .score-val { font-size: 2em; color: var(--gold); display: block; }
        
        #ans-box { color: var(--green); font-size: 1.4em; margin: 20px; padding: 15px; border: 1px dashed var(--green); border-radius: 10px; background: rgba(0,255,0,0.05); }
    </style>
</head>
<body>

<div class="header">
    <h1>♟️ بوابة أحمد المحترف: تحدي الـ 6 فئات ⚔️</h1>
</div>

<div class="container">
    <div id="step1">
        <h2>أهلاً بك يا قائد، سجل الفرق لبدء المعركة</h2>
        <input type="text" id="t1" placeholder="اسم الفريق الأول">
        <input type="text" id="t2" placeholder="اسم الفريق الثاني">
        <br>
        <button class="btn" onclick="showStep2()">اختيار الفئات ←</button>
    </div>

    <div id="step2" class="hidden">
        <h2>اختر 6 فئات للمسابقة (<span id="count" style="color:var(--gold)">0</span>/6)</h2>
        <div class="grid" id="cat-grid"></div>
        <br>
        <button class="btn" id="start-btn" onclick="startGame()" style="display:none;">بدء التحدي الآن 🔥</button>
    </div>

    <div id="step3" class="hidden">
        <div style="font-size: 1.2em; margin-bottom: 10px;">
            <span id="cur-cat-name" style="color:var(--gold); border-bottom: 2px solid;"></span> | 
            جولة <span id="cat-num">1</span> من 6
        </div>
        
        <div style="color: var(--green); font-size: 1.3em;">
            دور: <span id="turn-name"></span> | سؤال رقم <span id="q-num">1</span>
        </div>

        <div class="q-box">
            <div class="q-level" id="q-level-tag"></div>
            <div id="q-text"></div>
        </div>

        <div id="ans-box" class="hidden"></div>

        <button class="btn" id="show-btn" onclick="showAns()">إظهار الإجابة ✅</button>
        
        <div id="actions" class="hidden">
            <button class="btn" style="border-color:var(--green); color:var(--green)" onclick="record(true)">إجابة صحيحة (+50)</button>
            <button class="btn" style="border-color:var(--red); color:var(--red)" onclick="record(false)">إجابة خاطئة (0)</button>
        </div>

        <div class="score-bar">
            <div><span id="name1"></span><span class="score-val" id="s1">0</span></div>
            <div><span id="name2"></span><span class="score-val" id="s2">0</span></div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
    let team1, team2, sc1=0, sc2=0, selectedCats=[], curCatIdx=0, curQIdx=0, turn=1;

    // بنك الأسئلة (سهل ومتوسط)
    const db = [
        {
            n: "إسلام",
            questions: [
                {q: "ما أول ما نزل من التوراة؟", a: "بسم الله الرحمن الرحيم", l: "سهل"},
                {q: "من أول من صام من البشر؟", a: "آدم عليه السلام", l: "متوسط"},
                {q: "من أول داعية في الإسلام؟", a: "مصعب بن عمير", l: "سهل"},
                {q: "ما أعظم سورة في القرآن الكريم؟", a: "الفاتحة", l: "سهل"},
                {q: "من الملقب بأسد الله؟", a: "حمزة بن عبد المطلب", l: "سهل"},
                {q: "من هو الصحابي الذي تستحي منه الملائكة؟", a: "عثمان بن عفان", l: "متوسط"}
            ]
        },
        {
            n: "كرة قدم",
            questions: [
                {q: "من فاز بكأس العالم 2022؟", a: "الأرجنتين", l: "سهل"},
                {q: "كم لاعب يتواجد في الملعب لكل فريق؟", a: "11 لاعب", l: "سهل"},
                {q: "من هو الهداف التاريخي لدوري أبطال أوروبا؟", a: "كريستيانو رونالدو", l: "متوسط"},
                {q: "ما هو النادي الملقب بـ 'المرنجي'؟", a: "ريال مدريد", l: "متوسط"},
                {q: "أين يلعب محمد صلاح حالياً؟", a: "ليفربول", l: "سهل"},
                {q: "من هو اللاعب الملقب بالظاهرة؟", a: "رونالدو البرازيلي", l: "متوسط"}
            ]
        },
        {
            n: "سيارات",
            questions: [
                {q: "ما هي الدولة المصنعة لسيارات تويوتا؟", a: "اليابان", l: "سهل"},
                {q: "أي شركة شعارها الحصان الجامح؟", a: "فيراري", l: "سهل"},
                {q: "ما معنى اختصار BMW؟", a: "Bayerische Motoren Werke", l: "متوسط"},
                {q: "من هو مخترع أول سيارة تعمل بالبنزين؟", a: "كارل بنز", l: "متوسط"},
                {q: "أي شركة تنتج سيارة 'موستانج'؟", a: "فورد", l: "سهل"},
                {q: "ما هي أسرع سيارة إنتاجية في العالم؟", a: "كوينيجسيج يسكو", l: "متوسط"}
            ]
        },
        {
            n: "الأنمي",
            questions: [
                {q: "من هو بطل أنمي ون بيس؟", a: "لوفي", l: "سهل"},
                {q: "ما اسم الثعلب المحبوس داخل ناروتو؟", a: "كوراما (الكيوبي)", l: "سهل"},
                {q: "ما اسم المفكرة التي تقتل من يكتب اسمه فيها؟", a: "ديث نوت (Death Note)", l: "سهل"},
                {q: "من هو مؤلف دراغون بول؟", a: "أكيرا تورياما", l: "متوسط"},
                {q: "في هجوم العمالقة، ما اسم فيلق إيرين؟", a: "فيلق الاستطلاع", l: "متوسط"},
                {q: "كم عدد كرات التنين (Dragon Balls)؟", a: "7 كرات", l: "سهل"}
            ]
        },
        {
            n: "الأردن",
            questions: [
                {q: "ما هي عاصمة الأردن؟", a: "عمان", l: "سهل"},
                {q: "متى استقلت المملكة الأردنية الهاشمية؟", a: "1946", l: "متوسط"},
                {q: "ماذا تسمى مدينة البتراء؟", a: "المدينة الوردية", l: "سهل"},
                {q: "أين يقع البحر الميت؟", a: "في الأغوار (الأردن وفلسطين)", l: "سهل"},
                {q: "من هو ملك الأردن الحالي؟", a: "الملك عبد الله الثاني", l: "سهل"},
                {q: "ما هو أعلى جبل في الأردن؟", a: "جبل أم الدامي", l: "متوسط"}
            ]
        },
        {
            n: "جغرافيا",
            questions: [
                {q: "ما هي أكبر دولة في العالم مساحة؟", a: "روسيا", l: "سهل"},
                {q: "أين تقع الأهرامات؟", a: "مصر", l: "سهل"},
                {q: "ما هو أطول نهر في العالم؟", a: "نهر النيل", l: "سهل"},
                {q: "ما هي أصغر قارة في العالم؟", a: "أستراليا", l: "متوسط"},
                {q: "عاصمة فرنسا هي؟", a: "باريس", l: "سهل"},
                {q: "ما هو أعمق محيط في العالم؟", a: "المحيط الهادي", l: "متوسط"}
            ]
        },
        {
            n: "تاريخ",
            questions: [
                {q: "من الذي اكتشف أمريكا؟", a: "كولومبوس", l: "سهل"},
                {q: "متى بدأت الحرب العالمية الأولى؟", a: "1914", l: "متوسط"},
                {q: "من بنى الأهرامات؟", a: "الفراعنة", l: "سهل"},
                {q: "من هو قائد معركة حطين؟", a: "صلاح الدين الأيوبي", l: "متوسط"}
            ]
        },
        {
            n: "أكل",
            questions: [
                {q: "ما هي الأكلة الوطنية للأردن؟", a: "المنسف", l: "سهل"},
                {q: "ما هو المكون الأساسي للبيتزا؟", a: "العجين والجبن والصلصة", l: "سهل"},
                {q: "أي دولة تشتهر بالسوشي؟", a: "اليابان", l: "سهل"}
            ]
        }
    ];

    // إضافة فئات إضافية لضمان وجود 20 فئة
    const extraNames = ["تكنولوجيا", "حيوانات", "فضاء", "مهن", "ماركات", "ذكاء", "كرتون قديم", "أفلام", "ألعاب", "عواصم", "جسم الإنسان", "علوم"];
    extraNames.forEach(name => {
        db.push({ n: name, questions: [{q: `سؤال عن ${name} (قيد الإضافة)`, a: "إجابة", l: "متوسط"}] });
    });

    function showStep2() {
        team1 = $('#t1').val() || "فريق A";
        team2 = $('#t2').val() || "فريق B";
        $('#step1').fadeOut(300, () => {
            $('#step2').removeClass('hidden');
            renderCats();
        });
    }

    function renderCats() {
        const grid = $('#cat-grid');
        db.forEach((cat, i) => {
            grid.append(`<div class="card" id="c${i}" onclick="selectCat(${i})">${cat.n}</div>`);
        });
    }

    function selectCat(i) {
        if (selectedCats.includes(i)) return;
        if (selectedCats.length < 6) {
            selectedCats.push(i);
            $(`#c${i}`).addClass('selected');
            $('#count').text(selectedCats.length);
        }
        if (selectedCats.length === 6) $('#start-btn').fadeIn();
    }

    function startGame() {
        $('#step2').fadeOut(300, () => {
            $('#step3').removeClass('hidden');
            $('#name1').text(team1);
            $('#name2').text(team2);
            loadNext();
        });
    }

    function loadNext() {
        if (curQIdx >= 6) {
            curCatIdx++;
            curQIdx = 0;
            if (curCatIdx >= 6) {
                const winner = sc1 > sc2 ? team1 : team2;
                alert(`انتهت الجولة! \nالفائز هو: ${winner} \nالنتيجة النهائية: ${sc1} - ${sc2}`);
                location.reload();
                return;
            }
        }
        
        let cat = db[selectedCats[curCatIdx]];
        let questions = cat.questions;
        // اختيار سؤال عشوائي من الفئة
        let qObj = questions[Math.floor(Math.random() * questions.length)];
        
        $('#cur-cat-name').text(cat.n);
        $('#cat-num').text(curCatIdx + 1);
        $('#q-num').text(curQIdx + 1);
        $('#turn-name').text(turn === 1 ? team1 : team2);
        $('#q-text').text(qObj.q);
        $('#q-level-tag').text(qObj.l);
        $('#ans-box').text("الإجابة: " + qObj.a).addClass('hidden');
        $('#actions').addClass('hidden');
        $('#show-btn').show();
    }

    function showAns() {
        $('#ans-box').removeClass('hidden');
        $('#show-btn').hide();
        $('#actions').removeClass('hidden');
    }

    function record(isWin) {
        if (isWin) {
            if (turn === 1) { sc1 += 50; $('#s1').text(sc1); }
            else { sc2 += 50; $('#s2').text(sc2); }
        }
        curQIdx++;
        turn = (turn === 1) ? 2 : 1;
        loadNext();
    }
</script>

</body>
</html>
