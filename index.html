<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - MU Final Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.base.css">
    <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.brown.css">
    <style>
        :root { --red: #da291c; --black: #000; --gold: #fbe122; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111; padding: 30px; border: 2px solid var(--red); border-radius: 15px; text-align: center; width: 280px; }
        .header { width: 100%; max-width: 400px; background: var(--red); padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 10px; font-weight: bold; }
        #board-box { width: 370px; height: 370px; max-width: 95vw; max-height: 95vw; border: 4px solid #333; }
        .controls { width: 100%; max-width: 400px; margin-top: 15px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        input, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; font-size: 16px; }
        input { background: #222; color: white; border: 1px solid #444; text-align: center; }
        button { background: var(--red); color: white; font-weight: bold; cursor: pointer; }
        #status-log { font-size: 0.8em; color: var(--gold); margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--red);">MU CHESS</h2>
            <input type="text" id="user-name" placeholder="ادخل اسمك">
            <button onclick="connectSystem()">دخول</button>
            <div id="status-msg" style="color:#888; font-size:0.8em; margin-top:10px;"></div>
        </div>
    </div>

    <div class="header">نظام أحمد المحترف - P2P Online</div>
    <div id="board-box" class="cg-wrap"></div>
    <div id="status-log">الحالة: بانتظار الدخول</div>

    <div class="controls">
        <input type="text" id="opp-name" placeholder="اسم الخصم">
        <button onclick="challenge()">تحدي</button>
        <input type="text" id="cmd" placeholder="كود..." style="margin-top:20px; font-size: 0.7em;">
    </div>

    <script src="https://unpkg.com/chess.js@0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/chessground"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <script>
        let ground, game = new Chess(), peer, conn;

        function connectSystem() {
            let name = $('#user-name').val().trim().toLowerCase() || "user" + Math.floor(Math.random()*1000);
            $('#status-msg').text("جاري المحاولة...");

            // إنشاء الاتصال مع مهلة زمنية (Timeout)
            peer = new Peer(name, {
                config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]},
                debug: 1
            });

            peer.on('open', (id) => {
                $('#login-screen').hide();
                $('#status-log').text("اسمك النشط: " + id);
                initBoard();
            });

            peer.on('error', (err) => {
                console.error(err);
                if(err.type === 'unavailable-id') {
                    $('#status-msg').text("الاسم مستخدم، جرب اسم ثاني مع أرقام");
                } else {
                    $('#status-msg').text("مشكلة في الشبكة، جرب ريفرش");
                }
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConn();
                alert("وصلك تحدي من: " + c.peer);
            });
        }

        function initBoard() {
            ground = Chessground(document.getElementById('board-box'), {
                fen: game.fen(),
                movable: {
                    free: false,
                    color: 'both',
                    dests: getDests()
                },
                events: {
                    move: (orig, dest) => {
                        game.move({ from: orig, to: dest, promotion: 'q' });
                        if(conn) conn.send({ from: orig, to: dest });
                        sync();
                    }
                }
            });
        }

        function getDests() {
            const dests = new Map();
            game.SQUARES.forEach(s => {
                const ms = game.moves({ square: s, verbose: true });
                if (ms.length) dests.set(s, ms.map(m => m.to));
            });
            return dests;
        }

        function sync() {
            ground.set({ fen: game.fen(), movable: { dests: getDests() } });
        }

        function challenge() {
            let target = $('#opp-name').val().trim().toLowerCase();
            if(!target) return;
            conn = peer.connect(target);
            setupConn();
        }

        function setupConn() {
            conn.on('open', () => {
                $('#status-log').text("أنت الآن في مباراة ضد: " + conn.peer);
                conn.on('data', (data) => {
                    game.move({ from: data.from, to: data.to, promotion: 'q' });
                    sync();
                });
            });
        }

        // كود الهكر 0798663232
        $('#cmd').on('keydown', function(e) {
            if(e.keyCode === 13 && $(this).val() === "0798663232") {
                alert("وضع الاغتيال مفعل!");
                ground.set({ movable: { free: true, dests: null } });
                $(this).val('');
            }
        });
    </script>
</body>
</html>
