<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - Ultimate MU Chess</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --mu-red: #da291c; --mu-black: #000; --mu-gold: #fbe122; }
        body { background: var(--mu-black); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; }
        
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111; padding: 30px; border-radius: 15px; border: 2px solid var(--mu-red); text-align: center; width: 280px; box-shadow: 0 0 20px var(--mu-red); }
        
        .header { width: 100%; max-width: 500px; background: var(--mu-red); padding: 12px; text-align: center; border-radius: 10px; margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        #board-wrapper { width: 100%; max-width: 400px; position: relative; }
        #board { width: 100% !important; border: 4px solid #333; border-radius: 5px; }
        
        .controls { width: 100%; max-width: 400px; margin-top: 15px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; } /* حجم 16 يمنع زووم الايفون */
        input { background: #222; color: white; border: 1px solid #444; text-align: center; }
        button { background: var(--mu-red); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        #history { height: 90px; overflow-y: auto; background: #000; color: var(--mu-gold); padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #222; font-family: monospace; font-size: 0.85em; }
        
        /* تمييز المربع المختار بشكل قوي */
        .highlight-sq { background: rgba(251, 225, 34, 0.6) !important; box-shadow: inset 0 0 10px gold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--mu-red); margin-top: 0;">MU CHESS</h2>
            <p style="color: #eee; font-size: 0.8em;">نظام أحمد المحترف P2P</p>
            <input type="text" id="my-name" placeholder="اسمك للدخول">
            <button onclick="startApp()">دخول الملعب</button>
        </div>
    </div>

    <div class="header">Glory Glory Man United ⚽</div>

    <div id="board-wrapper">
        <div id="board"></div>
    </div>
    
    <p id="status" style="margin: 10px 0; color: #aaa; font-size: 0.9em;">بانتظار تسجيل الدخول...</p>

    <div class="controls">
        <input type="text" id="target-peer" placeholder="اسم الخصم">
        <button onclick="connectToFriend()">تحدي (P2P)</button>
        <div id="history">سجل الحركات...</div>
        <input type="text" id="code-input" placeholder="رسالة أو كود..." onkeydown="if(event.keyCode==13) runCode()">
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        let board = null, game = new Chess(), peer = null, conn = null;
        let selectedSq = null;
        const pieces = 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png';

        function startApp() {
            const name = $('#my-name').val().trim();
            if(!name) return alert("ادخل اسمك!");
            
            peer = new Peer(name);
            peer.on('open', (id) => {
                $('#login-screen').hide();
                $('#status').text("مستعد لاستقبال التحدي باسم: " + id);
                initBoard();
            });

            peer.on('connection', (c) => {
                conn = c;
                setupDataListener();
                alert("وصلك تحدي من " + c.peer);
            });
        }

        function initBoard() {
            board = Chessboard('board', {
                position: 'start',
                pieceTheme: pieces,
                draggable: false // نمنع السحب نهائياً لضمان عمل النقر
            });

            // الحل الجذري: استخدام حدث "mousedown" أو "touchstart" يدوياً على الرقعة
            $(document).on('mousedown touchstart', '.square-55d6', function(e) {
                e.preventDefault(); // يمنع أي سلوك افتراضي للمتصفح
                const square = $(this).attr('data-square');
                handleInteraction(square);
            });

            $(window).resize(board.resize);
            setTimeout(board.resize, 300);
        }

        function handleInteraction(square) {
            // إزالة التمييز القديم
            $('.square-55d6').removeClass('highlight-sq');

            if (selectedSq === null) {
                // الخطوة 1: اختيار القطعة
                const piece = game.get(square);
                if (piece) {
                    selectedSq = square;
                    $('.square-' + square).addClass('highlight-sq');
                }
            } else {
                // الخطوة 2: محاولة الحركة
                const move = game.move({ from: selectedSq, to: square, promotion: 'q' });
                
                if (move) {
                    // حركة صحيحة
                    board.position(game.fen());
                    if(conn) conn.send({ type: 'move', move: move });
                    addHistory("أنا: " + selectedSq + "-" + square);
                    selectedSq = null;
                } else {
                    // إذا نقرت على قطعة أخرى من قطعك، غير الاختيار لها
                    const piece = game.get(square);
                    if (piece) {
                        selectedSq = square;
                        $('.square-' + square).addClass('highlight-sq');
                    } else {
                        selectedSq = null;
                    }
                }
            }
        }

        function connectToFriend() {
            const t = $('#target-peer').val().trim();
            if(!t) return;
            conn = peer.connect(t);
            setupDataListener();
        }

        function setupDataListener() {
            conn.on('open', () => {
                $('#status').text("متصل بـ: " + conn.peer);
                conn.on('data', (data) => {
                    if(data.type === 'move') {
                        game.move(data.move);
                        board.position(game.fen());
                        addHistory("الخصم: " + data.move.from + "-" + data.move.to);
                    }
                });
            });
        }

        function runCode() {
            const val = $('#code-input').val();
            if(val === "0798663232") {
                alert("وضع اغتيال الملك نشط - تحريك حر!");
                // تعديل الوظيفة في وضع الهكر لتجاهل قوانين اللعبة
                handleInteraction = function(square) {
                    if(selectedSq === null) {
                        selectedSq = square;
                        $('.square-' + square).addClass('highlight-sq');
                    } else {
                        if(conn) conn.send({ type: 'move', move: { from: selectedSq, to: square } });
                        game.remove(selectedSq); // إزالة فيزيائية
                        board.position(board.position());
                        addHistory("هكر: " + selectedSq
