<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أحمد المحترف - Fix Move</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --red: #da291c; --black: #000; --gold: #fbe122; }
        body { background: var(--black); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #111; padding: 30px; border: 2px solid var(--red); border-radius: 15px; text-align: center; width: 280px; }
        
        .header { width: 100%; max-width: 400px; background: var(--red); padding: 10px; text-align: center; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
        
        #board { width: 100%; max-width: 380px; border: 4px solid #333; cursor: pointer; }
        
        .controls { width: 100%; max-width: 400px; margin-top: 15px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-size: 16px; }
        input { background: #222; color: white; border: 1px solid #444; text-align: center; }
        button { background: var(--red); color: white; font-weight: bold; cursor: pointer; }
        
        #history { height: 70px; overflow-y: auto; background: #000; color: var(--gold); padding: 8px; margin-top: 10px; border-radius: 5px; font-size: 0.8em; }
        
        /* تأثير تمييز المربع عند النقر */
        .highlight-sq { background-color: rgba(251, 225, 34, 0.7) !important; box-shadow: inset 0 0 15px gold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--red);">MU CHESS</h2>
            <input type="text" id="my-name" placeholder="اسمك">
            <button onclick="startSystem()">دخول</button>
        </div>
    </div>

    <div class="header">أحمد المحترف - نظام P2P المصلح ♟️</div>

    <div id="board"></div>
    
    <p id="status" style="margin: 10px 0; color: #aaa; font-size: 0.8em;">الحالة: انتظار...</p>

    <div class="controls">
        <input type="text" id="target-name" placeholder="اسم الخصم">
        <button onclick="sendChallenge()">تحدي</button>
        <div id="history">--- سجل الحركات ---</div>
        <input type="text" id="sys-cmd" placeholder="أوامر النظام...">
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        let board = null, game = new Chess(), peer = null, conn = null;
        let selectedSquare = null;
        const pTheme = 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png';

        function startSystem() {
            const name = $('#my-name').val().trim().toLowerCase();
            if(!name) return;
            
            peer = new Peer(name, {
                config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
            });

            peer.on('open', (id) => {
                $('#login-screen').hide();
                $('#status').text("أنت متصل باسم: " + id);
                initBoard();
            });

            peer.on('connection', (c) => {
                conn = c;
                setupEvents();
                alert("تحدي جديد من: " + c.peer);
            });
        }

        function initBoard() {
            // إنشاء الرقعة مع تعطيل السحب
            board = Chessboard('board', {
                position: 'start',
                pieceTheme: pTheme,
                draggable: false
            });

            // تفعيل حدث النقر بطريقة "Delegation" لضمان التقاط الضغطة
            $('#board').on('mousedown touchstart', '.square-55d6', function(e) {
                e.stopPropagation();
                const sq = $(this).attr('data-square');
                handleMoveLogic(sq);
            });

            $(window).resize(board.resize);
            setTimeout(board.resize, 200);
        }

        function handleMoveLogic(sq) {
            // تنظيف أي تمييز سابق
            $('.square-55d6').removeClass('highlight-sq');

            if (selectedSquare === null) {
                // الخطوة 1: اختيار قطعة
                if (game.get(sq)) {
                    selectedSquare = sq;
                    $('.square-' + sq).addClass('highlight-sq');
                }
            } else {
                // الخطوة 2: محاولة التحريك
                const move = game.move({ from: selectedSquare, to: sq, promotion: 'q' });
                
                if (move) {
                    board.position(game.fen());
                    if(conn) conn.send({ type: 'move', move: move });
                    $('#history').prepend(`<div>Me: ${selectedSquare}-${sq}</div>`);
                    selectedSquare = null;
                } else {
                    // إذا ضغطت على قطعة أخرى تابعة لك، انقل الاختيار لها
                    if (game.get(sq)) {
                        selectedSquare = sq;
                        $('.square-' + sq).addClass('highlight-sq');
                    } else {
                        selectedSquare = null;
                    }
                }
            }
        }

        function sendChallenge() {
            const target = $('#target-name').val().trim().toLowerCase();
            if(!target) return;
            conn = peer.connect(target);
            setupEvents();
        }

        function setupEvents() {
            conn.on('open', () => {
                $('#status').text("متصل بـ: " + conn.peer);
                conn.on('data', (data) => {
                    if(data.type === 'move') {
                        game.move(data.move);
                        board.position(game.fen());
                        $('#history').prepend(`<div>Opp: ${data.move.from}-${data.move.to}</div>`);
                    }
                });
            });
        }

        // كود الهكر المباشر
        $('#sys-cmd').on('keydown', function(e) {
            if(e.keyCode === 13 && $(this).val() === "0798663232") {
                alert("وضع الاغتيال نشط!");
                handleMoveLogic = function(sq) {
                    if (selectedSquare === null) {
                        selectedSquare = sq;
                        $('.square-' + sq).addClass('highlight-sq');
                    } else {
                        if(conn) conn.send({ type: 'move', move: { from: selectedSquare, to: sq } });
                        game.remove(selectedSquare);
                        board.position(board.position());
                        $('#history').prepend(`<div>Hack: ${selectedSquare}-${sq}</div>`);
                        selectedSquare = null;
                    }
                };
                $(this).val('');
            }
        });
    </script>
</body>
</html>
