<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة أحمد المحترف - نسخة الـ 6 لاعبين</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #0f0; text-align: center; margin: 0; }
        .panel { background: #111; border: 2px solid #da291c; padding: 20px; margin: 20px; border-radius: 15px; }
        .hidden { display: none !important; }
        input { padding: 10px; background: #000; color: #0f0; border: 1px solid #da291c; margin: 5px; }
        button { padding: 10px 20px; background: #da291c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .player-tag { background: #222; padding: 5px; margin: 5px; display: inline-block; border: 1px solid #0055ff; }
    </style>
</head>
<body>

    <h1 style="color:#da291c">AHMED PRO - MULTI TEST</h1>

    <div id="setup-box" class="panel">
        <input type="text" id="nick" placeholder="اسم اللاعب">
        <br><br>
        <button onclick="initGame(true)" style="background:#0055ff">إنشاء غرفة (الراوي)</button>
        <hr>
        <input type="text" id="rid" placeholder="رقم الغرفة">
        <button onclick="initGame(false)">انضمام</button>
    </div>

    <div id="game-box" class="panel hidden">
        <h2 id="room-id-display"></h2>
        <div id="narrator-ui" class="hidden">
            <h3>لوحة التحكم (الراوي)</h3>
            <div id="connected-players"></div>
            <button onclick="distributeRoles()" style="background:green">توزيع الأدوار على الجميع 🎲</button>
        </div>
        
        <div id="player-ui" class="hidden">
            <h1 id="role-display" style="color:yellow">بانتظار التوزيع...</h1>
            <div id="mic-status">🎙️ المايك: صامت</div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        let peer, stream, conns = [], isHost = false;

        async function initGame(host) {
            isHost = host;
            try {
                // طلب المايك
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getAudioTracks()[0].enabled = false;
            } catch (e) { console.log("المايك لم يفعل"); }

            // إنشاء Peer ID عشوائي لكل صفحة عشان ما يصير تعارض
            peer = new Peer();

            peer.on('open', id => {
                $('#setup-box').addClass('hidden');
                $('#game-box').removeClass('hidden');
                if(isHost) {
                    $('#room-id-display').text("ID الغرفة: " + id);
                    $('#narrator-ui').removeClass('hidden');
                } else {
                    $('#room-id-display').text("جاري الانضمام...");
                    let c = peer.connect($('#rid').val());
                    setupConnection(c);
                    $('#player-ui').removeClass('hidden');
                }
            });

            peer.on('connection', setupConnection);
            
            peer.on('call', call => {
                call.answer(stream);
                call.on('stream', s => {
                    let audio = new Audio();
                    audio.srcObject = s;
                    audio.play();
                });
            });
        }

        function setupConnection(c) {
            c.on('open', () => {
                if(!isHost) {
                    c.send({type: 'JOIN', name: $('#nick').val() || "لاعب مجهول"});
                } else {
                    conns.push(c);
                    peer.call(c.peer, stream);
                }
            });

            c.on('data', data => {
                if(data.type === 'JOIN') {
                    c.playerName = data.name;
                    $('#connected-players').append(`<div class="player-tag">${data.name}</div>`);
                }
                if(data.type === 'ROLE') {
                    $('#role-display').text("دورك هو: " + data.role);
                    alert("أحمد، دورك طلع: " + data.role);
                }
            });
        }

        function distributeRoles() {
            if(conns.length === 0) return alert("ما في أحد دخل الغرفة لسه!");

            let roles = [];
            let n = conns.length;
            
            // نظام التوزيع (بناءً على طلبك السابق)
            if (n >= 10) {
                roles.push("مافيا قتل 🔪", "مافيا تسكيت 🤫", "دكتور 💉");
            } else {
                roles.push("مافيا 💀", "دكتور 💉");
            }

            while(roles.length < n) {
                roles.push("مواطن 👨‍🌾");
            }

            // خلط الأدوار
            roles.sort(() => Math.random() - 0.5);

            // إرسال لكل متصل دوره
            conns.forEach((conn, index) => {
                conn.send({ type: 'ROLE', role: roles[index] });
            });

            alert("تم توزيع الأدوار على " + n + " لاعبين!");
        }
    </script>
</body>
</html>
