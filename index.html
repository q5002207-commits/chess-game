<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شطرنج 2 ضد 2 - تجربة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background: #000; color: #0f0; font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .board-area { text-align: center; }
        .chat-area { background: #111; border: 1px solid #0f0; border-radius: 8px; padding: 10px; width: 250px; }
        .chat-messages { height: 300px; overflow-y: auto; font-size: 12px; margin-bottom: 10px; }
        .chat-input { display: flex; gap: 5px; }
        .chat-input input { flex: 1; background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px; border-radius: 5px; }
        .chat-input button { background: #da291c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        button { background: #da291c; color: white; border: none; padding: 10px; margin: 5px; border-radius: 5px; cursor: pointer; }
        .team-info { background: #222; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .turn-info { background: #333; padding: 10px; border-radius: 8px; margin-top: 10px; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 8px; border-radius: 5px; margin: 5px; }
        .hidden { display: none; }
        #board { width: 480px; max-width: 90vw; }
    </style>
</head>
<body>
<div class="container">
    <div class="board-area">
        <h3>👥 شطرنج 2 ضد 2</h3>
        <div id="board"></div>
        <div id="game-controls">
            <div id="lobby-area">
                <button onclick="hostGame()">🎮 إنشاء غرفة (Host)</button>
                <input type="text" id="roomCode" placeholder="كود الغرفة">
                <button onclick="joinGame()">🚪 دخول</button>
            </div>
            <div id="game-area" class="hidden">
                <div class="team-info" id="team-status">⏳ جاري الاتصال...</div>
                <div class="turn-info" id="turn-status">⏳ انتظار...</div>
                <button id="start-btn" class="hidden" onclick="startGame()" style="background:green;">🌟 بدء المباراة 🌟</button>
            </div>
        </div>
    </div>
    <div class="chat-area">
        <h4>💬 شات</h4>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="رسالة...">
            <button onclick="sendChat()">📨</button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
let conn = null;
let isHost = false;
let game = new Chess();
let board = null;
let gameActive = false;
let players = [];
let myId = null;
let myTeam = null;
let teamWhite = [];
let teamBlack = [];
let currentTurn = 'white';
let expectedPlayerId = null;
let moveHistory = [];

function addChat(msg, isSystem = false) {
    let div = $('<div></div>').text(msg);
    if (isSystem) div.css('color', '#ffaa00').css('font-style', 'italic');
    else div.css('color', '#0f0');
    $('#chat-messages').append(div);
    $('#chat-messages').scrollTop($('#chat-messages')[0].scrollHeight);
}

function updateTeamStatus() {
    if (!myTeam) {
        $('#team-status').html('⏳ انتظار بدء المباراة...');
        return;
    }
    let status = `🎯 فريقي: ${myTeam === 'white' ? 'الأبيض 🤍' : 'الأسود 🖤'}<br>`;
    status += `🤍 الأبيض: ${teamWhite.map(p => p.name).join(' & ') || '؟'}<br>`;
    status += `🖤 الأسود: ${teamBlack.map(p => p.name).join(' & ') || '؟'}`;
    $('#team-status').html(status);
}

function updateTurnStatus() {
    if (!gameActive) {
        $('#turn-status').html('⏳ المباراة لم تبدأ');
        return;
    }
    let turnText = currentTurn === 'white' ? '🤍 الفريق الأبيض' : '🖤 الفريق الأسود';
    let currentPlayers = currentTurn === 'white' ? teamWhite : teamBlack;
    let currentPlayer = currentPlayers.find(p => p.id === expectedPlayerId);
    let name = currentPlayer ? currentPlayer.name : '?';
    $('#turn-status').html(`🎲 ${turnText}<br>⏳ يلعب الآن: ${name}`);
}

function updateBoard() {
    if (board) board.position(game.fen());
}

function broadcast(data) {
    if (conn && conn.connections) {
        Object.values(conn.connections).forEach(c => {
            if (c[0]) c[0].send(data);
        });
    }
}

function canPlay() {
    if (!gameActive || game.game_over()) return false;
    if (game.turn() !== currentTurn.charAt(0)) return false;
    if (expectedPlayerId !== myId) return false;
    return true;
}

function makeMove(move) {
    let result = game.move(move);
    if (result) {
        let playerName = players.find(p => p.id === myId)?.name || '?';
        moveHistory.push(`${playerName}: ${result.from}→${result.to}`);
        updateBoard();
        broadcast({ type: 'move', from: result.from, to: result.to, playerId: myId });
        
        if (game.game_over()) {
            let winner = game.turn() === 'w' ? 'الأسود' : 'الأبيض';
            addChat(`🏆 ${winner} فاز بالمباراة! 🏆`, true);
            gameActive = false;
            broadcast({ type: 'end', winner });
            $('#turn-status').html(`🏆 الفائز: ${winner}`);
            return;
        }
        
        currentTurn = currentTurn === 'white' ? 'black' : 'white';
        let nextPlayers = currentTurn === 'white' ? teamWhite : teamBlack;
        expectedPlayerId = nextPlayers[0]?.id;
        updateTurnStatus();
        broadcast({ type: 'turn', team: currentTurn, expectedPlayerId });
    }
}

function startGame() {
    if (!isHost || players.length !== 4) {
        addChat("❌ تحتاج 4 لاعبين!", true);
        return;
    }
    
    let shuffled = [...players];
    for (let i = shuffled.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    
    teamWhite = [shuffled[0], shuffled[1]];
    teamBlack = [shuffled[2], shuffled[3]];
    
    broadcast({
        type: 'teams',
        white: teamWhite.map(p => p.id),
        black: teamBlack.map(p => p.id),
        whiteNames: teamWhite.map(p => p.name),
        blackNames: teamBlack.map(p => p.name)
    });
    
    applyTeams(teamWhite.map(p => p.id), teamBlack.map(p => p.id), teamWhite.map(p => p.name), teamBlack.map(p => p.name));
    broadcast({ type: 'start' });
    
    game = new Chess();
    updateBoard();
    gameActive = true;
    currentTurn = 'white';
    expectedPlayerId = teamWhite[0]?.id;
    updateTurnStatus();
    addChat("🎉 بدأت المباراة! النقلة للفريق الأبيض", true);
}

function applyTeams(whiteIds, blackIds, whiteNames, blackNames) {
    teamWhite = whiteIds.map((id, i) => ({ id, name: whiteNames[i] }));
    teamBlack = blackIds.map((id, i) => ({ id, name: blackNames[i] }));
    if (teamWhite.some(p => p.id === myId)) myTeam = 'white';
    else if (teamBlack.some(p => p.id === myId)) myTeam = 'black';
    updateTeamStatus();
}

function setupReceiver() {
    if (!conn) return;
    conn.on('data', data => {
        if (data.type === 'teams') {
            applyTeams(data.white, data.black, data.whiteNames, data.blackNames);
        }
        else if (data.type === 'start') {
            game = new Chess();
            updateBoard();
            gameActive = true;
            currentTurn = 'white';
            expectedPlayerId = teamWhite[0]?.id;
            updateTurnStatus();
            addChat("🎉 بدأت المباراة!", true);
        }
        else if (data.type === 'move') {
            game.move({ from: data.from, to: data.to, promotion: 'q' });
            let player = players.find(p => p.id === data.playerId);
            moveHistory.push(`${player?.name || '?'}: ${data.from}→${data.to}`);
            updateBoard();
            if (game.game_over()) {
                let winner = game.turn() === 'w' ? 'الأسود' : 'الأبيض';
                addChat(`🏆 ${winner} فاز! 🏆`, true);
                gameActive = false;
                $('#turn-status').html(`🏆 الفائز: ${winner}`);
            }
        }
        else if (data.type === 'turn') {
            currentTurn = data.team;
            expectedPlayerId = data.expectedPlayerId;
            updateTurnStatus();
        }
        else if (data.type === 'end') {
            gameActive = false;
            $('#turn-status').html(`🏆 الفائز: ${data.winner}`);
            addChat(`🏆 ${data.winner} فاز! 🏆`, true);
        }
        else if (data.type === 'chat') {
            addChat(`${data.name}: ${data.msg}`);
        }
        else if (data.type === 'new_player') {
            players.push({ id: data.id, name: data.name });
            updatePlayerList();
        }
    });
}

function updatePlayerList() {
    let count = players.length;
    if (count === 4 && isHost) {
        addChat("✅ اكتمل العدد (4)! اضغط 'بدء المباراة'", true);
        $('#start-btn').removeClass('hidden');
    } else {
        addChat(`👥 عدد اللاعبين: ${count}/4`, true);
    }
}

function hostGame() {
    let id = Math.floor(1000 + Math.random() * 9000).toString();
    isHost = true;
    conn = new Peer("CHESS2V2_" + id);
    conn.on('open', () => {
        alert("🎮 كود غرفة 2v2: " + id);
        myId = conn.id;
        players.push({ id: myId, name: "Host" });
        $('#lobby-area').hide();
        $('#game-area').removeClass('hidden');
        updatePlayerList();
    });
    conn.on('connection', c => {
        let name = prompt("ادخل اسمك:", "لاعب");
        if (name) {
            players.push({ id: c.peer, name });
            c.send({ type: 'new_player', name: name, id: c.peer });
            updatePlayerList();
        }
    });
    setupReceiver();
    setupBoard();
}

function joinGame() {
    let code = $('#roomCode').val().trim();
    if (!code) return;
    conn = new Peer();
    conn.on('open', () => {
        let c = conn.connect("CHESS2V2_" + code);
        c.on('open', () => {
            let name = prompt("ادخل اسمك:", "لاعب");
            if (name) {
                myId = name;
                players.push({ id: myId, name });
                c.send({ type: 'new_player', name: name, id: myId });
                $('#lobby-area').hide();
                $('#game-area').removeClass('hidden');
            }
        });
    });
    setupReceiver();
    setupBoard();
}

function setupBoard() {
    board = Chessboard('board', {
        draggable: false,
        position: 'start',
        orientation: 'white',
        pieceTheme: 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/kosal/{piece}.svg'
    });
    
    $('#board').off('click').on('click', '.square-55d63', function() {
        if (!canPlay()) return;
        let sq = $(this).data('square');
        let piece = game.get(sq);
        if (piece && piece.color === currentTurn.charAt(0)) {
            $('.square-55d63').removeClass('highlight-selected');
            $('.highlight-hint').remove();
            window.selectedSq = sq;
            $(this).addClass('highlight-selected');
            game.moves({ square: sq, verbose: true }).forEach(m => {
                $('.square-' + m.to).append('<div class="highlight-hint"></div>');
            });
        } else if (window.selectedSq) {
            makeMove({ from: window.selectedSq, to: sq, promotion: 'q' });
            $('.square-55d63').removeClass('highlight-selected');
            $('.highlight-hint').remove();
            window.selectedSq = null;
        }
    });
}

function sendChat() {
    let msg = $('#chat-input').val().trim();
    if (msg && conn) {
        let name = players.find(p => p.id === myId)?.name || '?';
        broadcast({ type: 'chat', name: name, msg: msg });
        addChat(`${name}: ${msg}`);
        $('#chat-input').val('');
    }
}

// إضافة تأثير التحديد
const style = document.createElement('style');
style.textContent = `
    .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }
    .highlight-hint { width: 16px; height: 16px; background: rgba(0, 255, 0, 0.6); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
`;
document.head.appendChild(style);
</script>
</body>
</html>
