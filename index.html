<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - النسخة المتكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #main-menu { text-align: center; margin-top: 40px; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 25px; margin: 15px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.4em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .back-home { background: #333; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; border: none; }
        #board { width: 380px !important; max-width: 95vw !important; border: 4px solid #222; border-radius: 8px; }
        .mafia-card, .spy-card { background: #1a1a1a; padding: 20px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; text-align: center; color: white; cursor: pointer; }
        .role-display { display: none; color: #ff0000; font-size: 1.2em; font-weight: bold; margin-top: 10px; }
        .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }
        .highlight-hint { width: 16px; height: 16px; background: rgba(0, 255, 0, 0.6); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

<div id="main-menu">
    <h1 style="color:#da291c;">AHMED PRO SYSTEM</h1>
    <button class="menu-btn" onclick="showGame('chess')">♟️ شطرنج (الملوك المخصصة)</button>
    <button class="menu-btn" onclick="showGame('mafia')">🕵️ موزع المافيا</button>
    <button class="menu-btn" onclick="showGame('spy')">🔍 الجاسوس (أوفلاين)</button>
    <button class="menu-btn" style="border-color: #0055ff;" onclick="showGame('spyOnline')">🌐 الجاسوس (أونلاين)</button>
</div>

<div id="chess-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 القائمة</button>
    <div id="chess-setup">
        <button onclick="hostChess()">إنشاء طاولة</button>
        <input type="number" id="chessCodeInput" placeholder="أدخل الكود">
        <button style="background:#444;" onclick="joinChess()">دخول</button>
    </div>
    <div id="chess-board-container" class="hidden">
        <div id="board"></div>
        <p id="turn-display" style="text-align:center; color:#0f0; margin-top:10px; font-weight:bold;">بانتظار الحركة...</p>
    </div>
</div>

<div id="mafia-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 القائمة</button>
    <div id="mafia-setup">
        <input type="text" id="mafiaName" placeholder="اسم اللاعب">
        <button onclick="addM()">إضافة لاعب</button>
        <div id="mList" style="color:#888; margin:10px;"></div>
        <button style="background:green;" onclick="startM()">ابدأ التوزيع</button>
    </div>
    <div id="mafia-board" class="hidden">
        <div id="narrator-box" style="background:#0055ff; color:white; padding:10px; border-radius:10px; margin-bottom:10px;"></div>
        <div id="mafia-cards"></div>
    </div>
</div>

<div id="spy-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 القائمة</button>
    <div id="spy-setup">
        <input type="text" id="spyInputName" placeholder="اسم اللاعب">
        <button onclick="addS()">إضافة لاعب</button>
        <div id="sList" style="color:#888; margin:10px;"></div>
        <button style="background:green;" onclick="startS()">ابدأ الجولة</button>
    </div>
    <div id="spy-board" class="hidden"><div id="spy-cards"></div></div>
</div>

<div id="spy-online-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 القائمة</button>
    <div id="spy-online-setup">
        <button onclick="hostSpy()">إنشاء غرفة</button>
        <input type="number" id="spyCodeInput" placeholder="أدخل كود الغرفة">
        <button style="background:#444;" onclick="joinSpy()">انضمام</button>
    </div>
    <div id="spy-online-board" class="hidden">
        <div id="spy-online-role" style="font-size:1.5em; color:yellow; margin:20px;"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
let board = null, game = new Chess(), conn = null, myColor = 'w', selectedSq = null;
let mPlayers = [], sPlayers = [];

// روابط الملوك المخصصة
const whiteKingPhoto = 'https://lh3.googleusercontent.com/d/1p7ibYalq3QncEGAQODjen_Y3R-SntK3q';
const blackKingPhoto = 'https://lh3.googleusercontent.com/d/1Lt_BV7FoYmudcYL472gBUsJmSBc7V4Hc';

function showGame(t) {
    $('#main-menu, .hidden').hide();
    if(t==='chess') $('#chess-section').show();
    else if(t==='mafia') $('#mafia-section').show();
    else if(t==='spy') $('#spy-section').show();
    else if(t==='spyOnline') $('#spy-online-section').show();
}

// شطرنج
function initB() {
    $('#chess-setup').hide(); $('#chess-board-container').show();
    board = Chessboard('board', { 
        draggable: false, 
        orientation: myColor==='w'?'white':'black', 
        position: 'start',
        pieceTheme: function(piece) {
            if (piece === 'wK') return whiteKingPhoto;
            if (piece === 'bK') return blackKingPhoto;
            // استخدام شكل القطع Kosal كما طلبت
            return 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/kosal/{piece}.svg'.replace('{piece}', piece);
        }
    });
    $('#board').on('click', '.square-55d63', function() {
        let sq = $(this).data('square');
        if(game.turn()!==myColor) return;
        let p = game.get(sq);
        if(p && p.color===myColor) {
            $('.square-55d63').removeClass('highlight-selected'); $('.highlight-hint').remove();
            selectedSq = sq; $(this).addClass('highlight-selected');
            game.moves({square:sq, verbose:true}).forEach(m => $('.square-'+m.to).append('<div class="highlight-hint"></div>'));
        } else if(selectedSq) {
            let m = game.move({from:selectedSq, to:sq, promotion:'q'});
            if(m) { board.position(game.fen()); if(conn) conn.send({f:selectedSq, t:sq}); updateTurn(); }
            $('.square-55d63').removeClass('highlight-selected'); $('.highlight-hint').remove(); selectedSq = null;
        }
    });
    updateTurn();
}
function hostChess() {
    let id = Math.floor(1000+Math.random()*9000).toString();
    let p = new Peer("AHMED_CHESS_"+id);
    p.on('open', i => { $('#chess-setup').hide(); alert("كودك: " + id); });
    p.on('connection', c => { conn = c; myColor = 'w'; initB(); listenChess(); });
}
function joinChess() {
    let cde = $('#chessCodeInput').val();
    let p = new Peer();
    p.on('open', i => { conn = p.connect("AHMED_CHESS_"+cde); conn.on('open', () => { myColor = 'b'; initB(); listenChess(); }); });
}
function listenChess() { conn.on('data', d => { game.move({from:d.f, to:d.t, promotion:'q'}); board.position(game.fen()); updateTurn(); }); }
function updateTurn() { $('#turn-display').text("دور: " + (game.turn()==='w'?"الأبيض":"الأسود")); }

// مافيا
function addM() { let n=$('#mafiaName').val(); if(n){mPlayers.push(n); $('#mList').text(mPlayers.join("-")); $('#mafiaName').val("");} }
function startM() {
    if(mPlayers.length < 4) return alert("أضف 4 لاعبين");
    let nIdx = Math.floor(Math.random()*mPlayers.length), nName=mPlayers[nIdx], acts=mPlayers.filter((_,i)=>i!==nIdx);
    let roles=acts.map((_,i)=>i===0?"مافيا 🔪":"مواطن 👨‍🌾").sort(()=>Math.random()-0.5);
    $('#mafia-setup').hide(); $('#mafia-board').show(); $('#narrator-box').text("🎤 الراوي: "+nName);
    acts.forEach((p,i)=>{ let c=$(`<div class="mafia-card"><strong>${p}</strong><div class="role-display">${roles[i]}</div></div>`); c.click(function(){$(this).find('.role-display').toggle();}); $('#mafia-cards').append(c); });
}

// جاسوس أوفلاين
const spyPlaces = ["مستشفى", "مدرسة", "غابة", "طائرة", "مطعم", "فندق", "مطار", "سفينة", "مخيم", "قلعة", "مسجد", "الأردن", "فلسطين"];
function addS() { let n=$('#spyInputName').val(); if(n){sPlayers.push(n); $('#sList').text(sPlayers.join("-")); $('#spyInputName').val("");} }
function startS() {
    let place = spyPlaces[Math.floor(Math.random()*spyPlaces.length)];
    let sIdx = Math.floor(Math.random()*sPlayers.length);
    $('#spy-setup').hide(); $('#spy-board').show();
    sPlayers.forEach((p,i)=>{
        let r=(i===sIdx)?"جاسوس 🕵️":place;
        let c=$(`<div class="spy-card"><strong>${p}</strong><div class="role-display">${r}</div></div>`);
        c.click(function(){$(this).find('.role-display').toggle();}); $('#spy-cards').append(c);
    });
}

// جاسوس أونلاين
let spyConn = null;
function hostSpy() {
    let id = Math.floor(1000+Math.random()*9000).toString();
    let p = new Peer("AHMED_SPY_"+id);
    p.on('open', i => alert("كود الغرفة: " + id));
    p.on('connection', c => {
        let place = spyPlaces[Math.floor(Math.random()*spyPlaces.length)];
        let roles = ["جاسوس 🕵️", place];
        c.on('open', () => { 
            c.send(roles[Math.floor(Math.random()*2)]); 
            $('#spy-online-setup').hide(); $('#spy-online-board').show(); $('#spy-online-role').text("أنت المضيف، ابدأ النقاش!");
        });
    });
}
function joinSpy() {
    let cde = $('#spyCodeInput').val();
    let p = new Peer();
    p.on('open', i => {
        let c = p.connect("AHMED_SPY_"+cde);
        c.on('data', d => {
            $('#spy-online-setup').hide(); $('#spy-online-board').show();
            $('#spy-online-role').text("دورك هو: " + d);
        });
    });
}
</script>
</body>
</html>
