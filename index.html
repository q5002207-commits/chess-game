<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MU CHESS</title>

    <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.base.css">
    <link rel="stylesheet" href="https://unpkg.com/chessground/assets/chessground.brown.css">

    <style>
        body {
            background: #000;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #login-screen {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cg-wrap {
            width: 360px;
            height: 360px;
            border: 4px solid #333;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div>
        <input id="my-name" placeholder="اسمك">
        <button onclick="startApp()">دخول</button>
    </div>
</div>

<div id="board" class="cg-wrap"></div>

<script src="https://unpkg.com/chess.js@0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/chessground"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
let game = new Chess();
let ground = null;
let peer = null;
let conn = null;
let myColor = 'white';

// تشغيل التطبيق
function startApp() {
    const name = document.getElementById('my-name').value.trim();
    if (!name) return;

    peer = new Peer(name);

    peer.on('open', () => {
        document.getElementById('login-screen').style.display = 'none';
        initBoard();
    });

    peer.on('connection', (c) => {
        conn = c;
        myColor = 'black';
        setupConnection();
        alert("تم استلام تحدي");
    });
}

// إنشاء الرقعة
function initBoard() {
    ground = Chessground(document.getElementById('board'), {
        fen: game.fen(),

        movable: {
            free: false,
            color: myColor,
            dests: getDests()
        },

        events: {
            move: (orig, dest) => {
                const move = game.move({
                    from: orig,
                    to: dest,
                    promotion: 'q'
                });

                if (!move) return;

                if (conn) {
                    conn.send({ orig, dest });
                }

                updateBoard();
            }
        }
    });
}

// تحديث الرقعة حسب الدور
function updateBoard() {
    const turn = game.turn() === 'w' ? 'white' : 'black';

    ground.set({
        fen: game.fen(),
        movable: {
            color: turn === myColor ? myColor : null,
            dests: getDests()
        }
    });
}

// الحركات المسموحة
function getDests() {
    const dests = new Map();

    game.SQUARES.forEach(s => {
        const moves = game.moves({ square: s, verbose: true });
        if (moves.length) {
            dests.set(s, moves.map(m => m.to));
        }
    });

    return dests;
}

// الاتصال
function setupConnection() {
    conn.on('open', () => {
        console.log("متصل");
    });

    conn.on('data', (data) => {
        game.move({
            from: data.orig,
            to: data.dest,
            promotion: 'q'
        });

        updateBoard();
    });
}
</script>

</body>
</html>
