<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة أحمد المحترف - النسخة الشاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #main-menu { text-align: center; margin-top: 40px; width: 100%; max-width: 400px; }
        .menu-btn { display: block; width: 100%; padding: 25px; margin: 15px 0; background: #111; border: 2px solid #da291c; color: white; border-radius: 15px; font-size: 1.4em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: #da291c; box-shadow: 0 0 20px #da291c; }
        .back-home { background: #333; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; border: none; font-size: 0.8em; }
        .header { width: 100%; max-width: 400px; background: #da291c; padding: 12px; border-radius: 12px; text-align: center; color: white; margin-bottom: 10px; }
        #board { width: 380px !important; max-width: 95vw !important; border: 4px solid #222; border-radius: 8px; position: relative; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 8px; text-align: center; font-size: 1.1em; }
        button { width: 100%; padding: 12px; background: #da291c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .mafia-card, .spy-card { background: #1a1a1a; padding: 20px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; cursor: pointer; text-align: center; }
        .role-display { display: none; color: #ff0000; font-size: 1.2em; font-weight: bold; margin-top: 10px; }
        .narrator-box { background: #0055ff; color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border: 2px solid white; }
        .hidden { display: none; }
        .highlight-selected { background-color: rgba(255, 255, 0, 0.5) !important; }
        .highlight-hint { width: 16px; height: 16px; background: rgba(0, 255, 0, 0.6); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 999; }
        .vote-btn { background: #222; color: yellow; border: 1px solid yellow; margin: 5px; width: auto; display: inline-block; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="main-menu">
    <h1 style="color:#da291c;">AHMED PRO SYSTEM</h1>
    <button class="menu-btn" onclick="showGame('chess')">♟️ شطرنج أونلاين (تطوير التبيت)</button>
    <button class="menu-btn" onclick="showGame('mafia')">🕵️ موزع المافيا</button>
    <button class="menu-btn" onclick="showGame('spy')">🔍 الجاسوس (أوفلاين)</button>
    <button class="menu-btn" style="border-color: #0055ff;" onclick="showGame('spyOnline')">🌐 الجاسوس (أونلاين)</button>
</div>

<div id="chess-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 الرئيسية</button>
    <div class="header"><h3>🏆 شطرنج أحمد أونلاين</h3><div id="chess-status" style="color:yellow;">جاهز...</div></div>
    <div id="chess-setup" style="width:380px;">
        <button onclick="hostChess()">إنشاء (4 أرقام)</button>
        <input type="number" id="chessCodeInput" placeholder="الكود" style="margin-top:10px;">
        <button style="background:#444;" onclick="joinChess()">دخول</button>
    </div>
    <div id="chess-board-container" class="hidden">
        <div id="board"></div>
        <p id="turn-display" style="text-align:center; color:#0f0; font-weight:bold; margin-top:10px;">انتظر...</p>
    </div>
</div>

<div id="mafia-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 الرئيسية</button>
    <div id="mafia-setup">
        <input type="text" id="mafiaPlayerName" placeholder="اسم اللاعب">
        <button onclick="addMafiaPlayer()">إضافة</button>
        <div id="mafia-preview" style="color:#888; margin:10px;"></div>
        <button style="background:green;" onclick="startMafiaDist()">توزيع</button>
    </div>
    <div id="mafia-board" class="hidden">
        <div id="narrator-name"></div>
        <div id="mafia-cards-container"></div>
    </div>
</div>

<div id="spy-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 الرئيسية</button>
    <div id="spy-setup">
        <input type="text" id="spyPlayerName" placeholder="اسم اللاعب">
        <button onclick="addSpyPlayer()">إضافة</button>
        <div id="spy-preview" style="color:#888; margin:10px;"></div>
        <button style="background:green;" onclick="startSpyDist()">ابدأ</button>
    </div>
    <div id="spy-board" class="hidden"><div id="spy-cards-container"></div></div>
</div>

<div id="spy-online-section" class="hidden">
    <button class="back-home" onclick="location.reload()">🏠 الرئيسية</button>
    <div id="spy-online-setup">
        <input type="text" id="spyNick" placeholder="اسمك">
        <button onclick="hostRoom()">إنشاء غرفة</button>
        <input type="text" id="roomCode" placeholder="كود الغرفة" style="margin-top:10px;">
        <button onclick="joinRoom()">دخول</button>
    </div>
    <div id="lobby" class="hidden">
        <div id="display-room-id" style="color:yellow;"></div>
        <div id="online-players-list"></div>
        <button id="start-btn" style="background:green; display:none;" onclick="startOnlineGame()">ابدأ</button>
    </div>
    <div id="game-play" class="hidden">
        <div class="spy-card" onclick="$(this).find('.role-display').toggle()">
            <p>اضغط لمعرفة مكانك</p>
            <div id="my-role" class="role-display" style="color:#0f0;"></div>
        </div>
        <div id="vote-btns"></div>
        <div id="vote-log-container" style="margin-top:15px;"></div>
        <div id="final-result" style="color:red; font-size:1.5em;"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

<script>
let board = null, chessGame = new Chess();
let chessPeer = null, chessConn = null, myColor = 'w', selectedSquare = null;
let sPlayers = [], mPlayers = [], peer = null, players = [], myName = "", host = false, votesReceived = [];

const spyPlaces = ["مستشفى", "مدرسة", "غابة", "طائرة", "مطعم", "فندق", "مطار", "سفينة", "مخيم", "قلعة", "مسجد", "الأردن", "فلسطين", "شاورما", "منسف", "تلفزيون", "هاتف", "غرفة نوم", "سيارة", "المول", "السوبر ماركت", "الحلاق", "السينما", "المسرح", "البنك", "كازية", "مخبز", "خياط", "صيدلية", "عيادة أسنان", "مختبر", "الجامعة", "مدرسة سواقة", "حديقة حيوان", "السيرك", "المتحف", "معرض فنون", "صالة أفراح", "ملعب كرة قدم", "نادي رياضي", "مسبح", "شاطئ", "ميناء", "محطة قطار", "موقف باصات", "المترو", "جسر", "نفق", "مطبعة", "ورشة نجارة", "كراج تصليح", "صحراء", "واحة", "كهف", "بركان", "شلال", "جزيرة", "قطب متجمد", "قمة جبل", "وادي", "غابة استوائية", "سفينة فضاء", "محطة مير", "الغواصة", "منطاد", "هليكوبتر", "سفينة حربية", "ناقلة نفط", "كاسحة ثلوج", "أهرامات", "البتراء", "جرش", "قلعة عجلون", "قصر أموي", "معبد قديم", "بيت مهجور", "سفينة قراصنة", "مدينة مفقودة", "المريخ", "عطارد", "ثقب أسود", "غيمة", "تحت الأرض", "المطبخ", "الحمام", "البلكونة", "السطح", "قبو", "علية", "غرفة غسيل", "مستودع", "مكتبة", "ممر", "الحديقة", "داخل الثلاجة", "محفظة نقود", "علبة سردين", "تحت السرير", "فوق النخلة", "طنجرة منسف", "إبريق شاي", "كرتونة بيض", "شاحن تلفون", "سماعة بلوتوث", "مكة", "المدينة المنورة", "القاهرة", "بغداد", "دمشق", "بيروت", "دبي", "الرياض", "لندن", "باريس", "نيويورك", "طوكيو", "برج إيفل", "سور الصين العظيم", "التاج محل", "تمثال الحرية", "محل بلايستيشن", "قهوة شعبية", "محل تصليح تليفونات", "صناعية وادي السير", "البلد", "جبل عمان", "شارع الرينبو", "العبدلي", "دوار الداخلية", "محل كنافة", "فرن مناقيش", "بسطة خضرة", "محل ألعاب", "محل عطور", "محل ساعات", "محكمة", "قسم شرطة", "سجن", "مبنى المخابرات", "البرلمان", "وزارة التربية", "السفارة", "مكتب محامي", "غرفة عمليات", "ثكنة عسكرية", "برج مراقبة", "قاعدة صواريخ", "بيت جدي", "صالة الجيم", "محطة الفضاء الدولية", "نادي الفروسية", "حلبة سباق", "ملعب تنس", "صالة بولينج", "مدينة ملاهي", "زحليقة", "قطار موت", "بيت الرعب", "البحر الميت", "حمامات ماعين", "وادي رم", "العقبة", "جسر عبدون", "المدينة الرياضية", "مجمع بنك الإسكان", "مستشفى البشير", "الجامعة الأردنية", "التكنو", "الهاشمية", "علبة مكياج", "خزانة ملابس", "درج المكتب", "سلة مهملات", "فرن غاز", "غسالة", "نشافة", "مكواة", "مكنسة كهربائية", "اباجورة", "برواز صورة", "ساعة حائط", "سجادة صلاة", "مكتبة عامة", "محل ورد", "دار أيتام", "دار مسنين", "مخيم لاجئين", "خيمة بدو", "مزرعة خيول", "مزرعة دجاج", "منحل عسل", "مشاتل ورد", "داخل كيس شيبس", "تحت الكنباية", "ورا الباب", "جوا الخزانة", "فوق السطح", "جوا الغسالة", "تحت الطاولة", "داخل الشنطة", "جوا الجيبة", "فوق الشجرة", "البرازيل", "ألمانيا", "إسبانيا", "إيطاليا", "الأرجنتين", "تركيا", "المغرب", "تونس", "الجزائر", "مصر", "السودان", "الكويت", "قطر", "البحرين", "عمان", "اليمن", "برج خليفة", "برج العرب", "مول دبي", "جزيرة النخلة", "سوق نايف", "القرية العالمية"];

function showGame(t) { $('.hidden, #main-menu').hide(); if(t==='chess') $('#chess-section').show(); else if(t==='mafia') $('#mafia-section').show(); else if(t==='spy') $('#spy-section').show(); else if(t==='spyOnline') $('#spy-online-section').show(); }

// --- شطرنج متطور بالنقر ---
function hostChess() {
    let sid = Math.floor(1000 + Math.random() * 9000).toString();
    chessPeer = new Peer("CHESS_AHMED_" + sid);
    chessPeer.on('open', () => { $('#chess-setup').hide(); $('#chess-status').text("كود الطاولة: " + sid); });
    chessPeer.on('connection', c => { chessConn = c; myColor = 'w'; startChess(); listenC(); });
}
function joinChess() {
    let cde = $('#chessCodeInput').val(); chessPeer = new Peer();
    chessPeer.on('open', () => { chessConn = chessPeer.connect("CHESS_AHMED_" + cde); chessConn.on('open', () => { myColor = 'b'; startChess(); listenC(); }); });
}
function startChess() {
    $('#chess-setup').hide(); $('#chess-board-container').removeClass('hidden');
    board = Chessboard('board', { draggable: false, orientation: myColor==='w'?'white':'black', position: 'start', pieceTheme: 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/kosal/{piece}.svg' });
    $('#board').on('click', '.square-55d63', function() {
        let sq = $(this).data('square'); if(chessGame.turn()!==myColor) return;
        let p = chessGame.get(sq);
        if(p && p.color===myColor) {
            $('.square-55d63').removeClass('highlight-selected'); $('.highlight-hint').remove();
            selectedSquare = sq; $(this).addClass('highlight-selected');
            chessGame.moves({square:sq, verbose:true}).forEach(m => $('.square-'+m.to).append('<div class="highlight-hint"></div>'));
        } else if(selectedSquare) {
            let m = chessGame.move({from:selectedSquare, to:sq, promotion:'q'});
            if(m) { board.position(chessGame.fen()); chessConn.send({f:selectedSquare, t:sq}); updateS(); }
            $('.square-55d63').removeClass('highlight-selected'); $('.highlight-hint').remove(); selectedSquare = null;
        }
    });
    updateS();
}
function listenC() { chessConn.on('data', d => { chessGame.move({from:d.f, to:d.t, promotion:'q'}); board.position(chessGame.fen()); updateS(); }); }
function updateS() { $('#turn-display').text("دور: " + (chessGame.turn()==='w'?"الأبيض":"الأسود") + (chessGame.in_check()?" (كش!)":"")); }

// --- مافيا ---
function addMafiaPlayer() { let n = $('#mafiaPlayerName').val(); if(n){ mPlayers.push(n); $('#mafia-preview').text(mPlayers.join("-")); $('#mafiaPlayerName').val(""); } }
function startMafiaDist() {
    let nIdx = Math.floor(Math.random()*mPlayers.length), nName = mPlayers[nIdx], acts = mPlayers.filter((_,i)=>i!==nIdx);
    let roles = acts.map((_,i)=>i===0?"مافيا 🔪":"مواطن 👨‍🌾").sort(()=>Math.random()-0.5);
    $('#mafia-setup').hide(); $('#mafia-board').removeClass('hidden'); $('#narrator-name').html(`<div class="narrator-box">الراوي: ${nName}</div>`);
    acts.forEach((p,i)=>{ let c = $(`<div class="mafia-card">${p}<div class="role-display">${roles[i]}</div></div>`); c.click(function(){$(this).find('.role-display').toggle();}); $('#mafia-cards-container').append(c); });
}

// --- جاسوس أوفلاين ---
function addSpyPlayer() { let n = $('#spyPlayerName').val(); if(n){ sPlayers.push(n); $('#spy-preview').text(sPlayers.join("-")); $('#spyPlayerName').val(""); } }
function startSpyDist() {
    let pl = spyPlaces[Math.floor(Math.random()*spyPlaces.length)], sIdx = Math.floor(Math.random()*sPlayers.length);
    $('#spy-setup').hide(); $('#spy-board').removeClass('hidden');
    sPlayers.forEach((p,i)=>{ let r = (i===sIdx)?"جاسوس 🕵️":pl; let c = $(`<div class="spy-card">${p}<div class="role-display">${r}</div></div>`); c.click(function(){$(this).find('.role-display').toggle();}); $('#spy-cards-container').append(c); });
}

// --- جاسوس أونلاين ---
function hostRoom() {
    myName = $('#spyNick').val(); host = true; peer = new Peer("ROOM_"+Math.floor(100+Math.random()*899));
    peer.on('open', i => { $('#spy-online-setup').hide(); $('#lobby').show(); $('#display-room-id').text("كود: "+i); players.push({name:myName, id:i}); updateL(); $('#start-btn').show(); });
    peer.on('connection', c => { c.on('data', d => { if(d.type==='join'){players.push({name:d.name, id:c.peer}); bcast({type:'list', list:players}); updateL();} if(d.type==='vote') hVote(d.voter, d.target); }); });
}
function joinRoom() {
    myName = $('#spyNick').val(); peer = new Peer();
    peer.on('open', i => { let c = peer.connect($('#roomCode').val()); c.on('open', () => { c.send({type:'join', name:myName}); $('#spy-online-setup').hide(); $('#lobby').show(); }); 
    c.on('data', d => { if(d.type==='list'){players=d.list; updateL();} if(d.type==='start') sView(d.role, d.names); if(d.type==='res') sRes(d.spy, d.logs); }); });
}
function updateL(){ $('#online-players-list').text("الموجودين: "+players.map(p=>p.name).join(", ")); }
function bcast(d){ Object.values(peer.connections).forEach(c=>c[0].send(d)); }
function startOnlineGame(){
    let pl = spyPlaces[Math.floor(Math.random()*spyPlaces.length)], sIdx = Math.floor(Math.random()*players.length); peer.actualSpy = players[sIdx].name; votesReceived = [];
    players.forEach((p,i)=>{ let r = (i===sIdx)?"جاسوس 🕵️":pl; if(p.name===myName) sView(r, players.map(pl=>pl.name)); else { let c = Object.values(peer.connections).find(cn=>cn[0].peer===p.id); if(c) c[0].send({type:'start', role:r, names:players.map(pl=>pl.name)}); } });
}
function sView(r, nms){ $('#lobby').hide(); $('#game-play').show(); $('#my-role').text(r); let btns = $('#vote-btns').empty(); nms.forEach(n=>{ if(n!==myName) btns.append(`<button class="vote-btn" onclick="sVote('${n}')">${n}</button>`); }); }
function sVote(t){ if(host) hVote(myName, t); else peer.connections[Object.keys(peer.connections)[0]][0].send({type:'vote', voter:myName, target:t}); }
function hVote(v, t){ votesReceived.push(`${v} -> ${t}`); if(votesReceived.length>=players.length){ bcast({type:'res', spy:peer.actualSpy, logs:votesReceived}); sRes(peer.actualSpy, votesReceived); }}
function sRes(s, l){ $('#vote-btns').hide(); $('#vote-log-container').html(l.join("<br>")); $('#final-result').text("الجاسوس كان: "+s); }
</script>
</body>
</html>
